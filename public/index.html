// Limites de zone : au maximum 10 combattants ET 10 artefacts par joueur.
const MAX_COMBATANTS_PER_ZONE = 10;
const MAX_ARTIFACTS_PER_ZONE = 10;

function setupDrops(dropLeft, dropRight, lineArray, who){
  [dropLeft, dropRight].forEach(drop=>{
    drop.addEventListener('dragover', e=>{
      if (currentTurn !== who) return;
      if (!currentDragInfo) return;
      if (currentDragInfo.fromId === 'lineTop' || currentDragInfo.fromId === 'lineBottom') return;
      const card = currentDragInfo.card;
      const type  = getType(card.label);
      if (type === 'action' || type === 'familier' || type === 'artefact') {
        flashDenied(drop);
        return;
      }
      if (lineArray.length >= MAX_COMBATANTS_PER_ZONE) { flashDenied(drop); return; }
      if (!canPlayThisCardNow(who, card)) return;
      e.preventDefault();
      drop.classList.add('highlight');
    });

    drop.addEventListener('dragleave', ()=> drop.classList.remove('highlight'));

    drop.addEventListener('drop', e=>{
      if (currentTurn !== who) return;
      e.preventDefault();
      drop.classList.remove('highlight');
      if (!currentDragInfo) return;
      const fromId = currentDragInfo.fromId;

      const peek = findCardInSource(fromId, currentDragInfo.id);
      if (!peek) return;

      // Limite de zone : 10 combattants maximum par joueur.
      if (lineArray.length >= MAX_COMBATANTS_PER_ZONE) {
        flashDenied(drop);
        pushHistory('info', `Zone de combat pleine (${MAX_COMBATANTS_PER_ZONE} combattants maximum) : impossible de poser ${cardAnchor(peek.card.label)}.`);
        return;
      }

      if (!canPlayThisCardNow(who, peek.card)) { flashDenied(drop); return; }

      const card = takeCardFromSource(fromId, currentDragInfo.id);
      if (!card) return;

      const type  = getType(card.label);
      if (type === 'action' || type === 'familier' || type === 'artefact') { flashDenied(drop); return; }

      consumeAllowanceIfNeeded(who, card);

      resetStatsToBaseWhenEnteringBattle(card);

      if (!hasTag(card, 'rapide') && card.label !== 'C6' && card.label !== 'C59') {
        markAttacked(who, card);
      }

      if (card.label === 'C2' && (fromId==='handTop' || fromId==='handBottom')) { addMithril(who); }
      if (card.label === 'C6') { nonKryllsAllowance[who] = (nonKryllsAllowance[who]||0) + 1; }
      if (drop === dropLeft) lineArray.unshift(card); else lineArray.push(card);
      pushHistory('jeu', `${cardAnchor(card.label)} joué en combat (${playerLabel(who)}).`);
      broadcastAndPlaySfx('posecarte');

      if (card.label === 'C119') {
        handleNoxrocEffect(who);
      }

      if (card.label === 'C111') {
        pushHistory('jeu', `${cardAnchor('C111')} déploie une vague de froid sur la ligne adverse !`);

        const opp = (who === 'top') ? 'bottom' : 'top';
        const oppLine = getLineByOwner(opp);

        if (oppLine.length > 0) {
          const targetLeft = oppLine[0];
          applyFreezeToCard(targetLeft);

          if (oppLine.length > 1) {
            const targetRight = oppLine[oppLine.length - 1];
            applyFreezeToCard(targetRight);
          }
        } else {
          pushHistory('info', `La ligne adverse est vide, l'effet de ${cardAnchor('C111')} ne trouve aucune cible.`);
        }
      }

      if (card.label === 'C109') {
        const whoLabelText = playerLabel(who);

        addMithril(who);
        addMithril(who);
        pushHistory('mithril', `${whoLabelText} gagne 2 Mithril grâce à ${cardAnchor('C109')}.`);

        const allCombatants = topLine.concat(botLine);
        const diplomatsOnBoard = allCombatants.filter(c => hasTag(c, 'Diplomate'));

        if (diplomatsOnBoard.length > 1) {
          const opp = (who === 'top') ? 'bottom' : 'top';
          // "Doubler" le Mithril de chacun revient à lui ajouter un montant
          // égal à ce qu'il possède déjà — en passant par addMithril() pour
          // que Malocux (C68), si présent en face, capture bien ce gain.
          const whoBefore = mithril[who];
          const oppBefore = mithril[opp];
          for (let i = 0; i < whoBefore; i++) addMithril(who);
          for (let i = 0; i < oppBefore; i++) addMithril(opp);
          pushHistory('info', `Un autre diplomate est en jeu ! Le Mithril des deux joueurs est doublé.`);
        }

        updateMithril();
      }

      if (card.label === 'C110') {
        const whoLabelText = playerLabel(who);
        pushHistory('jeu', `${cardAnchor('C110')} déchaîne son pouvoir contre les Esprits !`);

        const topEsprits = topLine.filter(c => hasTag(c, 'Esprit'));
        const botEsprits = botLine.filter(c => hasTag(c, 'Esprit'));
        const totalDestroyed = topEsprits.length + botEsprits.length;

        if (totalDestroyed > 0) {
          topEsprits.forEach(cardToDestroy => {
            detachFamiliarsOnHost(cardToDestroy, 'top');
            discardCard(cardToDestroy, 'top', 'destroyed');
          });
          botEsprits.forEach(cardToDestroy => {
            detachFamiliarsOnHost(cardToDestroy, 'bottom');
            discardCard(cardToDestroy, 'bottom', 'destroyed');
          });

          const espritIds = topEsprits.concat(botEsprits).map(c => c.id);
          const newTop = topLine.filter(c => !espritIds.includes(c.id));
          const newBot = botLine.filter(c => !espritIds.includes(c.id));
          topLine.length = 0; topLine.push(...newTop);
          botLine.length = 0; botLine.push(...newBot);

          for (let i = 0; i < totalDestroyed; i++) addMithril(who);
          pushHistory('mithril', `${whoLabelText} gagne ${totalDestroyed} Mithril pour les Esprits détruits.`);

        } else {
          pushHistory('info', `Aucun combattant Esprit n'est présent sur le terrain.`);
        }
      }

      let diedOnEntry = false;
      try {
        diedOnEntry = onCharacterEnterBattlefield(card, who);

        if (!diedOnEntry && card.label === 'C117') {
            startDollyHeal(who, 'jouée', () => { fullRender(); });
        }

        if (!diedOnEntry && card.label === 'C59') {
            const allArts = topArts.concat(botArts);
            if (allArts.length > 0) {
                startC59DestroySelection(who);
            } else {
                pushHistory('info', `${cardAnchor('C59')} entre en jeu, mais il n'y a aucun artefact à détruire.`);
            }
        }

        if (!diedOnEntry && card.label === 'C20') {
            pendingWadooPlay = { owner: who, count: 1 };
            openButtonsPrompt(
              'Yzerta',
              "Effet activé : Vous pouvez maintenant jouer une carte de la faction <strong>Wadoo</strong> depuis votre main durant ce tour.",
              null,
              [{ label:'Compris', className:'confirm', onClick:()=>{} }]
            );
        }
        if (!diedOnEntry && card.label === 'C62') {
            pendingKryllsPlay = { owner: who, count: 1 };
            openButtonsPrompt(
              'Decebale',
              "Effet activé : Vous pouvez maintenant jouer une carte de la faction <strong>Krylls</strong> depuis votre main durant ce tour.",
              null,
              [{ label:'Compris', className:'confirm', onClick:()=>{} }]
            );
        }
      } catch (err) {
        // Filet de sécurité supplémentaire : quoi qu'il arrive dans les effets
        // spéciaux ci-dessus, la carte doit toujours s'afficher immédiatement.
        console.error(`Erreur après la pose de ${card && card.label} :`, err);
      }

      fullRender();
    });
  });
}

/* ---------- Drops ARTEFACTS ---------- */
function setupArtifactDrops(dropLeft, dropRight, arr, who){
  [dropLeft, dropRight].forEach(drop=>{
    drop.addEventListener('dragover', e=>{
      if (currentTurn !== who) return;
      if (!currentDragInfo) return;
      if (!(currentDragInfo.fromId === 'handTop' || currentDragInfo.fromId === 'handBottom')) return;
      if (getType(currentDragInfo.label) !== 'artefact') return;
      if (arr.length >= MAX_ARTIFACTS_PER_ZONE) { flashDenied(drop); return; }
      if (!canPlayThisCardNow(who, currentDragInfo.card)) return;
      e.preventDefault();
      drop.classList.add('highlight');
    });

    drop.addEventListener('dragleave', ()=> drop.classList.remove('highlight'));

    drop.addEventListener('drop', e=>{
      if (currentTurn !== who) return;
      e.preventDefault();
      drop.classList.remove('highlight');
      if (!currentDragInfo) return;
      const fromId = currentDragInfo.fromId;
      const peek = findCardInSource(fromId, currentDragInfo.id);
      if (!peek) return;
      if (!(fromId === 'handTop' || fromId === 'handBottom')) return;
      if (getType(peek.card.label) !== 'artefact') return;

      // Limite de zone : 10 artefacts maximum par joueur — vérifié AVANT de
      // retirer la carte de la main, pour ne jamais la faire disparaître.
      if (arr.length >= MAX_ARTIFACTS_PER_ZONE) {
        flashDenied(drop);
        pushHistory('info', `Zone d'Artefacts pleine (${MAX_ARTIFACTS_PER_ZONE} artefacts maximum) : impossible de poser ${cardAnchor(peek.card.label)}.`);
        return;
      }

      consumeAllowanceIfNeeded(who, peek.card);
      const card = takeCardFromSource(fromId, currentDragInfo.id);
      if (!card) return;

      if (card.label === 'C7') {
        card.charges = 3;
      }
      if (card.label === 'C112') {
        card.charges = 0;
      }
      if (card.label === 'C227') {
        card.charges = 1;
      }

      if (drop === dropLeft) arr.unshift(card); else arr.push(card);
      pushHistory('jeu', `${cardAnchor(card.label)} joué en zone Artefacts (${playerLabel(who)}).`);
      broadcastAndPlaySfx('posecarte');
      fullRender();
    });
  });
}

/* ---------- Drag util ---------- */
function takeCardFromSource(fromId, cardId){
  let arr=null;
  if(fromId==='handBottom') arr=botHand;
  else if(fromId==='handTop') arr=topHand;
  else if(fromId==='lineBottom') arr=botLine;
  else if(fromId==='lineTop') arr=topLine;
  if(!arr) return null;
  const idx = arr.findIndex(c=>c.id===cardId); if(idx===-1) return null;
  return arr.splice(idx,1)[0];
}

/* ---------- Défausse & EXIL ---------- */
const exileStack = document.getElementById('exileStack');
const exileCarousel = document.getElementById('exileCarousel');

function checkForIdoleDeFielTrigger(exiledCard, hpBeforeExile) {
  if (getType(exiledCard.label) !== 'personnage' || hpBeforeExile > 2) {
    return;
  }
  topArts.forEach(artifact => {
    if (artifact.label === 'C53') {
      addMithril('top');
      pushHistory('artefact', `${cardAnchor('C53')} rapporte +1 Mithril à ${playerLabel('top')} (créature de ${hpBeforeExile} PV exilée).`);
    }
  });
  botArts.forEach(artifact => {
    if (artifact.label === 'C53') {
      addMithril('bottom');
      pushHistory('artefact', `${cardAnchor('C53')} rapporte +1 Mithril à ${playerLabel('bottom')} (créature de ${hpBeforeExile} PV exilée).`);
    }
  });
}

function addToExile(card, context = {}){
    // Animation "absorption par le portail" — capturée ICI, avant toute
    // mutation d'état, pendant que l'élément DOM de la carte existe encore
    // réellement à l'écran (il ne sera retiré qu'au prochain fullRender()).
    // Point d'entrée UNIQUE de toutes les cartes vers l'Exil : cette seule
    // ligne couvre donc automatiquement absolument tous les cas du jeu.
    animateCardToExile(card);

    // KRYLLS (nouveau lot) : Arakcrabe (T15) — reprend son identité
    // d'Arakcube (C37) dès qu'elle rejoint l'Exil, quelle qu'en soit la
    // raison (l'animation ci-dessus a déjà capturé son apparence de
    // familier avant cette transformation, donc rien ne change visuellement
    // pendant l'absorption elle-même).
    if (card.label === 'T15') {
      const owner = ownerOfCardOnBoard(card) || card.playOwner || 'bottom';
      card = createCard('C37', owner === 'top' ? 'T' : 'B');
    }
    // KRYLLS (nouveau lot) : Mezamorph (C41) — redevient lui-même dès qu'il
    // se détache, quel que soit le familier qu'il imitait au moment de son
    // départ (on se base sur le drapeau mezamorphOriginal, pas sur son label
    // courant qui change dynamiquement).
    if (card.mezamorphOriginal) {
      const owner = ownerOfCardOnBoard(card) || card.playOwner || 'bottom';
      card = createCard('C41', owner === 'top' ? 'T' : 'B');
    }

    // ===================================================================
    // DÉBUT DE LA LOGIQUE DE RESTITUTION GÉNÉRIQUE DU MITHRIL CAPTURÉ
    // ===================================================================
    if (typeof card.capturedMithril === 'number' && card.capturedMithril > 0) {
        const owner = ownerOfCardOnBoard(card) || card.playOwner;
        if (owner) {
            const opp = (owner === 'top') ? 'bottom' : 'top';
            for (let i = 0; i < card.capturedMithril; i++) addMithril(opp);
            pushHistory('info', `${cardAnchor(card.label)} quitte le jeu et restitue ${card.capturedMithril} Mithril à ${playerLabel(opp)}.`);
            card.capturedMithril = 0;
        }
    }
    // ===================================================================
    // FIN DE LA LOGIQUE DE RESTITUTION
    // ===================================================================

    if (card.label === 'C58' && typeof card.charges === 'number' && card.charges > 0) {
        const owner = card.playOwner || 'bottom';
        startC58HealingSelection(owner, card.charges);
        pushHistory('artefact', `${cardAnchor('C58')} quitte le jeu et libère ${card.charges} charges de soin.`);
    }
    if (typeof context.hpBefore === 'number') {
        checkForIdoleDeFielTrigger(card, context.hpBefore);
    }
    if (getType(card.label) === 'personnage') {
        card.hp = getBaseHP(card.label);
        card.shield = getBaseShield(card.label);
    }
    cleanupPrismisLinksOnCardRemoval(card);
    cleanupWadooLinksOnCardRemoval(card);
    exilePile.unshift(card);
    updateExileUI();
    fullRender();

}
function updateExileUI(){ exileStack.setAttribute('data-count', exilePile.length); renderExileCarousel(); }

function renderExileCarousel(){
  exileCarousel.innerHTML = '';
  exilePile.forEach((card, idx) => {
    const t = document.createElement('div');
    t.className = 'thumb';
    const url = getCardImage(card.label);
    if (url) {
      loadImage(url)
        .then(() => { t.style.backgroundImage = `url(${url})`; attachHP(t, card); })
        .catch(() => { t.textContent = cardName(card.label); attachHP(t, card); });
    } else {
      t.textContent = cardName(card.label);
      attachHP(t, card);
    }
    t.addEventListener('mouseenter', () => showZoom(card.label, card));
    t.addEventListener('mouseleave', hideZoom);
    t.addEventListener('click', () => {
      if (!c18SelectMode) return;
      const owner = c18SelectMode.owner;
      const discardArr = (owner === 'top') ? topDiscard : botDiscard;
      const chosen = exilePile.splice(idx, 1)[0];
      if (!chosen) return;
      discardArr.unshift(chosen);
      c18SelectMode.picked++;
      addMithril(owner);
      updateExileUI();
      updateDiscardUI();
      fullRender();
      if (c18SelectMode.picked >= c18SelectMode.toPick || exilePile.length === 0) {
        endAzpiryneSelection(owner);
      }
    });
    exileCarousel.appendChild(t);
  });
}

function renderDiscardCarousel(carouselEl, pile){
  carouselEl.innerHTML = '';
  pile.forEach((card, idx) => {
    const t = document.createElement('div');
    t.className = 'dthumb';
    const url = getCardImage(card.label);
    if (url) {
      loadImage(url)
        .then(() => { t.style.backgroundImage = `url(${url})`; attachHP(t, card); })
        .catch(() => { t.textContent = cardName(card.label); attachHP(t, card); });

        const isOwnPile = (carouselEl.id === (powner === 'top' ? 'discardTopCarousel' : 'discardBottomCarousel'));

        const sourcePile = (powner === 'top') ? topDiscard : botDiscard;
        const chosen = sourcePile.splice(idx, 1)[0];
        if (!chosen) return;
        animateVortexTransfer(t, toDeckEl, chosen.label);
        deck.unshift(chosen);
        pilateSelectMode.card.charges = Math.max(0, (pilateSelectMode.card.charges || 0) - 1);
        pushHistory('info', `${cardAnchor('C216')} dépense une charge : ${cardAnchor(chosen.label)} replacée sur le dessus de son deck.`);
        markAttacked(powner, pilateSelectMode.card);

        setForceOpenDiscards(false);
        updateDeckCounters();

        fullRender();

      }
      if (!c9SelectMode) return;
      const owner = c9SelectMode.owner;
      const toDeckEl = document.getElementById(owner === 'top' ? 'deckTop' : 'deckBottom');
      const deck = (owner === 'top') ? topDeck : botDeck;

      const sourcePile = isTop ? topDiscard : botDiscard;
      const chosen = sourcePile.splice(idx, 1)[0];
      if (!chosen) return;
      animateVortexTransfer(t, toDeckEl, chosen.label);
      deck.unshift(chosen);
      pushHistory('info', `${cardAnchor('C9')} place ${cardAnchor(chosen.label)} au-dessus de son deck.`);
      const mask = document.getElementById('c9SelectOverlay'); if (mask) mask.remove();
      c9SelectMode && markAttacked(owner, c9SelectMode.card);
      c9SelectMode = null;
      setForceOpenDiscards(false);
      updateDeckCounters();
      updateDiscardUI();
      fullRender();
    });
    carouselEl.appendChild(t);
  });

/* --- Défausse API --- */
function returnSealedToOpponentDeck(card, owner){
  if(card.label!=='C8') return;
  const opp = (owner==='top')?'bottom':'top';
  const deck = (opp==='top') ? topDeck : botDeck;
  if(Array.isArray(card.sealed)){
    while(card.sealed.length){
      const c = card.sealed.shift();
      const pos = Math.floor(Math.random()*(deck.length+1));
      deck.splice(pos,0,c);
    }
    updateDeckCounters();
  }
}

function discardCard(card, owner, reason='other', context = {}){
  // KRYLLS (nouveau lot) : Arakcrabe (T15) — elle s'était transformée à
  // partir d'Arakcube (C37) pour aller s'attacher à un combattant ; dès
  // qu'elle quitte le jeu pour rejoindre une défausse, quelle qu'en soit la
  // raison (hôte retiré, effet qui la cible directement...), elle reprend
  // son identité d'origine d'Arakcube plutôt que d'exister en défausse sous
  // sa forme de familier.
  if (card.label === 'T15') {
    card = createCard('C37', owner === 'top' ? 'T' : 'B');
  }
  // KRYLLS (nouveau lot) : Mezamorph (C41) — redevient lui-même dès qu'il
  // se détache, quel que soit le familier qu'il imitait (drapeau
  // mezamorphOriginal, indépendant du label courant).
  if (card.mezamorphOriginal) {
    card = createCard('C41', owner === 'top' ? 'T' : 'B');
  }
  // WADOO : Linkrevable (C212) revient dans la zone de combat au lieu de mourir, tant qu'il lui reste des charges
  if (card.label === 'C212' && reason === 'death') {
    if (typeof card.charges !== 'number') card.charges = 4;
    card.charges = Math.max(0, card.charges - 1);
    if (card.charges > 0) {
      card.hp = getBaseHP('C212');
      card.shield = getBaseShield('C212');
      card.wadooLink = null;
      const line = getLineByOwner(owner);
      line.push(card);
      pushHistory('action', `${cardAnchor('C212')} revient dans la zone de combat ! (${card.charges} charge${card.charges>1?'s':''} restante${card.charges>1?'s':''})`);
      fullRender();
      return;
    } else {
      pushHistory('action', `${cardAnchor('C212')} n'a plus de charges : elle ne revient plus cette fois.`);
    }
  }

  // WADOO : Dégourat (C214) — MORT : l'adversaire défausse la carte du dessous de son deck
  if (card.label === 'C214' && reason === 'death') {
    const opp = (owner === 'top') ? 'bottom' : 'top';
    forceDiscardFromDeckBottom(opp, 1, 'C214');
  }

  // WADOO 3e lot : Bukaku (C223) — MORT : crée deux exemplaires de l'artefact
  // Qasar (C224) directement en jeu, dans la zone d'Artefacts de son propriétaire.
  if (card.label === 'C223' && reason === 'death') {
    const ownerArts = (owner === 'top') ? topArts : botArts;
    const ownerPrefix = (owner === 'top') ? 'T' : 'B';
    for (let i = 0; i < 2; i++) {
      ownerArts.push(createCard('C224', ownerPrefix));
    }
    pushHistory('artefact', `${cardAnchor('C223')} meurt et fait apparaître 2 exemplaires de ${cardAnchor('C224')} !`);
  }

  // ===================================================================
  // DÉBUT DE LA LOGIQUE DE RESTITUTION GÉNÉRIQUE DU MITHRIL CAPTURÉ
  // ===================================================================
  // Cette logique s'applique à Malocux (C68) ET à toute carte avec du Mithril via Scaracy (C163)
  if (typeof card.capturedMithril === 'number' && card.capturedMithril > 0) {
    const opp = (owner === 'top') ? 'bottom' : 'top';
    for (let i = 0; i < card.capturedMithril; i++) addMithril(opp);
    pushHistory('info', `${cardAnchor(card.label)} quitte le jeu et restitue ${card.capturedMithril} Mithril à ${playerLabel(opp)}.`);
    card.capturedMithril = 0; // On réinitialise le compteur
  }

// ===================================================================
// DÉBUT DE LA LOGIQUE DE SOIN POUR LUCIA (C165)
// ===================================================================
// On vérifie si la défausse est manuelle ("manual")
if (reason === 'manual') {
    const opp = (owner === 'top') ? 'bottom' : 'top';
    const oppLine = getLineByOwner(opp);
    const luciasInPlay = oppLine.filter(c => c.label === 'C165');

    if (luciasInPlay.length > 0) {
        pushHistory('info', `La défausse de ${cardAnchor(card.label)} déclenche l'effet de ${luciasInPlay.map(l => cardAnchor(l.label)).join(' et ')} !`);

        // Pour chaque Lucia en jeu, on soigne tous les combattants
        luciasInPlay.forEach(lucia => {
            oppLine.forEach(combatant => {
                if (getType(combatant.label) === 'personnage' && combatant.label !== 'C62') {
                    combatant.hp = (combatant.hp || 0) + 4;
                    playHPHitEffect(combatant); // Effet visuel du soin
                }
            });
        });
        pushHistory('pv', `Tous les combattants de ${playerLabel(opp)} gagnent +${luciasInPlay.length} PV.`);
    }
}
// ===================================================================
// FIN DE LA LOGIQUE DE SOIN POUR LUCIA
// ===================================================================
  // ===================================================================
  // FIN DE LA LOGIQUE DE RESTITUTION
  // ===================================================================

  if (card.isPaintedCopy) {
    addToExile(card, context);
    pushHistory('exil', `${cardAnchor(card.label)} part en EXIL (copie peinte).`);
    return;
  }
  if (card.isMirroredCopy) {
    addToExile(card, context);
    pushHistory('exil', `${cardAnchor(card.label)} part en EXIL (copie miroir).`);
    return;
  }

// Règle spéciale pour la Larve (T02) : elle est bannie si détruite
  if (card.label === 'T02' && reason === 'death') {
    addToExile(card, context);
    pushHistory('exil', `${cardAnchor('T02')} est bannie en EXIL.`);
    return; // On arrête la fonction ici
  }

  if (card.label === 'C66' && reason === 'death') {
    handleBoombaDeathrattle();
  }
  if (card.label === 'C117' && reason === 'death') {
    startDollyHeal(owner, 'détruite', () => {});
  }
  if (card.label === 'C61' && reason === 'death') {
    handlePestrassDeathrattle(owner);
  }
  if (card.label === 'C25' && reason === 'death') {
    const krouzpierOpp = (owner === 'top') ? 'bottom' : 'top';
    if (getLineByOwner(krouzpierOpp).length > 0) {
      startKrouzpierChain(owner);
    } else {
      pushHistory('info', `${cardAnchor('C25')} : aucun combattant adverse en zone de combat, son effet ne se déclenche pas.`);
    }
  }
  // KRYLLS (nouveau lot) : Tokzik (C35) — MORT : exile un combattant adverse (ciblage par clic).
  if (card.label === 'C35' && reason === 'death') {
    const tokzikOpp = (owner === 'top') ? 'bottom' : 'top';
    if (getLineByOwner(tokzikOpp).length > 0) {
      startTokzikTargeting(owner, tokzikOpp);
    } else {
      pushHistory('info', `${cardAnchor('C35')} : aucun combattant adverse en zone de combat, son effet ne se déclenche pas.`);
    }
  }
  // KRYLLS (nouveau lot) : Kryo (C38) — MORT : gèle un combattant adverse.
  if (card.label === 'C38' && reason === 'death') {
    const kryoOpp = (owner === 'top') ? 'bottom' : 'top';
    if (getLineByOwner(kryoOpp).length > 0) {
      startKryoTargeting(owner, kryoOpp);
    } else {
      pushHistory('info', `${cardAnchor('C38')} : aucun combattant adverse en zone de combat, son effet ne se déclenche pas.`);
    }
  }
  if (card.label === 'C58' && typeof card.charges === 'number' && card.charges > 0) {
      startC58HealingSelection(owner, card.charges);
      pushHistory('artefact', `${cardAnchor('C58')} quitte le jeu et libère ${card.charges} charges de soin.`);
  }
  if (card.label === 'C55') {
    const ownerLabelText = playerLabel(owner);
    const opp = (owner === 'top') ? 'bottom' : 'top';
    const discardPile = (owner === 'top') ? topDiscard : botDiscard;
    addMithril(owner);
    if (mithril[opp] > 0) mithril[opp]--;
    updateMithril();
    pushHistory('défausse', `${cardAnchor('C55')} : ${ownerLabelText} gagne +1 Mithril, l'adversaire en perd 1.`);
    if (discardPile.length >= 2) {
      const toExile1 = discardPile.shift();
      const toExile2 = discardPile.shift();
      addToExile(toExile1);
      addToExile(toExile2);
      pushHistory('exil', `${ownerLabelText} exile ${cardAnchor(toExile1.label)} et ${cardAnchor(toExile2.label)} via l'effet de Loloth.`);
    } else {
      pushHistory('info', `L'effet d'exil de ${cardAnchor('C55')} ne s'active pas (pas assez de cartes en défausse).`);
    }
  }
  if(card.label==='C1'){
    if (typeof card.hp==='number' && card.label !== 'C62') card.hp += 2; else card.hp = (CARD_HP_BASE['C1']||0) + 2;
    const deck = (owner==='bottom') ? botDeck : topDeck;
    const pos = Math.floor(Math.random() * (deck.length + 1));
    deck.splice(pos, 0, card);
    updateDeckCounters();
    pushHistory('info', `${cardAnchor('C1')} retourne dans le deck (effet).`);
    return;
  }
  if(reason==='death' && card.label==='C12'){
    addMithril(owner);
    addToExile(card, context);
    pushHistory('exil', `${cardAnchor('C12')} meurt : +1 Mithril au propriétaire puis EXIL.`);
    return;
  }
  if(card.label==='C2'){
    addToExile(card, context);
    pushHistory('exil', `${cardAnchor(card.label)} est exilé.`);
    return;
  }
  const diedMyzor = (card.label==='C6' && reason==='death');
  if(card.label==='C8'){ returnSealedToOpponentDeck(card, owner); }
  if(getType(card.label)==='personnage' && card.label !== 'C62'){
    card.hp = getBaseHP(card.label);
    card.shield = getBaseShield(card.label);
  }
  triggerWadooDollDeath(card, owner);
  cleanupPrismisLinksOnCardRemoval(card);
  cleanupWadooLinksOnCardRemoval(card);
  if (context.toExile) {
    // Redirection finale vers l'Exil (ex : tuée par Styx/C52) — tous les
    // effets de MORT ci-dessus se sont déjà déclenchés normalement, seule la
    // destination finale de la carte change.
    addToExile(card, context);
    pushHistory('exil', `${cardAnchor(card.label)} est exilé${context.exileReason === 'C52' ? ` par l'effet de ${cardAnchor('C52')}` : ''} au lieu d'aller en défausse.`);
  } else {
    // Capturé juste avant la mutation d'état, tant que l'élément DOM de la
    // carte est encore affiché tel quel à l'écran.
    animateCardToDiscard(card, owner);
    if(owner==='bottom') botDiscard.unshift(card); else topDiscard.unshift(card);
    updateDiscardUI(); refreshDiscardPanels();
    const why = (reason==='death')?'(détruite)': (reason==='zwyffer')?'(Zwyffer)':
                (reason==='action')?'(action jouée)':(reason==='cost')?'(coût)':'';
    pushHistory('défausse', `${cardAnchor(card.label)} va en défausse ${why}.`);
  }
  if(diedMyzor){
    for(let i=0;i<3;i++){
      if(!drawOneFor(owner)){
        const reshuffled = reshuffleDiscardIntoDeck(owner);
        if(!reshuffled) break;
        drawOneFor(owner);
      }
    }
    fullRender();
  }
}

/* ---------- Cycles (reshuffle) ---------- */
const cycles = { top:0, bottom:0 };

function cyclePipsHTML(count){
  let html = '<div class="cycleLabel">Cycles</div>';
  for(let i=1;i<=3;i++){
    const active = (i<=count) ? ' active' : '';
    const critical = (i===3) ? ' critical' : '';
    html += `<div class="cyclePip${active}${critical}" title="Cycle ${i}/3${i===3?' — Défaite immédiate':''}">☠</div>`;
  }
  return html;
}

function renderCycles(){
  const t = document.getElementById('cyclesTop');
  const b = document.getElementById('cyclesBottom');
  const setStage = (el, count) => {
    if(!el) return;
    el.innerHTML = cyclePipsHTML(count);
    el.classList.remove('stage1','stage2','stage3');
    if(count>=1 && count<=3) el.classList.add('stage'+count);
  };
  setStage(t, cycles.top);
  setStage(b, cycles.bottom);
}

function flashCycleHUD(player){
  const el = document.getElementById(player==='top' ? 'cyclesTop' : 'cyclesBottom');
  if(!el) return;
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
}

function checkCycleLoss(player){
  if (cycles[player] >= 3){
    const winner = (player === 'bottom') ? 'top' : 'bottom';
    endGame(winner, 'cycle');
  }
}

function incrementCycle(player){
  cycles[player] = Math.min(3, (cycles[player]||0)+1);
  renderCycles();
  flashCycleHUD(player);
  pushHistory('info', `${playerLabel(player)} atteint le cycle ${cycles[player]}/3.`);
  checkCycleLoss(player);
}

function reshuffleDiscardIntoDeck(player){
  const deck = (player==='top') ? topDeck : botDeck;
  const discard = (player==='top') ? topDiscard : botDiscard;
  if(discard.length === 0) return false;
  while(discard.length){ deck.push(discard.shift()); }
  for(let i=deck.length-1; i>0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  incrementCycle(player);
  updateDeckCounters();
  updateDiscardUI();
  return true;
}

// Affiche discrètement, à côté de chaque libellé de zone, le nombre de
// cartes actuellement posées sur les 10 maximum autorisées — passe en rouge
// une fois la limite atteinte, pour bien montrer pourquoi un dépôt échoue.
function updateZoneCounts(){
  const pairs = [
    ['battleCountTop', topLine.length, MAX_COMBATANTS_PER_ZONE],
    ['battleCountBottom', botLine.length, MAX_COMBATANTS_PER_ZONE],

// REMPLACEZ L'ANCIENNE FONCTION PAR CELLE-CI
function setupDumpDrop(dumpEl, owner) {
    dumpEl.addEventListener('dragover', e => {
        if (currentTurn !== owner) return;
        if (!currentDragInfo || currentDragInfo.fromId === 'lineTop' || currentDragInfo.fromId === 'lineBottom') return;

        // MODIFIÉ : On utilise la nouvelle fonction ici
        if (isCardUndiscardable(currentDragInfo.label)) {
            return;
        }

        if (!activeFaction[owner] || !hasTag(currentDragInfo.label, activeFaction[owner])) {
            return;
        }

        e.preventDefault();
        dumpEl.classList.add('highlight');
    });

    dumpEl.addEventListener('dragleave', () => dumpEl.classList.remove('highlight'));

    dumpEl.addEventListener('drop', e => {
        if (currentTurn !== owner) return;
        e.preventDefault();
        dumpEl.classList.remove('highlight');
        if (!currentDragInfo) return;

        const id = currentDragInfo.id;
        const fromId = currentDragInfo.fromId;

        if (fromId === 'lineTop' || fromId === 'lineBottom') {
            flashDenied(dumpEl);
            return;
        }

        const peek = findCardInSource(fromId, id);
        if (!peek) return;

        // VÉRIFICATION N°1 : On utilise la nouvelle fonction pour bloquer Harpess ET l'Éventail
        if (isCardUndiscardable(peek.card.label)) {
            pushHistory('info', `${cardAnchor(peek.card.label)} ne peut pas être défaussée.`);
            flashDenied(dumpEl);
            return;
        }

        // VÉRIFICATION N°2 : On vérifie si la faction de la carte est autorisée
        if (!activeFaction[owner] || !hasTag(peek.card.label, activeFaction[owner])) {
            flashDenied(dumpEl);
            return;
        }

        const card = takeCardFromSource(fromId, id);
        if (!card) return;

        discardCard(card, owner, 'manual');
        broadcastAndPlaySfx('discard');
        fullRender();
    });
}

function checkWin(player) {
  // KRYLLS (nouveau lot) : Forgecoeur (T14) — CHAQUE exemplaire dans la zone
  // d'artefact réduit d'1 le nombre d'A'rms nécessaires à la victoire.
  const forgecoeurCount = ((player === 'top') ? topArts : botArts).filter(a => a.label === 'T14').length;
  const armsNeeded = Math.max(1, 5 - forgecoeurCount);
  if (arms[player] >= armsNeeded) {
    endGame(player, 'forge');
  }
}

// Calcule le coût de forge RÉEL d'une A'rms pour ce joueur, en tenant compte de
// toutes les taxes/réductions actives (Éventail, Anomaly via forgeTax, et le
// rabais ponctuel de Gousset). Cette fonction est la SEULE source de vérité :
// elle est utilisée à la fois pour l'affichage (updateForgeTaxUI) et pour le
// calcul réel au moment de forger (checkForge), afin qu'ils ne puissent
// jamais diverger (auparavant, la réduction d'Anomaly était appliquée deux
// fois côté calcul mais une seule fois côté affichage).
function computeForgeCost(player) {
  const totalTax = forgeTax[player].reduce((sum, effect) => sum + effect.amount, 0);
  let cost = Math.max(1, 3 + totalTax);

  if (gousseDiscountActive[player]) {
    const playerLine = getLineByOwner(player);
    const gousseDiscount = playerLine.filter(c => hasTag(c, 'poupée')).length;
    cost = Math.max(1, cost - gousseDiscount);
  }
  return cost;
}

function checkForge(player){
  if (isSilentarmsActive()) {
    pushHistory('info', `La forge est bloquée par l'effet de ${cardAnchor('C60')}.`);
    return;
  }

  const playerLine = getLineByOwner(player);
  const anomalyCount = playerLine.filter(c => c.label === 'T03').length;
  const gousseDiscount = gousseDiscountActive[player] ? playerLine.filter(c => hasTag(c, 'poupée')).length : 0;
  const cost = computeForgeCost(player);

  let forged=false;
  if(mithril[player] >= cost && arms[player]<5 && !forgedThisTurn[player]){
    mithril[player] -= cost;
    arms[player]++;
    forged=true;
    forgedThisTurn[player]=true;
    if (gousseDiscountActive[player]) gousseDiscountActive[player] = false; // consommé
  }

  if(forged){
    updateMithril();
    renderArms();
    let historyMsg = `${playerLabel(player)} forge 1 A’rms (${arms[player]}/5) pour ${cost} Mithril.`;
    if (anomalyCount > 0) {
        historyMsg += ` (coût réduit par ${cardAnchor('T03')})`;
    }
    if (gousseDiscount > 0) {
        historyMsg += ` (coût réduit par ${cardAnchor('C213')})`;
    }
    pushHistory('artefact', historyMsg);
    checkWin(player);
  }

  updateForgeTaxUI();
}

/* ---------- Pioches & fin de tour ---------- */
function getDeckByOwner(owner) { return owner === 'top' ? topDeck : botDeck; }
function getHandByOwner(owner) { return owner === 'top' ? topHand : botHand; }



function drawOneFor(player){
  const deck = getDeckByOwner(player);
  const hand = getHandByOwner(player);
  if(deck.length>0){ hand.push(deck.shift()); return true; }
  return false;
}

function refillHand(player){
  const hand = getHandByOwner(player);
  const opp = (player === 'top') ? 'bottom' : 'top';
  const maluxCount = countMaluxOnLine(opp);

  // DÉBUT DE LA LOGIQUE MODIFIÉE POUR BUAY (C160)
  // Recalculée à CHAQUE itération de la boucle (pas une seule fois avant) :
  // un Buay pioché PENDANT cette même pioche doit lui aussi étendre la
  // cible, sinon il se retrouve compté à tort comme une carte "normale" et
  // le joueur finit avec une carte de moins que prévu.
  function currentTargetHandSize(){
    const buayCount = hand.filter(card => card.label === 'C160').length;
    return Math.max(0, (6 + buayCount) - maluxCount);
  }
  // FIN DE LA LOGIQUE MODIFIÉE

  if (maluxCount > 0 && hand.length < currentTargetHandSize()) {
      pushHistory('info', `L'effet de ${cardAnchor('C67')} réduit la taille de la main de ${playerLabel(player)} à ${6 - maluxCount} cartes (hors Buay).`);
  }

  const handSizeBeforeRefill = hand.length;
  while(hand.length < currentTargetHandSize()){
    const deck = (player==='top') ? topDeck : botDeck;
    if(deck.length === 0){
      const reshuffled = reshuffleDiscardIntoDeck(player);
      if(!reshuffled) {
        pushHistory('info', `Le joueur ${playerLabel(player)} ne peut plus piocher (deck et défausse vides).`);
        break;
      }
    }
    if(!drawOneFor(player)) {
      break;
    }
  }
  if (hand.length > handSizeBeforeRefill) broadcastAndPlaySfx('shuffle');
  updateDeckCounters();
  fullRender();
}

function startC112Targeting(owner, card, mode) {
    const allCombatants = topLine.concat(botLine);
    const hasValidTarget = allCombatants.some(c =>
        (mode === 'remove' && hasTag(c, 'Esprit')) ||
        (mode === 'add' && !hasTag(c, 'Esprit'))
    );

    if (!hasValidTarget) {
        alert("Aucune cible valide sur le plateau pour cette action.");
        return;
    }

    c112TargetMode = { owner, cardId: card.id, mode };
    closeActionPrompt();

    const promptEl = document.createElement('div');
    promptEl.id = 'c112-prompt';
    promptEl.className = 'actionPrompt';
    promptEl.style.bottom = '100px';
    promptEl.style.left = '50%';
    promptEl.style.transform = 'translateX(-50%)';
    promptEl.style.zIndex = '2000';
    promptEl.innerHTML = `
        <div class="apTitle">Ciblage : Eclesprit</div>
        <div class="apMsg">Choisissez un combattant pour ${mode === 'add' ? 'recevoir' : 'perdre'} la capacité Esprit.</div>
        <div class="apRow">
            <button id="c112-cancel" class="apBtn cancel">Annuler</button>
        </div>
    `;
    document.body.appendChild(promptEl);
    actionPromptEl = promptEl;

    promptEl.querySelector('#c112-cancel').addEventListener('click', endC112TargetingCleanup);
    fullRender();
}

function handleC112TargetSelection(targetCard, targetOwner) {
    if (!c112TargetMode) return;
    const { owner, cardId, mode } = c112TargetMode;

    const isValidTarget =
        (mode === 'remove' && hasTag(targetCard, 'Esprit')) ||
        (mode === 'add' && !hasTag(targetCard, 'Esprit'));

    if (!isValidTarget) return;

    const eclespritCard = findArtifactOnBoard(cardId);
    if (!eclespritCard) {
        console.error("Eclesprit not found!");
        endC112TargetingCleanup();
        return;
    }

    if (mode === 'remove') {
        if (!Array.isArray(targetCard.removedTags)) targetCard.removedTags = [];
        if (!targetCard.removedTags.includes('Esprit')) targetCard.removedTags.push('Esprit');
        const addedIdx = (targetCard.addedTags || []).indexOf('Esprit');
        if (addedIdx > -1) targetCard.addedTags.splice(addedIdx, 1);

        eclespritCard.charges = (eclespritCard.charges || 0) + 1;
        pushHistory('artefact', `${cardAnchor('C112')} retire Esprit à ${cardAnchor(targetCard.label)} et gagne une charge.`);
    } else { // mode === 'add'
        if (!Array.isArray(targetCard.addedTags)) targetCard.addedTags = [];
        if (!targetCard.addedTags.includes('Esprit')) targetCard.addedTags.push('Esprit');
        const removedIdx = (targetCard.removedTags || []).indexOf('Esprit');
        if (removedIdx > -1) targetCard.removedTags.splice(removedIdx, 1);

        eclespritCard.charges--;
        pushHistory('artefact', `${cardAnchor('C112')} donne Esprit à ${cardAnchor(targetCard.label)}.`);
    }

    exhaustArtifact(owner, eclespritCard);
    endC112TargetingCleanup();
}

function endC112TargetingCleanup() {
    c112TargetMode = null;
    closeActionPrompt();
    fullRender();
}

let lastSeenTurnForTimer = null;
function updateTurnUI(){
  const banner = ensureTurnBanner();

  // Minuteur de tour : redémarré dès qu'on détecte ICI un vrai changement de
  // tour — que ce soit le mien qui commence, ou celui de l'adversaire — pour
  // que le décompte défile en temps réel des DEUX côtés. Seul le joueur dont
  // c'est réellement le tour peut le faire passer à zéro (voir performEndTurn
  // et isTurnTimerRelevantForMe), l'autre le voit juste s'écouler.
  if (currentTurn !== 'none' && currentTurn !== lastSeenTurnForTimer) {
    lastSeenTurnForTimer = currentTurn;
    try{ setupTurnTimer(); }catch(err){ console.error('[turnTimer] redémarrage impossible :', err); }
  } else if (currentTurn === 'none') {
    lastSeenTurnForTimer = null;
  }

  if(currentTurn==='none'){
    endBtn.classList.add('hidden');
    banner.classList.remove('show');
  }else{
    if (ONLINE_MODE) {
      const myTurn = (currentTurn === MY_SEAT);
      endBtn.textContent = myTurn ? 'FIN DE TOUR (à moi de jouer)' : "En attente de l'adversaire…";
      endBtn.disabled = !myTurn;
      endBtn.style.opacity = myTurn ? '1' : '.5';
      endBtn.style.cursor = myTurn ? 'pointer' : 'not-allowed';

      banner.textContent = myTurn ? 'À VOUS DE JOUER' : "TOUR DE L'ADVERSAIRE";
      banner.className = 'show ' + (myTurn ? 'my-turn' : 'their-turn');
      document.body.classList.toggle('not-my-turn', !myTurn);
    } else {
      endBtn.textContent = (currentTurn==='bottom')
        ? 'FIN DE TOUR (Joueur 1)'
        : 'FIN DE TOUR (Joueur 2)';
      banner.textContent = (currentTurn==='bottom') ? 'TOUR — JOUEUR 1' : 'TOUR — JOUEUR 2';
      banner.className = 'show my-turn';
    }
    endBtn.classList.remove('hidden');
  }
}
function performEndTurn(){
  if (ONLINE_MODE && currentTurn !== MY_SEAT) return; // en ligne : pas ton tour
  if (!activeFaction[currentTurn]) {
    // Le choix de faction est obligatoire avant toute autre action, fin de
    // tour comprise — sans cela, on pourrait techniquement finir son tour
    // sans avoir rien pu jouer, ou contourner le choix.
    pushHistory('info', `Choisissez d'abord votre faction avant de terminer votre tour.`);
    const btn = document.getElementById('endTurn');
    if (btn) { btn.classList.add('deny'); setTimeout(()=> btn.classList.remove('deny'), 320); }
    return;
  }
  // Même principe pour TOUT choix en cours (cliquer sur un combattant, un
  // artefact, une carte en main dans une liste...) : tant qu'un effet
  // attend une action précise du joueur, "FIN DE TOUR" reste bloqué.
  if (isAnyTargetSelectionActive() || (actionPromptEl && actionPromptEl.parentNode)) {
    pushHistory('info', `Terminez d'abord le choix en cours avant de finir votre tour.`);
    const btn = document.getElementById('endTurn');
    if (btn) { btn.classList.add('deny'); setTimeout(()=> btn.classList.remove('deny'), 320); }
    return;
  }
  // Le son d'urgence du minuteur doit s'arrêter NET dès qu'on termine son
  // tour, plutôt que de continuer à jouer par-dessus le tour suivant.
  try{ if (typeof timerSfx !== 'undefined' && timerSfx) { timerSfx.pause(); timerSfx.currentTime = 0; } }catch(e){}
  // Remet chaque main à sa position d'origine dès qu'on termine son tour.
  if (typeof window.__resetHandPositions === 'function') window.__resetHandPositions();

  const finishingPlayer = currentTurn;
  const nextPlayer = (finishingPlayer === 'bottom') ? 'top' : 'bottom';
  actionBlocked[finishingPlayer] = false; // On retire un éventuel blocage sur LUI

  // PROTECTION CRITIQUE CONTRE LE BLOCAGE TOTAL DE LA PARTIE : chacune de ces
  // étapes exécute potentiellement beaucoup de logique liée aux cartes
  // (entretien, effets de fin de tour...). Si une seule d'entre elles
  // plantait de façon imprévue, l'ancien code s'arrêtait net AVANT même de
  // faire passer le tour au joueur suivant — les DEUX joueurs restaient
  // alors bloqués indéfiniment, le jeu étant strictement au tour par tour.
  // On isole donc chaque étape : le tour change TOUJOURS, quoi qu'il arrive.
  try{ cleanupWhyMeBuffs(); }catch(e){ console.error('[performEndTurn] cleanupWhyMeBuffs a échoué :', e); }
  try{ upkeepCharactersFor(finishingPlayer); }catch(e){ console.error('[performEndTurn] upkeepCharactersFor a échoué :', e); }
  try{ refillHand(finishingPlayer); }catch(e){ console.error('[performEndTurn] refillHand a échoué :', e); }

  currentTurn = nextPlayer;
  updateTurnUI();
  pushHistory('info', `Changement de tour → ${playerLabel(nextPlayer)}.`);

  if (!ONLINE_MODE) {
    try{ startTurn(nextPlayer); }catch(e){ console.error('[performEndTurn] startTurn a échoué :', e); }
  }
  if (ONLINE_MODE) fullRender(); // diffuse le changement de tour ; le nouveau joueur actif lancera son propre startTurn (voir bloc réseau)
}
endBtn.addEventListener('click', performEndTurn);

// ===================================================================
// MINUTEUR DE TOUR — 90 secondes par tour (un temps confortable pour ce
// jeu où l'on peut jouer plusieurs cartes et agir avec plusieurs
// combattants par tour, sans pour autant laisser la partie s'éterniser).
// Anneau + décompte affichés autour du bouton "Fin de tour", changement de
// couleur progressif (vert → orange à 30s → rouge clignotant à 15s), et
// passage automatique du tour si le temps est entièrement écoulé.
// Se met en pause tant qu'une fenêtre de choix bloquante est ouverte, pour
// ne jamais pénaliser un joueur en train de résoudre un effet obligatoire.
// ===================================================================
const TURN_TIME_LIMIT = 90;
const TURN_TIME_URGENT_SFX_AT = 15;
let turnTimerInterval = null;
let turnTimerSecondsLeft = TURN_TIME_LIMIT;
let turnTimerUrgentSfxPlayed = false; // évite de rejouer le son plusieurs fois pour le même tour

function isAnyBlockingModalOpen(){
  const hb = document.getElementById('hardBlocker');
  if (hb && hb.style.display === 'block') return true;
  const wo = document.getElementById('waitOverlay');
  if (wo && wo.style.display && wo.style.display !== 'none') return true;
  return false;
}

function isTurnTimerRelevantForMe(){
  // Le minuteur s'affiche désormais pour LES DEUX joueurs, y compris celui
  // qui n'est pas en train de jouer : il voit le décompte s'écouler en temps
  // réel pour savoir combien de temps il reste avant que le tour ne change.
  // Seul performEndTurn() vérifie séparément si c'est VRAIMENT mon tour avant
  // de le faire réellement passer à zéro.
  return currentTurn !== 'none';
}

function updateTurnTimerVisual(){
  try{
    const wrap = document.getElementById('turnTimerWrap');
    const barFill = document.getElementById('turnTimerBarFill');
    const label = document.getElementById('turnTimerLabel');
    if (!wrap || !barFill || !label) return;

    if (!isTurnTimerRelevantForMe()) {
      wrap.classList.add('hidden');
      return;
    }
    wrap.classList.remove('hidden');

    const ratio = Math.max(0, Math.min(1, turnTimerSecondsLeft / TURN_TIME_LIMIT));
    barFill.style.width = (ratio * 100) + '%';
    label.textContent = String(Math.max(0, Math.ceil(turnTimerSecondsLeft)));

    wrap.classList.remove('warn', 'urgent');
    if (turnTimerSecondsLeft <= 15) wrap.classList.add('urgent');
    else if (turnTimerSecondsLeft <= 30) wrap.classList.add('warn');
  }catch(err){
    console.error('[turnTimer] updateTurnTimerVisual a échoué :', err);
  }
}

function setupTurnTimer(){
  try{
    if (TUTORIAL_TIMER_DISABLED) {
      if (turnTimerInterval) { clearInterval(turnTimerInterval); turnTimerInterval = null; }
      // IMPORTANT : le bouton "FIN DE TOUR" vit À L'INTÉRIEUR de ce
      // conteneur — masquer le conteneur entier le rendrait invisible et
      // impossible à cliquer. On ne masque donc que les éléments propres au
      // minuteur (barre + compte à rebours), jamais le bouton lui-même.
      const barTrack = document.getElementById('turnTimerBarTrack');
      const label = document.getElementById('turnTimerLabel');
      if (barTrack) barTrack.style.display = 'none';
      if (label) label.style.display = 'none';
      return;
    }
    {
      const barTrack = document.getElementById('turnTimerBarTrack');
      const label = document.getElementById('turnTimerLabel');
      if (barTrack) barTrack.style.removeProperty('display');
      if (label) label.style.removeProperty('display');
    }
    if (turnTimerInterval) { clearInterval(turnTimerInterval); turnTimerInterval = null; }
    turnTimerSecondsLeft = TURN_TIME_LIMIT;
    turnTimerUrgentSfxPlayed = false;
    updateTurnTimerVisual();

    turnTimerInterval = setInterval(() => {
      try{
        if (!isTurnTimerRelevantForMe()) {
          // Le tour n'est plus (ou pas encore) le mien : le minuteur local n'a
          // plus lieu d'être actif tant que ça reste vrai.
          updateTurnTimerVisual();
          return;
        }
        if (isAnyBlockingModalOpen()) {
          // En pause : un choix obligatoire est affiché, on ne pénalise pas le
          // joueur pour le temps que ça lui prend à décider.
          return;
        }
        turnTimerSecondsLeft -= 1;
        // Alerte sonore une seule fois par tour, au moment précis où on passe
        // sous le seuil des 15 secondes restantes — UNIQUEMENT pour le joueur
        // dont c'est réellement le tour (pas pour celui qui regarde le
        // décompte de l'adversaire s'écouler en mode spectateur).
        const isGenuinelyMyTurn = !ONLINE_MODE || currentTurn === MY_SEAT;
        if (isGenuinelyMyTurn && !turnTimerUrgentSfxPlayed && turnTimerSecondsLeft <= TURN_TIME_URGENT_SFX_AT && turnTimerSecondsLeft > 0) {
          turnTimerUrgentSfxPlayed = true;
          playTimerUrgentSfx();
        }
        if (turnTimerSecondsLeft <= 0) {
          turnTimerSecondsLeft = 0;
          updateTurnTimerVisual();
          clearInterval(turnTimerInterval);
          turnTimerInterval = null;
          pushHistory('info', 'Temps écoulé — le tour passe automatiquement.');
          performEndTurn();
          return;
        }
        updateTurnTimerVisual();
      }catch(err){
        console.error('[turnTimer] Erreur dans le décompte, minuteur arrêté par sécurité :', err);
        if (turnTimerInterval) { clearInterval(turnTimerInterval); turnTimerInterval = null; }
      }
    }, 1000);
  }catch(err){
    console.error('[turnTimer] setupTurnTimer a échoué :', err);
  }
}

/* Anime un nombre affiché de "from" à "to" sur "durationMs", façon compteur
   de casino/jeu vidéo — utilisé pour les pièces et les points de Menace. */
function animateNumberCounter(el, from, to, durationMs, opts){
  opts = opts || {};
  const startTime = performance.now();
  const diff = to - from;
  function step(now){
    const t = Math.min(1, (now - startTime) / durationMs);
    const eased = 1 - Math.pow(1 - t, 3); // ease-out cubique : rapide puis ralentit
    const val = Math.round(from + diff * eased);
    el.textContent = (opts.sign && val > 0 ? '+' : '') + val + (opts.suffix || '');
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      el.textContent = (opts.sign && to > 0 ? '+' : '') + to + (opts.suffix || '');
      if (opts.onDone) opts.onDone();
    }
  }
  requestAnimationFrame(step);
}

function populateVictoryRewards(data, resultLabel){

  coinRow.style.color = '#ffd93d';
  coinRow.innerHTML = `🪙 <span id="victoryCoinCounter">${Math.max(0, (data.coins||0) - (data.gained||0))}</span>`;

  coinSub.textContent = data.gained > 0 ? `+${data.gained} pièces (${resultLabel})` : `Aucune pièce gagnée (${resultLabel})`;
  zone.appendChild(coinSub);

  const oldCoins = Math.max(0, (data.coins||0) - (data.gained||0));
  animateNumberCounter(document.getElementById('victoryCoinCounter'), oldCoins, data.coins||0, 1100);

  // --- Points de Menace (uniquement si partie CLASSÉE) ---
  if (data.ranked && data.rank && data.previousRank) {
    const rankRow = document.createElement('div');
    rankRow.style.marginTop = '14px';

    rankRow.style.borderTop = '1px solid rgba(255,255,255,.1)';

        <span>⚔ Menace :</span>

        <span style="opacity:.7;">pts</span>
      </div>
      <div id="victoryRankBadgeZone" style="margin-top:10px;"></div>
    `;
    zone.appendChild(rankRow);

    const counterEl = document.getElementById('victoryPointsCounter');
    counterEl.style.color = (data.pointsDelta >= 0) ? '#7dffb0' : '#ff8080';
    animateNumberCounter(counterEl, data.previousRank.points, data.rank.points, 1100, {
      onDone: () => {
        const badgeZone = document.getElementById('victoryRankBadgeZone');
        if (badgeZone) badgeZone.innerHTML = armsRankPillHtml(data.rank);

        // Changement de palier ? Petite célébration (ou notice sobre en cas

        if (data.rank.rankIndex !== data.previousRank.rankIndex) {
          const promoted = data.rank.rankIndex > data.previousRank.rankIndex;

          // qu'on y retourne — le joueur profite du moment une seconde fois

          try{
            sessionStorage.setItem('arms_pending_rank_celebration', JSON.stringify({ rank: data.rank, promoted, ts: Date.now() }));
          }catch(e){}
        }
      }
    });
  }
}

function krRankImageUrl(rank){
  if (!rank) return '';
  const slugMap = { 'Mineure':'mineure','Hostile':'hostile','Mortelle':'mortelle','Apocalyptique':'apocalyptique','Extinction':'extinction' };

}

function armsRankPillHtml(rank){
  if (!rank) return '';
  const colorsByTier = {
    'Mineure':       { c1:'#3ddc84', c2:'#1b7a45', glow:'rgba(61,220,132,.5)',  text:'#c8ffe0' },

/* Grande célébration lorsqu'on franchit un nouveau palier de Menace : vrai
   logo du rang avec une entrée spectaculaire (rotation + rebond), rayons de
   lumière tournants, effet de brillance qui balaie le badge, et confettis
   pour une promotion. Se ferme automatiquement ou au clic. */
function showRankChangeCelebration(newRank, promoted){
  try{
    const overlay = document.createElement('div');
    overlay.id = 'rankChangeOverlay';
    overlay.className = 'rankChangeOverlay';

    const colorsByTier = {
      'Mineure':       '#3ddc84', 'Hostile': '#ffd93d', 'Mortelle': '#ff5c5c',
      'Apocalyptique': '#c86bff', 'Extinction': '#ff3b3b',
    };
    const mainColor = colorsByTier[newRank.tierName] || '#7df9ff';
    const imgUrl = krRankImageUrl(newRank);

    let confettiHtml = '';
    if (promoted) {
      const colors = ['#7df9ff','#ffd93d','#ff5c5c','#c86bff','#3ddc84','#ffffff'];
      for (let i = 0; i < 46; i++) {
        const left = Math.random() * 100;
        const delay = (Math.random() * 0.7).toFixed(2);
        const duration = (2.1 + Math.random() * 1.6).toFixed(2);
        const color = colors[Math.floor(Math.random() * colors.length)];
        const w = (5 + Math.random() * 6).toFixed(1);
        const h = (w * 0.42).toFixed(1);
        const rot = Math.round(Math.random() * 360);
        confettiHtml += `<div class="rcConfetti" style="left:${left}%; animation-delay:${delay}s; animation-duration:${duration}s; background:${color}; width:${w}px; height:${h}px; transform:rotate(${rot}deg);"></div>`;
      }
    }

    overlay.style.setProperty('--rcMainColor', mainColor);
    overlay.innerHTML = `
      <div class="rcConfettiLayer">${confettiHtml}</div>
      <div class="rcRays"></div>
      <div class="rcSubtitle2" style="color:${promoted ? '#aefaff' : '#ffb0b0'};">
        ${promoted ? '✦ Nouveau palier de Menace atteint ✦' : 'Palier de Menace revu à la baisse'}
      </div>
      <div class="rcImgWrap">
        <img src="${imgUrl}" alt="${newRank.label}" class="rcRankImg">
        <div class="rcShine"></div>
      </div>
      <div class="rcLabel" style="color:${mainColor};">${newRank.label}</div>
      <div class="rcHint2">
        ${promoted ? 'Continuez à enchaîner les victoires classées pour aller encore plus loin.' : 'Remportez vos prochaines parties classées pour reprendre votre ascension.'}
      </div>
    `;
    document.body.appendChild(overlay);

    requestAnimationFrame(()=> requestAnimationFrame(()=> overlay.classList.add('go')));

    const dismiss = () => {
      if (overlay.dataset.dismissed) return;
      overlay.dataset.dismissed = '1';
      overlay.classList.remove('go');
      overlay.classList.add('leaving');
      setTimeout(()=>{ if (overlay.parentNode) overlay.remove(); }, 500);
    };
    overlay.addEventListener('click', dismiss);
    setTimeout(dismiss, 6000);
  }catch(e){ }
}

function endGame(winner, reason, opts = {}){
  if(GAME.over) return;
  GAME.over = true;

  currentTurn = 'none';
  const endBtn = document.getElementById('endTurn');
  if(endBtn) endBtn.classList.add('hidden');

  try{ closeActionPrompt(); }catch(e){}
  const c9ov = document.getElementById('c9SelectOverlay'); if(c9ov) c9ov.remove();
  try{ setForceOpenDiscards(false); }catch(e){}

  stopMatchMusic();
  // En ligne, chaque écran sait s'il s'agit d'une victoire ou d'une défaite
  // pour SON propre joueur. En local (hotseat, un seul écran partagé par les
  // deux joueurs), cette distinction n'a pas de sens : on garde le jingle de
  // victoire par défaut, comme auparavant.
  const iWon = ONLINE_MODE ? (winner === MY_SEAT) : true;
  playEndGameJingle(iWon);
  showVictoryOverlay(winner, reason, iWon);

  // Récompense en pièces + points de Menace (uniquement en partie en ligne —
  // le hotseat local n'a qu'un seul compte connecté des deux côtés, ça n'aurait
  // pas de sens). Un abandon ne rapporte jamais de pièces, mais compte quand
  // même comme une défaite pour le classement en partie CLASSÉE (pour ne pas
  // encourager à fuir une partie mal engagée).
  if (ONLINE_MODE && ONLINE_MATCH_ID) {
    const result = opts.isForfeit ? 'forfeit' : ((winner === MY_SEAT) ? 'win' : 'loss');
    const resultLabel = result === 'win' ? 'victoire' : (result === 'loss' ? 'défaite' : 'abandon');
    fetch('/api/match/result', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ matchId: ONLINE_MATCH_ID, result })
    }).then(r => r.json()).then(data => {
      if (data && data.ok && !data.alreadyRewarded) {
        let msg = `+${data.gained} pièces créditées sur votre compte (${resultLabel}).`;
        if (data.ranked && typeof data.pointsDelta === 'number' && data.pointsDelta !== 0 && data.rank) {
          const sign = data.pointsDelta > 0 ? '+' : '';
          msg += ` Menace ${sign}${data.pointsDelta} pts — rang actuel : <strong>${data.rank.label}</strong>.`;
        }
        pushHistory('mithril', msg);
        populateVictoryRewards(data, resultLabel);
      } else if (data && data.ok && data.alreadyRewarded) {
        // Reconnexion/rechargement après un crédit déjà effectué : on
        // affiche quand même l'état actuel, sans ré-animer un gain.
        const zone = document.getElementById('victoryRewardsZone');
        if (zone) zone.textContent = 'Récompenses déjà créditées pour cette partie.';
      }
    }).catch(() => {
      const zone = document.getElementById('victoryRewardsZone');
      if (zone) zone.textContent = 'Impossible de calculer les récompenses pour le moment.';
    });
  }
}

              // On passe par le canal de synchronisation d'état (déjà utilisé

  showHardBlocker();

        fullRender();
      }
      next();
    });

  next();
}

function upkeepFamiliersFor(player){
  const line = (player==='top')? topLine : botLine;
  line.forEach(host=>{
    const fams = getFamiliersOnHost(host);

    const hasParadlex = fams.some(f => f.label === 'C54' && !isFamiliarEffectSuppressed(host, 'C54'));
    if (hasParadlex && typeof host.hp === 'number' && host.label !== 'C62') {
      host.hp += 4;
      playHPHitEffect(host);
      pushHistory('pv', `${cardAnchor('C54')} soigne ${cardAnchor(host.label)} de +4 PV (entretien).`);
    }

    const hasMozkyto = fams.some(f=>f.label==='C10' && !isFamiliarEffectSuppressed(host, 'C10'));
    if(hasMozkyto && typeof host.hp==='number' && host.label !== 'C62'){
      host.hp = Math.max(0, host.hp - 2);
      playHPHitEffect(host);
      onHPDamaged(player, host, 2, 'upkeep-mozkyto');
      pushHistory('pv', `${cardAnchor('C10')} inflige -2 PV à ${cardAnchor(host.label)} (entretien).`);
      if(getEffectiveHP(host)<=0){
        const owner = (topLine.includes(host)) ? 'top' : 'bottom';
        const arr = (owner==='top')? topLine : botLine;
        const idx = arr.findIndex(c=>c.id===host.id);
        if(idx!==-1) arr.splice(idx,1);
        detachFamiliarsOnHost(host, owner);
        discardCard(host, owner, 'death');
      }
    }
  });
}

// WADOO 6e lot : Scapoo (C235) — au début du tour de son propriétaire,
// CHAQUE Scapoo déjà en jeu se duplique une fois : la copie s'attache à un
// combattant de la MÊME zone de combat choisi au hasard parmi ceux qui n'ont
// pas encore de Scapoo. Se répète tour après tour tant qu'il reste des
// combattants libres — la propagation s'accélère donc naturellement
// (1 → 2 → 4...) à mesure que le nombre de Scapoo augmente.
function processScapooDuplication(player){
  const line = getLineByOwner(player);
  const hasScapooAttached = (c) => getFamiliersOnHost(c).some(f => f.label === 'C235');

  const sourceCount = line.filter(hasScapooAttached).length;
  if (sourceCount === 0) return;

  let createdCount = 0;
  for (let i = 0; i < sourceCount; i++) {
    const eligibleTargets = line.filter(c => !hasScapooAttached(c));
    if (eligibleTargets.length === 0) break; // plus aucune cible libre
    const target = eligibleTargets[Math.floor(Math.random() * eligibleTargets.length)];
    const newScapoo = createCard('C235', player === 'top' ? 'T' : 'B');
    attachFamiliarToHost(player, newScapoo, target);
    createdCount++;
  }

  if (createdCount > 0) {
    pushHistory('familier', `${cardAnchor('C235')} se duplique ${createdCount} fois et se propage sur la zone de combat de ${playerLabel(player)} !`);
  }
}

function startTurn(player){
  // Minuteur de tour : redémarré à 90s à chaque nouveau tour. Enveloppé pour
  // garantir qu'il ne puisse JAMAIS interrompre le reste de la mise en place
  // du tour, même en cas d'erreur imprévue.
  try{ setupTurnTimer(); }catch(err){ console.error('[turnTimer] démarrage impossible :', err); }

  // Musique de partie : démarrée une seule fois, dès que la partie démarre
  // vraiment (premier tour), qu'elle soit en ligne ou en local (hotseat).
  if (!matchMusicStarted) {
    matchMusicStarted = true;
    startMatchMusic();
  }

  // WADOO 6e lot : Scapoo (C235) — se duplique en début de tour tant qu'il
  // reste des combattants sans Scapoo. Enveloppé en sécurité pour ne jamais
  // interrompre la mise en place du tour en cas d'erreur imprévue.
  try{ processScapooDuplication(player); }catch(err){ console.error('[Scapoo] duplication impossible :', err); }

  // Remet chaque main à sa position d'origine à chaque nouveau tour.
  if (typeof window.__resetHandPositions === 'function') window.__resetHandPositions();

  // WADOO : la remise de Gousset (C213) ne dure qu'un tour, elle expire si non utilisée
  gousseDiscountActive[player] = false;

  // NOUVELLE LOGIQUE CORRIGÉE POUR HARPESS (C156)
  // ===================================================================
  const playerHand = getHandByOwner(player);
  const hasHarpess = playerHand.some(c => c.label === 'C156');

  if (hasHarpess) {
    // CORRECTION : On cible les combattants DANS LA MAIN du joueur actif.
    const validTargetsInHand = playerHand.filter(c =>
        getType(c.label) === 'personnage' &&
        c.hp > 1 // On vérifie les PV actuels de l'instance de la carte.
    );

    if (validTargetsInHand.length > 0) {
      // On choisit une cible au hasard parmi les combattants valides dans la main.
      const targetCard = validTargetsInHand[Math.floor(Math.random() * validTargetsInHand.length)];

      // On réduit ses PV directement. Ce sera son nouveau total de PV de base quand elle sera jouée.
      targetCard.hp--; 

      // On notifie le joueur.
      const possessive = (player === 'bottom') ? 'votre' : 'sa';
      pushHistory('artefact', `Effet de ${cardAnchor('C156')} : ${cardAnchor(targetCard.label)} dans ${possessive} main subit -1 PV.`);
    }
  }
  // ===================================================================
  // FIN DE LA LOGIQUE CORRIGÉE POUR HARPESS
  // ===================================================================

  // ===================================================================
  // WADOO 2e lot : Skapé (C217) — au début de CHAQUE tour (une seule fois par
  // tour, quel que soit le joueur actif), tout Skapé rattaché à un combattant
  // perd 1 poil : une carte "Poil de Skapé" (T04) apparaît dans la main du
  // PROPRIÉTAIRE DE L'HÔTE (celui qui contrôle le combattant porteur), et non
  // forcément dans la main du joueur qui a joué Skapé.
  // ===================================================================
  getAllFamiliers().filter(f => f.label === 'C217').forEach(skape => {
    const { card: host, owner: hostOwner } = findHostOfFamiliar(skape);
    if (!host || !hostOwner) return;
    const hostHand = getHandByOwner(hostOwner);
    const hairPrefix = (hostOwner === 'top') ? 'T' : 'B';
    hostHand.push(createCard('T04', hairPrefix));
    const hostLabel = playerLabel(hostOwner);
    pushHistory('familier', `${cardAnchor('C217')} perd un poil : ${cardAnchor('T04')} apparaît dans la main de ${hostLabel}.`);
  });

  // ===================================================================
  // WADOO 2e lot : Poil de Skapé (T04) — tant qu'il est dans la main du
  // joueur dont c'est le tour, il force à défausser la carte du dessous
  // de SON PROPRE deck, à chaque fois que son tour commence.
  // ===================================================================
  const poilSkapeCount = playerHand.filter(c => c.label === 'T04').length;
  if (poilSkapeCount > 0) {
    forceDiscardFromDeckBottom(player, poilSkapeCount, 'T04');
  }

  // ===================================================================
  // WADOO 3e lot : Qasar (C224) — au début de CHAQUE tour (une seule fois par
  // tour, quel que soit le joueur actif), chaque Qasar en jeu bannit une carte
  // aléatoire de la défausse ADVERSE (celle de l'adversaire de son propriétaire)
  // vers l'Exil.
  // ===================================================================
  [...topArts, ...botArts].filter(a => a.label === 'C224').forEach(qasar => {
    const qasarOwner = topArts.includes(qasar) ? 'top' : 'bottom';
    const oppOwner = (qasarOwner === 'top') ? 'bottom' : 'top';
    const oppDiscard = (oppOwner === 'top') ? topDiscard : botDiscard;
    if (oppDiscard.length === 0) return;
    const idx = Math.floor(Math.random() * oppDiscard.length);
    const [banished] = oppDiscard.splice(idx, 1);
    addToExile(banished);
    const oppLabel = playerLabel(oppOwner);
    pushHistory('artefact', `${cardAnchor('C224')} bannit ${cardAnchor(banished.label)} de la défausse de ${oppLabel} vers l'Exil.`);
  });

  // NOUVELLE LOGIQUE : Gestion de la durée de tous les effets de taxe de forge
  const activeEffects = [];
  forgeTax[player].forEach(effect => {
    effect.turns--; // On décrémente la durée
    if (effect.turns > 0) {
      activeEffects.push(effect); // On garde l'effet s'il est encore actif
    }
  });
  forgeTax[player] = activeEffects; // On met à jour la liste avec seulement les effets actifs
  updateForgeTaxUI();

  activeFaction[player] = null;
  nonKryllsAllowance[player] = 0;
  forgedThisTurn[player] = false;
  pendingWadooPlay = { owner: null, count: 0 };
  pendingKryllsPlay = { owner: null, count: 0 };
  pendingChimeriaPlay = { owner: null, count: 0 };
  totemoonAllowance = { owner: null, granted: false };
  pendingFreePlay = { owner: null, cardId: null };
  venusylvaDestroyMode = { active: false, venusylvaId: null };
  c112TargetMode = null;
  c114TargetMode = null;
  dollyHealMode = null;
  warzazathEffect[player] = false;
  prismisTargetMode = null;
  freedaTargetMode = null;
  miroirTargetMode = null;
  // La ligne "actionBlocked[player] = false;" a été supprimée d'ici.
  zampanoAllowance = { owner: null, factions: [] };

  openFactionPrompt(player, ()=>{
    // Même protection que dans performEndTurn : cette callback déclenche
    // beaucoup de logique liée aux cartes (entretien, forge, familiers...).
    // Si l'une d'elles plantait, l'ancien code pouvait laisser la partie
    // dans un état à moitié préparé (rendu jamais rafraîchi, minuteur
    // jamais relancé...) — on isole donc tout dans un filet de sécurité qui
    // garantit que le tour finit toujours par s'afficher correctement.
    try{
      resetExhausted(player);
      resetArtifactExhausted(player);

      const recharged = resetAllShields();
      checkForge(player);

      upkeepArtifactsFor(player, ()=>{
        upkeepFamiliersFor(player);
        upkeepNarzbokFor(player, ()=>{
          fullRender();
          recharged.forEach(playHPHitEffect);
          updateTurnUI();
        });
      });

      fullRender();
      recharged.forEach(playHPHitEffect);
      updateTurnUI();
    }catch(err){
      console.error('[startTurn] la préparation du tour a rencontré une erreur :', err);
      fullRender();
      updateTurnUI();
    }
  });

  fullRender();
  updateTurnUI();
}

function playActionLiens(owner, actionCard) {
    if (!canPlayThisCardNow(owner, actionCard)) return;

    // 1. On prépare l'effet : on défausse la carte et on pioche 3 cartes
    consumeAllowanceIfNeeded(owner, actionCard);
    const hand = getHandByOwner(owner);
    const idx = hand.findIndex(c => c.id === actionCard.id);
    if (idx !== -1) hand.splice(idx, 1);
    discardCard(actionCard, owner, 'action');

    const deck = getDeckByOwner(owner);
    let revealedCards = [];
    for (let i = 0; i < 3; i++) {
        if (deck.length > 0) {
            revealedCards.push(deck.shift());
        } else {
            const reshuffled = reshuffleDiscardIntoDeck(owner);
            if (reshuffled && deck.length > 0) {
                revealedCards.push(deck.shift());
            } else {
                break; // Arrête si le deck est et reste vide
            }
        }
    }

    if (revealedCards.length === 0) {
        pushHistory('info', `${cardAnchor('C153')} est jouée, mais le deck est vide.`);
        fullRender();
        return;
    }

    pushHistory('action', `${cardAnchor('C153')} révèle ${revealedCards.length} carte(s).`);

    // 2. On initialise le mode de sélection
    liensSelectionMode = {
        owner,
        stage: 'draw', // Première étape : choisir la carte à piocher
        revealedCards,
        cardToDraw: null,
        cardToDeck: null,
        cardToGive: null,
    };

    // 3. On affiche la fenêtre de choix
    renderLiensPrompt();
}

function renderLiensPrompt() {
    if (!liensSelectionMode) return;

    const { stage, revealedCards } = liensSelectionMode;
    let title = '';
    
    // On change le titre de la fenêtre en fonction de l'étape
    if (stage === 'draw') {
        title = 'Choisissez la carte à PIOCHER';
    } else if (stage === 'deck') {
        title = 'Choisissez la carte à REPLACER sur votre deck';
    }

    let cardHTML = `<div class="liens-choices">`;
    revealedCards.forEach(c => {
        const url = getCardImage(c.label);
        // On attache l'ID de la carte à l'élément pour le retrouver au clic
        cardHTML += `<div class="card liens-card" data-card-id="${c.id}" data-label="${c.label}" style="background-image: url(${url});"></div>`;
    });
    cardHTML += `</div><div>${title}</div>`;

    // On utilise `openButtonsPrompt` sans boutons pour créer la fenêtre modale
    openButtonsPrompt('Effet : Liens', cardHTML, null, [], { nonCancellable: true });

    if (actionPromptEl) {
        actionPromptEl.classList.add('liens-prompt');
        const choiceCards = actionPromptEl.querySelectorAll('.liens-card');
        
        // On ajoute les interactions (zoom et clic) à chaque carte affichée
        choiceCards.forEach(cardEl => {
            cardEl.addEventListener('mouseenter', () => showZoom(cardEl.dataset.label));
            cardEl.addEventListener('mouseleave', hideZoom);
            cardEl.addEventListener('click', () => {
                const chosenCardId = cardEl.dataset.cardId;
                const chosenCard = liensSelectionMode.revealedCards.find(c => c.id === chosenCardId);
                if (chosenCard) {
                    handleLiensSelection(chosenCard);
                }
            });
        });
    }
}

function handleLiensSelection(chosenCard) {
    if (!liensSelectionMode) return;
    const { stage } = liensSelectionMode;

    // On retire la carte choisie de la liste des cartes révélées
    liensSelectionMode.revealedCards = liensSelectionMode.revealedCards.filter(c => c.id !== chosenCard.id);

    if (stage === 'draw') {
        liensSelectionMode.cardToDraw = chosenCard;
        liensSelectionMode.stage = 'deck'; // On passe à l'étape suivante
        
        // S'il ne reste qu'une carte, la dernière étape est automatique
        if (liensSelectionMode.revealedCards.length === 1) {
            liensSelectionMode.cardToDeck = liensSelectionMode.revealedCards[0];
            // La carte à donner est celle qui n'a pas été choisie, donc il n'y en a plus
            liensSelectionMode.revealedCards = [];
            finalizeLiensEffect();
        } else {
            renderLiensPrompt(); // On rafraîchit la fenêtre pour l'étape suivante
        }

    } else if (stage === 'deck') {
        liensSelectionMode.cardToDeck = chosenCard;
        
        // La dernière carte restante est celle à donner
        if (liensSelectionMode.revealedCards.length === 1) {
            liensSelectionMode.cardToGive = liensSelectionMode.revealedCards[0];
        }
        finalizeLiensEffect();
    }
}

function finalizeLiensEffect() {
    if (!liensSelectionMode) return;
    const { owner, cardToDraw, cardToDeck, cardToGive } = liensSelectionMode;

    const playerHand = getHandByOwner(owner);
    const playerDeck = getDeckByOwner(owner);
    const opp = (owner === 'top') ? 'bottom' : 'top';
    const oppHand = getHandByOwner(opp);

    if (cardToDraw) {
        playerHand.push(cardToDraw);
        pushHistory('pioche', `Vous piochez ${cardAnchor(cardToDraw.label)} via l'effet Liens.`);
    }
    if (cardToDeck) {
        playerDeck.unshift(cardToDeck); // unshift = placer au début (dessus) du deck
        pushHistory('jeu', `${cardAnchor(cardToDeck.label)} est replacé sur votre deck.`);
    }
    if (cardToGive) {
        oppHand.push(cardToGive);
        pushHistory('jeu', `Votre adversaire reçoit ${cardAnchor(cardToGive.label)}.`);
    }

    // On nettoie tout
    liensSelectionMode = null;
    closeActionPrompt();
    fullRender();
}

// REMPLACEZ L'ANCIENNE FONCTION PAR CELLE-CI
function handlePrismisTargetSelection(targetCard) {
    if (!prismisTargetMode) return;
    if (targetCard.id === prismisTargetMode.prismisId) return;

    // MODIFIÉ : On vérifie si la cible n'est pas déjà Chimeria avant de la sélectionner.
    if(hasTag(targetCard, 'Chimeria')) return;

    const targetIndex = prismisTargetMode.targets.indexOf(targetCard.id);
    if (targetIndex > -1) {
        prismisTargetMode.targets.splice(targetIndex, 1);
    } else if (prismisTargetMode.targets.length < prismisTargetMode.targetsToPick) {
        prismisTargetMode.targets.push(targetCard.id);
    }

    const promptMsg = document.querySelector('#prismis-prompt .apMsg');
    if (promptMsg) {
        // MODIFIÉ : Le message de sélection est aussi dynamique.
        const choiceText = prismisTargetMode.targetsToPick === 1 ? 'Choisissez <strong>une</strong> carte' : 'Choisissez <strong>deux</strong> cartes';
        promptMsg.innerHTML = `${choiceText} (combattants ou artefacts).<br>Sélection : ${prismisTargetMode.targets.length}/${prismisTargetMode.targetsToPick}`;
    }

    // MODIFIÉ : On vérifie si le nombre de cibles choisies correspond au nombre requis (1 ou 2).
    if (prismisTargetMode.targets.length === prismisTargetMode.targetsToPick) {
        applyPrismisEffect();
    } else {
        fullRender();
    }
}

function applyPrismisEffect() {
    if (!prismisTargetMode || prismisTargetMode.targets.length !== prismisTargetMode.targetsToPick) return;

    const prismisCard = findCardOrArtifactOnBoard(prismisTargetMode.prismisId);
    if (!prismisCard) {
        console.error("Prismis not found on board!");
        endPrismisTargetingCleanup();
        return;
    }

    prismisCard.prismisLinks = [...prismisTargetMode.targets];
    const targetNames = [];

    prismisTargetMode.targets.forEach(targetId => {
        const targetCard = findCardOrArtifactOnBoard(targetId);
        if (targetCard) {
            targetNames.push(cardAnchor(targetCard.label));
            targetCard.transformedByPrismis = prismisCard.id;

            // Étape 1 : On trouve la ou les factions d'origine de la carte (ex: "Krylls")
            const originalFactions = FACTIONS.filter(f => getTags(targetCard.label).includes(f));
            
            // Étape 2 : On stocke cette information dans "originalFactions" pour s'en souvenir plus tard
            targetCard.originalFactions = originalFactions;

            if (!Array.isArray(targetCard.removedTags)) targetCard.removedTags = [];
            
            // Étape 3 : On ajoute la faction d'origine (ex: "Krylls") à la liste des tags à IGNORER
            originalFactions.forEach(f => {
                if (!targetCard.removedTags.includes(f)) {
                    targetCard.removedTags.push(f);
                }
            });

            if (!Array.isArray(targetCard.addedTags)) targetCard.addedTags = [];

            // Étape 4 : On ajoute "Chimeria" à la liste des tags à AJOUTER
            if (!targetCard.addedTags.includes('Chimeria')) {
                targetCard.addedTags.push('Chimeria');
            }
        }
    });

    pushHistory('action', `${cardAnchor('C152')} transforme ${targetNames.join(' et ')} en faction <strong>Chimeria</strong>.`);
    endPrismisTargetingCleanup();
}

// Dès que 3 Pièces détachées se retrouvent dans la même zone d'artefact,
// elles s'assemblent automatiquement en Forgecoeur (T14).
let bobyzCycleCount = { top: 0, bottom: 0 };
function openBobyzActionPrompt(owner, card, fromEl){

  const cycleLabel = ['T11','T12','T13'][bobyzCycleCount[owner] % 3];

    { label:'Créer', className:'confirm', onClick:()=>useBobyzAction(owner, card) },

  ]);
}

function useBobyzAction(owner, card){
  const artArray = (owner === 'top') ? topArts : botArts;
  if (artArray.length >= MAX_ARTIFACTS_PER_ZONE) {
    pushHistory('info', `${cardAnchor('C32')} : zone d'artefact pleine, impossible de créer une Pièce détachée.`);
    closeActionPrompt();

  }
  const cycleLabel = ['T11','T12','T13'][bobyzCycleCount[owner] % 3];
  bobyzCycleCount[owner]++;
  markAttacked(owner, card); // consomme l'action du combattant pour ce tour (comme le minage)
  const piece = createCard(cycleLabel, owner === 'top' ? 'T' : 'B');
  artArray.push(piece);
