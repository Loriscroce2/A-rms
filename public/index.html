/* --- Mining prompt (C9 inclus) --- */
function openMiningPrompt(owner, card, fromEl){
  if (getType(card.label) !== 'personnage') return;
  if (isAnyTargetSelectionActive()) { denyBecauseSelectionPending(fromEl); return; }

  if (card.label === 'T02') {
    pushHistory('info', `${cardAnchor('T02')} ne peut pas miner.`);
    return;
  }

  if (card.label === 'T10') {
    pushHistory('info', `${cardAnchor('T10')} ne peut pas miner.`);
    return;
  }

  // KRYLLS (nouveau lot) : Bobyz (C32) — un clic ouvre son Action (créer une
  // Pièce détachée) à la place du minage classique.
  if (card.label === 'C32') {
    openBobyzActionPrompt(owner, card, fromEl);
    return;
  }

  const canPerformActions =
    currentTurn === owner &&
    !isFrozen(card) &&
    !hasAttacked(owner, card) &&
    canUnitActThisTurn(owner, card);

  const attachedFamiliars = getFamiliersOnHost(card);
  const coqsixCount = attachedFamiliars.filter(f => f.label === 'C159').length;

  if (attachedFamiliars.length === 0 && !canPerformActions) {
    if (currentTurn === owner) {
      fromEl.classList.add('deny');
      setTimeout(()=>fromEl.classList.remove('deny'), 260);
    }
    return;
  }

  const curHP = getEffectiveHP(card);
  const canMine = card.canMineFreely || curHP > 1 || coqsixCount > 0;
  let title = cardName(card.label);
  let msg = 'Choisissez une action.';
  let buttons = [];

  if (attachedFamiliars.length > 0) {
    buttons.push({
      label: `Voir Familiers (${attachedFamiliars.length})`,
      className: 'confirm',
      onClick: () => {
        showFamiliarCarousel(card, attachedFamiliars);
      }
    });
  }

  if (canPerformActions) {
    let mineButton;
    
    // On crée la fonction onClick une seule fois
    const onMineClick = () => {
        performMining(owner, card);
    };

    if (coqsixCount > 0) {
        let totalMithrilGain = 1;
        const opp = (owner === 'top') ? 'bottom' : 'top';
        const oppHand = getHandByOwner(opp);
        if (oppHand.length >= 7) {
            totalMithrilGain += coqsixCount;
        }
        mineButton = {
            label: `Miner (+${totalMithrilGain} Mithril)`,
            className: 'confirm',
            disabled: false,
            onClick: onMineClick // On utilise notre nouvelle fonction
        };
    } else {
        mineButton = {
            label: `Miner ${card.canMineFreely ? '(Gratuit)' : '(-1 PV)'}, +1 Mithril`,
            className: 'confirm' + (canMine ? '' : ' disabled'),
            disabled: !canMine,
            onClick: onMineClick // On utilise notre nouvelle fonction
        };
    }
    
    // Le reste de la logique pour les autres cartes reste identique
    if(card.label === 'C9') {
      title = 'Zcyvenger';
      msg = 'Choisissez&nbsp;: <strong>Miner</strong> ou <strong>Utiliser la capacité</strong>.';
      buttons.push(mineButton, { label:'Capacité de Zcyvenger', className:'confirm', onClick:()=>{ openC9AbilityPrompt(owner, card, fromEl); } });
    } else if (card.label === 'C22') {
      title = 'Khromafayl';
      buttons.push(mineButton, { label:'Capacité (Piocher)', className:'confirm', onClick:()=>{ useKhromafaylAbility(owner, card); } });
    } else if (card.label === 'C105') {
      title = 'Venusylva';
      const canDestroy = topArts.length > 0 || botArts.length > 0;
      buttons.push(mineButton, { label:'Capacité (Détruire artefact)', className:'confirm' + (canDestroy ? '' : ' disabled'), disabled:!canDestroy, onClick:()=>{ if(canDestroy) startVenusylvaDestroySelection(owner, card); } });
    } else if (card.label === 'C114') {
      title = 'Anamars';
      const canUseAbility = topLine.concat(botLine).some(c => getType(c.label) === 'personnage');
      buttons.push(mineButton, { label:'Action (Infliger -3PV)', className:'confirm' + (canUseAbility ? '' : ' disabled'), disabled:!canUseAbility, onClick:()=>{ if(canUseAbility) startC114Targeting(owner, card); } });
    } else if (card.label === 'C231') {
      title = 'Doolia';
      const opp = (owner === 'top') ? 'bottom' : 'top';
      const canUseAbility = getLineByOwner(opp).some(c => getType(c.label) === 'personnage');
      // Chez Doolia, l'effet (renvoyer un ennemi en main) se déclenche EN
      // MINANT — ce n'est pas une capacité alternative, donc un seul bouton
      // "Miner" à la place du duo Miner/Capacité habituel.
      buttons.push({
        label: 'Miner (Renvoyer un ennemi en main)',
        className: 'confirm' + (canUseAbility ? '' : ' disabled'),
        disabled: !canUseAbility,
        onClick: () => { if (canUseAbility) startC231Targeting(owner, card); }
      });
    } else if (card.label === 'C120') {
        title = 'Salomon II';
        buttons.push(mineButton, { label: 'Capacité (Jouer Chimeria)', className: 'confirm', onClick: () => { useSalomonIIAbility(owner, card); } });
    } else if (card.label === 'C155') {
        title = 'Freeda';
        const canUseAbility = topLine.concat(botLine).length > 0;
        buttons.push(mineButton, { label: 'Action (Geler)', className: 'confirm' + (canUseAbility ? '' : ' disabled'), disabled: !canUseAbility, onClick: () => { if (canUseAbility) startFreedaTargeting(owner, card); } });
    } else if (card.label === 'C173') {
        title = 'Freyd';
        msg = 'Choisissez : <strong>Miner</strong> ou utiliser votre <strong>Action</strong>.';
        buttons.push(mineButton, { label: 'Action (Anti-Citoyens)', className: 'confirm', onClick: () => { openFreydPrompt(owner, card, fromEl); } });
    } else if (card.label === 'C202' || card.label === 'C203') {
        title = cardName(card.label);
        const linkGain = (card.label === 'C202') ? 2 : 1;
        const canLink = !card.wadooLink && getLineByOwner(owner === 'top' ? 'bottom' : 'top').some(c => getType(c.label) === 'personnage');
        msg = `Choisissez : <strong>Miner</strong> ou effectuer le <strong>Rituel de liaison</strong> (lier cette Poupée à un ennemi, +${linkGain} Mithril).`;
        buttons.push(mineButton, { label: `Rituel de liaison (+${linkGain} Mithril)`, className: 'confirm' + (canLink ? '' : ' disabled'), disabled: !canLink, onClick: () => { if (canLink) startWadooLinkTargeting(owner, card); } });
    } else if (card.label === 'C206') {
        title = 'Mama Cecil';
        const canHeal = getEffectiveHP(card) < getBaseHP('C206');
        msg = 'Choisissez : <strong>Miner</strong> ou se <strong>Soigner</strong> de 3 PV.';
        buttons.push(mineButton, { label: 'Capacité (Soin +3 PV)', className: 'confirm' + (canHeal ? '' : ' disabled'), disabled: !canHeal, onClick: () => { if (canHeal) useMamaCecileHeal(owner, card); } });
    } else if (card.label === 'C211') {
        title = 'Barbatruk';
        const dolls = getLineByOwner(owner).filter(c => hasTag(c, 'poupée'));
        const canUse = dolls.length > 0;
        msg = 'Choisissez : <strong>Miner</strong> ou utiliser la <strong>Capacité</strong> (+2PB pour Barbatruk, en sacrifiant une de vos Poupées — si elle était liée, sa cible liée est détruite aussi).';
        buttons.push(mineButton, { label: 'Capacité (+2PB, sacrifice)', className: 'confirm' + (canUse ? '' : ' disabled'), disabled: !canUse, onClick: () => { if (canUse) openBarbatrukPrompt(owner, card); } });
    } else if (card.label === 'C218') {
        title = 'Shrman';
        const opp = (owner === 'top') ? 'bottom' : 'top';
        const enemyArts = (opp === 'top') ? topArts : botArts;
        const enemyWadooArts = enemyArts.filter(a => hasTag(a, 'Wadoo'));
        const canUse = enemyWadooArts.length > 0;
        msg = 'Choisissez : <strong>Miner</strong> ou <strong>Action</strong> (détruire un artefact Wadoo adverse, gagnez +2 Mithril si vous le faites).';
        buttons.push(mineButton, { label: 'Action (détruire artefact Wadoo, +2 Mithril)', className: 'confirm' + (canUse ? '' : ' disabled'), disabled: !canUse, onClick: () => { if (canUse) openShrmanDestroyPrompt(owner, card); } });
    } else if (card.label === 'C216') {
        title = 'Mlle Pilate';
        const ownDiscard = (owner === 'top') ? topDiscard : botDiscard;
        const chargeCount = card.charges || 0;
        const canUse = chargeCount > 0 && ownDiscard.length > 0;
        msg = `Choisissez : <strong>Miner</strong> ou dépenser une <strong>charge</strong> (${chargeCount} restante${chargeCount===1?'':'s'}) pour remettre une carte de votre défausse sur le dessus de votre deck.`;
        buttons.push(mineButton, { label: `Dépenser une charge (${chargeCount})`, className: 'confirm' + (canUse ? '' : ' disabled'), disabled: !canUse, onClick: () => { if (canUse) startPilateRecursion(owner, card); } });
    } else {
      buttons.push(mineButton);
    }
  }

  buttons.push({ label:'Annuler', className:'cancel', onClick:()=>{} });
  openButtonsPrompt(title, msg, fromEl, buttons);
}

  if (!canPlayThisCardNow(owner, card)) return;
  if (hasAttacked(owner, card)) return;

function resolveShrmanDestroy(owner, card, targetId){
  const opp = (owner === 'top') ? 'bottom' : 'top';
  const enemyArts = (opp === 'top') ? topArts : botArts;
  const idx = enemyArts.findIndex(a => a.id === targetId);
  if (idx === -1) { closeActionPrompt(); fullRender(); return; }

  const destroyed = enemyArts.splice(idx, 1)[0];
  discardCard(destroyed, opp, 'destroyed');
  markAttacked(owner, card);
  for (let i = 0; i < 2; i++) addMithril(owner);
  pushHistory('action', `${cardAnchor('C218')} détruit l'artefact ${cardAnchor(destroyed.label)} et gagne +2 Mithril.`);
  closeActionPrompt();
  fullRender();
}

function buildDollyPrompt() {

function startDollyHeal(owner, reasonText, onComplete) {
    // On cible tous les combattants sur le plateau, pas seulement ceux du joueur.
    const allCombatants = topLine.concat(botLine);
    const validTargets = allCombatants.filter(c => getType(c.label) === 'personnage');

    if (validTargets.length === 0) {
        pushHistory('info', `Effet de ${cardAnchor('C117')} (${reasonText}) : aucune cible sur le plateau à soigner.`);
        if (typeof onComplete === 'function') onComplete();
        return;
    }

    // Partie en ligne : Dolly n'est pas la mienne — ce choix appartient à son
    // propriétaire, je délègue et j'attends sa réponse.
    if (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE && MY_SEAT !== owner) {
        showWaitOverlay(`Patientez : l'adversaire choisit l'effet de ${cardName('C117')}...`);
        requestOpponentChoice('dolly', { targetIds: validTargets.map(c => c.id) }, (chosenId) => {
            hideWaitOverlay();
            if (chosenId) resolveDollyHeal(chosenId);
            if (typeof onComplete === 'function') onComplete();
        });
        return;
    }

    dollyHealMode = { owner, onComplete };
    buildDollyPrompt();
    fullRender();
}

function resolveDollyHeal(targetId) {
    const targetCard = findCardOnBoard(targetId);
    if (targetCard && typeof targetCard.hp === 'number' && targetCard.label !== 'C62') {
        targetCard.hp += 4;
        playHPHitEffect(targetCard);
        pushHistory('pv', `${cardAnchor(targetCard.label)} regagne 4 PV grâce à l'effet de ${cardAnchor('C117')}.`);
    }
    fullRender();
}

function handleDollyHealSelection(targetCard) {
    if (!dollyHealMode) return;

    // Je réponds pour le compte de l'adversaire qui a délégué ce choix : je ne
    // fais qu'indiquer mon choix, l'application réelle se fait chez lui.
    if (remoteChoiceMode && remoteChoiceMode.kind === 'dolly') {
        const rid = remoteChoiceMode.requestId;
        remoteChoiceMode = null;
        dollyHealMode = null;
        closeActionPrompt();
        hideChoiceNotice();
        window.__socket.emit('choiceResponse', { matchId: ONLINE_MATCH_ID, seat: MY_SEAT, requestId: rid, choice: targetCard.id });
        fullRender();
        return;
    }

    resolveDollyHeal(targetCard.id);
    const callback = dollyHealMode.onComplete;
    endDollyHealCleanup(callback);
}

function endDollyHealCleanup(onComplete) {
    dollyHealMode = null;
    closeActionPrompt();
    if (typeof onComplete === 'function') onComplete();
    fullRender();
}

/* --- Animation vortex carte -> deck --- */
function centerOf(el){
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width/2, y: r.top + r.height/2 };
}
function ensureArrow(){
  if(!aimArrowEl){
    aimArrowEl = document.createElement('div');
    aimArrowEl.className = 'aimArrow';
    aimLayer.appendChild(aimArrowEl);
  }
}
function updateArrow(toX, toY){
  if(!aimFrom || !aimArrowEl) return;
  const dx = toX - aimFrom.cx, dy = toY - aimFrom.cy;
  const len = Math.max(0, Math.hypot(dx,dy) - 18);
  const ang = Math.atan2(dy, dx) * 180 / Math.PI;
  aimArrowEl.style.left = `${aimFrom.cx}px`;
  aimArrowEl.style.top = `${aimFrom.cy}px`;
  aimArrowEl.style.width = `${len}px`;
  aimArrowEl.style.transform = `rotate(${ang}deg)`;
}
function animateVortexTransfer(fromEl, toEl, label){
  try{
    const start = centerOf(fromEl);
    const target = centerOf(toEl);
    const ghost = document.createElement('div');
    ghost.className = 'card vortexGhost';
    const url = getCardImage(label);
    if(url) ghost.style.backgroundImage = `url(${url})`;
    ghost.style.left = `${start.x}px`;
    ghost.style.top = `${start.y}px`;
    aimLayer.appendChild(ghost);
    requestAnimationFrame(()=>{
      const dx = target.x - start.x;
      const dy = target.y - start.y;
      ghost.style.transform = `translate(${dx}px, ${dy}px) scale(.4) rotate(900deg)`;
      ghost.style.opacity = '0.15';
    });
    ghost.addEventListener('transitionend', ()=>{ ghost.remove(); }, {once:true});
  }catch(e){ }
}

// ===================================================================
// NOUVELLES ANIMATIONS — Exil & Défausse. Utilisent le même principe que
// animateVortexTransfer ci-dessus (clone visuel qui vole vers sa
// destination) SANS jamais toucher aux fonctions/animations déjà en place.
// Point d'entrée unique par destination (addToExile / discardCard), donc
// TOUTE carte du jeu en bénéficie automatiquement, sans exception à gérer
// carte par carte.
// ===================================================================

/* Trouve l'élément DOM actuellement affiché pour une carte donnée, quelle
   que soit sa zone (plateau, main, artefacts) — doit être appelé AVANT toute
   mutation d'état, tant que le rendu précédent est encore à l'écran. */
function findLiveCardElement(card){
  if (!card || !card.id) return null;
  return document.querySelector(`[data-id="${card.id}"]`);
}

/* EXIL — la carte est aspirée façon "trou noir" : elle rétrécit, se met à
   tourbillonner et s'assombrit en fonçant vers le portail violet de l'Exil,
   avec une traînée lumineuse qui matérialise l'absorption. */
function animateCardToExile(card){
  try{
    const fromEl = findLiveCardElement(card);
    const exileEl = document.getElementById('exileRift') || document.getElementById('exileZone');
    if (!fromEl || !exileEl) return;

    const start = centerOf(fromEl);
    const target = centerOf(exileEl);

    const ghost = document.createElement('div');
    ghost.className = 'card exileGhost';
    const url = getCardImage(card.label);
    if (url) ghost.style.backgroundImage = `url(${url})`;
    ghost.style.left = `${start.x}px`;
    ghost.style.top = `${start.y}px`;
    aimLayer.appendChild(ghost);

    // Halo violet qui grandit brièvement autour du portail au moment de l'impact.
    const impactPulse = () => {
      exileEl.classList.add('exileImpact');
      setTimeout(() => exileEl.classList.remove('exileImpact'), 500);
    };

    requestAnimationFrame(()=>{
      const dx = target.x - start.x;
      const dy = target.y - start.y;
      ghost.style.transform = `translate(${dx}px, ${dy}px) scale(.08) rotate(620deg)`;
      ghost.style.opacity = '0';
      ghost.style.filter = 'brightness(.3) saturate(1.6) blur(1.5px)';
    });
    setTimeout(impactPulse, 520);
    ghost.addEventListener('transitionend', ()=>{ ghost.remove(); }, {once:true});
    setTimeout(()=>{ if (ghost.parentNode) ghost.remove(); }, 900); // filet de sécurité
  }catch(e){ }
}

/* DÉFAUSSE — vol plus terre-à-terre vers la pile : la carte se retourne
   (face cachée) et glisse jusqu'à la défausse, avec une légère rotation
   aléatoire pour un rendu naturel, moins "spectaculaire" que l'Exil. */
function animateCardToDiscard(card, owner){
  try{
    const fromEl = findLiveCardElement(card);
    const discardEl = document.getElementById(owner === 'top' ? 'dumpTop' : 'dumpBottom');
    if (!fromEl || !discardEl) return;

    const start = centerOf(fromEl);
    const target = centerOf(discardEl);

    const ghost = document.createElement('div');
    ghost.className = 'card discardGhost';
    const url = getCardImage(card.label);
    if (url) ghost.style.backgroundImage = `url(${url})`;
    ghost.style.left = `${start.x}px`;
    ghost.style.top = `${start.y}px`;
    aimLayer.appendChild(ghost);

    const randomTilt = (Math.random() * 50 - 25).toFixed(0);
    requestAnimationFrame(()=>{
      const dx = target.x - start.x;
      const dy = target.y - start.y;
      ghost.style.transform = `translate(${dx}px, ${dy}px) scale(.55) rotate(${randomTilt}deg)`;
      ghost.style.opacity = '0';
    });
    ghost.addEventListener('transitionend', ()=>{ ghost.remove(); }, {once:true});
    setTimeout(()=>{ if (ghost.parentNode) ghost.remove(); }, 700); // filet de sécurité
  }catch(e){ }
}

/* --- Dégâts & bouclier --- */
function applyDamageWithShield(card, incoming) {
  if (card.label === 'C62') { return { absorbed: incoming, hpLost: 0, hpBefore: getEffectiveHP(card) }; }
  if (getType(card.label) !== 'personnage') return { absorbed: 0, hpLost: 0, hpBefore: 0 };

  let dmg = Math.max(0, incoming);
  const hpBefore = getEffectiveHP(card);
  let totalAbsorbed = 0;

  const owner = ownerOfCardOnBoard(card);
  let tempShieldVal = (typeof card.tempShield === 'number') ? card.tempShield : 0;
  let baseShieldVal = (typeof card.shield === 'number') ? card.shield : 0;
  let holoBonusVal = (owner) ? holoAuraBonus(owner, card) : 0;

  if (isBruitzeurActive()) {
      tempShieldVal = 0;
      baseShieldVal = 0;
      holoBonusVal = 0;
  }

  let absorbedFromTemp = Math.min(tempShieldVal, dmg);
  if (typeof card.tempShield === 'number') card.tempShield -= absorbedFromTemp;
  dmg -= absorbedFromTemp;
  totalAbsorbed += absorbedFromTemp;

  let absorbedFromBase = Math.min(baseShieldVal, dmg);
  if (typeof card.shield === 'number') card.shield -= absorbedFromBase;
  dmg -= absorbedFromBase;
  totalAbsorbed += absorbedFromBase;

  let absorbedFromHolo = Math.min(holoBonusVal, dmg);
  dmg -= absorbedFromHolo;
  totalAbsorbed += absorbedFromHolo;

  if (dmg > 0) {
      let tempHpVal = (typeof card.tempHP === 'number') ? card.tempHP : 0;
      let damageToTempHP = Math.min(tempHpVal, dmg);
      if (typeof card.tempHP === 'number') card.tempHP -= damageToTempHP;
      dmg -= damageToTempHP;

      if (dmg > 0 && typeof card.hp === 'number') {
          card.hp = Math.max(0, card.hp - dmg);
      }
  }

  const hpAfter = getEffectiveHP(card);
  const totalHpLost = hpBefore - hpAfter;

  return { absorbed: totalAbsorbed, hpLost: totalHpLost, hpBefore: hpBefore };
}
function playHPHitEffect(card){
  const holder = document.querySelector(`.lane .card.placed[data-id="${card.id}"]`);
  if(!holder) return;
  const hp = holder.querySelector('.hp');
  if(!hp) return;
  hp.classList.remove('hit'); void hp.offsetWidth; hp.classList.add('hit');
}

/* --- Reset boucliers --- */
function resetAllShields(){
  const recharged = [];
  const all = topLine.concat(botLine);
  all.forEach(card=>{
    if (getType(card.label) === 'personnage'){
      const base = getBaseShield(card.label);
      const bonus = card.permanentShieldBonus || 0;
      const fullShieldValue = base + bonus;
      const before = (typeof card.shield === 'number') ? card.shield : base;
      card.shield  = fullShieldValue;
      if (fullShieldValue > 0 && before !== fullShieldValue) recharged.push(card);
    }
  });
  // Le Bouclier vient d'être remis à sa valeur "propre" ci-dessus, sans les
  // bonus de Blusyte/Tentacuz — leur compteur de bonus déjà appliqué doit
  // donc repartir de zéro, sinon le recalcul par delta qui suit soustrairait
  // un bonus qui n'est en réalité plus du tout présent dans ce Bouclier tout
  // juste réinitialisé, faussant le résultat (voire perdant carrément la
  // valeur de base si le bonus soustrait dépasse le Bouclier propre).
  getAllFamiliers().filter(f => f.label === 'C226' || f.label === 'C24').forEach(fam => {
    fam.appliedShieldBonus = 0;
  });
  recalcBlusyteBonuses();
  // KRYLLS (nouveau lot) : Tentacuz (C24) — même logique que Blusyte
  // ci-dessus, sans quoi son bonus restait "perdu" jusqu'au prochain
  // changement du nombre total de combattants.
  recalcTentacuzBonuses();
  return recharged;
}

// WADOO 4e lot : Blusyte (C226) — recalcule le bonus de Bouclier de CHAQUE
// Blusyte en jeu (alliée ou ennemie, peu importe qui héberge la carte) à
// partir du Mithril ACTUEL de son propriétaire. Basé sur un delta (bonus
// précédemment appliqué vs nouveau), donc sûr à appeler très souvent — y
// compris à chaque rendu — sans jamais accumuler ni écraser un bouclier
// gagné entre-temps par un autre effet (ex. Necrobsorb).
function recalcBlusyteBonuses(){
  const all = topLine.concat(botLine);
  getAllFamiliers().filter(f => f.label === 'C226').forEach(fam => {
    const host = all.find(c => c.id === fam.attachedTo);
    if (!host) return;
    const newBonus = mithril[fam.playOwner] || 0;
    const previousBonus = fam.appliedShieldBonus || 0;
    if (newBonus === previousBonus) return;
    host.shield = Math.max(0, (host.shield || 0) - previousBonus) + newBonus;
    fam.appliedShieldBonus = newBonus;
  });
}

// Decebale (C62) — ses PV sont TOUJOURS égaux au nombre de cartes dans
// l'Exil, recalculés en direct à chaque rendu. Le combat garde priorité :
// s'il la fait tomber à 0 PV pendant un échange, elle meurt normalement à
// ce moment-là (retirée avant que ce recalcul ne s'applique de nouveau) ;
// sinon, tant qu'elle est en vie, ses PV suivent la taille de l'Exil à la
// hausse comme à la baisse.
function recalcDecebaleHP(){
  const all = topLine.concat(botLine);
  all.forEach(card => {
    if (card.label !== 'C62') return;
    card.hp = exilePile.length;
    if (card.hp <= 0) {
      const owner = topLine.includes(card) ? 'top' : 'bottom';
      const line = getLineByOwner(owner);
      const idx = line.findIndex(c => c.id === card.id);
      if (idx !== -1) {
        line.splice(idx, 1);
        detachFamiliarsOnHost(card, owner);
        discardCard(card, owner, 'death', { hpBefore: 1 });
      }
    }
  });
}

// KRYLLS (nouveau lot) : Tentacuz (C24) — tant qu'il est rattaché, son hôte
// gagne +X Bouclier, X = nombre de combattants dans LES DEUX zones de combat
// (les deux joueurs confondus). Recalculé en direct à chaque rendu, comme
// Blusyte — delta-based pour pouvoir être appelé autant de fois que voulu.
function recalcTentacuzBonuses(){
  const all = topLine.concat(botLine);
  const totalCombatants = topLine.length + botLine.length;
  getAllFamiliers().filter(f => f.label === 'C24').forEach(fam => {
    const host = all.find(c => c.id === fam.attachedTo);
    if (!host) return;
    const previousBonus = fam.appliedShieldBonus || 0;
    if (totalCombatants === previousBonus) return;
    host.shield = Math.max(0, (host.shield || 0) - previousBonus) + totalCombatants;
    fam.appliedShieldBonus = totalCombatants;
  });
}

// KRYLLS (nouveau lot) : Hypnotikaa (C29) — tant qu'elle est dans la zone de
// combat, tous vos AUTRES combattants gagnent le trait Esprit. Recalculé en
// direct à chaque rendu ; le trait est retiré aussitôt qu'elle quitte le jeu.
function recalcHypnotikaaAura(){
  ['top', 'bottom'].forEach(owner => {
    const line = getLineByOwner(owner);
    const hasHypnotikaa = line.some(c => c.label === 'C29');
    line.forEach(c => {
      if (c.label === 'C29') return; // elle ne se donne pas Esprit à elle-même
      if (!Array.isArray(c.addedTags)) c.addedTags = [];
      const idx = c.addedTags.indexOf('Esprit');
      if (hasHypnotikaa && idx === -1) {
        c.addedTags.push('Esprit');
        c._hypnotikaaGrantedEsprit = true;
      } else if (!hasHypnotikaa && idx !== -1 && c._hypnotikaaGrantedEsprit) {
        c.addedTags.splice(idx, 1);
        c._hypnotikaaGrantedEsprit = false;
      }
    });
  });
}

// KRYLLS (nouveau lot) : Krouzpier (C25) — MORT : lance une carte en l'air ;
// le joueur choisit Cœur ou Pique AVANT le tirage. Bonne pioche = détruit un
// combattant ennemi et RECOMMENCE l'opération (chaîne potentiellement
// longue) ; mauvaise pioche = l'opération s'arrête là.
// Diffuse une étape de la séquence Krouzpier à l'adversaire, pour qu'il
// puisse suivre exactement ce qui se passe même s'il n'est pas celui qui
// choisit (aucun effet en local/hotseat, ni si le socket n'est pas prêt).
function broadcastKrouzpierStep(step){
  if (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE && window.__socket && ONLINE_MATCH_ID) {
    window.__socket.emit('krouzpierStep', { matchId: ONLINE_MATCH_ID, step });
  }
}

// KRYLLS (nouveau lot) : Krouzpier (C25) — MORT : lance une carte en l'air ;

// En ligne : c'est TOUJOURS le PROPRIÉTAIRE de Krouzpier qui choisit, même
// si ce n'est pas son tour — l'adversaire voit toute la séquence se dérouler
// en spectateur, narrée en direct via 'krouzpierStep'.
function startKrouzpierChain(owner){
  // CORRECTIF CRITIQUE : on diffuse TOUJOURS, quel que soit le client qui
  // exécute ce code — la mort de Krouzpier peut très bien être calculée sur
  // l'écran de l'ADVERSAIRE (ex. mort par Poison pendant SON tour à lui),
  // auquel cas sans ce broadcast systématique, le vrai propriétaire de
  // Krouzpier n'était jamais prévenu du tout qu'un choix l'attendait.
  broadcastKrouzpierStep({ type: 'choosing', owner });
  if (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE && MY_SEAT !== owner) {
    showKrouzpierSpectatorWait(owner);
    return;
  }
  showKrouzpierChoicePrompt(owner);
}

function showKrouzpierChoicePrompt(owner){
  const overlay = document.createElement('div');
  overlay.className = 'krouzpierOverlay';
  overlay.innerHTML = `
    <div class="krouzpierBox">
      <div class="krouzpierTitle">💀 ${cardName('C25')}</div>
      <div class="krouzpierSub">Une carte va être lancée en l'air et tournoyer… Devinez sur quelle couleur elle va retomber !</div>
      <div class="krouzpierChoices">
        <button class="krouzpierChoiceBtn" data-choice="coeur"><img src="/assets/coeur.png" alt="Cœur"><span>Cœur</span></button>

      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  requestAnimationFrame(()=> overlay.classList.add('go'));
  overlay.querySelectorAll('.krouzpierChoiceBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const choice = btn.dataset.choice;
      broadcastKrouzpierStep({ type: 'choice', choice });

}

function resolveKrouzpierFlip(owner, choice){
  const result = Math.random() < 0.5 ? 'coeur' : 'pique';
  const wasCorrect = (choice === result);
  broadcastKrouzpierStep({ type: 'result', result, correct: wasCorrect });
  showKrouzpierRevealAnimation(result, wasCorrect, () => {
    const resultLabel = (result === 'coeur') ? 'Cœur' : 'Pique';
    if (!wasCorrect) {
      pushHistory('jeu', `${cardAnchor('C25')} : mauvaise pioche (${resultLabel}) — l'opération s'arrête là.`);
      broadcastKrouzpierStep({ type: 'stopped' });
      return;
    }
    pushHistory('jeu', `${cardAnchor('C25')} : bonne pioche (${resultLabel}) !`);
    const opp = (owner === 'top') ? 'bottom' : 'top';
    const oppLine = getLineByOwner(opp);
    if (oppLine.length === 0) {
      pushHistory('info', `${cardAnchor('C25')} ne trouve plus aucun combattant ennemi à détruire — l'opération s'arrête là.`);
      broadcastKrouzpierStep({ type: 'stopped' });
      return;
    }
    startKrouzpierTargeting(owner, opp);
  });
}

function moveFamiliarToZyzy(familiarCard, oldHostCard, oldHostOwner, zyzyCard, zyzyOwner){
  // Nettoyage spécial AVANT le déplacement : Tentacuz (C24) et Blusyte
  // (C226) recalculent en direct un bonus de Bouclier sur leur hôte à
  // partir de leur propre attache — sans ce nettoyage explicite, l'ancien
  // hôte garderait pour toujours le bonus déjà appliqué, personne ne le
  // retirant jamais après le départ du familier. Tous les autres familiers
  // du jeu (Arakcrabe, Baro, Coqsix, Scapoo...) se recalculent déjà en
  // direct à partir de la vraie attache courante et n'ont besoin d'aucun
  // traitement particulier ici.
  if (familiarCard.label === 'C24' || familiarCard.label === 'C226') {
    oldHostCard.shield = getBaseShield(oldHostCard.label) + (oldHostCard.permanentShieldBonus || 0);
    familiarCard.appliedShieldBonus = 0;
  }

  // Déplace RÉELLEMENT le familier entre les deux tableaux (pas seulement
  // ses propriétés) — il doit physiquement quitter le tableau de son ancien
  // propriétaire pour rejoindre celui de Zyzy, sinon certaines vérifications
  // basées sur getFamArrayByOwner resteraient incohérentes avec playOwner.
  const oldFamArray = getFamArrayByOwner(familiarCard.playOwner);
  const oldIdx = oldFamArray.findIndex(f => f.id === familiarCard.id);
  if (oldIdx !== -1) oldFamArray.splice(oldIdx, 1);

  familiarCard.attachedTo = zyzyCard.id;
  familiarCard.playOwner = zyzyOwner;
  getFamArrayByOwner(zyzyOwner).push(familiarCard);

  pushHistory('familier', `${cardAnchor('C40')} place ${cardAnchor(familiarCard.label)} sur elle, retirée de
    ${cardAnchor(oldHostCard.label)}.`);
  fullRender();
}

function handleArakcubeTargetSelection(targetCard, targetCardOwner){
  if (!arakcubeTargetMode) return;
  const { casterOwner, artifactCard } = arakcubeTargetMode;
  if (targetCardOwner === casterOwner) return; // uniquement un combattant ADVERSE
  arakcubeTargetMode = null;
  closeActionPrompt();

  // Arakcube quitte la zone d'artefact (elle "se transforme" en Arakcrabe).
  const artArray = (casterOwner === 'top') ? topArts : botArts;
  const aidx = artArray.findIndex(a => a.id === artifactCard.id);
  if (aidx !== -1) artArray.splice(aidx, 1);

  // Le combattant ciblé passe SOUS NOTRE CONTRÔLE : il quitte la zone
  // adverse et rejoint la nôtre, tant qu'Arakcrabe reste attachée.
  const fromLine = getLineByOwner(targetCardOwner);
  const tidx = fromLine.findIndex(c => c.id === targetCard.id);
  if (tidx === -1) { fullRender(); return; }
  fromLine.splice(tidx, 1);
  targetCard.mindControlOriginalOwner = targetCardOwner;
  const toLine = getLineByOwner(casterOwner);

  askLeftRightPlacement('Arakcube', `Où placer ${cardAnchor(targetCard.label)} dans votre zone de combat ?`, (side) => {
    if (side === 'left') toLine.unshift(targetCard); else toLine.push(targetCard);

    const arakcrabe = createCard('T15', casterOwner === 'top' ? 'T' : 'B');
    attachFamiliarToHost(casterOwner, arakcrabe, targetCard);

    pushHistory('action', `${cardAnchor('C37')} se transforme en ${cardAnchor('T15')} et prend le contrôle de
      ${cardAnchor(targetCard.label)} !`);
    fullRender();
  });
}

// Vérifie en direct (à chaque rendu) que tout combattant sous contrôle
// mental a toujours bien Arakcrabe attachée — sinon, il retourne
// immédiatement à son propriétaire d'origine.
function recalcArakcrabeControl(){
  ['top', 'bottom'].forEach(owner => {
    const line = getLineByOwner(owner);
    for (let i = line.length - 1; i >= 0; i--) {
      const card = line[i];
      if (!card.mindControlOriginalOwner) continue;
      const stillControlled = getFamiliersOnHost(card).some(f => f.label === 'T15');
      if (!stillControlled) {
        const originalOwner = card.mindControlOriginalOwner;
        delete card.mindControlOriginalOwner;
        line.splice(i, 1);
        getLineByOwner(originalOwner).push(card);
        pushHistory('info', `${cardAnchor(card.label)} n'est plus sous contrôle : il retourne dans sa zone de combat d'origine.`);
      }
    }
  });
}

/* --- Côté spectateur (le joueur qui n'est PAS propriétaire de Krouzpier) :
   affiche la même séquence au fur et à mesure qu'elle arrive, sans jamais
   pouvoir interagir — juste pour suivre en direct ce que fait l'adversaire. */
function showKrouzpierSpectatorWait(owner){
  closeKrouzpierSpectatorOverlay();
  const overlay = document.createElement('div');
  overlay.className = 'krouzpierOverlay go';
  overlay.id = 'krouzpierSpectatorOverlay';
  overlay.innerHTML = `
    <div class="krouzpierBox">
      <div class="krouzpierTitle">💀 ${cardName('C25')}</div>
      <div class="krouzpierSub">${playerLabel(owner)} choisit Cœur ou Pique…</div>
      <div class="krouzpierChoices">
        <button class="krouzpierChoiceBtn" disabled style="opacity:.45;cursor:default;"><img src="/assets/coeur.png" alt="Cœur"><span>Cœur</span></button>
        <button class="krouzpierChoiceBtn" disabled style="opacity:.45;cursor:default;"><img src="/assets/pique.png" alt="Pique"><span>Pique</span></button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function closeKrouzpierSpectatorOverlay(){
  const old = document.getElementById('krouzpierSpectatorOverlay');
  if (old) old.remove();
}

function playKrouzpierSpectatorStep(step){
  if (!step) return;
  if (step.type === 'choosing') {
    // CORRECTIF CRITIQUE : si CE client est le PROPRIÉTAIRE de Krouzpier
    // (même si sa mort vient d'être calculée sur l'écran de l'adversaire),
    // c'est ICI qu'on doit lui proposer le VRAI choix interactif — pas un
    // simple écran d'attente passif, sinon personne ne choisit jamais rien
    // et la partie reste bloquée pour les deux joueurs.
    if (typeof MY_SEAT !== 'undefined' && MY_SEAT === step.owner) {
      showKrouzpierChoicePrompt(step.owner);
    } else {
      showKrouzpierSpectatorWait(step.owner);
    }
    return;
  }
  if (step.type === 'choice') {
    closeKrouzpierSpectatorOverlay();
    const label = (step.choice === 'coeur') ? 'Cœur' : 'Pique';
    pushHistory('jeu', `${cardAnchor('C25')} : l'adversaire choisit ${label}.`);
    return;
  }
  if (step.type === 'result') { showKrouzpierRevealAnimation(step.result, step.correct, () => {}); return; }
  if (step.type === 'destroyed') { pushHistory('jeu', `${cardAnchor('C25')} détruit ${cardAnchor(step.targetLabel)} !`); return; }
  if (step.type === 'stopped') { closeKrouzpierSpectatorOverlay(); }
}

/* Animation de tirage : la carte choisie tournoie plusieurs fois avant de
   se stabiliser sur le résultat réel (coeur.png ou pique.png), avec un halo
   vert (bonne pioche) ou rouge (mauvaise pioche). */
function showKrouzpierRevealAnimation(result, wasCorrect, onDone){
  try{
    const overlay = document.createElement('div');
    overlay.className = 'krouzpierOverlay krouzpierReveal';
    overlay.innerHTML = `
      <div class="krouzpierBox">
        <div class="krouzpierSub" style="margin-bottom:2px;">La carte tournoie dans les airs…</div>
        <div class="krouzpierFlipCard" id="krouzpierFlipCard">
          <img id="krouzpierFlipImg" src="/assets/coeur.png" alt="">
        </div>
        <div class="krouzpierResultText" id="krouzpierResultText"></div>
      </div>
    `;
    document.body.appendChild(overlay);
    requestAnimationFrame(()=> overlay.classList.add('go'));

    const imgEl = document.getElementById('krouzpierFlipImg');
    const flipEl = document.getElementById('krouzpierFlipCard');

    // Alterne rapidement entre Cœur et Pique en ralentissant peu à peu, pour
    // garder le suspense jusqu'au tout dernier instant — le VRAI résultat
    // n'est affiché qu'à la toute fin de la série, jamais avant.
    const swapDelays = [70, 70, 80, 90, 100, 120, 140, 170, 210, 260, 320, 400];
    let step = 0;
    let currentShown = 'coeur';

    function nextSwap(){
      if (step < swapDelays.length) {
        currentShown = (currentShown === 'coeur') ? 'pique' : 'coeur';
        imgEl.src = `/assets/${currentShown}.png`;
        flipEl.classList.remove('rvSwapPulse'); void flipEl.offsetWidth; flipEl.classList.add('rvSwapPulse');
        const delay = swapDelays[step];
        step++;
        setTimeout(nextSwap, delay);
      } else {
        // Tout dernier instant : révélation du VRAI résultat, pas avant.
        imgEl.src = `/assets/${result}.png`;
        flipEl.classList.add('landed', wasCorrect ? 'correct' : 'wrong');
        const resultText = document.getElementById('krouzpierResultText');
        if (resultText) {
          resultText.textContent = wasCorrect ? '✓ Bonne pioche !' : '✗ Mauvaise pioche…';
          resultText.classList.add('show');
          resultText.style.color = wasCorrect ? '#7dffb0' : '#ff8080';
        }
      }
    }
    setTimeout(nextSwap, swapDelays[0]);

    const totalSpinMs = swapDelays.reduce((a, b) => a + b, 0);
    setTimeout(()=>{
      overlay.classList.remove('go');
      setTimeout(()=>{ if (overlay.parentNode) overlay.remove(); onDone(); }, 350);
    }, totalSpinMs + 1500);
  }catch(e){ onDone(); }
}

// Tchat déplaçable librement sur tout l'écran (souris + doigt), en attrapant l'en-tête.
(function makeChatDraggable(){
  const header = chatPanel.querySelector('.chatHeader');
  if (!header) return;
  header.style.cursor = 'move';
  header.style.touchAction = 'none';
  let dragging = false, startX = 0, startY = 0, startLeft = 0, startTop = 0;

  function beginDrag(clientX, clientY){
    const rect = chatPanel.getBoundingClientRect();
    dragging = true;
    startX = clientX; startY = clientY;
    startLeft = rect.left; startTop = rect.top;
    chatPanel.style.left = startLeft + 'px';
    chatPanel.style.top = startTop + 'px';
    chatPanel.style.bottom = 'auto';
    chatPanel.style.right = 'auto';
  }
  function moveDrag(clientX, clientY){
    if (!dragging) return;
    const dx = clientX - startX, dy = clientY - startY;
    const maxLeft = window.innerWidth - chatPanel.offsetWidth - 4;
    const maxTop = window.innerHeight - 40;
    const newLeft = Math.max(4, Math.min(maxLeft, startLeft + dx));
    const newTop = Math.max(4, Math.min(maxTop, startTop + dy));
    chatPanel.style.left = newLeft + 'px';
    chatPanel.style.top = newTop + 'px';
  }
  function endDrag(){ dragging = false; }

  header.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.tabBtn, #chatClose')) return;
    beginDrag(e.clientX, e.clientY);
    try { header.setPointerCapture(e.pointerId); } catch(_) {}
    e.preventDefault();
  });
  header.addEventListener('pointermove', (e) => moveDrag(e.clientX, e.clientY));
  header.addEventListener('pointerup', (e) => { endDrag(); try { header.releasePointerCapture(e.pointerId); } catch(_) {} });
  header.addEventListener('pointercancel', endDrag);
})();

// Déplacer sa propre main de cartes en bloc, n'importe où sur l'écran — jamais
// celle de l'adversaire. En ligne, seule la poignée de SON PROPRE siège est active
// (peu importe où elle se trouve visuellement à cause du retournement d'écran) ;
// en local (un seul écran partagé), les deux poignées restent utilisables.
// Recalcule la position de la poignée pour qu'elle reste toujours juste au bord
// de SA main, peu importe où celle-ci se trouve réellement sur l'écran (retournement
// de siège, redimensionnement de fenêtre, ou main en cours de déplacement).
function syncGripPosition(hand, grip){
  if (!hand || !grip || grip.classList.contains('hidden')) return;
  const rect = hand.getBoundingClientRect();
  if (rect.width === 0 && rect.height === 0) return; // main vide pour l'instant
  const viewportMid = window.innerHeight / 2;
  const handMid = rect.top + rect.height / 2;
  let top = (handMid < viewportMid) ? (rect.top - 30) : (rect.bottom + 4);
  let left = rect.left + rect.width / 2;
  // Garde-fou : la poignée doit TOUJOURS rester visible et cliquable à l'écran,
  // même si la main a été poussée très loin sur un bord.
  top = Math.max(6, Math.min(window.innerHeight - 32, top));
  left = Math.max(30, Math.min(window.innerWidth - 30, left));
  grip.style.top = top + 'px';
  grip.style.left = left + 'px';
}

function makeOneHandDraggable(handId, gripId){
  const hand = document.getElementById(handId);
  const grip = document.getElementById(gripId);
  if (!hand || !grip) return null;
  let dragging = false, startX = 0, startY = 0, offX = 0, offY = 0;

  // Garde-fou : on ne peut jamais glisser la main assez loin pour la perdre
  // hors de l'écran — une bonne partie doit toujours rester visible.
  function clamp(x, y){
    const baseRect = hand.getBoundingClientRect();
    // On retire l'offset actuel pour retrouver la position "de base" de la main.
    const currentX = parseFloat(hand.style.getPropertyValue('--handDragX')) || 0;
    const currentY = parseFloat(hand.style.getPropertyValue('--handDragY')) || 0;
    const baseLeft = baseRect.left - currentX, baseTop = baseRect.top - currentY;
    const margin = 60; // au moins 60px de la main doivent rester visibles
    const minX = margin - baseRect.width - baseLeft;
    const maxX = window.innerWidth - margin - baseLeft;
    const minY = margin - baseRect.height - baseTop;
    const maxY = window.innerHeight - margin - baseTop;
    return [Math.max(minX, Math.min(maxX, x)), Math.max(minY, Math.min(maxY, y))];
  }

  function apply(x, y){
    const [cx, cy] = clamp(x, y);
    hand.style.setProperty('--handDragX', cx + 'px');
    hand.style.setProperty('--handDragY', cy + 'px');
    syncGripPosition(hand, grip);
    return [cx, cy];
  }

  // Pointer Events : une seule API unifiée souris/tactile, bien plus fiable
  // que mousedown/touchstart séparés (notamment sur Firefox).
  grip.addEventListener('pointerdown', (e) => {
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    hand.classList.add('grabbing');
    try { grip.setPointerCapture(e.pointerId); } catch(_) {}
    e.preventDefault();
  });
  grip.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    apply(offX + (e.clientX - startX), offY + (e.clientY - startY));
  });
  function stopDrag(e){
    if (!dragging) return;
    dragging = false;
    hand.classList.remove('grabbing');
    const [cx, cy] = apply(offX + (e.clientX - startX), offY + (e.clientY - startY));
    offX = cx; offY = cy;
    try { grip.releasePointerCapture(e.pointerId); } catch(_) {}
  }
  grip.addEventListener('pointerup', stopDrag);
  grip.addEventListener('pointercancel', () => { dragging = false; hand.classList.remove('grabbing'); });

  function resetPosition(){
    offX = 0; offY = 0;
    hand.style.setProperty('--handDragX', '0px');
    hand.style.setProperty('--handDragY', '0px');
    syncGripPosition(hand, grip);
  }

  // Double-clic sur la poignée : remet la main à sa place d'origine.
  grip.addEventListener('dblclick', resetPosition);

  // Repositionne la poignée dès que la main change de taille/position
  // (nouvelle carte, redimensionnement de fenêtre, retournement d'écran...).
  window.addEventListener('resize', () => syncGripPosition(hand, grip));
  new MutationObserver(() => syncGripPosition(hand, grip)).observe(hand, { childList:true, attributes:true });
  setTimeout(() => syncGripPosition(hand, grip), 300);

  return { resetPosition };
}

(function setupHandGrips(){
  const gripBottom = document.getElementById('handGrip');
  const gripTop = document.getElementById('handGripTop');
  // La main adverse est désormais totalement fixe : aucune poignée, aucun
  // glisser-déposer possible dessus (elle ne servait à rien). La vôtre se
  // déplace via l'en-tête de sa propre box (voir plus bas).
  if (gripBottom) gripBottom.classList.add('hidden');
  if (gripTop) gripTop.classList.add('hidden');

  // Rien à réinitialiser pour la main adverse : elle ne bouge plus jamais.
  window.__resetHandPositions = function(){};

  // ===================================================================
  // VOTRE MAIN — désormais dans sa propre box, déplaçable par son en-tête et
  // repliable via un bouton. Fini les calculs de position/échelle : vous
  // décidez vous-même où la mettre, elle ne peut donc plus jamais gêner.
  // ===================================================================
  const myHandId = (MY_SEAT === 'top') ? 'handTop' : 'handBottom';
  const myHandEl = document.getElementById(myHandId);
  if (!myHandEl) return;

  const panel = document.createElement('div');
  panel.id = 'myHandPanel';
  panel.className = 'myHandPanel';
  panel.innerHTML = `
    <div class="myHandPanel-header">
      <span class="myHandPanel-grip">⠿⠿</span>
      <span class="myHandPanel-title">Votre main <span id="myHandPanelCount">(0)</span></span>
      <button type="button" class="myHandPanel-toggle" title="Replier / déplier votre main">▾</button>
    </div>
    <div class="myHandPanel-body">
      <button type="button" class="myHandPanel-scrollBtn left hide" aria-label="Défiler vers la gauche">◀</button>
      <button type="button" class="myHandPanel-scrollBtn right hide" aria-label="Défiler vers la droite">▶</button>
    </div>
  `;
  myHandEl.parentNode.insertBefore(panel, myHandEl);
  const bodyEl = panel.querySelector('.myHandPanel-body');
  const scrollLeftBtn = bodyEl.querySelector('.myHandPanel-scrollBtn.left');
  const scrollRightBtn = bodyEl.querySelector('.myHandPanel-scrollBtn.right');
  bodyEl.insertBefore(myHandEl, scrollRightBtn); // la main se place entre les deux flèches
  myHandEl.classList.add('in-panel');

  // Défilement horizontal de la main : molette, glisser, ou flèches — et les
  // flèches se masquent/désactivent automatiquement quand il n'y a rien de
  // plus à voir de ce côté-là.
  function getHandRow(){ return myHandEl.querySelector('.handRow'); }
  function updateScrollArrows(){
    const row = getHandRow();
    if (!row) { scrollLeftBtn.classList.add('hide'); scrollRightBtn.classList.add('hide'); return; }
    const canScroll = row.scrollWidth > row.clientWidth + 2;
    scrollLeftBtn.classList.toggle('hide', !canScroll || row.scrollLeft <= 2);
    scrollRightBtn.classList.toggle('hide', !canScroll || row.scrollLeft >= row.scrollWidth - row.clientWidth - 2);
  }
  scrollLeftBtn.addEventListener('click', () => { const row = getHandRow(); if (row) row.scrollBy({ left: -180, behavior:'smooth' }); });
  scrollRightBtn.addEventListener('click', () => { const row = getHandRow(); if (row) row.scrollBy({ left: 180, behavior:'smooth' }); });
  // Molette verticale → défilement horizontal (bien plus intuitif que d'avoir
  // à maintenir Shift), et on délègue via l'événement pour survivre aux
  // re-rendus de renderHand (qui recrée .handRow à chaque fois).
  bodyEl.addEventListener('wheel', (e) => {
    const row = getHandRow();
    if (!row || row.scrollWidth <= row.clientWidth) return;
    e.preventDefault();
    row.scrollLeft += e.deltaY;
  }, { passive:false });
  bodyEl.addEventListener('scroll', updateScrollArrows, true);
  window.__updateMyHandScrollArrows = updateScrollArrows;

  const header = panel.querySelector('.myHandPanel-header');
  const toggleBtn = panel.querySelector('.myHandPanel-toggle');

  function setCollapsed(collapsed){
    panel.classList.toggle('collapsed', collapsed);
    toggleBtn.textContent = collapsed ? '▸' : '▾';
  }
  toggleBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    setCollapsed(!panel.classList.contains('collapsed'));
  });

  // Glisser-déposer DE LA BOX ENTIÈRE via son en-tête (jamais envoyé au
  // réseau, purement visuel et local à cet écran, comme pour la main adverse).
  let dragging = false, startX = 0, startY = 0, originX = 0, originY = 0;
  header.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.myHandPanel-toggle')) return;
    dragging = true;
    const rect = panel.getBoundingClientRect();
    originX = rect.left; originY = rect.top;
    startX = e.clientX; startY = e.clientY;
    panel.style.left = originX + 'px';
    panel.style.top = originY + 'px';
    panel.style.right = 'auto';
    panel.style.bottom = 'auto';
    panel.style.transform = 'none';
    try{ header.setPointerCapture(e.pointerId); }catch(err){}
  });
  header.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    let nx = originX + dx, ny = originY + dy;
    // On garde toujours au moins l'en-tête visible à l'écran, même si on
    // essaie de la faire glisser hors des bords.
    nx = Math.max(-panel.offsetWidth + 60, Math.min(window.innerWidth - 60, nx));
    ny = Math.max(0, Math.min(window.innerHeight - 34, ny));
    panel.style.left = nx + 'px';
    panel.style.top = ny + 'px';
  });
  const stopDrag = () => { dragging = false; };
  header.addEventListener('pointerup', stopDrag);
  header.addEventListener('pointercancel', stopDrag);

  // Pendant le choix de faction, on s'assure juste que la box est dépliée et
  // bien visible (un petit pouls lumineux attire l'œil), au lieu de l'ancien
  // agrandissement en plein écran qui n'a plus de sens dans une box à part.
  window.__attentionMyHandPanel = function(show){
    if (show) {
      setCollapsed(false);
      panel.classList.add('attention');
      setTimeout(() => panel.classList.remove('attention'), 2100);
    }
  };

  window.__updateMyHandPanelCount = function(n){
    const el = document.getElementById('myHandPanelCount');
    if (el) el.textContent = `(${n})`;
  };
})();

function trimListForQuota(listEl, max=8, purge=2){
  if(!listEl) return;
  if(listEl.children.length > max){
    for(let i=0;i<purge;i++){
      const first = listEl.firstElementChild;
      if(!first) break;
      listEl.removeChild(first);
    }
  }
}

// ===================================================================
// ANNONCES D'ACTION — bandeau centré synchronisé, pour les Actions, les
// Artefacts et les Familiers. Se greffe directement sur pushHistory :
// comme cette fonction est déjà appelée en miroir chez les deux joueurs
// (localement chez l'auteur de l'action, et via 'historyEntry' chez son
// adversaire), l'annonce apparaît automatiquement des deux côtés, sans
// avoir besoin d'écrire du code réseau spécifique pour chaque carte.
// ===================================================================
const ANNOUNCE_KINDS = {
  action:   { label: 'Action',   color: '#7df9ff' },
  artefact: { label: 'Artefact', color: '#ffa62b' },
  familier: { label: 'Familier', color: '#f78fb3' },
};
let announceQueue = [];
let announceShowing = false;

function queueActionAnnounce(kind, html){
  const meta = ANNOUNCE_KINDS[kind];
  if (!meta) return;
  announceQueue.push({ html, meta });
  processAnnounceQueue();
}

function processAnnounceQueue(){
  if (announceShowing || announceQueue.length === 0) return;
  announceShowing = true;
  const { html, meta } = announceQueue.shift();
  showActionAnnounce(html, meta, () => {
    announceShowing = false;
    processAnnounceQueue();
  });
}

function showActionAnnounce(html, meta, onDone){
  let el = document.getElementById('actionAnnounceOverlay');
  if (el) el.remove();
  el = document.createElement('div');
  el.id = 'actionAnnounceOverlay';
  el.style.setProperty('--aaColor', meta.color);
  el.innerHTML = `
    <div class="aaCard">
      <div class="aaKind">${meta.label}</div>
      <div class="aaText">${html}</div>
    </div>
  `;
  document.body.appendChild(el);
  if (typeof setupCardLinkInteractions === 'function') setupCardLinkInteractions(el);

  let dismissed = false;
  const dismiss = () => {
    if (dismissed) return;
    dismissed = true;
    el.classList.remove('show');
    setTimeout(()=>{ el.remove(); if (typeof onDone === 'function') onDone(); }, 200);
  };
  el.addEventListener('click', dismiss);

  requestAnimationFrame(()=> el.classList.add('show'));

  const autoMs = (typeof window.matchMedia === 'function' && window.matchMedia('(prefers-reduced-motion: reduce)').matches) ? 200 : 1900;
  setTimeout(dismiss, autoMs);
}

function pushHistory(kind, html, opts = {}){
  const actorSeat = opts.actorSeat || MY_SEAT;
  const wasNearBottom = isNearBottom(histLog);
  const row = document.createElement('div');
  row.className='hItem';
  // En ligne, on indique clairement qui est à l'origine de chaque ligne, pour
  // qu'on comprenne bien "vous" / "votre adversaire" même sur les entrées venues
  // de l'autre joueur (le texte lui-même reste écrit depuis SON point de vue).
  const whoBadge = ONLINE_MODE
    ? (actorSeat === MY_SEAT ? '<span class="hWho hWhoMe">Vous</span>' : '<span class="hWho hWhoOpp">Adversaire</span>')
    : '';
  row.innerHTML = `<span class="hMeta">${kind.toUpperCase()}</span>${whoBadge}<div class="txt">${html}</div>`;
  histLog.appendChild(row);
  trimListForQuota(histLog, 8, 2);
  if(wasNearBottom) histLog.scrollTop = histLog.scrollHeight;

  // Diffuse cette ligne à l'adversaire pour qu'il voie, lui aussi, le déroulé
  // complet de la partie — pas seulement ses propres actions.
  if (ONLINE_MODE && window.__socket && !opts.fromRemote) {
    window.__socket.emit('historyEntry', { matchId: ONLINE_MATCH_ID, kind, html, actorSeat: MY_SEAT });
  }

  // Annonce visuelle centrée pour les événements notables (Action, Artefact,
  // Familier) — déclenchée ici même, donc automatiquement visible chez les
  // deux joueurs puisque pushHistory tourne en miroir des deux côtés.
  queueActionAnnounce(kind, html);
}

// Bloque toute interaction pouvant déclencher une action de jeu (clic, glisser-
// déposer, appui clavier) tant que showWaitOverlay() est actif, SAUF ce qui se
// passe dans le panneau de tchat (écrire un message n'est pas "jouer"). Le
// survol (mouseenter/mouseleave/mousemove, utilisé pour le zoom des cartes)
// n'est jamais intercepté : on peut toujours regarder, juste pas agir.
let waitInputBlockActive = false;
const WAIT_BLOCKED_EVENTS = ['pointerdown', 'mousedown', 'click', 'dragstart', 'touchstart', 'keydown'];
function waitInputBlocker(e) {
  if (e.target && e.target.closest && e.target.closest('#chatPanel')) return;
  e.preventDefault();
  e.stopPropagation();
  if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
}
function enableWaitInputBlock() {
  if (waitInputBlockActive) return;
  waitInputBlockActive = true;
  WAIT_BLOCKED_EVENTS.forEach(evt => document.addEventListener(evt, waitInputBlocker, true));
}
function disableWaitInputBlock() {
  if (!waitInputBlockActive) return;
  waitInputBlockActive = false;
  WAIT_BLOCKED_EVENTS.forEach(evt => document.removeEventListener(evt, waitInputBlocker, true));
}

// Requêtes de choix délégué à l'adversaire (partie en ligne uniquement) : quand
// une carte déclenche un choix qui appartient à l'AUTRE joueur (ex : Pestrass

// et on affiche un message de patience en attendant sa réponse.
const pendingChoiceRequests = {};
// Quand CE client répond à une requête venant de l'adversaire (il possède la
// vraie carte concernée), remoteChoiceMode retient le contexte de la requête
// en cours pour que les handlers de clic sachent qu'il faut RENVOYER le choix
// au lieu de l'appliquer localement (l'application réelle se fera chez celui
// qui a initié la requête, avant sa propre synchronisation d'état).
let remoteChoiceMode = null; // { requestId, kind, picks? }

// ===================================================================
// VERROU D'ACTION EXCLUSIVE — dès qu'un choix précis est requis d'un joueur
// (cible à détruire, à lier, à soigner, etc.), tout le reste doit être
// bloqué (jouer une autre carte, attaquer, miner, finir son tour) tant que
// ce choix n'a pas été fait. Une fois résolu, le jeu reprend normalement.
// Cette fonction centralise TOUS les modes de ciblage existants : lui
// ajouter un nouveau mode à l'avenir suffit à le protéger aussi.

    (venusylvaDestroyMode && venusylvaDestroyMode.active) ||
    c112TargetMode || c114TargetMode || c231TargetMode || wadooLinkMode || dollyHealMode ||
    prismisTargetMode || liensSelectionMode || freedaTargetMode || miroirTargetMode ||
    hitAndRunMode || peinturlurerMode || explorationMode || chargeboxTargetMode ||
    c59DestroyMode || c51SelectMode || c58HealingMode ||
    c9SelectMode || pilateSelectMode || c18SelectMode || remoteChoiceMode ||
    kabbaTargetMode || krouzpierTargetMode || vakxzinTargetMode ||
    c33CombatantMode || c33ArtifactMode || tokzikTargetMode || longVoyageFamiliarMode ||
    arakcubeTargetMode || ozokshiArtifactMode || kryoTargetMode || zyzyHostTargetMode
  );
}

// ===================================================================
// WADOO 4e lot : Paraction (C227) — contre-sort. À appeler AVANT que l'effet
// d'une Action ne se résolve : si l'adversaire (qui vient de jouer l'Action)
// a en face de lui un Paraction avec une charge disponible, son propriétaire
// est invité à décider s'il la dépense pour annuler l'Action. `resolveFn`
// n'est appelé QUE si l'Action n'est pas contrée.
// ===================================================================
function attemptParactionCounter(actingOwner, actionCard, resolveFn){
  const actionLabel = actionCard.label;
  const opp = (actingOwner === 'top') ? 'bottom' : 'top';
  const oppArts = (opp === 'top') ? topArts : botArts;
  const paraction = oppArts.find(a => a.label === 'C227' && (a.charges || 0) > 0);
  if (!paraction) { resolveFn(); return; }

  if (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE && MY_SEAT !== opp) {
    // Ce choix appartient à l'adversaire (propriétaire de Paraction) : on
    // délègue et on attend sa réponse, comme pour Pestrass/Dolly/Demon Core.
    showWaitOverlay(`Patientez : l'adversaire décide s'il contre ${cardName(actionLabel)} avec ${cardName('C227')}...`);
    requestOpponentChoice('paraction', { actionLabel }, (useCharge) => {
      hideWaitOverlay();
      resolveParactionDecision(actingOwner, actionCard, useCharge, resolveFn);
    });
    return;
  }

  // C'est mon propre Paraction (ou partie locale/hotseat) : je choisis moi-même.
  openButtonsPrompt(
    'Paraction',
    `L'adversaire joue ${cardName(actionLabel)}. Voulez-vous dépenser une charge de ${cardName('C227')} (${paraction.charges}) pour la contrer ?`,
    null,
    [
      { label: 'Contrer (dépenser 1 charge)', className: 'confirm', onClick: () => resolveParactionDecision(actingOwner, actionCard, true, resolveFn) },
      { label: 'Laisser passer', className: 'cancel', onClick: () => resolveParactionDecision(actingOwner, actionCard, false, resolveFn) },
    ]
  );
}

function resolveParactionDecision(actingOwner, actionCard, useCharge, resolveFn){
  const actionLabel = actionCard.label;
  const opp = (actingOwner === 'top') ? 'bottom' : 'top';
  const oppArts = (opp === 'top') ? topArts : botArts;
  const paraction = oppArts.find(a => a.label === 'C227' && (a.charges || 0) > 0);
  if (useCharge && paraction) {
    paraction.charges = Math.max(0, (paraction.charges || 0) - 1);
    pushHistory('artefact', `${cardAnchor('C227')} contre ${cardAnchor(actionLabel)} : l'action est annulée !`);
    // Même contrée, l'action a bel et bien été JOUÉE : elle part en défausse
    // au lieu de rester dans la main de son propriétaire.
    const hand = getHandByOwner(actingOwner);
    const idx = hand.findIndex(c => c.id === actionCard.id);
    if (idx !== -1) hand.splice(idx, 1);
    discardCard(actionCard, actingOwner, 'action');
    fullRender();
    // resolveFn n'est volontairement PAS appelé : l'EFFET de l'action est contré.
  } else {
    resolveFn();
  }
}

function handleIncomingChoiceRequest(requestId, kind, payload) {
  if (kind === 'pestrass') {
    const familiars = (payload.familiarIds || []).map(id => getAllFamiliers().find(f => f.id === id)).filter(Boolean);
    if (familiars.length === 0) {
      window.__socket.emit('choiceResponse', { matchId: ONLINE_MATCH_ID, seat: MY_SEAT, requestId, choice: null });
      return;
    }
    showChoiceNotice(`${cardName('C61')} déclenche son effet de Mort : à vous de choisir.`);
    openPestrassChoicePrompt(familiars, (chosenId) => {
      hideChoiceNotice();
      closeActionPrompt();
      window.__socket.emit('choiceResponse', { matchId: ONLINE_MATCH_ID, seat: MY_SEAT, requestId, choice: chosenId });
    });
  }

  if (kind === 'paraction') {
    // WADOO 4e lot : l'adversaire vient de jouer une Action — c'est à MOI
    // (propriétaire de Paraction) de décider si je la contre.
    const actionLabel = payload.actionLabel;
    showChoiceNotice(`vous pouvez contrer ${cardName(actionLabel)} avec ${cardName('C227')}.`);
    openButtonsPrompt(
      'Paraction',
      `L'adversaire joue ${cardName(actionLabel)}. Voulez-vous dépenser une charge de ${cardName('C227')} pour la contrer ?`,
      null,
      [
        { label: 'Contrer (dépenser 1 charge)', className: 'confirm', onClick: () => {
            hideChoiceNotice();
            window.__socket.emit('choiceResponse', { matchId: ONLINE_MATCH_ID, seat: MY_SEAT, requestId, choice: true });
          } },
        { label: 'Laisser passer', className: 'cancel', onClick: () => {
            hideChoiceNotice();
            window.__socket.emit('choiceResponse', { matchId: ONLINE_MATCH_ID, seat: MY_SEAT, requestId, choice: false });
          } },
      ]
    );
  }

  if (kind === 'dolly') {
    const validTargets = (payload.targetIds || []).map(id => findCardOnBoard(id)).filter(Boolean);
    if (validTargets.length === 0) {
      window.__socket.emit('choiceResponse', { matchId: ONLINE_MATCH_ID, seat: MY_SEAT, requestId, choice: null });
      return;
    }
    remoteChoiceMode = { requestId, kind: 'dolly' };
    dollyHealMode = { owner: MY_SEAT, onComplete: null };
    closeActionPrompt();
    showChoiceNotice(`${cardName('C117')} déclenche son effet : à vous de choisir qui soigner.`);
    buildDollyPrompt();
    fullRender();
  }

  if (kind === 'c58') {
    const charges = payload.charges || 0;
    if (charges <= 0) {
      window.__socket.emit('choiceResponse', { matchId: ONLINE_MATCH_ID, seat: MY_SEAT, requestId, choice: [] });
      return;
    }
    remoteChoiceMode = { requestId, kind: 'c58', picks: [] };
    c58HealingMode = { owner: MY_SEAT, healsRemaining: charges };
    closeActionPrompt();
    showChoiceNotice(`${cardName('C58')} déclenche son effet : à vous de distribuer les soins.`);
    buildC58Prompt(charges);
    fullRender();
  }
}

function findHostOfFamiliar(familiar) {
  const allCombatants = topLine.concat(botLine);
  const host = allCombatants.find(c => c.id === familiar.attachedTo);
  if (!host) return { card: null, owner: null };

  const owner = topLine.includes(host) ? 'top' : 'bottom';
  return { card: host, owner };
}

function openPestrassChoicePrompt(familiars, onChosen) {
  const buttons = familiars.map(fam => {
    const { card: host, owner: hostOwner } = findHostOfFamiliar(fam);
    const hostName = host ? `(sur ${cardName(host.label)})` : '';
    const hostPlayerLabel = `(${playerLabel(hostOwner)})`;
    return {
      label: `${cardName(fam.label)} ${hostName} ${hostPlayerLabel}`,
      onClick: () => onChosen(fam.id)
    };
  });

  openButtonsPrompt(
    'Effet de Mort : Pestrass',
    "Choisissez un familier rattaché à un combattant, sur n'importe quelle zone de combat.",
    null,
    buttons
  );
}

function resolvePestrassChoice(pestrassOwner, familiarId) {
  const fam = getAllFamiliers().find(f => f.id === familiarId);
  if (!fam) { fullRender(); return; }
  const { owner: hostOwner } = findHostOfFamiliar(fam);
  const famOwner = fam.playOwner || hostOwner;
  const famArray = getFamArrayByOwner(famOwner);
  const idx = famArray.findIndex(f => f.id === fam.id);
  if (idx !== -1) {
    const discardedFam = famArray.splice(idx, 1)[0];
    discardCard(discardedFam, famOwner, 'effect');
    pushHistory('action', `${cardAnchor('C61')} défausse le familier ${cardAnchor(discardedFam.label)}.`);
  }
  fullRender();
}

function handlePestrassDeathrattle(pestrassOwner) {
  // Seuls les familiers actuellement rattachés à un combattant réellement présent
  // sur une des deux zones de combat sont éligibles (ni familiers fantômes, ni
  // ceux dont l'hôte a déjà quitté le plateau).
  const allFamiliers = getAllFamiliers().filter(fam => {
    const { card: host } = findHostOfFamiliar(fam);
    return host && (topLine.includes(host) || botLine.includes(host));
  });

  if (allFamiliers.length === 0) {
    pushHistory('info', `Effet de ${cardAnchor('C61')} : aucun familier rattaché sur le plateau à défausser.`);
    return;
  }

  // Partie en ligne : si Pestrass n'est pas la mienne, ce choix appartient à mon
  // adversaire, pas à moi — je lui délègue et j'affiche un message de patience.
  if (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE && MY_SEAT !== pestrassOwner) {
    showWaitOverlay(`Patientez : l'adversaire choisit l'effet de ${cardName('C61')}...`);
    requestOpponentChoice('pestrass', { familiarIds: allFamiliers.map(f => f.id) }, (chosenId) => {
      hideWaitOverlay();
      resolvePestrassChoice(pestrassOwner, chosenId);
    });
    return;
  }

  openPestrassChoicePrompt(allFamiliers, (chosenId) => resolvePestrassChoice(pestrassOwner, chosenId));
}

function handleBoombaDeathrattle() {
  if (boombaEffectInProgress) return;
  boombaEffectInProgress = true;

  document.body.classList.add('screen-flash');
  setTimeout(() => document.body.classList.remove('screen-flash'), 500);

  pushHistory('info', `${cardAnchor('C66')} explose, détruisant tous les personnages et artefacts !`);

  const cardsToDiscard = [];
  topLine.forEach(c => cardsToDiscard.push({ card: c, owner: 'top' }));
  botLine.forEach(c => cardsToDiscard.push({ card: c, owner: 'bottom' }));
  topArts.forEach(c => cardsToDiscard.push({ card: c, owner: 'top' }));
  botArts.forEach(c => cardsToDiscard.push({ card: c, owner: 'bottom' }));

  topLine.length = 0;
  botLine.length = 0;
  topArts.length = 0;
  botArts.length = 0;

  cardsToDiscard.forEach(item => {
    discardCard(item.card, item.owner, 'death');
  });

  boombaEffectInProgress = false;
  fullRender();
}


/* ---------- FAMILIERS ---------- */
function getFamArrayByOwner(owner){ return (owner==='top')?famTop:famBottom; }
function getAllFamiliers(){ return famTop.concat(famBottom); }
function getFamiliersOnHost(hostCard){
  const hid = hostCard.id;
  return getAllFamiliers().filter(f=>f.attachedTo===hid);
}
function attachFamiliarToHost(owner, familiarCard, hostCard){
  familiarCard.attachedTo = hostCard.id;
  familiarCard.playOwner = owner;
  getFamArrayByOwner(owner).push(familiarCard);
  pushHistory('familier', `${cardAnchor(familiarCard.label)} s’attache à ${cardAnchor(hostCard.label)}.`);

  if (hostCard.label === 'C108') {
    if (!hostCard.attachedFamiliarLabels.includes(familiarCard.label)) {
      hostCard.hp = (hostCard.hp || 0) + 2;
      playHPHitEffect(hostCard);

      const ownerPrefix = (owner === 'top') ? 'T' : 'B';
      const duplicateFamiliar = createCard(familiarCard.label, ownerPrefix);
      const hand = getHandByOwner(owner);
      hand.push(duplicateFamiliar);

      hostCard.attachedFamiliarLabels.push(familiarCard.label);

      const ownerLabelText = playerLabel(owner);
      pushHistory('info', `Effet de Rocketurne : +2 PV. Une copie de ${cardAnchor(familiarCard.label)} est ajoutée à la main de ${ownerLabelText}.`);

    } else {
      pushHistory('info', `L'effet de Rocketurne ne se déclenche pas car un ${cardName(familiarCard.label)} a déjà été attaché.`);
    }
  }

  if (familiarCard.label === 'C106') {
    pushHistory('info', `L'effet de ${cardAnchor('C106')} GÈLE ${cardAnchor(hostCard.label)} !`);
  }
  if (familiarCard.label === 'C107') {
    pushHistory('info', `L'effet de ${cardAnchor('C107')} annule les effets des autres familiers sur ${cardAnchor(hostCard.label)} !`);
  }

  // WADOO 4e lot : Blusyte (C226) — applique immédiatement son bonus de
  // Bouclier (+X, X = Mithril actuel de son propriétaire) dès l'attache,
  // sans attendre le prochain reset de bouclier. Fonctionne identiquement
  // qu'elle soit attachée à un allié OU à un ennemi.
  if (familiarCard.label === 'C226') {
    recalcBlusyteBonuses();
    pushHistory('info', `${cardAnchor('C226')} donne +${familiarCard.appliedShieldBonus || 0} Bouclier à ${cardAnchor(hostCard.label)} (Mithril actuel).`);
  }

  // KRYLLS (nouveau lot) : Mezamorph (C41) — dès qu'il s'attache, propose de
  // se transformer en copie d'un familier déjà présent sur le plateau.
  if (familiarCard.label === 'C41') {
    fullRender();
    openMezamorphCopyPrompt(owner, familiarCard);
    return;
  }

  fullRender();
}

function detachFamiliarsOnHost(hostCard, hostOwner){
  const hid = hostCard.id;

  [famTop, famBottom].forEach(arr => {
    for(let i = arr.length - 1; i >= 0; i--){
      const f = arr[i];
      if(f.attachedTo === hid){
        const familiar = arr.splice(i, 1)[0];
        const originalOwner = familiar.playOwner || hostOwner;

        if(familiar.label === 'C106'){
          pushHistory('info', `${cardAnchor(hostCard.label)} n'est plus gelé.`);
        }

        if(familiar.label === 'C10'){
          addToExile(familiar);
          pushHistory('exil', `${cardAnchor('C10')} part en EXIL (son hôte ${cardAnchor(hostCard.label)} a été retiré).`);
        } else {
          discardCard(familiar, originalOwner);
          pushHistory('défausse', `${cardAnchor(familiar.label)} va dans la défausse de son propriétaire (son hôte ${cardAnchor(hostCard.label)} a été retiré).`);
        }
      }
    }
  });
}

function familiarNamesOnHost(hostCard){
  const fams = getFamiliersOnHost(hostCard).map(f=>cardName(f.label));
  return fams;
}

/* Rendu compact des familiers rattachés, sur le plateau : petits badges
   circulaires superposés (identité au survol), au lieu de grandes vignettes +
   texte en permanence affiché. Au-delà de 3 familiers sur le même hôte
   (rare, mais possible), un badge "+N" regroupe le reste — son survol liste
   les noms restants. */
function renderMiniFamiliersForHost(el, hostCard){
  const old = el.querySelector('.famBadgeDock'); if (old) old.remove();

  const fams = getFamiliersOnHost(hostCard);
  if (fams.length === 0) return;

  const MAX_VISIBLE_BADGES = 3;
  const visible = fams.slice(0, MAX_VISIBLE_BADGES);
  const overflow = fams.slice(MAX_VISIBLE_BADGES);

  const dock = document.createElement('div');
  dock.className = 'famBadgeDock';

  visible.forEach(f => {
    const badge = document.createElement('div');
    badge.className = 'famBadge';
    const url = getCardImage(f.label);
    if (url) badge.style.backgroundImage = `url(${url})`;
    const tip = document.createElement('div');
    tip.className = 'famBadgeTip';
    tip.textContent = cardName(f.label);
    badge.appendChild(tip);
    // Clic pour figer/défiger l'info-bulle (en plus du survol) — utile au
    // tactile, où il n'y a pas de survol, et fonctionne identiquement pour
    // les combattants alliés ET adverses (même code des deux côtés).
    badge.addEventListener('click', (e) => {
      e.stopPropagation();
      const wasOpen = badge.classList.contains('pinned');
      dock.querySelectorAll('.famBadge.pinned, .famBadgeOverflow.pinned').forEach(b => b.classList.remove('pinned'));
      if (!wasOpen) badge.classList.add('pinned');
    });
    dock.appendChild(badge);
  });

  if (overflow.length > 0) {
    const badge = document.createElement('div');
    badge.className = 'famBadgeOverflow';
    badge.textContent = `+${overflow.length}`;
    const tip = document.createElement('div');
    tip.className = 'famBadgeTip';
    tip.textContent = overflow.map(f => cardName(f.label)).join(', ');
    badge.appendChild(tip);
    badge.addEventListener('click', (e) => {
      e.stopPropagation();
      const wasOpen = badge.classList.contains('pinned');
      dock.querySelectorAll('.famBadge.pinned, .famBadgeOverflow.pinned').forEach(b => b.classList.remove('pinned'));
      if (!wasOpen) badge.classList.add('pinned');
    });
    dock.appendChild(badge);
  }

  el.appendChild(dock);
}
// Un clic n'importe où ailleurs sur la page referme toute info-bulle de

});

// KRYLLS (nouveau lot) : Mezamorph (C41) — se transforme en copie d'un
// familier déjà présent sur le plateau, choisi via une grande fenêtre
// centrale listant toutes les options disponibles.
function openMezamorphCopyPrompt(owner, mezamorphCard){
  const candidates = getAllFamiliers().filter(f => f.id !== mezamorphCard.id);
  if (candidates.length === 0) {
    pushHistory('info', `${cardAnchor('C41')} : aucun autre familier sur le plateau à copier — il reste Mezamorph.`);
    return;
  }
  // Réutilise EXACTEMENT la même fenêtre que "Voir Familiers" (même overlay,
  // mêmes vignettes .dthumb) — mais avec TOUS les familiers de TOUS les
  // combattants en jeu, et rendue cliquable pour le choix (au lieu d'un
  // simple aperçu au survol).
  const carousel = document.getElementById('familiarCarousel');
  const title = document.getElementById('fcoTitle');
  if (!familiarCarouselOverlay || !carousel || !title) return;

  title.textContent = 'Mezamorph — choisissez le familier à copier';
  carousel.innerHTML = '';
  carousel.classList.add('selecting');

  candidates.forEach(fam => {
    const host = findCardOrArtifactOnBoard(fam.attachedTo);
    const thumb = document.createElement('div');
    thumb.className = 'dthumb';
    const url = getCardImage(fam.label);
    if (url) {
      thumb.style.backgroundImage = `url(${url})`;
    } else {
      thumb.textContent = cardName(fam.label);
    }
    thumb.title = `${cardName(fam.label)}${host ? ' — sur ' + cardName(host.label) : ''}`;
    thumb.addEventListener('mouseenter', () => showZoom(fam.label, fam));
    thumb.addEventListener('mouseleave', hideZoom);
    thumb.addEventListener('click', () => {
      carousel.classList.remove('selecting');
      hideFamiliarCarousel();
      applyMezamorphCopy(mezamorphCard, fam.label);
    });
    carousel.appendChild(thumb);
  });

  familiarCarouselOverlay.style.display = 'flex';
}

function applyMezamorphCopy(mezamorphCard, copiedLabel){
  mezamorphCard.label = copiedLabel;
  // Marque cette carte comme étant "secrètement" Mezamorph, quel que soit
  // le familier qu'elle imite actuellement — permet de la faire redevenir
  // C41 dès qu'elle se détache, peu importe la raison (voir discardCard et
  // addToExile).
  mezamorphCard.mezamorphOriginal = true;
  pushHistory('familier', `${cardAnchor('C41')} se transforme en une copie de ${cardAnchor(copiedLabel)} !`);
  fullRender();
}

function attachFamiliersZoom(zoomEl, hostCard){
