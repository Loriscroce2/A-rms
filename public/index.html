      document.querySelectorAll('.tcSpotlight').forEach(el => el.classList.remove('tcSpotlight'));
      document.querySelectorAll('.tcSpotlightLight').forEach(el => el.classList.remove('tcSpotlightLight'));
      document.querySelectorAll('.tcNeedsRelative').forEach(el => el.classList.remove('tcNeedsRelative'));
      document.getElementById('tcArrow').style.display = 'none';
      document.getElementById('tcArrow2').style.display = 'none';
      if (dialogue.style.display !== 'flex') blocker.style.display = 'none';
      if (tcArrowTimer) { clearInterval(tcArrowTimer); tcArrowTimer = null; }
      // Restaure le z-index de tout ancêtre temporairement remonté.
      tcBoostedAncestors.forEach(a => {
        if (a.dataset.tcOldZIndex === '') a.style.removeProperty('z-index');
        else a.style.zIndex = a.dataset.tcOldZIndex;
        delete a.dataset.tcOldZIndex;
      });
      tcBoostedAncestors = [];
    }
    // Accepte un seul élément OU un tableau d'éléments (ex. la carte en main
    // ET la zone de combat où la déposer, illuminées simultanément).
    function highlight(elOrArr, opts){
      opts = opts || {};
      clearHighlight();
      const els = (Array.isArray(elOrArr) ? elOrArr : [elOrArr]).filter(Boolean);
      if (els.length === 0) return;
      if (!opts.noBlock) blocker.style.display = 'block';
      // "noBlock" (autoriser le glisser natif ailleurs) et "noDarken" (ne pas
      // assombrir la zone, ex. le reste de la main) sont deux réglages
      // indépendants : on peut très bien bloquer tout le reste de l'écran
      // SANS assombrir la carte elle-même, pour qu'elle reste bien visible.
      const spotClass = (opts.noBlock || opts.noDarken) ? 'tcSpotlightLight' : 'tcSpotlight';
      els.forEach(el => {
        el.classList.add(spotClass);
        // On ne force position:relative QUE si l'élément est en position
        // statique par défaut (nécessaire pour que le z-index prenne effet).
        // Les cartes ont déjà leur propre positionnement (absolute en main,
        // relative une fois posées) — le leur imposer casserait leur mise en
        // page (éventail de la main notamment).
        if (window.getComputedStyle(el).position === 'static') {
          el.classList.add('tcNeedsRelative');
        }
        // Un ancêtre peut posséder son PROPRE contexte d'empilement (z-index
        // déjà fixé, ex. le prompt de faction à z-index:2000) qui plafonne
        // tout ce qu'il contient — le z-index forcé sur la cible elle-même ne
        // suffit alors pas à passer au-dessus du calque de blocage. On
        // remonte temporairement tout ancêtre concerné, et on le restaure
        // ensuite dans clearHighlight().
        let ancestor = el.parentElement;
        while (ancestor && ancestor !== document.body) {
          const cs = window.getComputedStyle(ancestor);
          if (cs.zIndex !== 'auto' && parseInt(cs.zIndex, 10) < 9060 && !tcBoostedAncestors.includes(ancestor)) {
            ancestor.dataset.tcOldZIndex = ancestor.style.zIndex || '';
            ancestor.style.zIndex = '9080';
            tcBoostedAncestors.push(ancestor);
          }
          ancestor = ancestor.parentElement;
        }
      });
      positionArrows(els);
      tcArrowTimer = setInterval(()=> positionArrows(els), 300);
    }
    function highlightHandCard(label){
      const card = botHand.find(c => c.label === label);
      if (!card) return null;
      const el = document.querySelector(`#handBottom [data-id="${card.id}"]`);
      highlight(el);
      return el;
    }

    function waitForCondition(checkFn, onDone, intervalMs){
      const timer = setInterval(()=>{
        try{
          if (checkFn()) { clearInterval(timer); onDone(); }
        }catch(e){ /* le plateau peut se re-rendre entre deux vérifications, on retente */ }
      }, intervalMs || 400);
      return timer;
    }

    async function markArmsTutorialSeen(){
      try{
        const res = await fetch('/api/tutorial/seen', { method:'POST' });
        return await res.json();
      }catch(e){ return null; }
    }

    // ==========================================================
    // SÉQUENCE
    // ==========================================================

    // ---- 1. Accueil ----
    async function step0_Welcome(){
      let firstName = '';
      let alreadySeen = false;
      try{
        const res = await fetch('/api/me');
        const data = await res.json();
        if (res.ok && data.user) {
          if (data.user.name) firstName = data.user.name;
          alreadySeen = !!data.user.hasSeenTutorial;
        }
      }catch(e){}

      const greeting = firstName ? `Bienvenue, <strong>${firstName}</strong> !` : 'Bienvenue !';
      const rewardLine = alreadySeen
        ? ''
        : ` <br><br>Suivez mes indications jusqu'au bout : ça vous rapportera <strong>350 pièces</strong> — pile de quoi vous
            offrir votre premier booster de cartes.`;
      showDialogue('Bienvenue dans A’rms', `${greeting} Je suis votre guide, et je vais vous accompagner à travers un vrai
        tour de jeu, sur le plateau.${rewardLine}`, [
        { label: 'Commencer', onClick: step1_CardTypes }
      ]);
    }

    // ---- 2. Les 4 types de cartes ----
    function step1_CardTypes(){
      showDialogue('2/13 — Les cartes', `Quatre types de cartes :<br><br>
        <strong>Personnage</strong> — combat pour vous.<br>
        <strong>Familier</strong> — renforce un Personnage.<br>
        <strong>Artefact</strong> — effet permanent.<br>
        <strong>Action</strong> — effet immédiat, puis défausse.`, [
        { label: 'Continuer', onClick: step2_Victory }
      ]);
    }

    // ---- 3. Conditions de victoire ----
    function step2_Victory(){
      showDialogue('3/13 — Objectif', `Le plus souvent, on gagne en forgeant <strong>5 A’rms</strong> ⚒ avant l'adversaire.
        D'autres cartes offrent des voies de victoire alternatives.`, [
        { label: 'Continuer', onClick: step3_Faction }
      ]);
    }

    // ---- 4. Choix de faction (vraie première action de chaque tour) ----
    function step3_Faction(){
      showDialogue('4/13 — Choisir sa faction', `<strong>Première action de chaque tour.</strong> Vous ne pourrez jouer que des
        cartes de cette faction ce tour-ci.`, [
        { label: 'À vous de jouer', onClick: () => {
          hideDialogue();
          const factionBox = document.querySelector('.factionPrompt');
          highlight(factionBox);
          showBanner('Choisir sa faction', `Cliquez sur une faction proposée ci-dessus.`);
          waitForCondition(() => !!activeFaction['bottom'], step4_PlayCard);
        } }
      ]);
    }

    // ---- 5. Jouer un Personnage ----
    function step4_PlayCard(){
      hideBanner(); clearHighlight();
      showDialogue('5/13 — Jouer un Personnage', `<strong>${cardName('C116')}</strong> est un Personnage : une fois en jeu,
        elle combat pour vous.`, [
        { label: 'À vous de jouer', onClick: () => {
          hideDialogue();
          const startCount = botLine.length;
          const card = botHand.find(c => c.label === 'C116');
          const cardEl = card ? document.querySelector(`#handBottom [data-id="${card.id}"]`) : null;
          const zoneEl = document.getElementById('battleBottom');
          highlight([cardEl, zoneEl], { noBlock: true });
          showBanner('Jouer un Personnage', `Glissez <strong>${cardName('C116')}</strong> depuis votre main jusque dans votre
            <strong>zone de combat</strong>.`);
          waitForCondition(() => botLine.length > startCount, step5_Mithril);
        } }
      ]);
    }

    // ---- 6. Mithril ----
    function step5_Mithril(){
      hideBanner(); clearHighlight();
      const box = document.getElementById('mithrilBoxBottom');
      showDialogue('6/13 — Le Mithril', `Le <strong>Mithril</strong> ⟡ est votre ressource courante : elle sert à activer des
        effets et à forger vos A’rms.`, [
        { label: 'Continuer', onClick: () => {
          hideDialogue();
          highlight(box);
          addMithril('bottom');
          addMithril('bottom');
          showBanner('Le Mithril', `Vous venez d'en gagner. Regardez le compteur.`);
          setTimeout(step6_Attack, 1600);
        } }
      ]);
    }

    // ---- 7. Épuisement / trait RAPIDE, puis attaque ----
    function step6_Attack(){
      clearHighlight();
      const dummy = createCard('C2', 'T');
      topLine.push(dummy);
      fullRender();
      const myCard = botLine[0];
      showDialogue('7/13 — Attaquer', `Un combattant qui vient d'être joué est normalement <strong>épuisé</strong> : il ne peut
        ni attaquer ni miner ce tour-ci. Seul le trait <strong>RAPIDE</strong> permet d'agir tout de suite —
        <strong>${myCard ? cardName(myCard.label) : 'votre combattant'}</strong> le possède.`, [
        { label: 'À vous de jouer', onClick: () => {
          hideDialogue();
          const myEl = myCard ? document.querySelector(`[data-id="${myCard.id}"]`) : null;
          const oppEl = document.querySelector(`[data-id="${dummy.id}"]`);
          highlight([myEl, oppEl], { noBlock: true });
          const startTopCount = topLine.length;
          const startMyHp = myCard ? getEffectiveHP(myCard) : 0;
          showBanner('Attaquer', `<strong>Maintenez le clic</strong> sur votre combattant, glissez vers l'adversaire, puis
            relâchez.`);
          waitForCondition(() => {
            const stillThere = botLine.find(c => myCard && c.id === myCard.id);
            const hpChanged = stillThere ? (getEffectiveHP(stillThere) !== startMyHp) : true;
            return topLine.length < startTopCount || hpChanged;
          }, step6b_CombatMath);
        } }
      ]);
    }

    // ---- 7b. Le calcul du combat ----
    function step6b_CombatMath(){
      clearHighlight();
      showDialogue('Le calcul du combat', `Chaque combattant inflige des dégâts égaux à ses <strong>PV actuels</strong>, des
        <strong>deux côtés à la fois</strong>. Le <strong>Bouclier</strong> absorbe les dégâts en premier ; le surplus retire
        des PV.`, [
        { label: 'Continuer', onClick: step6c_Mining }
      ]);
    }

    // ---- 7c. Miner ----
    function step6c_Mining(){
      clearHighlight();
      showDialogue('Miner', `Au lieu d'attaquer, un combattant peut aussi <strong>miner</strong> : il rapporte
        <strong>+1 Mithril</strong>, mais perd <strong>1 PV</strong> et ne pourra plus attaquer ce tour-ci — les deux actions
        sont <strong>incompatibles</strong>. Faisons-le avec une seconde ${cardName('C116')}.`, [
        { label: 'À vous de jouer', onClick: () => {
          hideDialogue();
          const miner = createCard('C116', 'B');
          botHand.push(miner);
          fullRender();
          const startCount = botLine.length;
          const cardEl = document.querySelector(`#handBottom [data-id="${miner.id}"]`);
          const zoneEl = document.getElementById('battleBottom');
          highlight([cardEl, zoneEl], { noBlock: true });
          showBanner('Miner', `Glissez cette seconde <strong>${cardName('C116')}</strong> depuis votre main jusque dans votre
            zone de combat.`);
          waitForCondition(() => botLine.length > startCount, () => {
            clearHighlight(); hideBanner();
            step6c2_MiningClick(miner);
          });
        } }
      ]);
    }

    function step6c2_MiningClick(miner){
      const minerEl = document.querySelector(`[data-id="${miner.id}"]`);
      highlight(minerEl);
      showBanner('Miner', `Cliquez sur cette <strong>${cardName('C116')}</strong>, puis choisissez "Miner" dans le menu.`);
      const startMithril = mithril['bottom'] || 0;
      waitForCondition(() => (mithril['bottom'] || 0) > startMithril, () => {
        clearHighlight(); hideBanner();
        showDialogue('Mithril gagné', `+1 Mithril récolté, mais <strong>-1 PV</strong> sur cette carte — vérifiez son compteur.
          Remarquez aussi qu'elle ne peut désormais plus attaquer ce tour-ci.`, [
          { label: 'Continuer', onClick: step7_Familiar }
        ]);
      });
    }

    // ---- 8. Familier ----
    function step7_Familiar(){
      clearHighlight();
      showDialogue('8/13 — Les Familiers', `<strong>${cardName('C107')}</strong> est un Familier : rattaché à un combattant, il
        en modifie les capacités tant qu'il reste en jeu.`, [
        { label: 'À vous de jouer', onClick: () => {
          hideDialogue();
          const startFamCount = famBottom.length;
          const famCard = botHand.find(c => c.label === 'C107');
          const famEl = famCard ? document.querySelector(`#handBottom [data-id="${famCard.id}"]`) : null;
          const hostEl = botLine[0] ? document.querySelector(`[data-id="${botLine[0].id}"]`) : null;
          highlight([famEl, hostEl], { noBlock: true });
          showBanner('Les Familiers', `Glissez <strong>${cardName('C107')}</strong> sur votre combattant pour l'y rattacher.`);
          waitForCondition(() => famBottom.length > startFamCount, step8_Action);
        } }
      ]);
    }

    // ---- 9. Action ----
    function step8_Action(){
      clearHighlight();
      showDialogue('9/13 — Les Actions', `<strong>${cardName('C102')}</strong> est une Action : effet immédiat, puis défausse.
        Elle se joue en la déposant directement sur le combattant à renforcer.`, [
        { label: 'À vous de jouer', onClick: () => {
          hideDialogue();
          const actionCard = botHand.find(c => c.label === 'C102');
          const actionEl = actionCard ? document.querySelector(`#handBottom [data-id="${actionCard.id}"]`) : null;
          const hostCard = botLine[0];
          const hostEl = hostCard ? document.querySelector(`[data-id="${hostCard.id}"]`) : null;
          highlight([actionEl, hostEl], { noDarken: true });
          showBanner('Les Actions', `Glissez <strong>${cardName('C102')}</strong> directement sur votre combattant.`);
          const startHp = hostCard ? getEffectiveHP(hostCard) : 0;
          const startShield = hostCard ? ((hostCard.shield || 0) + (hostCard.tempShield || 0)) : 0;
          waitForCondition(() => !botHand.find(c => c.label === 'C102'), () => {
            const nowCard = botLine.find(c => hostCard && c.id === hostCard.id);
            const gainedHp = nowCard ? (getEffectiveHP(nowCard) - startHp) : 0;
            const gainedShield = nowCard ? (((nowCard.shield || 0) + (nowCard.tempShield || 0)) - startShield) : 0;
            clearHighlight(); hideBanner();
            showDialogue('Bonus reçu', `${nowCard ? cardName(nowCard.label) : 'Votre combattant'} a bien reçu
              <strong>+${Math.max(gainedHp,0)} PV</strong> et <strong>+${Math.max(gainedShield,0)} Bouclier</strong>. Vérifiez
              les compteurs sur sa carte.`, [
              { label: 'Continuer', onClick: step9_ExileDiscard }
            ]);
          });
        } }
      ]);
    }

    // ---- 10. Défausse vs Exil ----
    function step9_ExileDiscard(){
      clearHighlight(); hideBanner();
      showDialogue('10/13 — Défausse et Exil', `Un combattant détruit part généralement en <strong>Défausse</strong>. Certains
        effets, plus définitifs, l'envoient en <strong>Exil</strong> à la place.`, [
        { label: 'Continuer', onClick: step9b_ManualDiscard }
      ]);
    }

    // ---- 10b. Défausse manuelle ----
    function step9b_ManualDiscard(){
      const fillerCard = botHand.find(c => c.label !== 'C116' && c.label !== 'C107' && c.label !== 'C102');
      if (!fillerCard) { step9c_Cycles(); return; }
      showDialogue('11/13 — Défausser une carte', `Vous pouvez aussi défausser <strong>volontairement</strong> une carte de
        votre main (utile pour s'en débarrasser), à condition qu'elle soit de la faction choisie ce tour-ci.`, [
        { label: 'À vous de jouer', onClick: () => {
          hideDialogue();
          const cardEl = document.querySelector(`#handBottom [data-id="${fillerCard.id}"]`);
          const dumpEl = document.getElementById('dumpBottom');
          highlight([cardEl, dumpEl], { noDarken: true });
          showBanner('Défausser une carte', `Glissez <strong>${cardName(fillerCard.label)}</strong>
            <strong>uniquement</strong> sur votre défausse — pas sur la zone de combat.`);
          const startHandCount = botHand.length;
          waitForCondition(() => botHand.length < startHandCount, () => { clearHighlight(); hideBanner(); step9c_Cycles(); });
        } }
      ]);
    }

    // ---- Les Cycles, en situation ----
    function step9c_Cycles(){
      const cycleBox = document.getElementById('cyclesBottom');
      showDialogue('Les Cycles', `Votre <strong>deck</strong> et votre <strong>défausse</strong> forment vos ressources de
        pioche. Une fois le deck vide, la défausse est remélangée pour en former un nouveau — chaque remélange compte comme
        <strong>1 Cycle</strong>. Atteindre <strong>3 Cycles</strong> fait perdre la partie.`, [
        { label: 'Voir en situation', onClick: () => {
          hideDialogue();
          highlight(cycleBox, { noBlock: true });
          showBanner('Les Cycles', `Regardez ce repère : votre deck va se vider et votre défausse va être remélangée.`);
          // On met le reste du deck de côté (au lieu de le détruire), pour
          // pouvoir le restituer juste après — sinon il ne reste ensuite que
          // les 1-2 cartes remélangées, insuffisant pour repiocher jusqu'à 6
          // cartes à la fin du tour.
          const setAside = botDeck.splice(0, botDeck.length);
          updateDeckCounters();
          setTimeout(() => {
            reshuffleDiscardIntoDeck('bottom');
            updateDeckCounters();
            // Pulsation dorée sur le repère de Cycle, bien visible, AVANT
            // d'ouvrir la boîte de dialogue (qui assombrirait sinon tout
            // l'écran et masquerait l'illumination qu'on vient de déclencher).
            showBanner('Les Cycles', `Votre défausse vient d'être remélangée — regardez le repère s'illuminer.`);
            if (cycleBox) { cycleBox.classList.remove('armForged'); void cycleBox.offsetWidth; cycleBox.classList.add('armForged'); }
            setTimeout(() => {
              clearHighlight(); hideBanner();
              // Restitution du deck mis de côté, pour la suite du didacticiel.
              botDeck.push(...setAside);
              updateDeckCounters();
              showDialogue('1er Cycle atteint', `Votre défausse vient d'être remélangée en un nouveau deck : c'est votre
                <strong>1er Cycle</strong> (visible sur ce repère). Il en resterait 2 avant la défaite automatique.`, [
                { label: 'Continuer', onClick: step10_Forge }
              ]);
            }, 3000);
          }, 800);
        } }
      ]);
      // Illuminé dès le tout début de l'explication, pas seulement après le
      // clic — DOIT être appelé APRÈS showDialogue, qui efface sinon
      // systématiquement toute surbrillance déjà posée à son ouverture.
      highlight(cycleBox, { noBlock: true });
    }

    // ---- 12. Forge automatique + fin de tour ----
    function step10_Forge(){
      showDialogue('12/13 — Forger un A’rms', `<strong>3 Mithril</strong> suffisent pour forger 1 A’rms ⚒. Aucun bouton à
        chercher : la forge est <strong>automatique</strong>, au <strong>début</strong> de chacun de vos tours, tant que vous
        avez assez de Mithril. <br><br>À la <strong>fin</strong> de votre tour, vous repiochez aussi automatiquement de quoi
        revenir à une main de <strong>6 cartes</strong>.`, [
        { label: 'À vous de jouer', onClick: () => {
          hideDialogue();
          // On garantit 3 Mithril pile pour que la forge se déclenche à coup
          // sûr au prochain tour, et que la démonstration soit toujours visible.
          if (mithril['bottom'] < 3) { mithril['bottom'] = 3; updateMithril(); }
          const endBtn = document.getElementById('endTurn');
          highlight(endBtn);
          showBanner('Fin de tour', `Cliquez sur "FIN DE TOUR".`);
          waitForCondition(() => currentTurn === 'top', () => {
            clearHighlight(); hideBanner();
            showDialogue('Un instant…', `L'adversaire joue à son tour…`, []);
            setTimeout(tcOpponentTurn, 1400);
          });
        } }
      ]);
    }

    // ---- Tour adverse scripté ----
    function tcOpponentTurn(){
      try{
        const dummy2 = createCard('C3', 'T');
        topLine.push(dummy2);
        fullRender();
      }catch(e){}
      setTimeout(()=>{
        const armsBefore = arms['bottom'] || 0;
        const btn = document.getElementById('endTurn');
        if (btn) btn.click();
        waitForCondition(() => currentTurn === 'bottom', () => step10b_NewTurnFaction(armsBefore));
      }, 1400);
    }

    // ---- Second choix de faction : un vrai nouveau tour vient de démarrer,
    // exactement comme au tout début — c'est PENDANT cette étape que la forge
    // automatique se vérifie réellement, ce qui explique pourquoi elle passait
    // inaperçue quand on la sautait. ----
    function step10b_NewTurnFaction(armsBefore){
      showDialogue('Votre tour recommence', `Comme au début de chaque tour, choisissez d'abord votre faction.`, [
        { label: 'À vous de jouer', onClick: () => {
          hideDialogue();
          const factionBox = document.querySelector('.factionPrompt');
          highlight(factionBox);
          showBanner('Choisir sa faction', `Cliquez sur une faction proposée ci-dessus.`);
          waitForCondition(() => !!activeFaction['bottom'], () => {
            clearHighlight(); hideBanner();
            step11_ForgeReveal(armsBefore);
          });
        } }
      ]);
    }

    // ---- Révélation du forgeage ----
    function step11_ForgeReveal(armsBefore){
      const armsAfter = arms['bottom'] || 0;
      if (armsAfter > armsBefore) {
        const armsBox = document.getElementById('armsBottom');
        const mithrilBox = document.getElementById('mithrilBoxBottom');
        highlight([mithrilBox, armsBox], { noBlock: true });
        showBanner('Un A’rms forgé !', `3 Mithril viennent d'être convertis en 1 A’rms — regardez les deux compteurs
          s'illuminer.`);
        // Pulsation dorée sur la case d'A'rms qui vient tout juste de s'allumer,
        // ET sur la boîte de Mithril — pour bien montrer la transformation de
        // l'un vers l'autre. On laisse le temps de VOIR cette animation avant
        // d'ouvrir la boîte de dialogue, qui assombrit tout l'écran et
        // masquerait sinon l'illumination qu'on vient de déclencher.
        const slots = armsBox ? armsBox.querySelectorAll('.armSlot.armActive') : [];
        const newSlot = slots[armsAfter - 1];
        if (newSlot) { newSlot.classList.remove('armForged'); void newSlot.offsetWidth; newSlot.classList.add('armForged'); }
        if (mithrilBox) { mithrilBox.classList.remove('armForged'); void mithrilBox.offsetWidth; mithrilBox.classList.add('armForged'); }
        setTimeout(() => {
          clearHighlight(); hideBanner();
          showDialogue('Un A’rms forgé !', `Votre tour a commencé : <strong>3 Mithril</strong> ont été convertis
            automatiquement en <strong>1 A’rms</strong> ⚒ (${armsAfter}/5).`, [
            { label: 'Continuer', onClick: step12_Final }
          ]);
        }, 3000);
      } else {
        step12_Final();
      }
    }

    // ---- 12. Conclusion ----
    function step12_Final(){
      hideDialogue(); clearHighlight();
      showDialogue('13/13 — Terminé', `Vous maîtrisez l'essentiel : faction, Personnage, Mithril, attaque, Familier, Action,
        forge. Une partie <strong>Classée</strong> fait évoluer votre rang de Menace — à découvrir dans le menu.`, [
        { label: 'Terminer', onClick: async () => {
          const result = await markArmsTutorialSeen();
          if (result && result.gained > 0) {
            showDialogue('🪙 Récompense !', `Bravo, vous avez suivi le didacticiel jusqu'au bout — voici
              <strong>+${result.gained} pièces</strong> (solde : ${result.coins}). Pile de quoi vous offrir un premier
              booster de cartes !`, [
              { label: 'Retour à l\'accueil', onClick: () => { window.location.href = '/accueil.html'; } }
            ]);
          } else {
            window.location.href = '/accueil.html';
          }
        } }
      ]);
    }

    step0_Welcome();
  }catch(e){ console.error('[Didacticiel] erreur :', e); }
}
