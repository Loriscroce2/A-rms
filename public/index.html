/* DÉBUT DES STYLES POUR L'ANIMATION DES DÉS (C171 - HASARDER)        */
/* =================================================================== */

.dice-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    gap: 80px; /* Espace entre les deux dés */
    z-index: 9000;
    pointer-events: none;
}

.dice {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    background-color: #e74c3c; /* Rouge des dés */
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 4em;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    animation: dice-roll 1.5s ease-out forwards;
    position: relative;
    opacity: 0;
    transform: scale(0.5) rotate(0deg);
}

/* Positionnement initial des dés (décollent du haut/bas) */
.dice-player-top {
    left: -100px;
    top: -100px;
    animation: dice-roll-top 1.5s ease-out forwards;
}

.dice-player-bottom {
    left: 100px;
    top: 100px;
    animation: dice-roll-bottom 1.5s ease-out forwards;
}


@keyframes dice-roll-top {
    0% { opacity: 0; transform: translateY(-200px) rotateX(0deg) rotateY(0deg) scale(0.5); }
    50% { opacity: 1; transform: translateY(0px) rotateX(360deg) rotateY(360deg) scale(1.2); }
    100% { opacity: 1; transform: translateY(-100px) rotateX(720deg) rotateY(720deg) scale(1); } /* Termine un peu plus haut */
}

@keyframes dice-roll-bottom {
    0% { opacity: 0; transform: translateY(200px) rotateX(0deg) rotateY(0deg) scale(0.5); }
    50% { opacity: 1; transform: translateY(0px) rotateX(-360deg) rotateY(-360deg) scale(1.2); }
    100% { opacity: 1; transform: translateY(100px) rotateX(-720deg) rotateY(-720deg) scale(1); } /* Termine un peu plus bas */
}

/* Animation de disparition des dés */
@keyframes dice-fade-out {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.5); }
}

/* MODIFIÉ : Correction du mouvement et ajout de la transparence */
.card.action-blocked {
    /* La propriété "position: relative;" a été supprimée car elle provoquait un bug de mouvement. */
}

/* NOUVEAU : Ajout d'un voile d'assombrissement sur la carte, SANS affecter l'image des lianes */
.card.action-blocked::before {
    content: '';
    position: absolute;
    inset: 0; /* Couvre entièrement la carte */
    background-color: rgba(0, 0, 0, 0.6); /* Voile noir semi-transparent */
    border-radius: 12px; /* Doit correspondre aux bords de la carte */
    pointer-events: none; /* N'interfère pas avec les clics */
    z-index: 9; /* Se place juste en dessous des lianes (qui ont z-index: 10) */
}

/* L'overlay des lianes reste inchangé */
.vines-overlay {
    content: '';
    position: absolute;
    inset: 0; /* Couvre entièrement la carte parente */
    width: 100%;
    height: 100%;
    background-image: url('/assets/liane.png');
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 1; /* Aucune transparence */
    pointer-events: none; /* Ne bloque pas les clics */
    z-index: 10;
    animation: vine-grow 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    border-radius: 12px; /* Pour suivre les bords arrondis de la carte */
}

@keyframes vine-grow {
    from { 
        clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%);
    }
    to { 
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
    }
}

/* ---------- Utilitaires & Zoom ---------- */
const uid = (()=>{ let n=1; return p=>p+(n++); })();

/* ===== FALLBACKS & 250 CARTES ===== */

/* 1) Image fallback: si pas dans CARD_IMAGES, fabriquer /cartes/0001.png … */
function getCardImage(label){
  if (typeof CARD_IMAGES !== 'undefined' && CARD_IMAGES && CARD_IMAGES[label]) return CARD_IMAGES[label];
  const n = parseInt(String(label).replace(/^[CT]/i,''),10); // Modifié pour accepter T01
  if(!isNaN(n)) return `../cartes/${String(n).padStart(4,'0')}.png`;
  // Cas spécifique pour les tokens comme T01
  if (label.startsWith('T')) {
      return `../cartes/${label}.png`;
  }
  return null;
}

/* 2) Conversions code/label */
function labelToCode(label){
  const n = parseInt(String(label).replace(/^C/i,''),10);
  return String(isNaN(n)?0:n).padStart(4,'0');
}
function codeToLabel(code){ return 'C' + parseInt(code,10); }

/* 3) Faction par tranche (identique à play.html) → tag automatique */
function factionFromCode(code){
  const n = parseInt(code,10);
  if (n<=50) return 'Krylls';
  if (n<=100) return 'Impy';
  if (n<=150) return 'Savage';
  if (n<=200) return 'Chimeria';
  return 'Wadoo';
}

/* 4) Stats dynamiques (charge d’abord localStorage, puis /data/card-stats.json) */
let CARD_STATS = {}; // ex: { "0001":{type:"personnage", hp:4, shield:0, tags:["Krylls"]}, ... }

(function loadStatsFromLocal(){
  try{
    const raw = localStorage.getItem('arms_card_stats');
    if(!raw) return;
    const obj = JSON.parse(raw);
    if(obj && typeof obj==='object') CARD_STATS = obj;
  }catch{}
})();

(async function tryFetchStats(){
  try{
    const res = await fetch('/data/card-stats.json', {cache:'no-store'});
    if(res.ok){
      const obj = await res.json();
      if(obj && typeof obj==='object'){
        CARD_STATS = obj;
        // rafraîchir l’UI quand on reçoit de meilleures stats
        try{ fullRender(); }catch{}
      }
    }
  }catch{}
})();

/* 5) Accès unifié au type / PV / bouclier / tags */
function getStatsForLabel(label){
  const code = labelToCode(label);
  const st = CARD_STATS[code];
  if (st && typeof st==='object') return st;

  // Fallbacks “anciens” (C1..C18) si définis
  const o = {};
  if (typeof CARD_TYPES      !== 'undefined' && CARD_TYPES[label])      o.type   = CARD_TYPES[label];
  if (typeof CARD_HP_BASE    !== 'undefined' && CARD_HP_BASE[label]!=null)    o.hp     = CARD_HP_BASE[label];
  if (typeof CARD_SHIELD_BASE!== 'undefined' && CARD_SHIELD_BASE[label]!=null) o.shield = CARD_SHIELD_BASE[label];
  if (typeof CARD_TAGS       !== 'undefined' && CARD_TAGS[label])       o.tags   = CARD_TAGS[label].slice();
  return o;
}
function getType(label){
  const st = getStatsForLabel(label);
  return st && st.type ? st.type : 'personnage'; // défaut = personnage pour “nouvelles” cartes
}
function getBaseHP(label){
  const st = getStatsForLabel(label);
  if (st && typeof st.hp==='number') return st.hp;
  return 0;
}
function getBaseShield(label){
  const st = getStatsForLabel(label);
  if (st && typeof st.shield==='number') return st.shield;
  return 0;
}
function getTags(label){
  const tags = new Set();
  const t1 = (typeof CARD_TAGS !== 'undefined' && CARD_TAGS[label]) ? CARD_TAGS[label] : [];
  t1.forEach(x=>tags.add(x));
  const st = getStatsForLabel(label);
  if (st && Array.isArray(st.tags)) st.tags.forEach(x=>tags.add(x));
  if (label.startsWith('C')) { // Les tokens n'ont pas de faction "numérique"
    tags.add(factionFromCode(labelToCode(label)));
  }
  return Array.from(tags);
}

/* 6) Deck actif (depuis play.html) */
function loadActiveDeck(){
  try{
    const raw = localStorage.getItem('arms_active_deck');
    if(!raw) return null;
    const d = JSON.parse(raw);
    return (d && Array.isArray(d.cards)) ? d : null;
  }catch{ return null; }
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }


function showZoom(label, card=null){
  const url = getCardImage(label);
  zoomCard.innerHTML = '';
  zoomCard.style.backgroundImage = '';
  zoomCard.textContent = '';

    if (safeCard.label === 'C8'){ attachSealedBadge(zoomCard, safeCard); }
    if (safeCard.label === 'C68'){ attachCapturedMithril(zoomCard, safeCard); }
    if (getType(safeCard.label) === 'personnage'){ attachFamiliersZoom(zoomCard, safeCard); }
 if (safeCard.label === 'C154'){ attachGoals(zoomCard, safeCard); }

}

/* Prime les 5 pistes au 1er geste utilisateur (indispensable iOS/Safari, dont
   la politique de lecture automatique bloque tout son avant une interaction).
   IMPORTANT : chaque piste est tentée indépendamment — si l'une d'elles
   échoue (fichier manquant, etc.), ça ne doit jamais empêcher les autres de
   se débloquer normalement (c'était le bug précédent : une seule piste en
   échec bloquait tout le mécanisme de déblocage, silencieusement). */
async function unlockGameAudio(){
  initGameAudio();
  let atLeastOneOk = false;
  for (const a of [matchMusic, victorySfx, defeatSfx, timerSfx, ignominieSfx, posecarteSfx, shuffleSfx, discardSfx, mozkytoSfx, flipcardSfx, chargementMusic]) {
    // CORRECTIF : si ce son est déjà en train de jouer légitimement (ex.
    // chargementMusic pendant l'écran Versus), on ne le touche surtout pas —
    // le "test silencieux" ci-dessous (muet, jouer, pause, remise à zéro)
    // interromprait et réinitialiserait une lecture en cours par erreur.
    if (!a.paused) { atLeastOneOk = true; continue; }
    try{
      a.muted = true;
      await a.play();
      a.pause();
      a.currentTime = 0;
      a.muted = false;
      atLeastOneOk = true;
    }catch(err){
      a.muted = false;
    }
  }
  if (atLeastOneOk) gameAudioUnlocked = true;
}

// Plusieurs types de gestes sont écoutés (pas seulement un premier clic isolé)
// tant que le déblocage n'a pas réussi au moins une fois, pour ne jamais
// rester bloqué si la toute première tentative échoue.
function armGameAudioUnlockListeners(){
  const tryUnlock = async () => {
    if (gameAudioUnlocked) {
      ['pointerdown','click','keydown','touchstart'].forEach(evt => window.removeEventListener(evt, tryUnlock, true));
      return;
    }
    await unlockGameAudio();
    if (gameAudioUnlocked) {
      ['pointerdown','click','keydown','touchstart'].forEach(evt => window.removeEventListener(evt, tryUnlock, true));
    }
  };
  ['pointerdown','click','keydown','touchstart'].forEach(evt => window.addEventListener(evt, tryUnlock, true));
}
armGameAudioUnlockListeners();

/* Musique de partie : démarrée une seule fois (voir startTurn), coupée dans
   endGame() dès que la partie se termine, quelle qu'en soit la raison. */
async function startMatchMusic(){
  initGameAudio();
  if (!matchMusic) return;
  try{
    matchMusic.currentTime = 0;
    await matchMusic.play();
  }catch(err){
    // Le tout premier essai peut échouer si aucun geste n'a encore eu lieu :
    // on réessaie automatiquement dès le prochain geste utilisateur, quel qu'il soit.
    const retry = async () => {
      ['pointerdown','click','keydown','touchstart'].forEach(evt => window.removeEventListener(evt, retry, true));
      try{ await matchMusic.play(); }catch(e){}
    };
    ['pointerdown','click','keydown','touchstart'].forEach(evt => window.addEventListener(evt, retry, true));
  }
}
function stopMatchMusic(){
  if (!matchMusic) return;
  try{ matchMusic.pause(); matchMusic.currentTime = 0; }catch(e){}
}

/* Certains navigateurs coupent la lecture audio en cours au moment précis où
   la page passe en plein écran (ou en sort). On surveille cet événement et on
   relance la musique de partie si elle s'est arrêtée alors qu'elle n'aurait
   pas dû (partie toujours en cours, musique déjà démarrée). */
function resumeMatchMusicIfNeeded(){
  try{
    if (matchMusic && matchMusic.paused && matchMusicStarted && (typeof GAME === 'undefined' || !GAME.over)) {
      matchMusic.play().catch(()=>{});
    }
  }catch(err){}
}
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange'].forEach(evt => {
  document.addEventListener(evt, () => {
    // Petit délai : sur certains navigateurs, la coupure audio se produit
    // juste APRÈS l'événement, pas pendant — on laisse une fraction de
    // seconde avant de vérifier/relancer.
    setTimeout(resumeMatchMusicIfNeeded, 200);
  });
});

function fadeOutChargementMusic(durationMs){
  if (!chargementMusic) return;
  durationMs = durationMs || 800;
  const startVolume = chargementMusic.volume;
  const startTime = performance.now();
  function step(now){
    const t = Math.min(1, (now - startTime) / durationMs);
    chargementMusic.volume = Math.max(0, startVolume * (1 - t));
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      chargementMusic.pause();
      chargementMusic.currentTime = 0;
      chargementMusic.volume = 0.5; // remis à sa valeur normale pour la prochaine fois
    }
  }
  requestAnimationFrame(step);
}

// Joue un petit bruitage LOCALEMENT, et le diffuse aussi à l'adversaire en
// ligne (canal vfx déjà utilisé pour les animations), pour que les deux
// joueurs entendent toujours la même chose au même moment.
const SFX_BY_NAME = { posecarte: playPosecarteSfx, discard: playDiscardSfx, shuffle: playShuffleSfx, mozkyto: playMozkytoSfx };
function broadcastAndPlaySfx(name){
  const fn = SFX_BY_NAME[name];
  if (fn) fn();
  if (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE && window.__socket && window.__socket.connected && typeof ONLINE_MATCH_ID !== 'undefined') {
    window.__socket.emit('vfx', {
      matchId: ONLINE_MATCH_ID,
      seat: (typeof MY_SEAT !== 'undefined') ? MY_SEAT : undefined,
      payload: { type: 'sfx', name }
    });
  }
}

/* Se joue au moment où la fusion (Fusionner les tous, C236) démarre son
   animation, pour accompagner l'aspiration monstrueuse des cartes. */
async function playIgnominieSfx(){
  initGameAudio();
  if (!ignominieSfx) return;
  try{
    ignominieSfx.currentTime = 0;
    await ignominieSfx.play();
  }catch(err){
    const retry = async () => {
      ['pointerdown','click','keydown','touchstart'].forEach(evt => window.removeEventListener(evt, retry, true));
      try{ ignominieSfx.currentTime = 0; await ignominieSfx.play(); }catch(e){}
    };
    ['pointerdown','click','keydown','touchstart'].forEach(evt => window.addEventListener(evt, retry, true));
  }
}

// NOUVELLE FONCTION (C107) : Vérifie si l'effet d'un familier est annulé par Zero
function isFamiliarEffectSuppressed(hostCard, familiarLabel) {
  const familiars = getFamiliersOnHost(hostCard);
  const hasZero = familiars.some(f => f.label === 'C107');
  // L'effet est supprimé si Zero est présent ET que le familier testé n'est pas Zero lui-même.
  return hasZero && familiarLabel !== 'C107';
}

// BLOC CORRIGÉ À UTILISER
function isFrozen(card) {
  if (getType(card.label) !== 'personnage') return false;

  // Condition 1: La carte a la nouvelle propriété de gel direct
  if (card.isFrozenByEffect === true) {
    return true;
  }

  // Condition 2: La carte est gelée par le familier Baro
  const hasBaro = getFamiliersOnHost(card).some(f => f.label === 'C106' && !isFamiliarEffectSuppressed(card, 'C106'));

  return hasBaro;
}

// AJOUT : Fonction utilitaire pour vérifier si une carte ne peut pas être défaussée
function isCardUndiscardable(cardLabel) {
  return cardLabel === 'C156' || cardLabel === 'T01';
}

function applyFreezeToCard(targetCard) {
  if (getType(targetCard.label) !== 'personnage' || isFrozen(targetCard)) return; // Ne pas geler une carte déjà gelée

  targetCard.isFrozenByEffect = true;
  pushHistory('info', `${cardAnchor(targetCard.label)} est GELÉ par un effet !`);

}

// --- NOUVEAU SYSTÈME DE TAGS DYNAMIQUES (pour C112 Eclesprit) ---
// MODIFIÉ : Ce système est maintenant crucial pour C152 Prismis
// VERSION DÉFINITIVE À UTILISER
function getEffectiveTags(cardOrLabel) {
    // Étape 1 : On prend les tags de base de la carte (ex: "guerrier", "Krylls")
    const baseTags = new Set(getTags(typeof cardOrLabel === 'string' ? cardOrLabel : cardOrLabel.label));

    // Étape 2 : Si on a la carte réelle (un objet), on applique ses modifications temporaires
    if (typeof cardOrLabel === 'object' && cardOrLabel.id) {
        // On ajoute les tags de la liste "addedTags" (ex: "Chimeria")
        if (Array.isArray(cardOrLabel.addedTags)) {
            cardOrLabel.addedTags.forEach(t => baseTags.add(t));
        }
        // On retire les tags de la liste "removedTags" (ex: "Krylls")
        if (Array.isArray(cardOrLabel.removedTags)) {
            cardOrLabel.removedTags.forEach(t => baseTags.delete(t));
        }

        // On gère aussi les tags de familier comme le poison
        const isPoisonedByFamiliar = getFamiliersOnHost(cardOrLabel).some(f => f.label === 'C64' && !isFamiliarEffectSuppressed(cardOrLabel, 'C64'));
        if (isPoisonedByFamiliar) {
            baseTags.add('poison');
        }
        // WADOO 6e lot : Scapoo (C235) — tout combattant qui le porte est
        // considéré comme une Poupée (compte pour Tribut Poupesque, etc.)
        const hasScapoo = getFamiliersOnHost(cardOrLabel).some(f => f.label === 'C235' && !isFamiliarEffectSuppressed(cardOrLabel, 'C235'));
        if (hasScapoo) {
            baseTags.add('poupée');
        }
    }

    return Array.from(baseTags);
}
// VERSION DÉFINITIVE À UTILISER
function hasTag(cardOrLabel, tag) {
    const effectiveTags = getEffectiveTags(cardOrLabel);
    return effectiveTags.includes(tag);
}

function getEffectiveHP(card) {
  // NOTE : Decebale (C62) n'a PLUS de cas spécial ici — son cas spécial
  // renvoyait TOUJOURS la taille de l'Exil, quoi qu'il arrive, ce qui
  // masquait totalement les dégâts de combat (elle ne pouvait jamais être
  // détectée à 0 PV et donc jamais mourir). Sa règle "PV = taille de l'Exil"
  // est désormais gérée UNIQUEMENT par recalcDecebaleHP(), qui écrit
  // directement dans card.hp — cette fonction se contente alors de lire
  // cette valeur normalement, comme pour n'importe quel autre combattant.
  // Le combat peut donc réduire son hp normalement, et si elle tombe à 0,
  // elle meurt comme prévu ; si elle survit, recalcDecebaleHP() la
  // resynchronise ensuite sur la taille de l'Exil au rendu suivant.
  const base = (typeof card.hp === 'number') ? card.hp : getBaseHP(card.label);
  const temp = (typeof card.tempHP === 'number') ? card.tempHP : 0;
  return base + temp;
}

function getATK(card){
  if (getType(card.label) !== 'personnage') return 0;
  return getEffectiveHP(card);
}

function loadImage(url){
  return new Promise((resolve,reject)=>{ const im=new Image(); im.onload=()=>resolve(url); im.onerror=reject; im.src=url; });
}
/* --- PV + Bouclier (affiche le bouclier effectif avec aura C17) --- */
function attachHP(el, card){
  el.querySelectorAll('.hp,.shield').forEach(n=>n.remove());
  const isPerso = (getType(card.label) === 'personnage');

  const hpVal = getEffectiveHP(card);
  if (isPerso){
    const hp = document.createElement('div'); hp.className='hp'; hp.textContent = hpVal; el.appendChild(hp);
  } else {
    return;
  }

  const storedShield = (typeof card.shield === 'number') ? card.shield : getBaseShield(card.label);
  const tempShield = (typeof card.tempShield === 'number') ? card.tempShield : 0;
  let ownerHint = el.dataset && el.dataset.owner ? el.dataset.owner : ownerOfCardOnBoard(card);
  let effectiveShield = storedShield + tempShield + (ownerHint ? holoAuraBonus(ownerHint, card) : 0);

  if (isBruitzeurActive()) {
    effectiveShield = 0;
  }
  if (effectiveShield > 0){
    const sh = document.createElement('div'); sh.className='shield'; sh.textContent = effectiveShield; el.appendChild(sh);
  }
}

/* ---------- Création/clone ---------- */
function createCard(label, ownerPrefix){
  const c = { id: uid(ownerPrefix), label };
  if (getType(label) === 'personnage'){
    c.hp     = getBaseHP(label);
    c.shield = getBaseShield(label);
  }
if (label === 'C154') {
    c.goals = 0;
  }
  if (label === 'C108') {
    c.attachedFamiliarLabels = [];
  }
  // NOUVEAU : Initialisation des propriétés pour Prismis
  if (label === 'C152') {
    c.prismisLinks = []; // IDs des cartes ciblées
  }
  // WADOO : toute carte peut potentiellement porter un lien vaudou (mais seules les Poupées l'utilisent)
  c.wadooLink = null;
  if (label === 'C212') {
    // 4 "revenez-en" disponibles au départ, affichées via le système de
    // charges standard (comme C7/C58/C112/C216/C227) — donc visibles sur la
    // carte ET rechargeables par Chargbox (C174), ce qui n'était pas le cas
    // avec l'ancien compteur interne dédié.
    c.charges = 4;
  }
  // Initialisation des propriétés pour les tags dynamiques
  c.addedTags = [];
  c.removedTags = [];
  c.canMineFreely = false;
  c.permanentShieldBonus = 0;
  return c;
}
// NOUVELLE FONCTION (CORRIGÉE)
function resetStatsToBaseWhenEnteringBattle(card){
  if (getType(card.label) !== 'personnage') return;

  // La ligne "card.hp = getBaseHP(card.label);" a été VOLONTAIREMENT supprimée ici.
  // Cela permet de conserver les PV modifiés (par Harpess, par exemple) lorsque la carte passe de la main au terrain.

  // On continue de réinitialiser le bouclier et les autres stats.
  card.shield = getBaseShield(card.label);
  card.addedTags = [];
  card.removedTags = [];
  card.canMineFreely = false;
  card.permanentShieldBonus = 0;
  
  if (card.label === 'C152') {
    card.prismisLinks = [];
  }
}
function cloneCard(card, ownerPrefix){
  const c = { id: uid(ownerPrefix), label: card.label };
 if (typeof card.goals === 'number') c.goals = card.goals;
  if (typeof card.hp === 'number')     c.hp = card.hp;
  if (typeof card.shield === 'number') c.shield = card.shield;
     if (card.isMirroredCopy) c.isMirroredCopy = true;
  if (typeof card.tempHP === 'number') c.tempHP = card.tempHP;
  if (typeof card.tempShield === 'number') c.tempShield = card.tempShield;
  if (typeof card.charges === 'number') c.charges = card.charges;
  if (typeof card.capturedMithril === 'number') c.capturedMithril = card.capturedMithril;
  if (Array.isArray(card.sealed))       c.sealed = card.sealed.map(x => x);
  if (Array.isArray(card.addedTags))    c.addedTags = [...card.addedTags];
  if (Array.isArray(card.removedTags))  c.removedTags = [...card.removedTags];
  if (card.attachedTo) c.attachedTo = card.attachedTo;
  if (card.playOwner)  c.playOwner  = card.playOwner;
  if (card.canMineFreely) c.canMineFreely = true;
  if (typeof card.permanentShieldBonus === 'number') c.permanentShieldBonus = card.permanentShieldBonus;
  // NOUVEAU : On clone aussi les données de Prismis
  if (Array.isArray(card.prismisLinks)) c.prismisLinks = [...card.prismisLinks];
  if (card.wadooLink) c.wadooLink = card.wadooLink;
  if (card.transformedByPrismis) c.transformedByPrismis = card.transformedByPrismis;
  if (Array.isArray(card.originalFactions)) c.originalFactions = [...card.originalFactions];
  return c;

function openFactionPrompt(player, onChosen){
  // --- Détermination des factions proposées ---
  // Une faction n'est proposée que si le joueur a AU MOINS une carte de cette
  // faction quelque part d'immédiatement utilisable : sa main, sa zone de
  // combat, ou sa zone d'Artefacts. Le deck construit (qui peut contenir des
  // cartes de 3 factions) ne suffit plus à lui seul à débloquer un choix —
  // il faut réellement avoir la carte sous la main ou déjà en jeu.
  const availableFactionSet = new Set();
  const playerHand = getHandByOwner(player);
  const playerLine = getLineByOwner(player);
  const playerArts = (player === 'top') ? topArts : botArts;

  const scanCardFactions = (card) => {
    getTags(card.label).filter(tag => FACTIONS.includes(tag)).forEach(f => availableFactionSet.add(f));
  };
  playerHand.forEach(scanCardFactions);
  playerLine.forEach(scanCardFactions);
  playerArts.forEach(scanCardFactions);

  let availableFactions = Array.from(availableFactionSet);

  // Filet de sécurité : si le joueur n'a VRAIMENT aucune carte nulle part
  // (main, plateau, artefacts) — cas extrême qui ne devrait normalement
  // jamais arriver grâce au remplissage de main en fin de tour — on retombe
  // sur les factions de son deck construit pour ne jamais le bloquer.
  if (availableFactions.length === 0) {
    if (player === 'bottom' && window.__ACTIVE_DECK__ && window.__ACTIVE_DECK__.factions) {
      Object.keys(window.__ACTIVE_DECK__.factions).forEach(f => availableFactionSet.add(f));
    } else {
      FACTIONS.forEach(f => availableFactionSet.add(f));
    }
    availableFactions = Array.from(availableFactionSet);
  }
  // --- FIN de la détermination des factions ---


  // On conserve la logique spéciale pour l'Éventail (T01) qui peut débloquer Chimeria
  const hasEventail = playerHand.some(c => c.label === 'T01');
  if (hasEventail && !availableFactions.includes('Chimeria')) {
    availableFactions.push('Chimeria');
  }

  // Le reste de la fonction (création des boutons, blocage par Paradlex) reste inchangé
  fpButtons.innerHTML = '';

  const blockedFactions = new Set();
  playerLine.forEach(host => {
    // Ignominie (T08) est "neutre" : elle appartient aux 5 factions à la
    // fois, mais Paradlex ne doit PAS pouvoir en bloquer une pour autant —
    // seul son soin (+4 PV en entretien, ailleurs dans le code) s'applique
    // normalement sur elle.
    if (host.label === 'T08') return;
    const hasParadlex = getFamiliersOnHost(host).some(f => f.label === 'C54' && !isFamiliarEffectSuppressed(host, 'C54'));
    if (hasParadlex) {
      const hostFaction = FACTIONS.find(fac => hasTag(host, fac));
      if(hostFaction) {
        blockedFactions.add(hostFaction);
      }
    }
  });
  // CONDITION DE DÉFAITE — GÉNÉRALE, pas spécifique à Paradlex : le choix
  // d'une faction est obligatoire en tout début de tour pour pouvoir jouer
  // la moindre carte. Si, PAR N'IMPORTE QUEL MOYEN (Paradlex, un effet de
  // copie produisant un Paradlex supplémentaire, ou toute autre carte
  // future qui viendrait bloquer des factions), un joueur se retrouve avec
  // ZÉRO faction disponible qui ne soit pas bloquée, il perd la partie sur
  // le champ — quelle que soit la cause exacte du blocage.
  if (availableFactions.length > 0 && availableFactions.every(f => blockedFactions.has(f))) {
    const winner = (player === 'top') ? 'bottom' : 'top';
    pushHistory('info', `${playerLabel(player)} ne peut choisir aucune faction : toutes ses factions disponibles sont bloquées — défaite immédiate.`);
    endGame(winner, 'faction-locked');
    return;
  }

  availableFactions.forEach(f=>{
    const b = document.createElement('button');
    b.className = 'fpBtn';
    b.innerHTML = '';

    const logo = document.createElement('img');
    logo.className = 'fpLogo';
    // Chaîne de secours : si le chemin exact échoue (casse du nom de fichier
    // différente selon l'hébergeur, cache, etc.), on essaie automatiquement
    // d'autres variantes avant d'abandonner et de masquer l'image cassée.
    const logoCandidates = [
      `/assets/Logo-${f}.png`,
      `/assets/logo-${f.toLowerCase()}.png`,
      `/assets/Logo-${f.toUpperCase()}.png`,
    ];
    let logoAttempt = 0;
    logo.addEventListener('error', () => {
      logoAttempt++;
      if (logoAttempt < logoCandidates.length) {
        logo.src = logoCandidates[logoAttempt];
      } else {
        logo.style.display = 'none'; // évite l'icône d'image cassée si tout échoue
      }
    });
    logo.src = logoCandidates[0];
    logo.alt = `Logo ${f}`;
    b.appendChild(logo);

    const factionName = document.createElement('span');
    factionName.textContent = f;
    b.appendChild(factionName);

    if (blockedFactions.has(f)) {
      b.disabled = true;
      b.title = `Cette faction est bloquée par l'effet de Paradlex sur l'un de vos combattants.`;
      b.style.opacity = '0.5';
      b.style.cursor = 'not-allowed';
      b.style.textDecoration = 'line-through';
    }

    b.addEventListener('click', ()=>{
      if (b.disabled) return;
      activeFaction[player]=f;
      factionOverlay.style.display='none';
      const handEl = document.getElementById(player === 'top' ? 'handTop' : 'handBottom');
      if (handEl) handEl.classList.remove('faction-select-zoom');
      pushHistory('info', `Faction choisie par ${player===MY_SEAT?'vous (Joueur 1)':'Joueur 2 (adversaire)'} : <strong>${f}</strong>.`);
      if(typeof onChosen === 'function') onChosen();
    });
    fpButtons.appendChild(b);
  });
  fpTitle.textContent = (player===MY_SEAT ? 'Choix de faction — Joueur 1 (vous)' : 'Choix de faction — Joueur 2 (adversaire)');
  factionOverlay.style.display='flex';

  {

    } else if (handEl) {
      handEl.classList.add('faction-select-zoom');
    }
  }
}

function canPlayThisCardNow(player, card){

  if (actionBlocked[player] && getType(label) === 'action') {
    pushHistory('info', `Impossible de jouer ${cardAnchor(label)}, les actions sont bloquées ce tour-ci.`);
    return false;

  if (pendingFreePlay.owner === player && pendingFreePlay.cardId === card.id) {
    return true;
  }
  if (pendingWadooPlay.owner === player && pendingWadooPlay.count > 0 && hasTag(label, 'Wadoo')) {
    return true;
  }
  if (pendingKryllsPlay.owner === player && pendingKryllsPlay.count > 0 && hasTag(label, 'Krylls')) {
    return true;
  }
  if (pendingChimeriaPlay.owner === player && pendingChimeriaPlay.count > 0 && hasTag(label, 'Chimeria')) {
    return true;
  }
  if (zampanoAllowance.owner === player && zampanoAllowance.factions.some(f => hasTag(label, f))) {
    return true;
  }
  if (isCardAllowedThisTurn(player, card)) return true;
  if (!isKrylls(label) && nonKryllsAllowance[player] > 0) return true;
  return false;
}

// ===================================================================
// STREAMING DE POSITION EN DIRECT — l'adversaire, en ligne, voit en temps
// réel une carte quitter la main de l'autre joueur, se déplacer avec son
// curseur, puis se déposer. Purement visuel (fantôme superposé), ne
// modifie jamais l'état réel du jeu — celui-ci arrive comme d'habitude via
// stateSync une fois le dépôt effectivement résolu.
// ===================================================================
let dragMoveThrottleTs = 0;
document.addEventListener('dragstart', (e) => {
  if (typeof ONLINE_MODE === 'undefined' || !ONLINE_MODE || !window.__socket || !window.__socket.connected) return;
  const id = e.target && e.target.dataset && e.target.dataset.id;
  if (!id) return;
  const card = (typeof findCardAnywhere === 'function') ? findCardAnywhere(id) : null;
  if (!card) return;
  window.__socket.emit('vfx', {
    matchId: ONLINE_MATCH_ID, seat: MY_SEAT,
    payload: { type: 'dragStart', cardLabel: card.label }
  });
}, false);

document.addEventListener('dragover', (e) => {
  if (typeof ONLINE_MODE === 'undefined' || !ONLINE_MODE || !currentDragInfo || !window.__socket || !window.__socket.connected) return;
  const now = Date.now();
  if (now - dragMoveThrottleTs < 40) return; // ~25 images/seconde maximum, pour ne pas saturer le réseau
  dragMoveThrottleTs = now;
  const xPct = (e.clientX / window.innerWidth) * 100;
  const yPct = (e.clientY / window.innerHeight) * 100;
  window.__socket.emit('vfx', {
    matchId: ONLINE_MATCH_ID, seat: MY_SEAT,
    payload: { type: 'dragMove', x: xPct, y: yPct }
  });
});

document.addEventListener('dragend', () => {
  if (typeof ONLINE_MODE === 'undefined' || !ONLINE_MODE || !window.__socket || !window.__socket.connected) return;
  window.__socket.emit('vfx', {
    matchId: ONLINE_MATCH_ID, seat: (typeof MY_SEAT !== 'undefined') ? MY_SEAT : undefined,
    payload: { type: 'dragEnd' }
  });
});

let opponentDragGhost = null;
let opponentDragGhostSafetyTimer = null;
function showOpponentDragGhost(cardLabel){
  removeOpponentDragGhost(true); // retrait immédiat s'il y avait un ancien fantôme, sans fondu
  const el = document.createElement('div');
  el.id = 'opponentDragGhost';
  el.style.cssText = 'position:fixed; width:90px; height:126px; z-index:7000; pointer-events:none; border-radius:9px; background-size:cover; background-position:center; box-shadow:0 10px 26px rgba(0,0,0,.65), 0 0 18px rgba(125,249,255,.5); border:2px solid rgba(125,249,255,.6); transform:translate(-50%,-50%) scale(1); opacity:0; transition:opacity .22s ease, transform .22s ease, left .07s linear, top .07s linear;';
  const url = getCardImage(cardLabel);
  if (url) el.style.backgroundImage = `url(${url})`;
  document.body.appendChild(el);
  opponentDragGhost = el;
  requestAnimationFrame(()=>{ if (opponentDragGhost) opponentDragGhost.style.opacity = '1'; });
  armOpponentDragGhostSafety();
}
function armOpponentDragGhostSafety(){
  // Filet de sécurité : si "dragEnd" ne parvenait jamais (coupure réseau en
  // plein glissement, par exemple), le fantôme ne doit jamais rester
  // affiché indéfiniment — il se retire de lui-même après 3s d'inactivité.
  if (opponentDragGhostSafetyTimer) clearTimeout(opponentDragGhostSafetyTimer);
  opponentDragGhostSafetyTimer = setTimeout(()=>removeOpponentDragGhost(false), 3000);
}
function moveOpponentDragGhost(xPct, yPct){
  if (!opponentDragGhost) return;
  // Miroir VERTICAL uniquement : le retournement d'écran de ce jeu ne
  // réordonne que les rangées (haut/bas), pas les colonnes — la main de
  // l'adversaire (en bas pour lui) est donc ma zone adverse (en haut pour
  // moi), d'où l'inversion du seul pourcentage Y.
  const x = xPct;
  const y = 100 - yPct;
  // La transition CSS "left .07s / top .07s" (déjà posée à la création)
  // interpole en douceur entre deux positions reçues, plutôt que de sauter
  // brutalement d'un point à l'autre — la carte glisse vraiment à l'écran.
  opponentDragGhost.style.left = `${(x/100)*window.innerWidth}px`;
  opponentDragGhost.style.top = `${(y/100)*window.innerHeight}px`;
  armOpponentDragGhostSafety();
}
function removeOpponentDragGhost(instant){
  if (opponentDragGhostSafetyTimer) { clearTimeout(opponentDragGhostSafetyTimer); opponentDragGhostSafetyTimer = null; }
  if (!opponentDragGhost) return;
  const el = opponentDragGhost;
  opponentDragGhost = null;
  if (instant) { el.remove(); return; }
  // Disparition en fondu + léger zoom, plutôt qu'un retrait brutal — la
  // carte "se pose" visuellement au lieu de disparaître d'un coup, le temps
  // que le vrai état (via stateSync) prenne le relais.
  el.style.opacity = '0';
  el.style.transform = 'translate(-50%,-50%) scale(1.08)';
  setTimeout(()=>{ if (el.parentNode) el.remove(); }, 240);
}

function playActionC30(owner, actionCard){
  if (!canPlayThisCardNow(owner, actionCard)) return;
  consumeAllowanceIfNeeded(owner, actionCard);
  const hand = getHandByOwner(owner);
  const idx = hand.findIndex(c => c.id === actionCard.id);
  if (idx !== -1) hand.splice(idx, 1);
  discardCard(actionCard, owner, 'action');

  const opp = (owner === 'top') ? 'bottom' : 'top';
  const targets = getLineByOwner(opp).filter(c => hasTag(c, 'provocateur'));
  if (targets.length === 0) {
    pushHistory('info', `${cardAnchor('C30')} : aucun combattant adverse Provocateur.`);

    return;
  }
  targets.forEach(c => {
    if (!Array.isArray(c.removedTags)) c.removedTags = [];
    if (!c.removedTags.includes('provocateur')) c.removedTags.push('provocateur');
    c.hp = getEffectiveHP(c) - 4;
  });
  pushHistory('action', `${cardAnchor('C30')} retire Provocation et inflige <strong>-4 PV</strong> à ${targets.length}
    combattant(s) adverse(s).`);

  // Les combattants tombés à 0 PV ou moins meurent immédiatement.
  targets.forEach(c => {
    if (c.hp <= 0) {
      const line = getLineByOwner(opp);
      const lidx = line.findIndex(x => x.id === c.id);
      if (lidx !== -1) {
        line.splice(lidx, 1);
        detachFamiliarsOnHost(c, opp);
        discardCard(c, opp, 'death');
      }
    }
  });
  fullRender();
}

function handleC33ArtifactSelection(artifactCard, artifactOwner){
  if (!c33ArtifactMode) return;
  const { owner, combatantCard } = c33ArtifactMode;
  c33ArtifactMode = null;
  closeActionPrompt();

  // La transformation s'applique IMMÉDIATEMENT (comme les dégâts de combat,
  // avant même l'animation Versus) — l'animation n'est plus qu'un habillage
  // visuel joué PAR-DESSUS un état déjà correct. La retarder jusqu'à la fin
  // de l'animation créait un risque de conflit avec une synchronisation
  // d'état reçue entre-temps en ligne.
  const artArray = (owner === 'top') ? topArts : botArts;
  if (artArray.length >= MAX_ARTIFACTS_PER_ZONE) {
    pushHistory('info', `${cardAnchor('C33')} : zone d'artefact pleine, la transformation échoue.`);
    fullRender();
    return;
  }
  const line = getLineByOwner(owner);
  const cidx = line.findIndex(c => c.id === combatantCard.id);
  if (cidx === -1) return;
  line.splice(cidx, 1);
  detachFamiliarsOnHost(combatantCard, owner);
  const copy = createCard(artifactCard.label, owner === 'top' ? 'T' : 'B');
  artArray.push(copy);
  pushHistory('action', `${cardAnchor('C33')} transforme ${cardAnchor(combatantCard.label)} en une copie de
    ${cardAnchor(artifactCard.label)} !`);
  fullRender();

  // Prévient l'adversaire pour qu'il voie, lui aussi, l'animation en même temps.
  if (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE && window.__socket) {
    window.__socket.emit('vfx', {
      matchId: ONLINE_MATCH_ID, seat: owner,
      payload: { type: 'c33Transform', combatantLabel: combatantCard.label, artifactLabel: artifactCard.label }
    });
  }
  playC33TransformAnimation(combatantCard.label, artifactCard.label, () => { fullRender(); });
}

// Animation de transition : le combattant se dématérialise en particules
// dorées, glisse de la zone de combat vers la zone d'artefact, puis se
// recompose en une copie de l'artefact ciblé.
function playC33TransformAnimation(combatantLabel, artifactLabel, onDone){
  try{
    const overlay = document.createElement('div');
    overlay.className = 'c33TransformOverlay';
    overlay.innerHTML = `
      <div class="c33Rays"></div>
      <div class="c33Caption" id="c33Caption">Transformation en cours…</div>
      <div class="c33Track">
        <div class="c33Zone c33ZoneFrom">Zone de combat</div>
        <div class="c33Stage" id="c33Stage">
          <img class="c33Img c33From" id="c33FromImg" src="${getCardImage(combatantLabel)}" alt="">
          <img class="c33Img c33To" id="c33ToImg" src="${getCardImage(artifactLabel)}" alt="" style="opacity:0;">
          <div class="c33Sparkle" id="c33Sparkle"></div>
        </div>
        <div class="c33Zone c33ZoneTo">Zone d'artefact</div>
      </div>
    `;
    document.body.appendChild(overlay);
    requestAnimationFrame(()=> overlay.classList.add('show'));

    const stage = document.getElementById('c33Stage');
    const captionEl = document.getElementById('c33Caption');
    const sparkle = document.getElementById('c33Sparkle');

    // Quelques étincelles dorées qui accompagnent le passage d'une zone à l'autre.
    const glyphs = ['✦','✧','⟡'];
    for (let i = 0; i < 16; i++) {
      const s = document.createElement('div');
      s.className = 'c33SparkleBit';
      s.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
      s.style.top = (30 + Math.random() * 40) + '%';
      s.style.animationDelay = (Math.random() * 1.6) + 's';
      sparkle.appendChild(s);
    }

    setTimeout(()=>{
      stage.classList.add('c33Traveling');
      if (captionEl) captionEl.textContent = 'Dématérialisation…';
    }, 300);

    setTimeout(()=>{
      if (captionEl) captionEl.textContent = 'Recomposition…';
      document.getElementById('c33FromImg').style.opacity = '0';
      document.getElementById('c33ToImg').style.opacity = '1';
      stage.classList.add('c33Recompose');
    }, 2600);

    setTimeout(()=>{
      if (captionEl) captionEl.textContent = 'Transformation achevée !';
    }, 3500);

    setTimeout(()=>{
      overlay.classList.remove('show');
      setTimeout(()=>{ if (overlay.parentNode) overlay.remove(); onDone(); }, 500);
    }, 4600);
  }catch(e){ onDone(); }
}

  const realIdx = sourcePile.findIndex(c => c.id === entry.card.id);

  fullRender();

// WADOO 6e lot : Fusionner les tous (C236) — TOUS les combattants adverses
// fusionnent en une seule carte "Ignominie" (T08, 15PV, neutre = toutes
// factions à la fois). Les cartes fusionnées disparaissent LITTÉRALEMENT du
// jeu (ni exil, ni défausse) : pas de déclenchement de MORT, pas de
// restitution de Mithril capturé, aucune trace.
// KRYLLS (nouveau lot) : Réveillez vous (C23) — révèle les decks des DEUX
// joueurs jusqu'à trouver un combattant chacun (toute carte non-combattante
// révélée au passage part en défausse), puis les fait combattre (dégâts
// mutuels égaux à leurs PV actuels). Les survivants rejoignent leur zone de
// combat. Si un seul camp révèle un combattant (deck adverse épuisé), il
// rejoint sa zone sans opposition.
// KRYLLS (nouveau lot) : Réveillez vous (C23) — révèle les decks des DEUX
// joueurs, carte après carte avec une vraie mise en scène au centre de
// l'écran, jusqu'à trouver un combattant chacun (toute carte non-combattante
// révélée au passage part en défausse). Les deux combattants trouvés
// rejoignent leur zone de combat puis s'affrontent avec le VRAI moteur de
// combat (resolveFight) — mêmes animations, mêmes règles que n'importe quel
// combat classique. Le survivant reste avec ses PV restants. Si un seul camp
// révèle un combattant (deck adverse épuisé), il rejoint sa zone sans
// opposition.
async function playActionReveillezVous(owner, actionCard){
  if (!canPlayThisCardNow(owner, actionCard)) return;

  consumeAllowanceIfNeeded(owner, actionCard);
  const hand = getHandByOwner(owner);
  const idx = hand.findIndex(c => c.id === actionCard.id);
  if (idx !== -1) hand.splice(idx, 1);
  discardCard(actionCard, owner, 'action');
  fullRender();

  pushHistory('action', `${cardAnchor('C23')} réveille les deux decks…`);

  // Calcul RÉEL (tirage + défausses) fait D'ABORD, très rapidement, sans
  // aucune animation — pour pouvoir diffuser la séquence exacte à
  // l'adversaire AVANT que l'animation ne démarre. Les deux joueurs
  // regardent ensuite la même animation, démarrée quasi simultanément.
  const topResult = computeReveillezVousSequence('top');
  const botResult = computeReveillezVousSequence('bottom');
  const topCard = topResult.revealed;
  const botCard = botResult.revealed;

  if (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE && window.__socket && window.__socket.connected) {
    window.__socket.emit('vfx', {
      matchId: ONLINE_MATCH_ID, seat: owner,
      payload: { type: 'reveillezVous', topSequence: topResult.sequence, botSequence: botResult.sequence }
    });
  }

  const overlay = buildReveillezVousOverlay();
  document.body.appendChild(overlay);
  requestAnimationFrame(()=> overlay.classList.add('go'));

  await Promise.all([
    replayRevealAnimation('top', overlay, topResult.sequence),
    replayRevealAnimation('bottom', overlay, botResult.sequence),
  ]);

  const footerEl = overlay.querySelector('#rvFooter');
  if (footerEl) {
    if (topCard && botCard) {
      footerEl.textContent = `Les deux combattants sont trouvés — l'affrontement va commencer !`;
      footerEl.style.color = '#7dffb0';
    } else if (topCard || botCard) {
      footerEl.textContent = `Un seul combattant a été trouvé — il rejoindra sa zone sans opposition.`;
      footerEl.style.color = '#ffb84d';
    } else {
      footerEl.textContent = `Aucun combattant trouvé dans les deux decks.`;
      footerEl.style.color = '#ff8080';
    }
  }

  await sleep(2000);
  overlay.classList.remove('go');
  await sleep(350);
  if (overlay.parentNode) overlay.remove();

  if (topCard) pushHistory('jeu', `${playerLabel('top')} révèle ${cardAnchor(topCard.label)}.`);
  if (botCard) pushHistory('jeu', `${playerLabel('bottom')} révèle ${cardAnchor(botCard.label)}.`);

  if (!topCard && !botCard) {
    pushHistory('info', `${cardAnchor('C23')} : aucun combattant n'a pu être révélé (decks épuisés).`);
    fullRender();
    return;
  }

  // Un seul camp a pu révéler un combattant : il rejoint sa zone directement.
  if (topCard && !botCard) {
    getLineByOwner('top').push(topCard);
    pushHistory('jeu', `${cardAnchor(topCard.label)} rejoint la zone de combat sans opposition.`);
    fullRender();
    return;
  }
  if (botCard && !topCard) {
    getLineByOwner('bottom').push(botCard);
    pushHistory('jeu', `${cardAnchor(botCard.label)} rejoint la zone de combat sans opposition.`);
    fullRender();
    return;
  }

  // Les deux combattants rejoignent D'ABORD leur zone de combat, puis
  // s'affrontent avec le moteur de combat RÉEL (resolveFight) : mêmes
  // dégâts, même animation Versus, mêmes effets déclenchés (poison, gel,
  // etc.) qu'un combat classique. Le(s) survivant(s) reste(nt) simplement
  // sur le plateau avec ses/leurs PV restants — resolveFight s'en charge.
  getLineByOwner('top').push(topCard);
  getLineByOwner('bottom').push(botCard);
  fullRender();

  // Règle "Esprit" (identique à une attaque normale) : si un seul des deux
  // combattants révélés porte le trait Esprit, le combat n'a tout simplement
  // pas lieu — les deux rejoignent leur zone sans s'affronter.
  const isTopEsprit = hasTag(topCard, 'Esprit');
  const isBotEsprit = hasTag(botCard, 'Esprit');
  if (isTopEsprit !== isBotEsprit) {
    pushHistory('info', `${cardAnchor(topCard.label)} et ${cardAnchor(botCard.label)} ne peuvent pas s'affronter — seul l'un des
      deux porte le trait <strong>Esprit</strong>, qui ne peut interagir qu'avec ses semblables. Les deux combattants rejoignent
      simplement leur zone de combat, sans combat.`);
    return;
  }

  await sleep(450);
  resolveFight({ card: topCard, owner: 'top' }, { card: botCard, owner: 'bottom' });
}

function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

        Les cartes qui ne sont pas des combattants sont défaussées au passage.

// Calcule RÉELLEMENT le résultat (tire les cartes du deck, défausse les
// non-combattants) SANS aucune animation — volontairement rapide, pour
// pouvoir diffuser la séquence à l'adversaire AVANT que l'animation ne
// commence, plutôt qu'après (sinon les deux joueurs la verraient à des
// moments différents, celui qui déclenche en premier, l'autre après coup).
function computeReveillezVousSequence(sideOwner){
  const deck = getDeckByOwner(sideOwner);
  let revealed = null;
  const sequence = [];

  while (deck.length > 0) {
    const c = deck.shift();
    const isCombattant = getType(c.label) === 'personnage';
    sequence.push({ label: c.label, isCombattant });
    if (isCombattant) {
      revealed = c;
      break;
    } else {
      discardCard(c, sideOwner, 'other');
    }
  }
  return { revealed, sequence };
}

// Rejoue, CÔTÉ SPECTATEUR uniquement, la même animation visuelle qu'un
// autre client vient de calculer — à partir de la séquence de cartes déjà
// diffusée. Ne touche JAMAIS au vrai deck ni à la vraie défausse : l'état
// réel arrive comme d'habitude via stateSync.
async function replayRevealAnimation(sideOwner, overlay, sequence){
  const suffix = (sideOwner === 'top') ? 'Top' : 'Bottom';
  const slotEl = overlay.querySelector(`#rvSlot${suffix}`);
  const statusEl = overlay.querySelector(`#rvStatus${suffix}`);
  const discardCountEl = overlay.querySelector(`#rvDiscardCount${suffix}`);
  const discardPileEl = overlay.querySelector(`#rvDiscard${suffix}`);
  let discardedCount = 0;
  let revealedLabel = null;

  for (let i = 0; i < sequence.length; i++) {
    const { label, isCombattant } = sequence[i];
    const cardsSeen = i + 1;
    slotEl.innerHTML = `<img src="${getCardImage(label)}" alt="${cardName(label)}">`;
    slotEl.classList.remove('rvFlip'); void slotEl.offsetWidth; slotEl.classList.add('rvFlip');
    if (statusEl) { statusEl.textContent = `Carte n°${cardsSeen} : ${cardName(label)}`; statusEl.style.color = ''; }
    await sleep(950);

    if (isCombattant) {
      revealedLabel = label;
      slotEl.classList.add('rvLocked');
      if (statusEl) { statusEl.textContent = `✓ ${cardName(label)} est un combattant !`; statusEl.style.color = '#7dffb0'; }
      await sleep(900);
      break;
    } else {
      if (statusEl) { statusEl.textContent = `${cardName(label)} n'est pas un combattant → part en défausse.`; statusEl.style.color = '#ffb84d'; }
      await sleep(700);
      slotEl.classList.add('rvDiscarding');
      if (discardPileEl) { discardPileEl.classList.remove('rvPulse'); void discardPileEl.offsetWidth; discardPileEl.classList.add('rvPulse'); }
      await sleep(550);
      discardedCount++;
      if (discardCountEl) discardCountEl.textContent = String(discardedCount);
      slotEl.classList.remove('rvDiscarding', 'rvFlip');
      slotEl.innerHTML = `<div class="rvCardBack"></div>`;
      await sleep(300);
    }
  }

  if (!revealedLabel && statusEl) { statusEl.textContent = 'Deck entièrement épuisé — aucun combattant trouvé.'; statusEl.style.color = '#ff8080'; }
  return revealedLabel;
}

// Diffuse et rejoue "Réveillez vous" chez le joueur qui n'a pas déclenché la
// carte, en synchronisant l'animation complète (les deux côtés à la fois).
async function playReveillezVousSpectator(topSequence, botSequence){
  const overlay = buildReveillezVousOverlay();
  document.body.appendChild(overlay);
  requestAnimationFrame(()=> overlay.classList.add('go'));

  const [topLabel, botLabel] = await Promise.all([
    replayRevealAnimation('top', overlay, topSequence || []),
    replayRevealAnimation('bottom', overlay, botSequence || []),
  ]);

  const footerEl = overlay.querySelector('#rvFooter');
  if (footerEl) {
    if (topLabel && botLabel) {
      footerEl.textContent = `Les deux combattants sont trouvés — l'affrontement va commencer !`;
      footerEl.style.color = '#7dffb0';
    } else if (topLabel || botLabel) {
      footerEl.textContent = `Un seul combattant a été trouvé — il rejoindra sa zone sans opposition.`;
      footerEl.style.color = '#ffb84d';
    } else {
      footerEl.textContent = `Aucun combattant trouvé dans les deux decks.`;
      footerEl.style.color = '#ff8080';
    }
  }

  await sleep(2000);
  overlay.classList.remove('go');
  await sleep(350);
  if (overlay.parentNode) overlay.remove();
  fullRender();
}

function playActionFusionnerLesTous(owner, actionCard){
  if (!canPlayThisCardNow(owner, actionCard)) return;

  const opp = (owner === 'top') ? 'bottom' : 'top';
  const oppLine = getLineByOwner(opp);

  if (oppLine.length === 0) {
    pushHistory('info', `${cardAnchor('C236')} ne trouve aucun combattant adverse à fusionner.`);
    return;
  }

  consumeAllowanceIfNeeded(owner, actionCard);
  const hand = getHandByOwner(owner);
  const idx = hand.findIndex(c => c.id === actionCard.id);
  if (idx !== -1) hand.splice(idx, 1);
  discardCard(actionCard, owner, 'action');

  // Capture des éléments DOM AVANT toute suppression, pour l'animation.
  const mergedEls = oppLine.map(c => findLiveCardElement(c)).filter(Boolean);
  const mergedLabels = oppLine.map(c => c.label);

  // Le Mithril capturé (Malocux/Scaracy) par N'IMPORTE LAQUELLE des créatures
  // fusionnées est cumulé et transmis à Ignominie — rien n'est perdu, même si
  // plusieurs créatures en portaient chacune.
  const totalCapturedMithril = oppLine.reduce((sum, c) => sum + (typeof c.capturedMithril === 'number' ? c.capturedMithril : 0), 0);

  // Retrait complet et littéral des cartes fusionnées : nettoyage des
  // références (familiers, liens) mais SANS passer par discardCard ni
  // addToExile — elles ne meurent pas, elles cessent simplement d'exister
  // (aucun effet de MORT ne se déclenche).
  oppLine.forEach(c => {
    detachFamiliarsOnHost(c, opp);
    cleanupPrismisLinksOnCardRemoval(c);
    cleanupWadooLinksOnCardRemoval(c);
  });
  oppLine.length = 0;

  const ignominie = createCard('T08', opp === 'top' ? 'T' : 'B');
  ignominie.hp = getBaseHP('T08');
  ignominie.shield = getBaseShield('T08');
  if (totalCapturedMithril > 0) {
    ignominie.capturedMithril = totalCapturedMithril;
  }
  getLineByOwner(opp).push(ignominie);

  pushHistory('action', `${cardAnchor('C236')} fusionne ${mergedLabels.length} combattant${mergedLabels.length>1?'s':''} adverse${mergedLabels.length>1?'s':''} en ${cardAnchor('T08')} !` +
    (totalCapturedMithril > 0 ? ` Elle hérite de ${totalCapturedMithril} Mithril capturé.` : ''));

  animateFusionFrenzy(mergedEls, opp);
  fullRender();

  // Le vagabondage démarre une fois la carte réellement affichée dans le DOM
  // (juste après ce fullRender), pour toute la durée du son Ignominie.mp3.
  requestAnimationFrame(()=> requestAnimationFrame(()=> startIgnominieWander(ignominie, opp)));
}

/* Ignominie erre dans sa zone de combat pendant toute la durée du son
   Ignominie.mp3 (13,08s) : la case tremble en continu, la carte se déplace
   aléatoirement en laissant des reflets éthérés (traînée violette qui
   s'estompe) derrière son passage, puis se stabilise à sa position normale
   une fois le son terminé — ne restant alors QUE la carte Ignominie. */
function startIgnominieWander(card, owner){
  try{
    const IGNOMINIE_SOUND_DURATION_MS = 13080;
    const zoneEl = document.getElementById(owner === 'top' ? 'battleTop' : 'battleBottom');
    if (!zoneEl) return;
    zoneEl.classList.add('ignominieZoneShake');

    // La main du joueur du haut est repoussée hors de vue pendant tout le
    // vagabondage : sa position pouvait sinon venir chevaucher visuellement
    // l'animation (peu importe le côté où Ignominie apparaît).
    const handTopEl = document.getElementById('handTop');
    if (handTopEl) handTopEl.classList.add('hiddenDuringIgnominieWander');

    const findCardEl = () => document.querySelector(`[data-id="${card.id}"]`);

    const spawnTrailGhost = (el) => {
      try{
        const rect = el.getBoundingClientRect();
        const ghost = document.createElement('div');
        ghost.className = 'card ignominieTrailGhost';
        const bg = el.style.backgroundImage || getComputedStyle(el).backgroundImage;
        if (bg) ghost.style.backgroundImage = bg;
        ghost.style.left = `${rect.left}px`;
        ghost.style.top = `${rect.top}px`;
        ghost.style.width = `${rect.width}px`;
        ghost.style.height = `${rect.height}px`;
        aimLayer.appendChild(ghost);
        requestAnimationFrame(()=> ghost.classList.add('fade'));
        setTimeout(()=>{ if (ghost.parentNode) ghost.remove(); }, 1300);
      }catch(e){ }
    };

    const wanderStep = () => {
      const el = findCardEl();
      if (!el) return;
      spawnTrailGhost(el);
      const rx = (Math.random() * 2 - 1) * 26;
      const ry = (Math.random() * 2 - 1) * 18;
      const rot = (Math.random() * 2 - 1) * 12;
      el.style.transition = 'transform .42s cubic-bezier(.4,0,.2,1)';
      el.style.transform = `translate(${rx}px, ${ry}px) rotate(${rot}deg) scale(1.06)`;
      el.style.zIndex = '60';
      el.style.filter = 'drop-shadow(0 0 14px rgba(160,50,210,.75))';
    };

    wanderStep();
    const wanderInterval = setInterval(wanderStep, 400);

    setTimeout(()=>{
      clearInterval(wanderInterval);
      zoneEl.classList.remove('ignominieZoneShake');
      if (handTopEl) handTopEl.classList.remove('hiddenDuringIgnominieWander');
      const el = findCardEl();
      if (el) {
        el.style.transition = 'transform .55s ease';
        el.style.transform = 'none';
        el.style.zIndex = '';
        el.style.filter = '';
      }
      // Présentation finale : Ignominie zoomée au centre de l'écran, avec
      // une explication de ce qui vient de se passer.
      showIgnominieReveal(card, owner);
    }, IGNOMINIE_SOUND_DURATION_MS);
  }catch(e){ }
}

/* Grand plan de présentation d'Ignominie une fois le vagabondage terminé —
   carte zoomée au centre de l'écran + explication, avec entrée/sortie
   animées. Se ferme automatiquement après quelques secondes, ou au clic. */
function showIgnominieReveal(card, owner){
  try{
    const overlay = document.createElement('div');
    overlay.className = 'ignominieReveal';
    const ownerLabel = playerLabel(owner);
    const mithrilNote = (typeof card.capturedMithril === 'number' && card.capturedMithril > 0)
      ? ` Elle porte encore ${card.capturedMithril} Mithril capturé hérité de la fusion.`
      : '';
    overlay.innerHTML = `
      <div class="ignominieRevealCard" style="background-image:url(${getCardImage(card.label)})"></div>
      <div class="ignominieRevealText">
        <h2>Ignominie s'éveille</h2>
        <p>Les combattants de ${ownerLabel} viennent de fusionner en une seule et unique horreur à <strong>15 PV</strong>, appartenant à toutes les factions à la fois.${mithrilNote}</p>
      </div>
    `;
    document.body.appendChild(overlay);
    requestAnimationFrame(()=> overlay.classList.add('go'));

    const dismiss = () => {
      if (overlay.dataset.dismissed) return;
      overlay.dataset.dismissed = '1';
      overlay.classList.remove('go');
      overlay.classList.add('leaving');
      setTimeout(()=>{ if (overlay.parentNode) overlay.remove(); }, 500);
    };
    overlay.addEventListener('click', dismiss);
    setTimeout(dismiss, 9000);
  }catch(e){ }
}

/* Animation de fusion : chaque carte adverse est aspirée façon vortex vers
   le centre de sa propre zone de combat (teinte violette/pourpre, en écho au
   visuel de la carte), avec un léger décalage entre chacune pour un effet de
   "convergence" progressive, puis une onde de choc marque l'apparition
   d'Ignominie à l'endroit exact de l'impact. */
function animateFusionFrenzy(mergedEls, targetOwner){
  try{
    if (!mergedEls || mergedEls.length === 0) return;
    const zoneEl = document.querySelector(targetOwner === 'top' ? '#battleTop .battleInner' : '#battleBottom .battleInner');
    if (!zoneEl) return;
    const zoneRect = zoneEl.getBoundingClientRect();
    const target = { x: zoneRect.left + zoneRect.width / 2, y: zoneRect.top + zoneRect.height / 2 };

    // Son + assombrissement progressif de tout l'écran dès le lancement,
    // pour poser une ambiance monstrueuse avant même que les cartes ne
    // commencent à converger.
    playIgnominieSfx();
    const vignette = document.createElement('div');
    vignette.className = 'fusionVignette';
    document.body.appendChild(vignette);
    requestAnimationFrame(()=> vignette.classList.add('go'));

    mergedEls.forEach((el, i) => {
      const start = centerOf(el);
      const ghost = document.createElement('div');
      ghost.className = 'card fusionGhost';
      const url = el.style.backgroundImage;
      if (url) ghost.style.backgroundImage = url;
      ghost.style.left = `${start.x}px`;
      ghost.style.top = `${start.y}px`;
      ghost.style.transitionDelay = `${i * 70}ms`;
      aimLayer.appendChild(ghost);
      requestAnimationFrame(()=>{
        const dx = target.x - start.x;
        const dy = target.y - start.y;
        ghost.style.transform = `translate(${dx}px, ${dy}px) scale(.06) rotate(${520 + i * 110}deg)`;
        ghost.style.opacity = '0';
      });
      setTimeout(()=>{ if (ghost.parentNode) ghost.remove(); }, 900 + i * 70);
    });

    const shockDelay = 550 + mergedEls.length * 70;

    // Secousse d'écran : déclenchée juste avant l'impact pour culminer
    // exactement au moment du flash, façon "montée de tension → choc".
    setTimeout(()=>{
      document.body.classList.add('fusionShake');
      setTimeout(()=> document.body.classList.remove('fusionShake'), 650);
    }, Math.max(0, shockDelay - 150));

    setTimeout(()=>{
      const flash = document.createElement('div');
      flash.className = 'fusionFlash';
      flash.style.left = `${target.x}px`;
      flash.style.top = `${target.y}px`;
      aimLayer.appendChild(flash);
      requestAnimationFrame(()=> flash.classList.add('go'));
      setTimeout(()=>{ if (flash.parentNode) flash.remove(); }, 700);
    }, shockDelay);

    // La vignette se dissipe une fois l'impact passé.
    setTimeout(()=>{
      vignette.classList.remove('go');
      setTimeout(()=>{ if (vignette.parentNode) vignette.remove(); }, 500);
    }, shockDelay + 350);
  }catch(e){ }
}

function updateForgeTaxUI() {
  ['top', 'bottom'].forEach(player => {
    // On nettoie les anciens effets "temporaires" (Éventail, Anomaly) pour recalculer
    forgeTax[player] = forgeTax[player].filter(effect => effect.source !== 'Éventail (T01)' && effect.source !== 'Anomaly (T03)');

    // Logique pour l'Éventail
    const playerHand = getHandByOwner(player);
    const eventailCount = playerHand.filter(c => c.label === 'T01').length;
    if (eventailCount > 0) {
      forgeTax[player].push({
        source: 'Éventail (T01)',
        amount: eventailCount,
        turns: 1 // Temporaire, recalculé à chaque update
      });
    }

    // ===================================================================
    // DÉBUT DE LA LOGIQUE POUR ANOMALY (T03)
    // ===================================================================
    const playerLine = getLineByOwner(player);
    const anomalyCount = playerLine.filter(c => c.label === 'T03').length;
    if (anomalyCount > 0) {
        forgeTax[player].push({
            source: 'Anomaly (T03)',
            amount: -anomalyCount, // Réduction de coût (valeur négative)
            turns: 1 // Temporaire, recalculé à chaque update
        });
    }
    // ===================================================================
    // FIN DE LA LOGIQUE POUR ANOMALY
    // ===================================================================

    const box = document.getElementById(`mithrilBox${player.charAt(0).toUpperCase() + player.slice(1)}`);
    const modSpan = document.getElementById(`mithrilCostMod${player.charAt(0).toUpperCase() + player.slice(1)}`);

    const totalTaxAmount = forgeTax[player].reduce((sum, effect) => sum + effect.amount, 0);
    const gousseActive = gousseDiscountActive[player];

    if (totalTaxAmount !== 0 || gousseActive) {
      const tooltipLines = forgeTax[player]
        .map(effect => `${effect.source}: ${effect.amount > 0 ? '+' : ''}${effect.amount} Mithril`);
      if (gousseActive) {
        const gousseDiscount = getLineByOwner(player).filter(c => hasTag(c, 'poupée')).length;
        if (gousseDiscount > 0) tooltipLines.push(`Gousset (C213): -${gousseDiscount} Mithril`);
      }

      const finalCost = computeForgeCost(player);
      const delta = finalCost - 3; // écart réel par rapport au coût de base (3), après tous les plafonds
      const sign = delta > 0 ? '+' : '';
      modSpan.textContent = `( Coût Forge: ${finalCost}, ${sign}${delta} )`;
      // Vert = réduction de coût (bon pour le joueur), Rouge = surcoût (pénalité)
      modSpan.style.color = (delta < 0) ? 'var(--green)' : (delta > 0 ? 'var(--red)' : '');
      box.title = tooltipLines.join('\n');
    } else {
      modSpan.textContent = '';
      modSpan.style.color = '';
      box.title = '';
    }
  });
}

/* ---- NOUVELLE CARTE C51 "Violence" ---- */
let c59DestroyMode = null; // { owner }
let c51SelectMode = null; // { owner, targetsToPick, picked:[] }
let c58HealingMode = null; // { owner, healsRemaining }

function openC51Prompt(owner, card, anchorEl) {
  if (!canPlayThisCardNow(owner, card)) return;
  const canPay = mithril[owner] >= 2;
  openButtonsPrompt(
    'Violence',
    'Jouer <strong>Violence</strong> ?<br><small>Coût : <strong>2 Mithril</strong>. Effet : Inflige <strong>-6 PV</strong> à un ou deux combattants adverses de votre choix.</small>',
    anchorEl,
    [
      {
        label: 'Valider (-2 Mithril)',
        className: 'confirm' + (canPay ? '' : ' disabled'),
        disabled: !canPay,
        onClick: () => playActionC51(owner, card)
      },
      { label: 'Annuler', className: 'cancel', onClick: () => {} },
    ]
  );
}

function playActionC51(owner, actionCard) {
  if (!canPlayThisCardNow(owner, actionCard) || mithril[owner] < 2) return;

  const opp = (owner === 'top') ? 'bottom' : 'top';
  const oppLine = getLineByOwner(opp);
  const targets = oppLine.filter(c => getType(c.label) === 'personnage');

  if (targets.length < 1) {
    alert("Il n'y a aucune cible adverse valide.");
    return;
  }

  consumeAllowanceIfNeeded(owner, actionCard);
  mithril[owner] -= 2;
  const hand = (owner === 'top') ? topHand : botHand;
  const idx = hand.findIndex(c => c.id === actionCard.id);
  if (idx !== -1) hand.splice(idx, 1);
  discardCard(actionCard, owner, 'action');

  const targetsToPick = Math.min(2, targets.length);
  pushHistory('action', `${cardAnchor('C51')} est jouée pour 2 Mithril. En attente de ${targetsToPick} cible(s)...`);

  startC51Targeting(owner, targetsToPick);
}

function startC51Targeting(owner, targetsToPick = 2) {
  c51SelectMode = { owner, targetsToPick, picked: [] };

  closeActionPrompt();

  const promptEl = document.createElement('div');
  promptEl.id = 'c51-prompt';
  promptEl.className = 'actionPrompt';
  promptEl.style.position = 'fixed';
  promptEl.style.bottom = '100px';
  promptEl.style.left = '50%';
  promptEl.style.transform = 'translateX(-50%)';
  promptEl.style.zIndex = '2000';
  promptEl.innerHTML = `
    <div class="apTitle">Ciblage : Violence</div>
    <div class="apMsg">Choisissez ${targetsToPick} combattant(s) adverse(s).</div>
    <div class="apRow">
      <button id="c51-validate" class="apBtn confirm disabled">Valider (0/${targetsToPick})</button>
      <button id="c51-cancel" class="apBtn cancel">Annuler</button>
    </div>
  `;
  document.body.appendChild(promptEl);

  actionPromptEl = promptEl;

  promptEl.querySelector('#c51-validate').addEventListener('click', () => {
    if (c51SelectMode && c51SelectMode.picked.length === c51SelectMode.targetsToPick) {
      applyAndEndC51Selection();
    }
  });

  promptEl.querySelector('#c51-cancel').addEventListener('click', () => {
    endC51SelectionCleanup();
    pushHistory('info', 'Le ciblage de Violence a été annulé.');
  });

  fullRender();
}

function handleC51TargetSelection(targetCard) {
  if (!c51SelectMode) return;

  const pickedIndex = c51SelectMode.picked.indexOf(targetCard.id);

  if (pickedIndex > -1) {
    c51SelectMode.picked.splice(pickedIndex, 1);
  } else {
    if (c51SelectMode.picked.length < c51SelectMode.targetsToPick) {
      c51SelectMode.picked.push(targetCard.id);
    }
  }

  const validateBtn = document.getElementById('c51-validate');
  if (validateBtn) {
    const count = c51SelectMode.picked.length;
    validateBtn.textContent = `Valider (${count}/${c51SelectMode.targetsToPick})`;
    validateBtn.classList.toggle('disabled', count !== c51SelectMode.targetsToPick);
  }

  fullRender();
}

function applyAndEndC51Selection() {
  if (!c51SelectMode || c51SelectMode.picked.length !== c51SelectMode.targetsToPick) return;

  const opp = (c51SelectMode.owner === 'top') ? 'bottom' : 'top';
  const oppLine = getLineByOwner(opp);
  const targets = [];

  c51SelectMode.picked.forEach(targetId => {
    const card = oppLine.find(c => c.id === targetId);
    if (card) {
      targets.push(card);
    }
  });

  if (targets.length > 0) {
    const targetNames = targets.map(t => cardAnchor(t.label)).join(' et ');
    pushHistory('pv', `${cardAnchor('C51')} inflige 6 points de dégâts à ${targetNames}.`);

    targets.forEach(target => {
      const res = applyDamageWithShield(target, 6);
      onHPDamaged(opp, target, res.hpLost, 'action');
      if (getEffectiveHP(target) <= 0) {
        const line = getLineByOwner(opp);
        const idx = line.findIndex(c => c.id === target.id);
        if (idx !== -1) {
            line.splice(idx, 1);
            detachFamiliarsOnHost(target, opp);
            discardCard(target, opp, 'death');
        }
      }
    });
  }

  endC51SelectionCleanup();
}

function endC51SelectionCleanup() {
    c51SelectMode = null;
    closeActionPrompt();
    fullRender();
}

function buildC58Prompt(charges) {
  closeActionPrompt();
  const promptEl = document.createElement('div');
  promptEl.id = 'c58-prompt';
  promptEl.className = 'actionPrompt';
  promptEl.style.bottom = '100px';
  promptEl.style.left = '50%';

  promptEl.style.zIndex = '2000';
  promptEl.innerHTML = `
    <div class="apTitle">Effet : Demon Core</div>
    <div class="apMsg">Distribuez <strong>${charges} points de soin</strong> aux combattants de votre choix.</div>
    <div class="apRow">
      <button id="c58-cancel" class="apBtn cancel">Terminer</button>
    </div>
  `;
  document.body.appendChild(promptEl);
  actionPromptEl = promptEl;
  promptEl.querySelector('#c58-cancel').addEventListener('click', endC58HealingCleanup);
}

function startC58HealingSelection(owner, charges) {
  if (charges <= 0) return;

  // Partie en ligne : Demon Core n'est pas le mien — ce choix appartient à son
  // propriétaire, je délègue et j'attends sa réponse (liste des cibles soignées).
  if (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE && MY_SEAT !== owner) {
    showWaitOverlay(`Patientez : l'adversaire distribue les soins de ${cardName('C58')}...`);
    requestOpponentChoice('c58', { charges }, (chosenIds) => {
      hideWaitOverlay();
      (chosenIds || []).forEach(id => resolveC58Heal(id));
      fullRender();
    });
    return;
  }

  c58HealingMode = { owner, healsRemaining: charges };
  buildC58Prompt(charges);
  fullRender();
}

function resolveC58Heal(targetId) {
  const targetCard = findCardOnBoard(targetId);
  if (targetCard && typeof targetCard.hp === 'number' && targetCard.label !== 'C62') {
    targetCard.hp++;
    pushHistory('pv', `${cardAnchor(targetCard.label)} regagne 1 PV grâce au Demon Core.`);
    playHPHitEffect(targetCard);
  }
}

function handleC58HealingSelection(targetCard) {
  if (!c58HealingMode || c58HealingMode.healsRemaining <= 0) return;

  // Je réponds pour le compte de l'adversaire qui a délégué ce choix : je me
  // contente d'enregistrer mes cibles, l'application réelle se fera chez lui.
  if (remoteChoiceMode && remoteChoiceMode.kind === 'c58') {
    if (typeof targetCard.hp === 'number' && targetCard.label !== 'C62') {
      remoteChoiceMode.picks.push(targetCard.id);
      c58HealingMode.healsRemaining--;
    }
    const msgEl = document.querySelector('#c58-prompt .apMsg');
    if (msgEl) {
      msgEl.innerHTML = `Distribuez <strong>${c58HealingMode.healsRemaining} points de soin</strong> restants.`;
    }
    if (c58HealingMode.healsRemaining <= 0) {
      endC58HealingCleanup();
    } else {
      fullRender();
    }
    return;
  }

  if (typeof targetCard.hp === 'number' && targetCard.label !== 'C62') {
    targetCard.hp++;
    c58HealingMode.healsRemaining--;
    pushHistory('pv', `${cardAnchor(targetCard.label)} regagne 1 PV grâce au Demon Core.`);
    playHPHitEffect(targetCard);
  }

  const msgEl = document.querySelector('#c58-prompt .apMsg');
  if (msgEl) {
    msgEl.innerHTML = `Distribuez <strong>${c58HealingMode.healsRemaining} points de soin</strong> restants.`;
  }

  if (c58HealingMode.healsRemaining <= 0) {
    endC58HealingCleanup();
  } else {
    fullRender();
  }
}

function endC58HealingCleanup() {
  // Fin (volontaire ou forcée) d'une session déléguée : je renvoie la liste des
  // cibles choisies à l'adversaire, qui appliquera les soins de son côté.
  if (remoteChoiceMode && remoteChoiceMode.kind === 'c58') {
    const rid = remoteChoiceMode.requestId;
    const picks = remoteChoiceMode.picks.slice();
    remoteChoiceMode = null;
    c58HealingMode = null;
    closeActionPrompt();
    hideChoiceNotice();
    window.__socket.emit('choiceResponse', { matchId: ONLINE_MATCH_ID, seat: MY_SEAT, requestId: rid, choice: picks });
    fullRender();
    return;
  }

  c58HealingMode = null;
  closeActionPrompt();
  fullRender();
}

/* ---------- Mining & Zcyvenger ---------- */
const AIM_THRESHOLD = 8;
let dragCandidate = null;
let aimHoldTimer = null;

function startAiming(card, owner, fromEl){
  if(currentTurn !== owner) return;
  if(hasAttacked(owner, card)) return;
  if(isAnyTargetSelectionActive()) { denyBecauseSelectionPending(fromEl); return; }

// La Larve (T02) ne peut pas attaquer
  if (card.label === 'T02') {
    pushHistory('info', `${cardAnchor('T02')} ne peut pas attaquer.`);
    return;
  }

// KRYLLS : Pudding (T10) ne peut pas attaquer non plus.
  if (card.label === 'T10') {
    pushHistory('info', `${cardAnchor('T10')} ne peut pas attaquer.`);
    return;
  }

// WADOO : Golgoth (C215) est une carte purement défensive, elle ne peut jamais attaquer
// (seulement miner, ou utiliser son rituel de liaison à l'entrée en jeu).
  if (card.label === 'C215') {
    pushHistory('info', `${cardAnchor('C215')} est une Poupée défensive : elle ne peut pas attaquer.`);
    return;
  }

  if (isFrozen(card)) {
    pushHistory('info', `${cardAnchor(card.label)} est GELÉ et ne peut pas attaquer.`);
    fromEl.classList.add('deny');
    setTimeout(()=>fromEl.classList.remove('deny'), 260);
    return;
  }

  if(!canUnitActThisTurn(owner, card)){ fromEl.classList.add('deny'); setTimeout(()=>fromEl.classList.remove('deny'), 260); return; }

  const c = centerOf(fromEl);
  aimFrom = { card, owner, cx:c.x, cy:c.y };
  aiming = true;
  if(dragCandidate) dragCandidate.attackMode = true;
  ensureArrow();
  aimArrowEl.style.display = 'block';
  updateArrow(c.x, c.y);
}

function onPointerMoveForAim(e){
  if(!dragCandidate) return;
  const dx = e.clientX - dragCandidate.startX;
  const dy = e.clientY - dragCandidate.startY;
  const dist = Math.hypot(dx, dy);
  if(dist > AIM_THRESHOLD && !aiming){
    clearTimeout(aimHoldTimer); aimHoldTimer=null;
    startAiming(dragCandidate.card, dragCandidate.owner, dragCandidate.fromEl);
  }
}
function onPointerUpForAim(e){
  clearTimeout(aimHoldTimer); aimHoldTimer=null;
  document.removeEventListener('pointermove', onPointerMoveForAim);
  if(dragCandidate && !dragCandidate.attackMode && !aiming){
    openMiningPrompt(dragCandidate.owner, dragCandidate.card, dragCandidate.fromEl);
  }
  dragCandidate = null;
}

/* --- Adjacent helpers --- */
function getLineByOwner(owner){ return owner==='top' ? topLine : botLine; }
function neighborsInLine(owner, hostCard){
  const line = getLineByOwner(owner);
  const idx = line.findIndex(c=>c.id===hostCard.id);
  if(idx===-1) return [];
  const out=[];
  if(idx-1>=0) out.push(line[idx-1]);
  if(idx+1<line.length) out.push(line[idx+1]);
  return out;
}
function countCitizensOnBoard(){
  const all = topLine.concat(botLine);
  return all.filter(c => hasTag(c, 'citoyen')).length;
}

/* --- Aura Holozhyeld (C17) : +2 bouclier aux extrêmes --- */
function ownerOfCardOnBoard(card){
  if(topLine.find(c => c.id === card.id)) return 'top';
  if(botLine.find(c => c.id === card.id)) return 'bottom';
  return null;
}
function countHolosOnLine(owner){
  const line = getLineByOwner(owner);
  return line.filter(c => c.label === 'C17').length;
}
function isLeftmost(owner, card){
  const line = getLineByOwner(owner);
  return line.length && line[0].id === card.id;
}
function isRightmost(owner, card){
  const line = getLineByOwner(owner);
  return line.length && line[line.length-1].id === card.id;
}
function holoAuraBonus(owner, card){
  if(!owner) return 0;
  const n = countHolosOnLine(owner);
  if(n<=0) return 0;
  let bonus = 0;
  if(isLeftmost(owner, card))  bonus += 2*n;
  if(isRightmost(owner, card)) bonus += 2*n;
  return bonus;
}

    ]

/**
 * Applique l'effet de l'action de Freyd : inflige des dégâts
 * aux Citoyens adverses en fonction de la taille de la main adverse.
 */
function useFreydAbility(owner, card) {
  const opp = (owner === 'top') ? 'bottom' : 'top';
  const oppHand = getHandByOwner(opp);
  const damage = Math.max(0, oppHand.length - 6);

  // On épuise Freyd, qu'il fasse des dégâts ou non
  markAttacked(owner, card);

  if (damage === 0) {
    pushHistory('action', `${cardAnchor(card.label)} utilise son action, mais n'inflige aucun dégât.`);
    fullRender();
    return;
  }

  const oppLine = getLineByOwner(opp);
  const targets = oppLine.filter(c => hasTag(c, 'citoyen'));

  if (targets.length === 0) {
    pushHistory('action', `${cardAnchor(card.label)} utilise son action, mais il n'y a aucun Citoyen adverse à cibler.`);
    fullRender();
    return;
  }

  const targetNames = targets.map(t => cardAnchor(t.label)).join(', ');
  pushHistory('action', `${cardAnchor(card.label)} inflige ${damage} dégâts à ${targetNames}.`);

  targets.forEach(target => {
    const res = applyDamageWithShield(target, damage);
    playHPHitEffect(target);
    onHPDamaged(opp, target, res.hpLost, 'action');

    if (getEffectiveHP(target) <= 0) {
      const line = getLineByOwner(opp);
      const idx = line.findIndex(c => c.id === target.id);
      if (idx !== -1) {
        line.splice(idx, 1);
        detachFamiliarsOnHost(target, opp);
        discardCard(target, opp, 'death');
      }
    }
  });

  fullRender();
}
