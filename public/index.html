function checkForgecoeurAssembly(owner){
  const artArray = (owner === 'top') ? topArts : botArts;
  const pieceLabels = ['T11','T12','T13'];
  const pieceCount = artArray.filter(a => pieceLabels.includes(a.label)).length;
  if (pieceCount >= 3) {
    let removed = 0;
    for (let i = artArray.length - 1; i >= 0 && removed < 3; i--) {
      if (pieceLabels.includes(artArray[i].label)) { artArray.splice(i, 1); removed++; }
    }
    // Forgecoeur apparaît IMMÉDIATEMENT (comme les dégâts de combat, avant
    // même l'animation Versus) — le tourbillon de 8,6 secondes n'est plus
    // qu'un habillage visuel joué PAR-DESSUS un état déjà correct, sous un
    // écran plein qui masque le plateau réel pendant ce temps. Le retarder
    // jusqu'à la fin de l'animation créait un risque de conflit avec une
    // synchronisation d'état reçue entre-temps en ligne.
    const forgecoeur = createCard('T14', owner === 'top' ? 'T' : 'B');
    artArray.push(forgecoeur);
    pushHistory('artefact', `Les 3 Pièces détachées s'assemblent en ${cardAnchor('T14')} !`);
    fullRender();

    // Prévient l'adversaire pour qu'il voie, lui aussi, l'animation en même temps.
    if (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE && window.__socket) {
      window.__socket.emit('vfx', {
        matchId: ONLINE_MATCH_ID, seat: owner,
        payload: { type: 'forgecoeurAssembly' }
      });
    }
    playForgecoeurAssemblyAnimation(() => {
      fullRender();
      // CORRECTIF : checkWin() n'était appelée que juste après avoir forgé
      // une A'rms — si le joueur avait DÉJÀ assez d'A'rms pour le nouveau
      // seuil réduit par ce Forgecoeur (ex. 1 A'rms alors qu'il n'en fallait
      // désormais plus qu'1 grâce à 4 Forgecoeur), la victoire ne se
      // déclenchait jamais, faute d'être revérifiée à ce moment précis.
      // Vérifiée ICI, une fois l'animation terminée, pour laisser le temps
      // de bien la voir avant que la partie ne se termine.
      checkWin(owner);
    });
  }
}

// Animation d'assemblage : les 3 Pièces détachées tournoient en cercle au
// centre de l'écran, le tourbillon se resserre et accélère peu à peu,
// jusqu'à un éclair final qui révèle Forgecoeur.
// Séquence sonore de l'animation Forgecoeur : Mechanic.mp3 démarre dès le
// début ; à sa moitié, yesyes.mp3 se joue par-dessus ; à 2 secondes de sa
// fin, pasrobot.mp3 se joue également par-dessus. Le minutage se base sur
// la VRAIE durée du fichier Mechanic.mp3 une fois chargée (avec un filet de
// sécurité si jamais elle n'arrivait pas à temps).
function playForgecoeurSoundSequence(){
  try{
    const mechanic = new Audio('/assets/Mechanic.mp3');
    mechanic.volume = 0.9;
    let scheduled = false;
    const schedule = (duration) => {
      if (scheduled) return;
      scheduled = true;
      const halfMs = Math.max(0, (duration / 2) * 1000);
      const nearEndMs = Math.max(0, (duration - 2) * 1000);
      setTimeout(() => { try{ const a = new Audio('/assets/yesyes.mp3'); a.volume = 0.9; a.play().catch(()=>{}); }catch(e){} }, halfMs);
      setTimeout(() => { try{ const a = new Audio('/assets/pasrobot.mp3'); a.volume = 0.9; a.play().catch(()=>{}); }catch(e){} }, nearEndMs);
    };
    mechanic.addEventListener('loadedmetadata', () => {
      const duration = (isFinite(mechanic.duration) && mechanic.duration > 0) ? mechanic.duration : 6;
      schedule(duration);
    }, { once: true });
    mechanic.play().catch(()=>{});
    // Filet de sécurité si "loadedmetadata" ne se déclenche jamais (rare) :
    // on planifie quand même les deux autres sons, sur une durée estimée.
    setTimeout(() => schedule(6), 1200);
  }catch(e){}
}

function playForgecoeurAssemblyAnimation(onDone){
  try{
    playForgecoeurSoundSequence();

    const overlay = document.createElement('div');
    overlay.className = 'forgecoeurAssemblyOverlay';
    overlay.innerHTML = `
      <div class="fgcRays"></div>
      <div class="fgcCaption" id="fgcCaption">Les Pièces détachées s'assemblent…</div>
      <div class="fgcStage" id="fgcStage">
        <img class="fgcPiece" id="fgcPiece1" src="${getCardImage('T11')}" alt="">
        <img class="fgcPiece" id="fgcPiece2" src="${getCardImage('T12')}" alt="">
        <img class="fgcPiece" id="fgcPiece3" src="${getCardImage('T13')}" alt="">
        <img class="fgcResult" id="fgcResult" src="${getCardImage('T14')}" alt="" style="opacity:0;">
      </div>
      <div class="fgcSubtitle" id="fgcSubtitle"></div>
    `;
    document.body.appendChild(overlay);
    requestAnimationFrame(()=> overlay.classList.add('show'));

    const pieces = [
      document.getElementById('fgcPiece1'),
      document.getElementById('fgcPiece2'),
      document.getElementById('fgcPiece3'),
    ];
    const resultImg = document.getElementById('fgcResult');
    const captionEl = document.getElementById('fgcCaption');

    const startTime = performance.now();
    const spiralDuration = 4200; // ms — durée du tourbillon avant la fusion
    let landed = false;

    function animate(now){
      const elapsed = now - startTime;
      const t = Math.min(1, elapsed / spiralDuration);
      const eased = 1 - Math.pow(1 - t, 2); // accélère en douceur vers la fin
      const radius = 390 * (1 - eased * 0.9); // le cercle se resserre progressivement (x3)
      const spinSpeed = 0.0022 + eased * 0.010; // tourne de plus en plus vite

      pieces.forEach((el, i) => {
        const angle = (elapsed * spinSpeed) + (i * (Math.PI * 2 / 3));
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius * 0.62; // légère ellipse, effet de perspective
        const scale = 1 - eased * 0.35;
        el.style.transform = `translate(-50%,-50%) translate(${x}px, ${y}px) scale(${Math.max(0.15, scale)}) rotate(${angle * 50}deg)`;
        el.style.opacity = String(Math.max(0, 1 - eased * 0.85));
      });

      if (t < 1) {
        requestAnimationFrame(animate);
      } else if (!landed) {
        landed = true;
        pieces.forEach(el => { el.style.opacity = '0'; });
        overlay.classList.add('fgcFlash');
        if (captionEl) captionEl.textContent = 'Forgecoeur !';
        const subtitleEl = document.getElementById('fgcSubtitle');
        if (subtitleEl) subtitleEl.textContent = 'Tant que Forgecoeur reste dans la zone d\'artefact, la victoire par forge ne demande plus que 4 A\'rms.';
        resultImg.style.opacity = '1';
        resultImg.classList.add('fgcResultLand');
      }
    }
    requestAnimationFrame(animate);

    // Le tourbillon dure ~4,2s ; Forgecoeur reste ensuite affiché en grand
    // au centre plus de 4s supplémentaires, le temps de bien le lire.
    setTimeout(()=>{
      overlay.classList.remove('show');
      setTimeout(()=>{ if (overlay.parentNode) overlay.remove(); onDone(); }, 500);
    }, 8600);
  }catch(e){ onDone(); }
}

// KRYLLS : Kabba le zunt (C28) — transforme le combattant adverse choisi en
// Pudding (T10, 1 PV), placé dans la zone de combat DU LANCEUR (vol + downgrade).
function transformIntoPudding(targetOwner, targetCard, casterOwner){
  closeActionPrompt();

  // La transformation s'applique IMMÉDIATEMENT (exactement comme les dégâts
  // de combat, qui s'appliquent avant même l'animation Versus) — l'animation
  // de 12 secondes n'est plus qu'un habillage visuel joué PAR-DESSUS un état
  // déjà correct. La retarder jusqu'à la fin de l'animation créait un risque
  // de conflit avec une synchronisation d'état reçue entre-temps en ligne,
  // qui pouvait faire "revenir en arrière" la transformation.
  const targetLine = getLineByOwner(targetOwner);
  const idx = targetLine.findIndex(c => c.id === targetCard.id);
  if (idx === -1) return;
  targetLine.splice(idx, 1);
  detachFamiliarsOnHost(targetCard, targetOwner);
  const casterLine = getLineByOwner(casterOwner);
  const pudding = createCard('T10', casterOwner === 'top' ? 'T' : 'B');
  pudding.hp = 1;
  // Le Pudding hérite du Mithril que la créature transformée avait capturé
  // — un petit malus pour celui qui transforme, mais logique : la créature
  // garde ce qu'elle possédait avant sa métamorphose.
  if (typeof targetCard.capturedMithril === 'number' && targetCard.capturedMithril > 0) {
    pudding.capturedMithril = targetCard.capturedMithril;
  }
  casterLine.push(pudding);
  pushHistory('action', `${cardAnchor('C28')} transforme ${cardAnchor(targetCard.label)} en ${cardAnchor('T10')} (1 PV) dans
    votre zone de combat !${pudding.capturedMithril ? ` Le Pudding conserve ${pudding.capturedMithril} Mithril capturé.` : ''}`);
  fullRender();

  // Prévient l'adversaire pour qu'il voie, lui aussi, l'animation en même temps.
  if (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE && window.__socket) {
    window.__socket.emit('vfx', {
      matchId: ONLINE_MATCH_ID, seat: casterOwner,
      payload: { type: 'kabbaTransform', targetLabel: targetCard.label }
    });
  }
  playKabbaTransformAnimation(targetCard, () => { fullRender(); });
}

// Animation de 12 secondes : la créature ciblée semble résister avant d'être
// happée par la transformation en Pudding — tremble et se débat, puis
// alterne en fondu/zoom entre son image d'origine et celle du Pudding,
// de plus en plus vite, jusqu'à se figer en Pudding.
function playKabbaTransformAnimation(targetCard, onDone){
  try{
    const overlay = document.createElement('div');
    overlay.className = 'kabbaTransformOverlay';
    overlay.innerHTML = `
      <div class="kabbaStage">
        <div class="kabbaCaption" id="kabbaCaption">${cardName(targetCard.label)} résiste…</div>
        <div class="kabbaCardStage" id="kabbaCardStage">
          <img class="kabbaImg kabbaOriginalImg" id="kabbaOriginalImg" src="${getCardImage(targetCard.label)}" alt="${cardName(targetCard.label)}">
          <img class="kabbaImg kabbaPuddingImg" id="kabbaPuddingImg" src="${getCardImage('T10')}" alt="Pudding" style="opacity:0;">
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    requestAnimationFrame(()=> overlay.classList.add('show'));

    // Son joué dès le tout début des 12 secondes.
    try{
      const sfx = new Audio('/assets/nopudding.mp3');
      sfx.volume = 0.85;
      sfx.play().catch(()=>{});
    }catch(e){}

    const stage = document.getElementById('kabbaCardStage');
    const origImg = document.getElementById('kabbaOriginalImg');
    const puddingImg = document.getElementById('kabbaPuddingImg');
    const captionEl = document.getElementById('kabbaCaption');

    // Phase 1 (0 → 7s) : la créature se débat, tirée peu à peu vers le
    // Pudding qu'elle va devenir — tremblements + résistance visible.
    stage.classList.add('kabbaStruggling');
    setTimeout(()=>{ if (captionEl) captionEl.textContent = 'La transformation commence à opérer…'; }, 4000);

    // Phase 2 (7s → 11.6s) : alternance de plus en plus rapide entre les deux
    // images, avec zoom/dézoom, jusqu'à se stabiliser en Pudding.
    setTimeout(()=>{
      stage.classList.remove('kabbaStruggling');
      if (captionEl) captionEl.textContent = 'Pouf !';
      const swapDelays = [420, 380, 340, 300, 260, 220, 180, 150, 120, 100, 90];
      let step = 0;
      let showingPudding = false;
      function nextSwap(){
        showingPudding = !showingPudding;
        origImg.style.opacity = showingPudding ? '0' : '1';
        puddingImg.style.opacity = showingPudding ? '1' : '0';
        stage.classList.remove('kabbaZoomPulse'); void stage.offsetWidth; stage.classList.add('kabbaZoomPulse');
        step++;
        if (step < swapDelays.length) {
          setTimeout(nextSwap, swapDelays[step]);
        } else {
          // Réglage final : Pudding reste affiché, dernier zoom d'atterrissage.
          origImg.style.opacity = '0';
          puddingImg.style.opacity = '1';
          stage.classList.add('kabbaLanded');
          if (captionEl) captionEl.textContent = 'Transformé en Pudding !';
        }
      }
      setTimeout(nextSwap, swapDelays[0]);
    }, 7000);

    // Fin des 12 secondes : fermeture de l'écran, puis on applique le
    // vrai changement d'état du jeu.
    setTimeout(()=>{
      overlay.classList.remove('show');
      setTimeout(()=>{ if (overlay.parentNode) overlay.remove(); onDone(); }, 400);
    }, 12000);
  }catch(e){ onDone(); }
}

// === WADOO : Barbatruk (C211) ===
function openBarbatrukPrompt(owner, card) {
  if (!canPlayThisCardNow(owner, card)) return;
  if (hasAttacked(owner, card)) return;

  const dolls = getLineByOwner(owner).filter(c => hasTag(c, 'poupée'));
  if (dolls.length === 0) return;

  const buttons = dolls.map(doll => ({
    label: doll.wadooLink ? `${cardName(doll.label)} (liée)` : `${cardName(doll.label)} (non liée)`,
    className: 'confirm',
    onClick: () => useBarbatruk(owner, card, doll)
  }));
  buttons.push({ label: 'Annuler', className: 'cancel', onClick: () => {} });

  openButtonsPrompt('Barbatruk', 'Choisissez la Poupée à sacrifier.', null, buttons);
}

function useBarbatruk(owner, card, doll) {
  if (!canPlayThisCardNow(owner, card)) return;
  if (hasAttacked(owner, card)) return;
  markAttacked(owner, card);

  card.shield = (typeof card.shield === 'number' ? card.shield : getBaseShield('C211')) + 2;
  pushHistory('action', `${cardAnchor('C211')} active sa capacité : +2PB.`);

  const line = getLineByOwner(owner);
  const idx = line.findIndex(c => c.id === doll.id);
  const linkedTargetId = doll.wadooLink;

  if (idx !== -1) {
    line.splice(idx, 1);
    detachFamiliarsOnHost(doll, owner);
    discardCard(doll, owner, 'other');
    pushHistory('action', `${cardAnchor(doll.label)} est sacrifiée par ${cardAnchor('C211')}.`);
  }

  if (linkedTargetId) {
    const targetOwner = (owner === 'top') ? 'bottom' : 'top';
    const targetLine = getLineByOwner(targetOwner);
    const targetCard = targetLine.find(c => c.id === linkedTargetId);
    if (targetCard) {
      const tIdx = targetLine.findIndex(c => c.id === targetCard.id);
      targetLine.splice(tIdx, 1);
      detachFamiliarsOnHost(targetCard, targetOwner);
      discardCard(targetCard, targetOwner, 'death');
      pushHistory('action', `La Poupée était liée : ${cardAnchor(targetCard.label)} est détruit avec elle !`);
    }
  }

  closeActionPrompt();
  fullRender();
}

function cleanupPrismisLinksOnCardRemoval(removedCard) {
    // Cas unique : la carte retirée est Prismis lui-même. Le lien — et donc
    // le statut Chimeria des cartes liées — PERDURE tant que Prismis reste en
    // jeu, MÊME si une carte liée quitte le plateau entre-temps (main,
    // défausse, Exil...). On utilise donc une recherche élargie (n'importe
    // quelle zone), pas seulement le plateau, pour être sûr de bien retrouver
    // et nettoyer chaque carte liée, où qu'elle se trouve désormais.
    if (removedCard.label === 'C152' && Array.isArray(removedCard.prismisLinks)) {
        pushHistory('info', `Les liens de ${cardAnchor('C152')} se brisent.`);
        removedCard.prismisLinks.forEach(targetId => {
            const targetCard = findCardAnywhere(targetId);
            if (targetCard) {
                // On fait l'inverse : on retire "Chimeria" des tags ajoutés
                targetCard.addedTags = targetCard.addedTags.filter(t => t !== 'Chimeria');
                
                // Et on retire la faction d'origine de la liste des tags à ignorer,
                // ce qui la restaure.
                if (Array.isArray(targetCard.originalFactions)) {
                    targetCard.removedTags = targetCard.removedTags.filter(t => !targetCard.originalFactions.includes(t));
                }
                
                // On nettoie les propriétés pour ne laisser aucune trace
                delete targetCard.transformedByPrismis;
                delete targetCard.originalFactions;
            }
        });
    }
    // NOTE : l'ancien "Cas 2" (qui brisait le lien dès qu'une carte liée
    // quittait simplement le plateau, ex. renvoyée en main) a été retiré
    // volontairement — le lien doit désormais perdurer jusqu'à ce que
    // Prismis LUI-MÊME quitte le jeu, pas avant.
}


// === WADOO : nettoyage des liens vaudou quand une Poupée ou sa cible quitte le plateau ===
function cleanupWadooLinksOnCardRemoval(removedCard) {
  [topLine, botLine].forEach(line => {
    line.forEach(c => {
      if (c.wadooLink === removedCard.id) {
        c.wadooLink = null;
      }
    });
  });
}

// === WADOO : force un joueur à défausser depuis le DESSOUS de son deck ===
// (utilisé par Négociateur des Brumes, Autel aux Ossements, Ombre Vaudou, Dégourat)
// `victimOwner` = le joueur dont le deck perd des cartes. `sourceLabel` = la carte responsable.
function forceDiscardFromDeckBottom(victimOwner, count, sourceLabel) {
  const deck = getDeckByOwner(victimOwner);
  const discard = (victimOwner === 'bottom') ? botDiscard : topDiscard;
  let actuallyDiscarded = 0;
  for (let i = 0; i < count; i++) {
    if (deck.length === 0) break;
    const card = deck.pop(); // le dessous du deck = la fin du tableau
    discard.unshift(card);
    actuallyDiscarded++;
  }
  if (actuallyDiscarded > 0) {
    pushHistory('info', `${cardAnchor(sourceLabel)} force ${playerLabel(victimOwner)} à défausser ${actuallyDiscarded} carte${actuallyDiscarded > 1 ? 's' : ''} du dessous de son deck.`);
    // WADOO : Chat Noir — le camp qui INFLIGE la défausse (l'adversaire de victimOwner) en profite
    const beneficiary = (victimOwner === 'top') ? 'bottom' : 'top';
    applyChatNoirBonus(beneficiary, actuallyDiscarded);
  }
  updateDeckCounters();
  updateDiscardUI();
  return actuallyDiscarded;
}

// === WADOO : Chat Noir (C209) — bonus de PV permanent à son hôte à chaque carte que
// l'adversaire défausse hors de son tour (donc via un effet subi, pas une défausse volontaire) ===
function applyChatNoirBonus(owner, amount) {
  if (amount <= 0) return;
  const line = getLineByOwner(owner);
  line.forEach(host => {
    const hasCat = getFamiliersOnHost(host).some(f => f.label === 'C209' && !isFamiliarEffectSuppressed(host, 'C209'));
    if (hasCat) {
      host.hp += amount;
      playHPHitEffect(host);
      pushHistory('pv', `${cardAnchor('C209')} fait gagner ${amount}PV à ${cardAnchor(host.label)} (défausse adverse forcée).`);
    }
  });
}
function drawPrismisLinks() {
    if (!linkCanvas || !linkCtx) return;

    const allPlayableCards = topLine.concat(botLine, topArts, botArts);
    linkCanvas.width = window.innerWidth;
    linkCanvas.height = window.innerHeight;
    linkCtx.clearRect(0, 0, linkCanvas.width, linkCanvas.height);

    const prismisCards = allPlayableCards.filter(c => c.label === 'C152' && c.prismisLinks && c.prismisLinks.length > 0);

    prismisCards.forEach(prismis => {
        const prismisEl = document.querySelector(`.card.placed[data-id="${prismis.id}"]`);
        if (!prismisEl) return;
        const start = centerOf(prismisEl);

        prismis.prismisLinks.forEach(targetId => {
            const targetEl = document.querySelector(`.card.placed[data-id="${targetId}"]`);
            if (targetEl) {
                const end = centerOf(targetEl);

                const gradient = linkCtx.createLinearGradient(start.x, start.y, end.x, end.y);
                gradient.addColorStop(0, 'rgba(255, 0, 0, 0.7)');
                gradient.addColorStop(0.2, 'rgba(255, 165, 0, 0.7)');
                gradient.addColorStop(0.4, 'rgba(255, 255, 0, 0.7)');
                gradient.addColorStop(0.6, 'rgba(0, 128, 0, 0.7)');
                gradient.addColorStop(0.8, 'rgba(0, 0, 255, 0.7)');
                gradient.addColorStop(1, 'rgba(128, 0, 128, 0.7)');

                linkCtx.beginPath();
                linkCtx.moveTo(start.x, start.y);
                linkCtx.quadraticCurveTo((start.x + end.x) / 2, (start.y + end.y) / 2 - 40, end.x, end.y);
                linkCtx.strokeStyle = gradient;
                linkCtx.lineWidth = 4;
                linkCtx.shadowColor = 'white';
                linkCtx.shadowBlur = 10;
                linkCtx.stroke();
            }
        });
    });

    // === Liens Vaudou (Wadoo) : fil violet entre la Poupée et sa cible ===
    const wadooDolls = allPlayableCards.filter(c => c.wadooLink);
    wadooDolls.forEach(doll => {
        const dollEl = document.querySelector(`.card.placed[data-id="${doll.id}"]`);
        if (!dollEl) return;
        const start = centerOf(dollEl);
        const targetEl = document.querySelector(`.card.placed[data-id="${doll.wadooLink}"]`);
        if (!targetEl) return;
        const end = centerOf(targetEl);

        linkCtx.beginPath();
        linkCtx.moveTo(start.x, start.y);
        linkCtx.quadraticCurveTo((start.x + end.x) / 2, (start.y + end.y) / 2 + 40, end.x, end.y);
        linkCtx.strokeStyle = 'rgba(255, 217, 61, 0.85)';
        linkCtx.setLineDash([6, 6]);
        linkCtx.lineWidth = 3;
        linkCtx.shadowColor = 'rgba(255, 217, 61, 0.9)';
        linkCtx.shadowBlur = 8;
        linkCtx.stroke();
        linkCtx.setLineDash([]);
    });
}

function playActionHitAndRun(owner, actionCard, anchorEl) {
  if (!canPlayThisCardNow(owner, actionCard)) return;

  const opp = (owner === 'top') ? 'bottom' : 'top';
  const enemyLine = getLineByOwner(opp);
  const allyLine = getLineByOwner(owner);

  // Vérifier qu'il y a au moins une cible pour chaque partie de l'effet
  if (enemyLine.length === 0) {
    pushHistory('info', `Impossible de jouer ${cardAnchor('C161')}: Aucun combattant adverse à cibler.`);
    return;
  }
  if (allyLine.length === 0) {
    pushHistory('info', `Impossible de jouer ${cardAnchor('C161')}: Aucun combattant allié à renvoyer.`);
    return;
  }

  // Consommer la carte et commencer le processus de ciblage
  consumeAllowanceIfNeeded(owner, actionCard);
  const hand = getHandByOwner(owner);
  const idx = hand.findIndex(c => c.id === actionCard.id);
  if (idx !== -1) hand.splice(idx, 1);
  discardCard(actionCard, owner, 'action');
  pushHistory('action', `${cardAnchor('C161')} est jouée...`);

  startHitAndRunTargeting(owner);
}

function startHitAndRunTargeting(owner) {

    <div class="apRow">

    </div>
  `;

    pushHistory('info', "L'action de Hit & Run a été annulée.");

function handleHitAndRunSelection(targetCard, targetOwner) {
  if (!hitAndRunMode) return;

  const { owner, stage } = hitAndRunMode;
  const opp = (owner === 'top') ? 'bottom' : 'top';

  if (stage === 'damage') {
    if (targetOwner !== opp) return; // Doit cibler un ennemi

    hitAndRunMode.targetDamageId = targetCard.id;
    hitAndRunMode.stage = 'bounce'; // Passe à l'étape suivante

    // Mettre à jour le message du prompt
    const msgEl = document.querySelector('#hitandrun-prompt .apMsg');
    if (msgEl) {
      msgEl.innerHTML = `<strong>Étape 2/2 :</strong> Choisissez un combattant <strong>ALLIÉ</strong> à renvoyer dans votre main.`;
    }
    fullRender(); // Met à jour les surbrillances

  } else if (stage === 'bounce') {
    if (targetOwner !== owner) return; // Doit cibler un allié

    hitAndRunMode.targetBounceId = targetCard.id;
    applyHitAndRunEffect();
  }
}

function applyHitAndRunEffect() {
  if (!hitAndRunMode) return;
  const { owner, targetDamageId, targetBounceId } = hitAndRunMode;
  const opp = (owner === 'top') ? 'bottom' : 'top';

  // --- Partie 1: Infliger les dégâts ---
  const damageTarget = findCardOnBoard(targetDamageId);
  if (damageTarget) {
    pushHistory('pv', `${cardAnchor('C161')} inflige 3 dégâts à ${cardAnchor(damageTarget.label)}.`);
    const res = applyDamageWithShield(damageTarget, 3);
    playHPHitEffect(damageTarget);
    onHPDamaged(opp, damageTarget, res.hpLost, 'action');

    if (getEffectiveHP(damageTarget) <= 0) {
      const line = getLineByOwner(opp);
      const idx = line.findIndex(c => c.id === damageTarget.id);
      if (idx !== -1) {
        line.splice(idx, 1);
        detachFamiliarsOnHost(damageTarget, opp);
        discardCard(damageTarget, opp, 'death');
      }
    }
  }

  // --- Partie 2: Renvoyer l'allié dans la main ---
  const bounceTarget = findCardOnBoard(targetBounceId);
  if (bounceTarget) {
    const line = getLineByOwner(owner);
    const idx = line.findIndex(c => c.id === bounceTarget.id);
    if (idx !== -1) {
      const cardToHand = line.splice(idx, 1)[0];
      
      // Très important : détacher les familiers et réinitialiser la carte
      detachFamiliarsOnHost(cardToHand, owner);
      cardToHand.hp = getBaseHP(cardToHand.label);
      cardToHand.shield = getBaseShield(cardToHand.label);
      delete cardToHand.tempHP;
      delete cardToHand.tempShield;
      // etc. pour tous les effets temporaires

      const hand = getHandByOwner(owner);
      hand.push(cardToHand);
      pushHistory('jeu', `${cardAnchor(cardToHand.label)} retourne dans la main de son propriétaire.`);
    }
  }

  endHitAndRunCleanup();
}

function endHitAndRunCleanup() {
  hitAndRunMode = null;
  closeActionPrompt();
  fullRender();
}

setTimeout(() => {

function checkForLarvaFusion(owner) {
    const playerLine = getLineByOwner(owner);
    const larvas = playerLine.filter(c => c.label === 'T02');

    if (larvas.length >= 3) {
        pushHistory('info', `Trois ${cardAnchor('T02')} commencent à fusionner !`);
        
        const larvasToFuse = larvas.slice(0, 3);
        const larvaIDs = larvasToFuse.map(l => l.id);

        // Prévient l'adversaire pour qu'il voie, lui aussi, l'animation en même temps.
        if (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE && window.__socket && window.__socket.connected) {
          window.__socket.emit('vfx', {
            matchId: ONLINE_MATCH_ID, seat: owner,
            payload: { type: 'larvaFusion', owner }
          });
        }
        playFusionAnimation(owner);
        
        const newLine = playerLine.filter(c => !larvaIDs.includes(c.id));
        playerLine.length = 0;
        playerLine.push(...newLine);
        
        fullRender();
        
        // ===================================================================
        // DÉBUT DE LA CORRECTION POUR IDOLE DE FIEL (C53)
        // ===================================================================

        // à l'activation de l'Idole de Fiel.
        larvasToFuse.forEach(larva => {
            addToExile(larva, { hpBefore: getEffectiveHP(larva) });
        });
        // ===================================================================
        // FIN DE LA CORRECTION
        // ===================================================================
    }
}

function playFusionAnimation(owner) {
    const overlay = document.createElement('div');
    overlay.id = 'fusionOverlay';
    document.body.appendChild(overlay);
    overlay.style.display = 'block';

    // Étape 1 : Les 3 larves arrivent et orbitent
    for (let i = 1; i <= 3; i++) {
        const el = document.createElement('div');
        el.className = 'fusion-larva';
        el.style.backgroundImage = `url(${getCardImage('T02')})`;
        overlay.appendChild(el);
        el.style.animation = `larva-fly-in-${i} 1s ease-out forwards`;

        setTimeout(() => {
            el.style.animation = `larva-orbit 2s linear infinite`;
            const angle = (360 / 3) * (i - 1);
            el.style.transformOrigin = `center 120px`;
            el.style.transform = `rotate(${angle}deg)`;
        }, 1200);
        
        // Étape 2 : Les larves implosent
        setTimeout(() => {
            el.style.animation = `final-fusion-flash 0.3s ease-in forwards`;
        }, 3500);
    }

    // Étape 3 : Le cœur d'énergie apparaît et pulse
    const coreStartTime = 3700; // Le cœur apparaît juste après l'implosion des larves
    setTimeout(() => {
        const core = document.createElement('div');
        core.className = 'fusion-core';
        overlay.appendChild(core);

        // Étape 4 : L'Anomaly émerge du cœur en s'agrandissant
        const anomalyEmergenceTime = 1400; // Commence après 1.4s de pulsation du cœur
        setTimeout(() => {
            core.remove(); // On supprime le cœur
            document.body.classList.add('fusion-shake'); // IMPACT : Secousse d'écran
            
            // L'Anomaly apparaît maintenant et s'anime en sortant du centre
            const anomalyZoomEl = document.createElement('div');
            anomalyZoomEl.className = 'fusion-anomaly-zoom';
            anomalyZoomEl.style.backgroundImage = `url(${getCardImage('T03')})`;
            overlay.appendChild(anomalyZoomEl);

            overlay.style.pointerEvents = 'auto';
            anomalyZoomEl.style.cursor = 'pointer';
            anomalyZoomEl.title = 'Cliquez pour placer l\'Anomaly';

            // Étape 5 : Le clic sur l'Anomaly déclenche le choix de placement
            overlay.addEventListener('click', () => {
                overlay.remove();
                document.body.classList.remove('fusion-shake');
                spawnAnomaly(owner);
            }, { once: true });
            
        }, anomalyEmergenceTime); // Le cœur pulse pendant ce temps avant que l'Anomaly n'émerge.

    }, coreStartTime);
}

function spawnAnomaly(owner) {
    const ownerPrefix = owner === 'top' ? 'T' : 'B';
    const anomaly = createCard('T03', ownerPrefix);

    openButtonsPrompt(
        'Fusion terminée !',

}

function playActionExploration(owner, actionCard) {
    if (!canPlayThisCardNow(owner, actionCard)) return;

    consumeAllowanceIfNeeded(owner, actionCard);
    const hand = getHandByOwner(owner);
    const idx = hand.findIndex(c => c.id === actionCard.id);
    if (idx !== -1) hand.splice(idx, 1);
    discardCard(actionCard, owner, 'action');

    const deck = getDeckByOwner(owner);
    let revealedCards = [];
    for (let i = 0; i < 5; i++) {
        if (deck.length > 0) {
            revealedCards.push(deck.shift());
        } else {
            const reshuffled = reshuffleDiscardIntoDeck(owner);
            if (reshuffled && deck.length > 0) {
                revealedCards.push(deck.shift());
            } else {
                break;
            }
        }
    }

    if (revealedCards.length === 0) {
        pushHistory('info', `${cardAnchor('C168')} est jouée, mais le deck est vide.`);
        fullRender();
        return;
    }

    pushHistory('action', `${cardAnchor('C168')} révèle les ${revealedCards.length} premières cartes du deck.`);
    
    explorationMode = {
        owner,
        revealedCards,
        toDraw: [],
        cardsToDrawObjects: [],
        toDeck: [],
        stage: 'draw' // 'draw' puis 'deck'
    };

    renderExplorationPrompt();
}

function renderExplorationPrompt() {
    if (!explorationMode) return;

    const { stage, revealedCards, toDraw } = explorationMode;
    let title = '';
    let maxSelection = 0;

    if (stage === 'draw') {
        title = `Choisissez ${2 - toDraw.length} carte(s) à PIOCHER`;
        maxSelection = 2;
    } else { // stage === 'deck'
        title = `Replacez les ${revealedCards.length} cartes restantes sur votre deck (la 1ère choisie sera au-dessus)`;
        maxSelection = revealedCards.length;
    }

    let cardHTML = `<div class="exploration-choices">`;
    revealedCards.forEach(c => {
        const url = getCardImage(c.label);
        const isSelected = (stage === 'draw' && toDraw.includes(c.id)) || (stage === 'deck' && explorationMode.toDeck.includes(c.id));
        cardHTML += `<div class="card exploration-card ${isSelected ? 'selected' : ''}" data-card-id="${c.id}" data-label="${c.label}" style="background-image: url(${url});"></div>`;
    });
    cardHTML += `</div><div>${title}</div>`;

    openButtonsPrompt('Effet : Exploration', cardHTML, null, [], { nonCancellable: true });

    if (actionPromptEl) {
        actionPromptEl.classList.add('exploration-prompt');
        const choiceCards = actionPromptEl.querySelectorAll('.exploration-card');
        
        choiceCards.forEach(cardEl => {
            cardEl.addEventListener('mouseenter', () => showZoom(cardEl.dataset.label));
            cardEl.addEventListener('mouseleave', hideZoom);
            cardEl.addEventListener('click', () => handleExplorationSelection(cardEl.dataset.cardId));
        });
    }
}

function handleExplorationSelection(chosenCardId) {
    if (!explorationMode) return;
    
    const { stage, toDraw, toDeck } = explorationMode;

    if (stage === 'draw') {
    const { toDraw, cardsToDrawObjects, revealedCards } = explorationMode;
    const index = toDraw.indexOf(chosenCardId);

    if (index > -1) {
        // Dé-sélectionner
        toDraw.splice(index, 1);
        explorationMode.cardsToDrawObjects = cardsToDrawObjects.filter(c => c.id !== chosenCardId);
    } else if (toDraw.length < 2) {
        // Sélectionner
        const cardObject = revealedCards.find(c => c.id === chosenCardId);
        if (cardObject) {
            toDraw.push(chosenCardId);
            cardsToDrawObjects.push(cardObject);
        }
    }

    renderExplorationPrompt(); // Rafraîchir l'affichage

    if (toDraw.length === 2) {
        // Passe à l'étape suivante
        explorationMode.stage = 'deck';
        // On retire les cartes choisies pour la pioche de la liste des cartes à replacer
        explorationMode.revealedCards = revealedCards.filter(c => !toDraw.includes(c.id));
        setTimeout(renderExplorationPrompt, 500);
    }

} else { // stage === 'deck'
        const index = toDeck.indexOf(chosenCardId);
        if (index > -1) return; // Déjà sélectionné pour être replacé

        toDeck.push(chosenCardId);
        renderExplorationPrompt(); // Rafraîchir pour montrer la sélection

        if (toDeck.length === explorationMode.revealedCards.length) {
            finalizeExplorationEffect();
        }
    }
}

function finalizeExplorationEffect() {
    if (!explorationMode) return;
    const { owner, cardsToDrawObjects, toDeck, revealedCards } = explorationMode;

    const playerHand = getHandByOwner(owner);
    const playerDeck = getDeckByOwner(owner);

    // Piocher les cartes sélectionnées (maintenant correctement stockées)
    cardsToDrawObjects.forEach(card => {
        playerHand.push(card);
        pushHistory('pioche', `Vous piochez ${cardAnchor(card.label)} via l'effet Exploration.`);
    });

    // Replacer les autres sur le deck dans l'ordre choisi
    [...toDeck].reverse().forEach(cardId => {
        const card = revealedCards.find(c => c.id === cardId);
        if (card) {
            playerDeck.unshift(card);
        }
    });
    if (toDeck.length > 0) {
        pushHistory('jeu', `Les ${toDeck.length} cartes restantes sont replacées sur le deck.`);
    }

    explorationMode = null;
    closeActionPrompt();
    fullRender();
}

    if (oppLine.length > 0) return; // La ligne adverse n'est pas vide

    const playerLine = getLineByOwner(owner);
    const flaviosReady = playerLine.filter(c => c.label === 'C154' && !hasAttacked(owner, c) && !isFrozen(c));

    if (flaviosReady.length > 0) {
      // Si au moins un Flavio peut attaquer et que la ligne adverse est vide, on affiche la cible
      const oppBattleZone = document.querySelector(opp === 'top' ? '#battleTop .battleInner' : '#battleBottom .battleInner');
      
      const targetEl = document.createElement('div');
      targetEl.className = 'highlight-direct-attack';
      targetEl.textContent = 'Attaque Directe';
      targetEl.dataset.owner = opp; // L' "owner" de la cible est l'adversaire

      targetEl.addEventListener('mouseenter', () => {
        if (aiming && aimFrom && aimFrom.card.label === 'C154') {
          targetEl.classList.add('enemyTargetHint');
          hoveredTarget = { type: 'direct', owner: opp, el: targetEl };
        }
      });
      targetEl.addEventListener('mouseleave', () => {
        targetEl.classList.remove('enemyTargetHint');
        if (hoveredTarget && hoveredTarget.type === 'direct') {
          hoveredTarget = null;
        }
      });

      oppBattleZone.appendChild(targetEl);
    }
  });
}

/* ===================================================================
   MODE EN LIGNE — connexion réseau entre les deux joueurs

  // Plein écran : impossible à déclencher automatiquement (règle de sécurité des
  // navigateurs, il faut un vrai clic). On propose donc un bouton dédié, ET on
  // profite du tout premier clic du joueur n'importe où sur la page pour le
  // proposer aussi, afin que ça arrive le plus naturellement possible.
  function requestFullscreenSafely(){
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (req && !document.fullscreenElement) {
      try { const p = req.call(el); if (p && p.catch) p.catch(()=>{}); } catch(e){}
    }
  }
  const fsBtn = document.getElementById('fullscreenBtn');
  if (fsBtn) fsBtn.addEventListener('click', requestFullscreenSafely);
  document.addEventListener('click', requestFullscreenSafely, { once: true, capture: true });

  function serializeGameState() {
    return {
      currentTurn,
      topDeck, botDeck, topHand, botHand,
      topLine, botLine, topArts, botArts,
      topDiscard, botDiscard, exilePile,
      famTop, famBottom,
      mithril: { ...mithril }, arms: { ...arms }, cycles: { ...cycles },
      activeFaction: { ...activeFaction },
      nonKryllsAllowance: { ...nonKryllsAllowance },
      actionBlocked: { ...actionBlocked },
      exhausted: { top: [...exhausted.top], bottom: [...exhausted.bottom] },
      artifactExhausted: { top: [...artifactExhausted.top], bottom: [...artifactExhausted.bottom] },
      forgeTax: { top: forgeTax.top, bottom: forgeTax.bottom },
      gameOverInfo: window.__gameOverInfo || null,
    };
  }

  function replaceContents(arr, newArr) {
    arr.length = 0;
    if (Array.isArray(newArr)) arr.push(...newArr);
  }

  function applyGameState(state) {
    APPLYING_REMOTE_STATE = true;
    try {
      currentTurn = state.currentTurn;
      topDeck = state.topDeck || []; botDeck = state.botDeck || [];
      topHand = state.topHand || []; botHand = state.botHand || [];
      replaceContents(topLine, state.topLine);
      replaceContents(botLine, state.botLine);
      replaceContents(topArts, state.topArts);
      replaceContents(botArts, state.botArts);
      replaceContents(topDiscard, state.topDiscard);
      replaceContents(botDiscard, state.botDiscard);
      replaceContents(exilePile, state.exilePile);
      replaceContents(famTop, state.famTop);
      replaceContents(famBottom, state.famBottom);
      if (state.mithril) Object.assign(mithril, state.mithril);
      if (state.arms) Object.assign(arms, state.arms);
      if (state.cycles) Object.assign(cycles, state.cycles);
      if (state.activeFaction) {
        // On n'écrase jamais SA PROPRE faction avec une valeur reçue à distance :
        // c'est un choix personnel, seul le joueur lui-même en est l'autorité.
        // Sans cette précaution, une synchronisation en retard depuis l'autre
        // joueur pouvait remettre notre choix à zéro juste après l'avoir fait.
        const oppSeat = (MY_SEAT === 'top') ? 'bottom' : 'top';
        activeFaction[oppSeat] = state.activeFaction[oppSeat];
      }
      if (state.nonKryllsAllowance) Object.assign(nonKryllsAllowance, state.nonKryllsAllowance);
      if (state.actionBlocked) Object.assign(actionBlocked, state.actionBlocked);
      if (state.exhausted) {
        // Comme pour la faction : on ne laisse jamais une synchro distante
        // écraser NOTRE PROPRE épuisement (aucun effet de carte n'agit sur
        // l'épuisement de l'adversaire — seul le joueur lui-même se l'inflige).
        // Sans ça, une mise à jour en retard pouvait annuler un minage/attaque
        // qu'on venait tout juste de faire.
        const oppSeat = (MY_SEAT === 'top') ? 'bottom' : 'top';
        exhausted[oppSeat] = new Set(state.exhausted[oppSeat] || []);
      }
      if (state.artifactExhausted) {
        artifactExhausted.top = new Set(state.artifactExhausted.top || []);
        artifactExhausted.bottom = new Set(state.artifactExhausted.bottom || []);
      }
      if (state.forgeTax) { forgeTax.top = state.forgeTax.top || []; forgeTax.bottom = state.forgeTax.bottom || []; }

      updateTurnUI();
      fullRender();

      // Fin de partie reçue de l'adversaire (abandon, etc.) : on la déclenche
      // aussi de notre côté, via le canal réseau déjà fiable pour tout le reste.
      if (state.gameOverInfo && !GAME.over) {
        setTimeout(() => endGame(state.gameOverInfo.winner, state.gameOverInfo.reason), 0);
      }
    } finally {
      APPLYING_REMOTE_STATE = false;
    }
  }

  let broadcastTimer = null;
  function scheduleStateBroadcast() {
    if (broadcastTimer) clearTimeout(broadcastTimer);
    // Délai fortement réduit (150ms → 30ms) : diminue la fenêtre pendant laquelle
    // une mise à jour légèrement en retard venant de l'adversaire pourrait écraser
    // une action qu'on vient tout juste de faire (ex: minage : Mithril + épuisement).
    broadcastTimer = setTimeout(() => {
      broadcastTimer = null;
      if (window.__socket && window.__socket.connected) {
        window.__socket.emit('stateSync', { matchId: ONLINE_MATCH_ID, seat: MY_SEAT, state: serializeGameState() });

    }, 30);
  }

    if (hasDraw) {
      const $ = (sel) => overlay.querySelector(sel);

      // Le "VS" tient la pose un bon moment (les joueurs le voient
      // clairement), PUIS éclate proprement pour laisser place au tirage —
      // jamais de coupure brutale.
      setTimeout(() => {
        $('#vsEmblem').classList.add('vsShatter');
        overlay.querySelectorAll('.vsStreak').forEach(s => s.classList.add('vsStreakFade'));
        overlay.querySelectorAll('.vsAvatarWrap').forEach(a => a.classList.add('vsFaded'));
      }, 3600);

      setTimeout(() => {
        $('#vsEmblem').style.display = 'none';
        $('#vsDrawPhase').classList.add('show');
        $('#vsDrawTitle').classList.add('show');
      }, 4400);

      // Les deux cartes glissent en douceur jusqu'au centre, DOS TOURNÉ.
      setTimeout(() => {
        $('#vsDrawCardTop').classList.add('vsSlideIn');
        $('#vsDrawCardBottom').classList.add('vsSlideIn');
      }, 5100);

      const topCode = drawReveal.top;
      const botCode = drawReveal.bottom;
      const topNum = parseInt(topCode, 10);
      const botNum = parseInt(botCode, 10);

      // Bascule 3D de la première carte (léger effet de suspense entre les deux).
      setTimeout(() => {
        const topLabel = codeToLabel(topCode);
        const imgTop = $('#vsDrawImgTop');
        if (imgTop) imgTop.src = getCardImage(topLabel);
        $('#vsDrawFlipperTop').classList.add('flipped');
        playFlipcardSfx();
        setTimeout(() => {
          const l = $('#vsDrawLabelTop');
          if (l) {
            const highCls = (topNum > botNum) ? ' vsHighestNum' : '';
            l.innerHTML = `${cardName(topLabel)}<span class="vsDrawCardNum${highCls}">${topCode}</span>`;
            l.classList.add('show');
          }
        }, 500);
      }, 6800);

      setTimeout(() => {
        const botLabel = codeToLabel(botCode);
        const imgBot = $('#vsDrawImgBottom');
        if (imgBot) imgBot.src = getCardImage(botLabel);
        $('#vsDrawFlipperBottom').classList.add('flipped');
        playFlipcardSfx();
        setTimeout(() => {
          const l = $('#vsDrawLabelBottom');
          if (l) {
            const highCls = (botNum > topNum) ? ' vsHighestNum' : '';
            l.innerHTML = `${cardName(botLabel)}<span class="vsDrawCardNum${highCls}">${botCode}</span>`;
            l.classList.add('show');
          }
        }, 500);
        $('#vsDrawVsWord').classList.add('show');
      }, 7500);

      // Temps de lecture : les deux cartes restent affichées, bien
      // visibles, sans rien d'autre qui bouge — le temps de vraiment
      // regarder les numéros et les noms.
      setTimeout(() => {
        const cardTop = $('#vsDrawCardTop');
        const cardBot = $('#vsDrawCardBottom');
        const winnerName = (firstSeat === 'top') ? profiles.top.name : profiles.bottom.name;
        if (firstSeat === 'top') { cardTop.classList.add('vsWinner'); cardBot.classList.add('vsLoser'); }
        else { cardBot.classList.add('vsWinner'); cardTop.classList.add('vsLoser'); }
        const titleEl = $('#vsDrawTitle');
        const resultEl = $('#vsDrawResult');
        if (titleEl) titleEl.textContent = 'Le tirage le plus fort commence !';
        if (resultEl) { resultEl.textContent = `${winnerName} commence la partie !`; resultEl.classList.add('show'); }
      }, 10500);

      setTimeout(() => {
        const subEl = $('#vsDrawSub');
        const loserName = (compensationSeat === 'top') ? profiles.top.name : profiles.bottom.name;
        if (subEl) { subEl.textContent = `En compensation, ${loserName} reçoit 1 carte supplémentaire dans sa main de départ.`; subEl.classList.add('show'); }
      }, 12800);
    }

    // Tenue prolongée avant la sortie en fondu vers le plateau — largement
    // le temps de tout lire, sans jamais se sentir précipité.
    setTimeout(() => {
      overlay.classList.add('exit');
      fadeOutChargementMusic(700); // la musique de chargement s'éteint en douceur pile quand le plateau arrive
      setTimeout(() => {
        overlay.remove();
        style.remove();
        onDone();
      }, 700);
    }, hasDraw ? 17200 : 5600);
  }

  function buildInitialStateFromDeckCodes(deckCodes, compensationSeat) {
    // Reconstruit les vrais objets carte à partir des codes reçus du
    // serveur, avec exactement la même logique que le mode local.
    topDeck = deckCodes.top.map(code => createCard(codeToLabel(code), 'T'));
    botDeck = deckCodes.bottom.map(code => createCard(codeToLabel(code), 'B'));
    botHand = drawInitialHand(botDeck);
    topHand = drawInitialHand(topDeck);
    // Le joueur qui NE COMMENCE PAS reçoit 1 carte de compensation
    // supplémentaire dans sa main de départ (7 au lieu de 6), pour
    // rééquilibrer l'absence d'initiative — en Classée comme en Non classée.
    if (compensationSeat === 'top' && topDeck.length > 0) topHand.push(topDeck.shift());
    if (compensationSeat === 'bottom' && botDeck.length > 0) botHand.push(botDeck.shift());
  }

  // Démarre startTurn() localement UNIQUEMENT dans le navigateur du joueur
  // dont c'est effectivement le tour (choix de faction, etc. doivent
  // apparaître chez le bon joueur, pas chez celui qui vient de finir).
  let lastTurnStartedFor = null;
  function maybeStartMyTurn() {
    if (currentTurn === MY_SEAT) {
      if (lastTurnStartedFor !== currentTurn) {
        lastTurnStartedFor = currentTurn;
        startTurn(MY_SEAT);
      }
    } else {
      lastTurnStartedFor = null;
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    const socket = io();
    window.__socket = socket;

    socket.on('connect', () => {
      socket.emit('joinMatch', { matchId: ONLINE_MATCH_ID, seat: MY_SEAT });
    });

    socket.on('opponentJoined', () => {
      document.getElementById('waitOverlaySub').textContent = 'Adversaire connecté, préparation de la partie…';
    });

    socket.on('gameStateUpdate', (state) => {
      if (!ONLINE_READY) {
        // Première réception : c'est l'état initial (codes de decks à mélanger nous-même localement).
        if (state.deckCodes) {
          buildInitialStateFromDeckCodes(state.deckCodes, state.compensationSeat);
          currentTurn = state.turn || 'bottom';
        } else {
          applyGameState(state);
        }
        ONLINE_READY = true;
        waitOverlay.remove();
        if (state.profiles) { window.PLAYER_PROFILES = state.profiles; refreshChatAsSelector(); }

        const revealBoard = () => {
          // Musique de partie : démarrée ici pour les DEUX joueurs dès le tout
          // début du match (et non plus seulement au premier tour de celui qui
          // commence, ce qui retardait son démarrage côté second joueur).
          if (!matchMusicStarted) {
            matchMusicStarted = true;
            startMatchMusic();
          }
          updateTurnUI();
          fullRender();
          maybeStartMyTurn();
          renderPlayerPanels();
          scheduleStateBroadcast(); // on partage aussitôt l'état initial construit localement
        };

        if (state.profiles) {
          showVersusIntro(state.profiles, state.drawReveal, state.firstSeat, state.compensationSeat, revealBoard);
        } else {
          revealBoard();
        }
      }
    });

    socket.on('stateSync', ({ state }) => {
      applyGameState(state);
      maybeStartMyTurn();
    });

    // Délégation de choix à l'adversaire (ex : effet de Mort de Pestrass déclenché
    // par mon action, mais dont le choix appartient à l'adversaire).
    socket.on('choiceRequest', ({ requestId, kind, payload }) => {
      handleIncomingChoiceRequest(requestId, kind, payload);
    });
    socket.on('choiceResponse', ({ requestId, choice }) => {
      const cb = pendingChoiceRequests[requestId];
      if (cb) {
        delete pendingChoiceRequests[requestId];
        cb(choice);
      }
    });

    // Déconnexion de l'adversaire : compte à rebours de 30 secondes avant
    // forfait automatique. S'il se reconnecte à temps (opponentRejoined),
    // tout reprend normalement ; sinon (matchForfeit), la victoire vous
    // revient automatiquement.
    let opponentLeftTimer = null;
    function removeOpponentLeftOverlay(){
      if (opponentLeftTimer) { clearInterval(opponentLeftTimer); opponentLeftTimer = null; }
      const el = document.getElementById('opponentLeftOverlay');
      if (el) el.remove();
    }

    socket.on('opponentLeft', ({ seat, graceSeconds }) => {
      if (seat === MY_SEAT) return; // ne me concerne pas si c'est moi-même
      removeOpponentLeftOverlay(); // sécurité, au cas où un précédent traînerait encore
      let remaining = graceSeconds || 30;
      const total = remaining;
      const overlay = document.createElement('div');
      overlay.id = 'opponentLeftOverlay';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9500;display:flex;align-items:center;justify-content:center;background:rgba(0,10,15,.93);color:#e8fdff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;text-align:center;padding:24px;';
      overlay.innerHTML = `
        <div>
          <div style="font-size:24px;font-weight:800;margin-bottom:12px;">Votre adversaire s'est déconnecté</div>
          <div style="font-size:15px;opacity:.85;margin-bottom:20px;max-width:420px;">Il a <strong id="opponentLeftCountdown">${remaining}</strong> secondes pour se reconnecter, sans quoi vous remportez la partie automatiquement.</div>
          <div style="width:240px;height:8px;border-radius:999px;background:rgba(255,255,255,.15);margin:0 auto;overflow:hidden;">
            <div id="opponentLeftBar" style="height:100%;width:100%;background:linear-gradient(90deg,#19e27a,#ffd93d);transition:width 1s linear;"></div>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      const countdownEl = document.getElementById('opponentLeftCountdown');
      const barEl = document.getElementById('opponentLeftBar');
      opponentLeftTimer = setInterval(() => {
        remaining--;
        if (countdownEl) countdownEl.textContent = String(Math.max(0, remaining));
        if (barEl) barEl.style.width = `${Math.max(0, (remaining / total) * 100)}%`;
        if (remaining <= 0) { clearInterval(opponentLeftTimer); opponentLeftTimer = null; }
      }, 1000);
    });

    socket.on('opponentRejoined', ({ seat }) => {
      if (seat === MY_SEAT) return;
      removeOpponentLeftOverlay();
      pushHistory('info', `Votre adversaire s'est reconnecté.`);
    });

    socket.on('matchForfeit', ({ winnerSeat }) => {
      removeOpponentLeftOverlay();
      endGame(winnerSeat, 'disconnect');
    });

    socket.on('actionError', ({ message }) => {
      console.warn('Erreur serveur:', message);
    });

    // Effets visuels transitoires (ex : animation des dés de Hasarder) qu'il
    // faut aussi montrer chez l'adversaire, pas seulement chez celui qui joue la carte.
    // Historique de partie : reçoit les entrées de l'adversaire pour que
    // chacun voie le déroulé complet, pas seulement ses propres actions.
    socket.on('historyEntry', ({ kind, html, actorSeat }) => {
      pushHistory(kind, html, { fromRemote: true, actorSeat });
    });

    // Tchat : reçoit les messages de l'adversaire pour qu'une vraie
    // conversation bidirectionnelle soit possible entre les deux joueurs.
    socket.on('chatMessage', ({ who, text }) => {
      postChat(who, text);
    });

    // Krouzpier (C25) : narration synchronisée pour le joueur non actif,
    // qui voit ainsi chaque choix et son résultat au fur et à mesure.
    socket.on('krouzpierStep', ({ step }) => {
      playKrouzpierSpectatorStep(step);
    });

    socket.on('vfx', ({ payload }) => {
      if (!payload) return;
      if (payload.type === 'hasarder') {
        // "playerDrawCount" appartenait à celui qui a joué la carte (mon adversaire ici) ;
        // "oppDrawCount" me concernait moi. On les inverse donc pour mon propre écran.
        showHasarderDice(payload.oppDrawCount, payload.playerDrawCount);
      }
      if (payload.type === 'combatVersus') {
        // Diffusé par l'attaquant : je vois exactement la même animation que lui,
        // le state final me parviendra de toute façon via le prochain stateSync.
        showCombatVersus(payload, () => fullRender());
      }
      if (payload.type === 'kabbaTransform') {
        // Diffusé par celui qui joue Kabba le zunt : les deux joueurs voient la
        // même animation de transformation en même temps.
        playKabbaTransformAnimation({ label: payload.targetLabel }, () => fullRender());
      }
      if (payload.type === 'forgecoeurAssembly') {
        // Diffusé par celui qui assemble les 3 Pièces détachées.
        playForgecoeurAssemblyAnimation(() => fullRender());
      }
      if (payload.type === 'c33Transform') {
        // Diffusé par celui qui joue Pour le bien de tous.
        playC33TransformAnimation(payload.combatantLabel, payload.artifactLabel, () => fullRender());
      }
      if (payload.type === 'sfx') {
        // Type générique : rejoue localement le même petit bruitage que
        // l'adversaire vient de déclencher (pose de carte, défausse
        // manuelle, distribution de main, Mozkyto...), pour que les DEUX
        // joueurs entendent toujours la même chose au même moment.
        const sfxMap = { posecarte: playPosecarteSfx, discard: playDiscardSfx, shuffle: playShuffleSfx, mozkyto: playMozkytoSfx };
        const fn = sfxMap[payload.name];
        if (fn) fn();
      }
      // Streaming de position en direct : l'adversaire vient de prendre une
      // carte, la déplace, ou vient de la relâcher.
      if (payload.type === 'dragStart') { showOpponentDragGhost(payload.cardLabel); }
      if (payload.type === 'dragMove') { moveOpponentDragGhost(payload.x, payload.y); }
      if (payload.type === 'dragEnd') { removeOpponentDragGhost(false); }
      if (payload.type === 'reveillezVous') {
        // Diffusé par celui qui joue Réveillez vous : les deux joueurs
        // voient la même animation, démarrée quasi simultanément (voir
        // computeReveillezVousSequence, calculé et diffusé AVANT l'animation).
        playReveillezVousSpectator(payload.topSequence, payload.botSequence);
      }
      if (payload.type === 'larvaFusion') {
        // Diffusé quand 3 Larves (T02) fusionnent automatiquement en Anomaly.
        playFusionAnimation(payload.owner);
      }
    });
  });
}

/* ===================================================================
   DIDACTICIEL INTERACTIF — coach en direct sur le VRAI plateau de jeu.
   Entièrement additif et isolé : ne redéfinit ni ne modifie AUCUNE fonction
   existante du moteur. Ne fait qu'observer l'état réel du jeu (botLine,
   mithril, arms, currentTurn, famBottom...) pour savoir quand une étape est

    // ---- Dialogue centré : lecture pure, rien d'autre n'est cliquable ----

      document.getElementById('tcdText').innerHTML = html;

        const btn = document.createElement('button');
        btn.className = 'tcdBtn';
        btn.textContent = b.label;
        btn.addEventListener('click', b.onClick);
        btnRow.appendChild(btn);
      });
      dialogue.style.display = 'flex';
      blocker.style.display = 'block';
      blocker.style.zIndex = '9250'; // sous la boîte de dialogue (9300), au-dessus de tout le reste
    }
    function hideDialogue(){
      dialogue.style.display = 'none';
      blocker.style.zIndex = '9050'; // repasse sous le bandeau/spotlight pour la phase d'action
    }

    // ---- Bandeau compact : accompagne une action précise sur le vrai plateau ----
    function showBanner(label, html){
      document.getElementById('tcbStepLabel').textContent = label;
      document.getElementById('tcbText').innerHTML = html;
      banner.style.display = 'flex';
    }
    function hideBanner(){ banner.style.display = 'none'; }

    let tcArrowTimer = null;
    let tcBoostedAncestors = [];
    function positionArrows(els){
      const arrowEls = [document.getElementById('tcArrow'), document.getElementById('tcArrow2')];
      arrowEls.forEach((arrowEl, i) => {
        const el = els[i];
        if (!el) { arrowEl.style.display = 'none'; return; }
        const rect = el.getBoundingClientRect();
        arrowEl.style.display = 'block';
        const cx = rect.left + rect.width / 2;
        if (rect.top < 170) {
          arrowEl.textContent = '▲';
          arrowEl.style.left = (cx - 19) + 'px';
          arrowEl.style.top = (rect.bottom + 8) + 'px';
        } else {
          arrowEl.textContent = '▼';
          arrowEl.style.left = (cx - 19) + 'px';
          arrowEl.style.top = (rect.top - 48) + 'px';
        }
      });
    }
