// ===================================================================
// VERSUS DE COMBAT — overlay plein écran joué à chaque attaque, pour les
// deux joueurs (local ET en ligne, via l'événement 'vfx' déjà utilisé pour
// Hasarder). Purement visuel : ne modifie jamais l'état du jeu, qui est
// déjà entièrement calculé avant l'appel.
// ===================================================================
function showCombatVersus(payload, onDone){
  const done = () => { if (typeof onDone === 'function') onDone(); };

  let ov = document.getElementById('combatVersusOverlay');
  if (ov) ov.remove(); // au cas où une précédente animation traînerait encore

  ov = document.createElement('div');
  ov.id = 'combatVersusOverlay';

  const atkImg = getCardImage(payload.attackerLabel) || '';
  const defImg = getCardImage(payload.defenderLabel) || '';
  const atkName = cardName(payload.attackerLabel);
  const defName = cardName(payload.defenderLabel);

  const atkShieldBefore = payload.attacker.shield || 0;
  const defShieldBefore = payload.defender.shield || 0;
  const dmgToDefender = payload.dmgToDefender || 0;
  const dmgToAttacker = payload.dmgToAttacker || 0;
  const absorbedByDefender = payload.absorbedByDefender || 0;
  const absorbedByAttacker = payload.absorbedByAttacker || 0;

  const atkFighterClass = payload.attackerDied ? 'dead' : (payload.defenderDied ? 'survivor' : '');
  const defFighterClass = payload.defenderDied ? 'dead' : (payload.attackerDied ? 'survivor' : '');

  ov.innerHTML = `
    <div class="cvClashFlash"></div>
    <div class="cvStage">
      <div class="cvFighter left">
        <div class="cvImgWrap">
          <img src="${atkImg}" alt="${atkName}">
          <div class="cvFloat" data-role="atkFloat"></div>
          ${payload.attackerDied ? '<div class="cvDeadStamp">Détruit</div>' : ''}
        </div>
        <div class="cvName">${atkName}</div>
        <div class="cvHpRow"><div class="cvHp" data-role="atkHp">${Math.max(payload.attacker.hp,0)} PV</div></div>
        ${atkShieldBefore > 0 ? `<div class="cvShield" data-role="atkShield">🛡 ${atkShieldBefore}</div>` : ''}
        <div class="cvCaption" data-role="atkCaption"></div>
        ${payload.newlyFrozenAttacker ? '<div class="cvTag appear frozen">Gelé par Glaraneith</div>' : ''}
      </div>
      <div class="cvMid"><div class="cvVs">VS</div></div>
      <div class="cvFighter right">
        <div class="cvImgWrap">
          <img src="${defImg}" alt="${defName}">
          <div class="cvFloat" data-role="defFloat"></div>
          ${payload.defenderDied ? '<div class="cvDeadStamp">Détruit</div>' : ''}
        </div>
        <div class="cvName">${defName}</div>
        <div class="cvHpRow"><div class="cvHp" data-role="defHp">${Math.max(payload.defender.hp,0)} PV</div></div>
        ${defShieldBefore > 0 ? `<div class="cvShield" data-role="defShield">🛡 ${defShieldBefore}</div>` : ''}
        <div class="cvCaption" data-role="defCaption"></div>
        ${payload.isTargetFrozen ? '<div class="cvTag appear frozen">Gelé — pas de riposte</div>' : ''}
        ${payload.newlyFrozenDefender ? '<div class="cvTag appear frozen">Gelé par Glaraneith</div>' : ''}
        ${(payload.poisonFromAttacker && payload.defenderDied) ? '<div class="cvTag appear poison">Anéanti par le Poison</div>' : ''}
      </div>
    </div>
    <div class="cvResultBar" data-role="resultBar"></div>
    <div class="cvSkip">Cliquez pour passer</div>
  `;
  document.body.appendChild(ov);

  let dismissed = false;
  const dismiss = () => {
    if (dismissed) return;
    dismissed = true;
    ov.classList.remove('show');
    setTimeout(()=>{ ov.remove(); done(); }, 200);
  };
  ov.addEventListener('click', dismiss);

  requestAnimationFrame(()=> ov.classList.add('show'));

  // T+0.55s : au moment de l'impact, les nombres de dégâts (et d'absorption) flottent
  setTimeout(()=>{
    const defFloat = ov.querySelector('[data-role="defFloat"]');
    const atkFloat = ov.querySelector('[data-role="atkFloat"]');
    if (defFloat) {
      if (dmgToDefender > 0) {
        defFloat.textContent = `-${dmgToDefender}`;
        defFloat.classList.add('play');
      } else if (absorbedByDefender > 0) {
        defFloat.textContent = `🛡 -${absorbedByDefender}`;
        defFloat.classList.add('absorb','play');
      }
    }
    if (atkFloat) {
      if (dmgToAttacker > 0) {
        atkFloat.textContent = `-${dmgToAttacker}`;
        atkFloat.classList.add('play');
      } else if (absorbedByAttacker > 0) {
        atkFloat.textContent = `🛡 -${absorbedByAttacker}`;
        atkFloat.classList.add('absorb','play');
      } else if (payload.isTargetFrozen) {
        atkFloat.textContent = '—';
        atkFloat.classList.add('absorb','play');
      }
    }
  }, 550);

  // T+0.75s : les PV tombent à leur valeur finale, le bouclier consommé se barre,
  // et une légende textuelle confirme ce qu'il vient de se passer sous chaque carte.
  setTimeout(()=>{
    const atkHpEl = ov.querySelector('[data-role="atkHp"]');
    const defHpEl = ov.querySelector('[data-role="defHp"]');
    const atkShieldEl = ov.querySelector('[data-role="atkShield"]');
    const defShieldEl = ov.querySelector('[data-role="defShield"]');
    const atkCaptionEl = ov.querySelector('[data-role="atkCaption"]');
    const defCaptionEl = ov.querySelector('[data-role="defCaption"]');

    if (atkHpEl){ atkHpEl.textContent = `${Math.max(payload.attackerHp,0)} PV`; atkHpEl.classList.add('tick'); }
    if (defHpEl){ defHpEl.textContent = `${Math.max(payload.defenderHp,0)} PV`; defHpEl.classList.add('tick'); }
    if (atkShieldEl && absorbedByAttacker > 0) atkShieldEl.classList.add('gone');
    if (defShieldEl && absorbedByDefender > 0) defShieldEl.classList.add('gone');

    // Le grisage "détruit" / le halo "survivant" ne s'appliquent QU'À CE
    // MOMENT (impact), pas dès l'ouverture de l'écran — sinon un combattant
    // vaincu apparaissait déjà grisé avant même que l'animation ne commence.
    if (atkFighterClass) {
      const atkFighterEl = ov.querySelector('.cvFighter.left');
      if (atkFighterEl) atkFighterEl.classList.add(atkFighterClass);
    }
    if (defFighterClass) {
      const defFighterEl = ov.querySelector('.cvFighter.right');
      if (defFighterEl) defFighterEl.classList.add(defFighterClass);
    }

    if (defCaptionEl) {
      defCaptionEl.textContent = payload.defenderDied ? `${defName} est détruit !` : (dmgToDefender>0 ? `${defName} encaisse ${dmgToDefender} dégât(s).` : '');
      if (defCaptionEl.textContent) defCaptionEl.classList.add('show');
    }
    if (atkCaptionEl) {
      atkCaptionEl.textContent = payload.attackerDied ? `${atkName} est détruit !` : (payload.isTargetFrozen ? `${atkName} n'a pas subi de riposte.` : (dmgToAttacker>0 ? `${atkName} encaisse ${dmgToAttacker} dégât(s).` : ''));
      if (atkCaptionEl.textContent) atkCaptionEl.classList.add('show');
    }
  }, 750);

  // T+1.5s : bandeau-résumé final, sans ambiguïté sur qui survit / qui est détruit
  setTimeout(()=>{
    const bar = ov.querySelector('[data-role="resultBar"]');
    if (!bar) return;
    let msg;
    if (payload.attackerDied && payload.defenderDied) {
      msg = `💥 ${atkName} et ${defName} sont détruits tous les deux.`;
    } else if (payload.defenderDied) {
      msg = `☠ ${defName} est détruit — ${atkName} survit avec ${Math.max(payload.attackerHp,0)} PV.`;
    } else if (payload.attackerDied) {
      msg = `☠ ${atkName} est détruit — ${defName} survit avec ${Math.max(payload.defenderHp,0)} PV.`;
    } else {
      msg = `${atkName} (${Math.max(payload.attackerHp,0)} PV) et ${defName} (${Math.max(payload.defenderHp,0)} PV) survivent tous les deux.`;
    }
    bar.textContent = msg;
    bar.classList.add('show');
  }, 1500);

  const autoMs = (typeof window.matchMedia === 'function' && window.matchMedia('(prefers-reduced-motion: reduce)').matches) ? 300 : 3400;
  setTimeout(dismiss, autoMs);
}


function resolveFight(from, to){
  if (warzazathEffect[from.owner]) {
    addMithril(from.owner);
    pushHistory('mithril', `Effet ${cardAnchor('C118')} : +1 Mithril pour l'attaque.`);
  }

    // ===================================================================
    // DÉBUT DE LA LOGIQUE POUR SCARACY (C163) LORS DU COMBAT
    // ===================================================================
    const attacker = from.card;
    const attackerOwner = from.owner;
    const hasScaracyOnAttacker = getFamiliersOnHost(attacker).some(f => f.label === 'C163' && !isFamiliarEffectSuppressed(attacker, 'C163'));
    const isWarrior = hasTag(attacker, 'guerrier');

    if (hasScaracyOnAttacker && isWarrior) {
        const opp = (attackerOwner === 'top') ? 'bottom' : 'top';
        if (mithril[opp] > 0) {
            mithril[opp]--;
            // On stocke le Mithril sur la carte attaquante
            if (typeof attacker.capturedMithril !== 'number') attacker.capturedMithril = 0;
            attacker.capturedMithril++;
            pushHistory('familier', `${cardAnchor('C163')} capture 1 Mithril adverse sur ${cardAnchor(attacker.label)} !`);
            updateMithril();
        } else {
            pushHistory('info', `${cardAnchor('C163')} tente de capturer du Mithril, mais l'adversaire n'en a pas.`);
        }
    }
    // ===================================================================
    // FIN DE LA LOGIQUE POUR SCARACY
    // ===================================================================

    // ===================================================================
    // KONY (C26) : juste avant la résolution du combat, place une Mine
    // E.M.I dans la zone d'artefact de son propriétaire.
    // ===================================================================
    if (from.card.label === 'C26') {
      const konyOwner = from.owner;
      const konyArtArray = (konyOwner === 'top') ? topArts : botArts;
      if (konyArtArray.length < MAX_ARTIFACTS_PER_ZONE) {
        const mine = createCard('C27', konyOwner === 'top' ? 'T' : 'B');
        konyArtArray.push(mine);
        pushHistory('artefact', `${cardAnchor('C26')} place une ${cardAnchor('C27')} dans la zone d'artefact.`);
      } else {
        pushHistory('info', `${cardAnchor('C26')} tente de placer une ${cardAnchor('C27')}, mais la zone d'artefact est pleine.`);
      }
    }
    // ===================================================================
    // FIN DE LA LOGIQUE POUR KONY
    // ===================================================================

    // ===================================================================
    // OZOKSHI (C34) : au combat, permet de jouer un artefact de la main,
    // gratuitement et sans restriction de faction. TANT QUE ce choix n'est
    // pas résolu, le combat lui-même NE SE RÉSOUT PAS (voir continueResolveFight,
    // appelée uniquement une fois le choix du joueur fait — ou immédiatement
    // s'il n'y a aucun artefact éligible).
    // ===================================================================
    if (from.card.label === 'C34') {
      const ozokshiOwner = from.owner;
      const ozokshiHand = getHandByOwner(ozokshiOwner);
      const eligibleArtifacts = ozokshiHand.filter(c => getType(c.label) === 'artefact');
      if (eligibleArtifacts.length > 0) {
        openOzokshiArtifactPrompt(ozokshiOwner, eligibleArtifacts, () => continueResolveFight(from, to));
        return;
      }
    }
    // ===================================================================
    // FIN DE LA LOGIQUE POUR OZOKSHI
    // ===================================================================

    // ===================================================================
    // CÉNEWZ (C36) : au combat, dévoile la carte du dessus du deck
    // adverse, choisit de la défausser ou de la remettre sur le deck. MÊME
    // PRINCIPE : le combat attend la résolution de ce choix avant de
    // continuer.
    // ===================================================================
    if (from.card.label === 'C36') {
      const cenewzOwner = from.owner;
      const cenewzOpp = (cenewzOwner === 'top') ? 'bottom' : 'top';
      const oppDeck = (cenewzOpp === 'top') ? topDeck : botDeck;
      if (oppDeck.length > 0) {
        openCenewzRevealPrompt(cenewzOwner, cenewzOpp, oppDeck[0], () => continueResolveFight(from, to));
        return;
      } else {
        pushHistory('info', `${cardAnchor('C36')} : le deck adverse est vide, rien à dévoiler.`);
      }
    }
    // ===================================================================
    // FIN DE LA LOGIQUE POUR CÉNEWZ
    // ===================================================================

  continueResolveFight(from, to);
}

// Suite RÉELLE de la résolution du combat (dégâts, morts, animation...) —
// extraite de resolveFight pour pouvoir être retardée jusqu'à la résolution
// complète d'un éventuel effet COMBAT nécessitant un choix du joueur
// (Ozokshi, Cénewz...), au lieu de s'exécuter en parallèle d'un prompt
// encore ouvert.
function continueResolveFight(from, to){
  if (from.card.label === 'C116') {
    const owner = from.owner;
    const line = getLineByOwner(owner);
    const alliedWarriors = line.filter(c => c.id !== from.card.id && hasTag(c, 'guerrier'));

    if (alliedWarriors.length > 0) {
      alliedWarriors.forEach(ally => {
        if (typeof ally.hp === 'number' && ally.label !== 'C62') {
          ally.hp += 2;
          playHPHitEffect(ally);
        }
      });
      const allyNames = alliedWarriors.map(a => cardAnchor(a.label)).join(', ');
      pushHistory('info', `Effet de ${cardAnchor('C116')} : ${allyNames} gagne(nt) +2 PV.`);
    }
  }

  if(from.card.label === 'C2'){
    const copy = createCard('C2', from.owner==='top'?'T':'B');
    if(from.owner==='top') topHand.push(copy); else botHand.push(copy);
    const fromEl = document.querySelector(`.lane .card.placed[data-id="${from.card.id}"]`);
    const handEl = document.getElementById(from.owner==='top' ? 'handTop' : 'handBottom');
    if(fromEl && handEl) animateC2Ghost(fromEl, handEl, 'C2');
  }
  if (from.card.label === 'C3') { addMithril(from.owner); }

  const atkA = getATK(from.card);
  const isTargetFrozen = isFrozen(to.card);
  const atkB = isTargetFrozen ? 0 : getATK(to.card);

  // WADOO 5e lot : Rking (C232) — ne perd jamais de PV en combat (ni en
  // attaquant, ni en ripostant). On neutralise les dégâts REÇUS uniquement —
  // ses propres dégâts infligés restent normaux.
  const dmgToDefender = (to.card.label === 'C232') ? 0 : atkA;
  const dmgToAttacker = (from.card.label === 'C232') ? 0 : atkB;

  // Snapshot "avant" pour l'animation Versus (avant toute mutation de PV/bouclier)
  const cvBefore = {
    attackerLabel: from.card.label,
    defenderLabel: to.card.label,
    attacker: { hp: getEffectiveHP(from.card), shield: from.card.shield || 0 },
    defender: { hp: getEffectiveHP(to.card), shield: to.card.shield || 0 },
    isTargetFrozen,
  };

  const resTo   = applyDamageWithShield(to.card,   dmgToDefender);
  const resFrom = applyDamageWithShield(from.card, dmgToAttacker);

  if(resTo.hpLost > 0) {
    onHPDamaged(to.owner, to.card, resTo.hpLost, 'combat');
    if (hasTag(from.card, 'poison')) {
      to.card.hp = 0;
      pushHistory('pv', `${cardAnchor(to.card.label)} est anéanti par le <strong>POISON</strong> !`);
    }
    // WADOO 5e lot : Glaraneith (C229) — gèle toute cible à qui elle inflige des dégâts.
    if (from.card.label === 'C229') {
      applyFreezeToCard(to.card);
    }
  }
  if(resFrom.hpLost > 0) {
    onHPDamaged(from.owner, from.card, resFrom.hpLost, 'riposte');
    if (hasTag(to.card, 'poison')) {
      from.card.hp = 0;
      pushHistory('pv', `${cardAnchor(from.card.label)} est anéanti par le <strong>POISON</strong> !`);
    }
    // WADOO 5e lot : Glaraneith (C229) — gèle aussi en ripostant.
    if (to.card.label === 'C229') {
      applyFreezeToCard(from.card);
    }
  }

  // Snapshot "après" pour l'animation Versus, capturé AVANT removeIfDead/discardCard
  // (qui réinitialisent les PV de base d'une carte détruite en l'envoyant en défausse).
  const cvAfter = {
    attackerHp: getEffectiveHP(from.card),
    attackerShieldLeft: from.card.shield || 0,
    attackerDied: getEffectiveHP(from.card) <= 0,
    defenderHp: getEffectiveHP(to.card),
    defenderShieldLeft: to.card.shield || 0,
    defenderDied: getEffectiveHP(to.card) <= 0,
    poisonFromAttacker: hasTag(from.card, 'poison') && getEffectiveHP(to.card) <= 0,
    dmgToDefender: resTo.hpLost || 0,
    dmgToAttacker: resFrom.hpLost || 0,
    absorbedByDefender: resTo.absorbed || 0,
    absorbedByAttacker: resFrom.absorbed || 0,
    // WADOO 5e lot : Glaraneith (C229) — gel infligé PENDANT ce combat même
    // (à ne pas confondre avec isTargetFrozen, qui décrit un gel déjà présent
    // AVANT le combat et qui a empêché la riposte).
    newlyFrozenDefender: from.card.label === 'C229' && resTo.hpLost > 0 && getEffectiveHP(to.card) > 0,
    newlyFrozenAttacker: to.card.label === 'C229' && resFrom.hpLost > 0 && getEffectiveHP(from.card) > 0,
  };

  const riposteMessage = isTargetFrozen
    ? `Aucune riposte car ${cardAnchor(to.card.label)} est GELÉ.`
    : (resFrom.hpLost > 0 || resFrom.absorbed > 0 ? `Riposte: absorbé ${resFrom.absorbed}, -${resFrom.hpLost} PV.` : '');

  pushHistory('pv',
    `${cardAnchor(from.card.label)} attaque ${cardAnchor(to.card.label)} `+
    `(absorbé ${resTo.absorbed}, -${resTo.hpLost} PV). `+
    riposteMessage
  );

  function removeIfDead(card, owner, killer, hpBefore){
    if(getEffectiveHP(card) > 0) return;

    // ===================================================================
    // DÉBUT DE LA LOGIQUE CORRIGÉE ET FINALE POUR GLUANGEL (C169)
    // ===================================================================
    const familiars = getFamiliersOnHost(card);
    const hasGluangel = familiars.some(f => f.label === 'C169' && !isFamiliarEffectSuppressed(card, 'C169'));

    if (hasGluangel) {
      // 1. On détache tous les familiars (ils iront à la défausse)
      detachFamiliarsOnHost(card, owner);
      
      // 2. On réinitialise la carte sauvée à ses statistiques de base
      card.hp = getBaseHP(card.label);
      card.shield = getBaseShield(card.label);
      // Nettoyage complet des effets temporaires
      delete card.tempHP;
      delete card.tempShield;
      card.addedTags = [];
      card.removedTags = [];
      card.isFrozenByEffect = false;
      card.canMineFreely = false;
      card.permanentShieldBonus = 0;

      // 3. On renvoie la carte sauvée dans la main de son propriétaire
      const hand = getHandByOwner(owner);
      hand.push(card);
      pushHistory('familier', `Grâce à ${cardAnchor('C169')}, ${cardAnchor(card.label)} est sauvé et retourne dans la main de son propriétaire !`);
      
      // 4. On retire la carte de la ligne de combat SANS la défausser
      const line = (owner==='top')? topLine : botLine;
      const idx = line.findIndex(c=>c.id===card.id);
      if(idx !== -1) line.splice(idx,1);

      return; // On arrête la fonction ici pour empêcher la défausse
    }
    // ===================================================================
    // FIN DE LA LOGIQUE GLUANGEL
    // ===================================================================
    
    // Si la carte n'a pas Gluangel, la logique de mort normale s'exécute
    const line = (owner==='top')? topLine : botLine;
    const idx = line.findIndex(c=>c.id===card.id);
    if(idx !== -1) line.splice(idx,1);
    detachFamiliarsOnHost(card, owner);

    const context = { hpBefore: hpBefore };

    if (killer && killer.label === 'C52') {
      // La carte doit tout de même déclencher son propre effet de MORT (Myzor,
      // Dégourat, Bukaku, Boomba, Dolly, Pestrass...) avant de finir en Exil —
      // seule sa destination finale change (Exil au lieu de la défausse),
      // pas le fait qu'elle meure. On passe donc bien par discardCard.
      discardCard(card, owner, 'death', Object.assign({}, context, { toExile: true, exileReason: 'C52' }));
    } else {
      discardCard(card, owner, 'death', context);
    }
  }

  removeIfDead(to.card,   to.owner,   from.card, resTo.hpBefore);
  removeIfDead(from.card, from.owner, to.card,   resFrom.hpBefore);

  markAttacked(from.owner, from.card);

  // Animation Versus plein écran, jouée localement ET diffusée à l'adversaire
  // en ligne (même mécanisme que les dés de Hasarder).
  const cvPayload = Object.assign({}, cvBefore, cvAfter);
  if (ONLINE_MODE && window.__socket && window.__socket.connected) {
    window.__socket.emit('vfx', { matchId: ONLINE_MATCH_ID, seat: from.owner, payload: Object.assign({ type: 'combatVersus' }, cvPayload) });
  }
  showCombatVersus(cvPayload, () => fullRender());
  fullRender();
}

/* -------- Provocateur (C14) -------- */
function isTargetBlockedByTaunt(defenderCard, defenderOwner){
  const line = getLineByOwner(defenderOwner);
  const idx = line.findIndex(c=>c.id===defenderCard.id);
  if(idx===-1) return false;

  const left  = line[idx-1];
  const right = line[idx+1];

  const leftTaunt  = left  && hasTag(left, 'provocateur');
  const rightTaunt = right && hasTag(right, 'provocateur');

  return !hasTag(defenderCard, 'provocateur') && (leftTaunt || rightTaunt);
}

/* --- Vérification avant combat (C14 & C15) --- */
function maybeResolveAttack(from, to){
  // Les vérifications visuelles (provocation, esprit) restent côté client pour un retour rapide
  if (isTargetBlockedByTaunt(to.card, to.owner)){
    const el = document.querySelector(`.lane .card.placed[data-id="${to.card.id}"]`);
    if(el){ el.classList.add('deny'); setTimeout(()=>el.classList.remove('deny'),260); }
    pushHistory('info', `Cible refusée : un combattant avec <strong>Provocation</strong> protège cette carte.`);
    return;
  }

  const isAttackerEsprit = hasTag(from.card, 'Esprit');
  const isDefenderEsprit = hasTag(to.card, 'Esprit');

  if (isAttackerEsprit !== isDefenderEsprit) {
    const el = document.querySelector(`.lane .card.placed[data-id="${to.card.id}"]`);
    if(el){ el.classList.add('deny'); setTimeout(()=>el.classList.remove('deny'),260); }
    pushHistory('info', `Cible refusée : les personnages "Esprit" ne peuvent interagir qu'entre eux.`);
    return;
  }
  
  // MODE HORS-LIGNE : on résout le combat localement. La synchronisation avec
  // l'adversaire se fait ensuite automatiquement via fullRender() (voir bloc réseau).
  if(to.card.label === 'C15'){
    const attackerOwner = from.owner;
    const hand = attackerOwner==='top' ? topHand : botHand;
    if(hand.length===0){
      alert("Impossible d’attaquer Zancredy : vous n’avez aucune carte en main à défausser.");
      return;
    }
    openDiscardForAttackPrompt(attackerOwner, ()=>{
      resolveFight(from, to);
    }, ()=>{});
    return;
  }

  if (to.card.label === 'C113') {
    const attackerHP = getEffectiveHP(from.card);
       if (attackerHP < 5) {
         const el = document.querySelector(`.lane .card.placed[data-id="${to.card.id}"]`);
         if(el){ el.classList.add('deny'); setTimeout(()=>el.classList.remove('deny'), 260); }
         pushHistory('info', `Cible refusée : ${cardAnchor('C113')} ne peut être attaqué que par des combattants avec 5 PV ou plus.`);
         return;
       }
     }
      resolveFight(from, to);
}

/* --- Prompt : défausser 1 carte pour attaquer C15 --- */
function openDiscardForAttackPrompt(attackerOwner, onOk, onCancel){
  const hand = attackerOwner==='top' ? topHand : botHand;
  const title = 'Zancredy';
  const msg   = "Pour attaquer <strong>Zancredy</strong>, défaussez <strong>1 carte</strong> de votre main.";
  const buttons = [];
  hand.forEach((c, idx)=>{
    const label = `${cardName(c.label)}`;
    buttons.push({
      label, className:'', onClick:()=>{
        const chosen = hand.splice(idx,1)[0];
        discardCard(chosen, attackerOwner, 'manual');
        pushHistory('info', `${playerLabel(attackerOwner)} défausse ${cardAnchor(chosen.label)} pour pouvoir attaquer ${cardAnchor('C15')}.`);
        if(typeof onOk==='function') onOk();
      }
    });
  });
  buttons.push({ label:'Annuler', className:'cancel', onClick:()=>{ if(onCancel) onCancel(); } });
  openButtonsPrompt(title, msg, document.body, buttons);
}

/* ---------- Helpers drag source ---------- */
function findCardInSource(fromId, cardId){
  let arr=null;
  if(fromId==='handBottom') arr=botHand;
  else if(fromId==='handTop') arr=topHand;
  else if(fromId==='lineBottom') arr=botLine;
  else if(fromId==='lineTop') arr=topLine;
  if(!arr) return null;
  const idx = arr.findIndex(c=>c.id===cardId);
  if(idx===-1) return null;
  return {arr, idx, card:arr[idx]};
}

/* ---------- Rendu main ---------- */
function renderHand(container, hand, opts = { faceDown: false, draggable: true }) {
    container.innerHTML = '';
    if (hand.length === 0) {
      if (typeof window.__updateMyHandScrollArrows === 'function') window.__updateMyHandScrollArrows();
      return;
    }

    // Dans la box de la main locale : rangée propre, sans éventail ni rotation,
    // avec défilement horizontal si ça déborde (voir CSS .handRow / boutons
    // flèches créés une fois pour toutes dans setupHandGrips).
    const isPanelHand = container.classList.contains('in-panel');
    let rowEl = container;
    if (isPanelHand) {
      rowEl = document.createElement('div');
      rowEl.className = 'handRow';
      container.appendChild(rowEl);
    }

    const spreadFactor = window.innerWidth < 820 ? 0.55 : (window.innerWidth < 1300 ? 0.75 : 1);
    const spread = 26 * spreadFactor, curve = 42, mid = (hand.length - 1) / 2;
    const owner = (container.id === 'handTop') ? 'top' : 'bottom';

    hand.forEach((card, i) => {
        const el = document.createElement('div');
        el.className = isPanelHand ? 'card in-line' : 'card';

        // ===================================================================
        // DÉBUT DE LA LOGIQUE VISUELLE (FINALE) POUR ENTRAVER (C172)
        // ===================================================================
        if (actionBlocked[owner] && getType(card.label) === 'action') {
            el.classList.add('action-blocked');
            el.style.cursor = 'not-allowed';
            el.title = 'Les actions sont bloquées ce tour-ci par l\'effet d\'Entraver.';
            
            // ON CRÉE UN ÉLÉMENT SÉPARÉ POUR L'IMAGE DES LIANES
            const vinesEl = document.createElement('div');
            vinesEl.className = 'vines-overlay';
            el.appendChild(vinesEl); // On l'ajoute À L'INTÉRIEUR de la carte
        }
        // ===================================================================
        // FIN DE LA LOGIQUE VISUELLE POUR ENTRAVER
        // ===================================================================

        // Logique pour Buay (C160) : Ne jamais être face cachée
        const isFaceDown = opts.faceDown && card.label !== 'C160';

        // KRYLLS (nouveau lot) : Ozokshi (C34) — pendant son effet COMBAT, les
        // artefacts éligibles dans la main du joueur concerné sont illuminés
        // en doré pulsant, et cliquables directement pour faire le choix.
        if (ozokshiArtifactMode && ozokshiArtifactMode.owner === owner && getType(card.label) === 'artefact' && !isFaceDown) {
          el.classList.add('ozokshiEligibleHint');
        }

        if (isFaceDown) {
            el.classList.add('back');
        } else {
            applyCardFace(el, card);
            attachHP(el, card);
        }

        if (isPanelHand) {
          // Rangée propre : pas de courbe, pas de rotation. Une estimation de
          // départ resserre déjà un peu plus les cartes si la main est grande ;
          // l'ajustement FIN et garanti se fait juste après, une fois le rendu
          // réellement mesurable (voir plus bas, après la boucle).
          const overlap = hand.length > 8 ? 34 : (hand.length > 6 ? 22 : (hand.length > 4 ? 10 : 0));
          if (i > 0 && overlap > 0) el.style.marginLeft = `-${overlap}px`;
        } else {
          // Style de positionnement en éventail (main adverse uniquement désormais)
          const x = (i - mid) * spread;
          const a = (i - mid) * (curve / hand.length);
          const y = Math.abs(i - mid) * 7;
          el.style.left = `calc(50% + ${x}px)`;
          el.style.bottom = `${y}px`;
          // La rotation passe par une variable CSS (au lieu d'un transform en ligne)
          // pour que le survol (:hover) en CSS puisse proprement la remplacer.
          el.style.setProperty('--fanRotate', `${a}deg`);
        }

        // Logique de Drag & Drop
        if (opts.draggable) {
            el.draggable = true;
            el.dataset.id = card.id;
            el.addEventListener('dragstart', (e) => {
                if (isAnyTargetSelectionActive()) { e.preventDefault(); denyBecauseSelectionPending(el); return; }
                e.dataTransfer.setData('cardId', card.id);
                e.dataTransfer.setData('from', container.id);
                currentDragInfo = { id: card.id, fromId: container.id, owner, label: card.label, card: card };
                highlightEligibleZones(card, owner);
            });
            el.addEventListener('dragend', () => { currentDragInfo = null; clearEligibleZones(); });
        } else {
            el.draggable = false;
            el.style.cursor = 'default';
        }

        // Ajout des écouteurs d'événements seulement si la carte est visible
        if (!isFaceDown) {
            el.addEventListener('mouseenter', () => showZoom(card.label, card));
            el.addEventListener('mouseleave', hideZoom);

            // Écouteurs pour les cartes "Action" — chacune passe désormais par
            // attemptParactionCounter (WADOO : Paraction, C227), qui vérifie si
            // l'adversaire peut/veut la contrer avant de laisser son effet se résoudre.
            if (card.label === 'C118') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC118Prompt(owner, card, el)); }); }
            if (card.label === 'C104') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => playActionLongVoyage(owner, card, el)); }); }
            if (card.label === 'C21') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC21Prompt(owner, card, el)); }); }
            if (card.label === 'C63') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC63Prompt(owner, card, el)); }); }
            if (card.label === 'C51') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC51Prompt(owner, card, el)); }); }
            if (card.label === 'C19') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC19Prompt(owner, card, el)); }); }
            if (card.label === 'C5') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC5Prompt(owner, card, el)); }); }
            if (card.label === 'C18') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC18Prompt(owner, card, el)); }); }
            if (card.label === 'C16') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC16Prompt(owner, card)); }); }
            if (card.label === 'C30') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC30Prompt(owner, card, el)); }); }
            if (card.label === 'C33') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC33Prompt(owner, card, el)); }); }
            if (card.label === 'C153') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => playActionLiens(owner, card, el)); }); }
            if (card.label === 'C161') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => playActionHitAndRun(owner, card, el)); }); }
            if (card.label === 'C162') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => playActionPeinturlurer(owner, card, el)); }); }
            if (card.label === 'C168') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => playActionExploration(owner, card)); }); }
            if (card.label === 'C171') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => playActionHasarder(owner, card, el)); }); }
            if (card.label === 'C172') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => playActionEntraver(owner, card, el)); }); }
            if (card.label === 'C204') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC204Prompt(owner, card, el)); }); }
            if (card.label === 'C210') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC210Prompt(owner, card, el)); }); }
            if (card.label === 'C219') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => openC219Prompt(owner, card, el)); }); }
            if (card.label === 'C228') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => playActionSororite(owner, card, el)); }); }
            if (card.label === 'C233') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => playActionTributPoupesque(owner, card)); }); }
            if (card.label === 'C234') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => playActionWagneto(owner, card, el)); }); }
            if (card.label === 'C236') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => playActionFusionnerLesTous(owner, card)); }); }
            if (card.label === 'C23') { el.addEventListener('click', () => { if (currentTurn !== owner) return; attemptParactionCounter(owner, card, () => playActionReveillezVous(owner, card)); }); }

            // KRYLLS (nouveau lot) : Ozokshi (C34) — clic direct sur un
            // artefact illuminé en main pour le jouer gratuitement.
            if (ozokshiArtifactMode && ozokshiArtifactMode.owner === owner && getType(card.label) === 'artefact') {
              el.addEventListener('click', () => handleOzokshiHandCardClick(card, owner));
            }
        }

        rowEl.appendChild(el);
    });

    if (isPanelHand) {
      // Ajustement FIN et garanti : une fois le rendu réellement mesurable, on
      // resserre encore un peu plus les cartes (par petits pas) jusqu'à ce que
      // tout rentre sans avoir besoin de défiler — et seulement si, malgré ce
      // resserrement progressif, il reste vraiment trop de cartes, le
      // défilement (déjà en place) prend le relais comme filet de sécurité.
      requestAnimationFrame(() => {
        const cards = Array.from(rowEl.querySelectorAll('.card.in-line'));
        if (cards.length > 1) {
          let overlapPx = 0;
          const firstMargin = parseFloat(cards[1].style.marginLeft || '0');
          if (!Number.isNaN(firstMargin) && firstMargin < 0) overlapPx = -firstMargin;
          let attempts = 0;
          while (rowEl.scrollWidth > rowEl.clientWidth + 2 && overlapPx < 60 && attempts < 20) {
            overlapPx += 4;
            cards.forEach((c, idx) => { if (idx > 0) c.style.marginLeft = `-${overlapPx}px`; });
            attempts++;
          }
        }
        if (typeof window.__updateMyHandScrollArrows === 'function') window.__updateMyHandScrollArrows();
      });
    }
}

/* ---------- Action C5 ---------- */
function playActionC5(owner, actionCard){
  if(!canPlayThisCardNow(owner, actionCard)) return;
  consumeAllowanceIfNeeded(owner, actionCard);

  const sources = [];
  if(topDiscard.length) sources.push('top');
  if(botDiscard.length) sources.push('bottom');
  if(sources.length===0){
    alert("Aucune carte dans les défausses. Action Vortex annulée.");
    return;
  }

  const hand = (owner==='top') ? topHand : botHand;
  const idx = hand.findIndex(c=>c.id===actionCard.id);
  if(idx!==-1) hand.splice(idx,1);

  addMithril(owner);
  pushHistory('action', `${cardAnchor('C5')} : +1 Mithril, recycle une carte de défausse dans le deck du joueur.`);

  const sourcePlayer = sources[Math.floor(Math.random()*sources.length)];
  const sourcePile = (sourcePlayer==='top') ? topDiscard : botDiscard;
  const pickedIndex = Math.floor(Math.random()*sourcePile.length);
  const pickedCard = sourcePile.splice(pickedIndex,1)[0];

  const deck = (owner==='top') ? topDeck : botDeck;
  const pos = Math.floor(Math.random()*(deck.length+1));
  deck.splice(pos,0,pickedCard);

  const fromEl = (sourcePlayer==='top') ? document.getElementById('dumpTop') : document.getElementById('dumpBottom');
  const toEl   = (owner==='top') ? document.getElementById('deckTop') : document.getElementById('deckBottom');
  animateVortexTransfer(fromEl, toEl, pickedCard.label);

  discardCard({ ...actionCard }, owner, 'action');

  updateDeckCounters();
  updateDiscardUI();
  fullRender();
}

function playActionLongVoyage(owner, actionCard, anchorEl) {
  if (!canPlayThisCardNow(owner, actionCard)) return;

  const hand = getHandByOwner(owner);
  const deck = getDeckByOwner(owner);

  let drawnCards = [];
  if (deck.length >= 2) {
    drawnCards.push(deck.pop(), deck.pop());
  } else {
    const initialDeckSize = deck.length;
    for (let i = 0; i < initialDeckSize; i++) {
      drawnCards.push(deck.pop());
    }
    const reshuffled = reshuffleDiscardIntoDeck(owner);
    if (reshuffled) {
      while(drawnCards.length < 2 && deck.length > 0) {
        drawnCards.push(deck.pop());
      }
    }
  }

  if (drawnCards.length === 0) {
    pushHistory('info', `${cardAnchor('C104')} ne trouve aucune carte à piocher.`);
    return;
  }

  const idx = hand.findIndex(c => c.id === actionCard.id);
  if (idx !== -1) hand.splice(idx, 1);
  discardCard(actionCard, owner, 'action');
  pushHistory('action', `${cardAnchor('C104')} est jouée.`);

  const [cardA, cardB] = drawnCards;

  const buttons = [];
  buttons.push({
    label: `Jouer ${cardName(cardA.label)}`,
    className: 'confirm',
    onClick: () => handleLongVoyageChoice(owner, cardA, cardB ? [cardB] : []),
    stayOpen: true
  });

  if (cardB) {
    buttons.push({
      label: `Jouer ${cardName(cardB.label)}`,
      className: 'confirm',
      onClick: () => handleLongVoyageChoice(owner, cardB, [cardA]),
      stayOpen: true
    });
  }

  buttons.push({
    label: 'Garder tou' + (drawnCards.length > 1 ? 'tes les deux' : 'te'),
    className: '',
    onClick: () => handleLongVoyageChoice(owner, null, drawnCards),
    stayOpen: true
  });

  let cardHTML = `<div class="longvoyage-choices">`;
  drawnCards.forEach(c => {
    const url = getCardImage(c.label);
    cardHTML += `<div class="card lv-card" data-label="${c.label}" style="background-image: url(${url});"></div>`;
  });
  cardHTML += `</div><div>Choisissez une option.</div>`;

  openButtonsPrompt('Long Voyage', cardHTML, null, buttons, { nonCancellable: true });

  if (actionPromptEl) {
    actionPromptEl.classList.add('longvoyage-prompt');
    const choiceCards = actionPromptEl.querySelectorAll('.lv-card');
    choiceCards.forEach(cardEl => {
      cardEl.addEventListener('mouseenter', () => showZoom(cardEl.dataset.label));
      cardEl.addEventListener('mouseleave', hideZoom);
    });
  }
}

function handleLongVoyageChoice(owner, cardToPlay, otherCards) {
  const hand = getHandByOwner(owner);

  otherCards.forEach(card => {
    hand.push(card);
    pushHistory('info', `${cardAnchor(card.label)} est ajouté à votre main.`);
  });

  closeActionPrompt();

  if (!cardToPlay) { fullRender(); return; }

  const type = getType(cardToPlay.label);

  // Personnage : entre DIRECTEMENT dans la zone de combat (déclenche son effet JOUER).
  if (type === 'personnage') {
    const line = getLineByOwner(owner);
    resetStatsToBaseWhenEnteringBattle(cardToPlay);
    // Épuisé comme n'importe quel Personnage fraîchement joué, sauf s'il a le
    // trait RAPIDE (ou les rares exceptions C6/C59, déjà en place ailleurs).
    if (!hasTag(cardToPlay, 'rapide') && cardToPlay.label !== 'C6' && cardToPlay.label !== 'C59') {
      markAttacked(owner, cardToPlay);
    }
    askLeftRightPlacement('Long Voyage', `Où placer ${cardAnchor(cardToPlay.label)} dans votre zone de combat ?`, (side) => {
      if (side === 'left') line.unshift(cardToPlay); else line.push(cardToPlay);
      onCharacterEnterBattlefield(cardToPlay, owner);
      pushHistory('jeu', `${cardAnchor('C104')} : ${cardAnchor(cardToPlay.label)} entre directement dans votre zone de combat !`);
      broadcastAndPlaySfx('posecarte');
      fullRender();
    });
    return;
  }

  // Artefact : entre DIRECTEMENT dans la zone d'artefact (si de la place).
  if (type === 'artefact') {
    const artArray = (owner === 'top') ? topArts : botArts;
    if (artArray.length >= MAX_ARTIFACTS_PER_ZONE) {
      hand.push(cardToPlay);
      pushHistory('info', `${cardAnchor('C104')} : zone d'artefact pleine — ${cardAnchor(cardToPlay.label)} rejoint votre main à la place.`);
      fullRender();
      return;
    }
    artArray.push(cardToPlay);
    pushHistory('jeu', `${cardAnchor('C104')} : ${cardAnchor(cardToPlay.label)} entre directement dans votre zone d'artefact !`);
    broadcastAndPlaySfx('posecarte');
    fullRender();
    return;
  }

  // Familier : on doit choisir SUR QUEL combattant l'attacher — ciblage par clic.
  if (type === 'familier') {
    hand.push(cardToPlay);
    fullRender();
    openLongVoyageFamiliarHostPrompt(owner, cardToPlay);
    return;
  }

  // Action : effet immédiat — on réutilise le VRAI dispatch de clic déjà en
  // place pour chaque Action (plutôt que de reproduire à la main la logique
  // bespoke de chacune des ~250 cartes), en simulant un clic sur la carte
  // fraîchement rendue en main, rendue jouable gratuitement ce tour-ci.
  if (type === 'action') {
    hand.push(cardToPlay);
    pendingFreePlay = { owner: owner, cardId: cardToPlay.id };
    fullRender();
    setTimeout(()=>{
      const handSel = (owner === 'top') ? '#handTop' : '#handBottom';
      const el = document.querySelector(`${handSel} [data-id="${cardToPlay.id}"]`);
      if (el) el.click();
    }, 60);
    return;
  }

  // Repli générique pour tout type imprévu : comportement précédent (retour
  // en main, jouable gratuitement).
  hand.push(cardToPlay);
  pendingFreePlay = { owner: owner, cardId: cardToPlay.id };
  pushHistory('info', `Vous pouvez maintenant jouer ${cardAnchor(cardToPlay.label)} gratuitement ce tour-ci.`);
  fullRender();
}

function handleLongVoyageFamiliarSelection(hostCard, hostOwner){

/* ---------- Cartes posées (combat) ---------- */
function ensureFallbackName(el, label){
  let cap = el.querySelector('.faceName');
  if(!cap){
    cap = document.createElement('div');
    cap.className = 'faceName';
    el.appendChild(cap);
  }
  cap.textContent = cardName(label);
}
function clearFallbackName(el){
  const cap = el.querySelector('.faceName');
  if(cap) cap.remove();
}
function applyCardFace(el, card){
  const lbl = (card && card.label) ? card.label : null;

  if (lbl && lbl.startsWith('C')) {
    el.dataset.faction = factionFromCode(labelToCode(lbl));
  }
  if (lbl) {
    el.dataset.ctype = getType(lbl);
  }

  const afterFace = () => {
    attachHP(el, card);
    if ((lbl === 'C7' || lbl === 'C58' || lbl === 'C112' || lbl === 'C216' || lbl === 'C227' || lbl === 'C212') && el.classList.contains('placed')) {
      if (typeof card.charges !== 'number') card.charges = 0;
      attachCharges(el, card);
    }
 if (lbl === 'C154') {
      attachGoals(el, card);
    }
    if (lbl === 'C8') {
      renderRescelleurUnderStack(el, card);
    }
    // Affiche le Mithril capturé pour N'IMPORTE QUELLE carte (Malocux ou via Scaracy)
attachCapturedMithril(el, card);
    // Badge visuel pour le mot-clé Provocateur (qu'il soit imprimé sur la carte
    // ou accordé dynamiquement en cours de partie, ex. Golgoth, C115...)
    attachProvocateurBadge(el, card);
    // WADOO 6e lot : badge Poupée pour tout combattant portant Scapoo (C235).
    attachPoupeeBadge(el, card);
    // KRYLLS (nouveau lot) : badge Esprit visible sur toute carte portant ce trait.
    attachEspritBadge(el, card);
  };

  clearFallbackName(el);

  if (!lbl) {
    ensureFallbackName(el, 'C?');
    afterFace();
    return;
  }

  const url = getCardImage(lbl);
  if (!url) {
    ensureFallbackName(el, lbl);
    afterFace();
    return;
  }

  loadImage(url)
    .then(() => {
      el.style.backgroundImage = `url(${url})`;
      clearFallbackName(el);
      afterFace();
    })
    .catch(() => {
      el.style.backgroundImage = '';
      ensureFallbackName(el, lbl);
      afterFace();
    });
}

// NOUVEAU : Logique pour dégeler une carte
// REMPLACEZ L'ANCIENNE FONCTION PAR CELLE-CI
function unfreezeCard(owner, hostCard) {
    const hand = getHandByOwner(owner);
    
    // MODIFIÉ : On filtre la main pour ne garder que les cartes défaussables.
    const discardableHand = hand.filter(c => !isCardUndiscardable(c.label));

    const hasChosenFaction = !!activeFaction[owner];

    if (discardableHand.length === 0 || !hasChosenFaction) {
        let reason = !hasChosenFaction ? 'vous devez choisir une faction.' : 'vous n\'avez pas de carte défaussable en main.';
        pushHistory('info', `Impossible de dégeler : ${reason}`);
        return;
    }

    // On choisit une carte au hasard PARMI les cartes défaussables.
    const randomIndex = Math.floor(Math.random() * discardableHand.length);
    const cardToDiscard = discardableHand[randomIndex];
    
    // On la retire de la main principale
    const originalHandIndex = hand.findIndex(c => c.id === cardToDiscard.id);
    if (originalHandIndex !== -1) {
        const discardedForCost = hand.splice(originalHandIndex, 1)[0];
        discardCard(discardedForCost, owner, 'cost');
        pushHistory('défausse', `${cardAnchor(discardedForCost.label)} est défaussée pour payer le coût du dégel.`);
    }

    if (hostCard.isFrozenByEffect) {
        hostCard.isFrozenByEffect = false;
        pushHistory('info', `${cardAnchor(hostCard.label)} est dégelé !`);
    } else {
        const baroFamiliar = getFamiliersOnHost(hostCard).find(f => f.label === 'C106');
        if (baroFamiliar) {
            const famOwner = baroFamiliar.playOwner || owner;
            const famArray = getFamArrayByOwner(famOwner);
            const famIndex = famArray.findIndex(f => f.id === baroFamiliar.id);
            if (famIndex !== -1) {
                const removedFamiliar = famArray.splice(famIndex, 1)[0];
                discardCard(removedFamiliar, famOwner, 'effect');
                pushHistory('info', `${cardAnchor(hostCard.label)} est dégelé ! ${cardAnchor(removedFamiliar.label)} est défaussé.`);
            }
        }
    }
    fullRender();
}

// NOUVEAU : Fenêtre pour l'action de dégel
function openUnfreezePrompt(owner, card, el) {
    const hand = getHandByOwner(owner);
    const canPay = hand.length > 0;
    const hasChosenFaction = !!activeFaction[owner];

    let msg = `Ce combattant est GELÉ.`;
    let reason = "";

    if (!hasChosenFaction) {
        reason = `<br><strong style="color:var(--orange);">Vous devez choisir une faction avant de pouvoir dégeler une unité.</strong>`;
    } else if (!canPay) {
        reason = `<br><strong style="color:var(--orange);">Vous n'avez pas de carte en main à défausser.</strong>`;
    } else {
        msg += `<br>Voulez-vous défausser une carte au hasard de votre main pour le dégeler ?`;
    }

    openButtonsPrompt(
        'Combattant Gelé',
        msg + reason,
        el,
        [
            {
              label: 'Dégeler (Défausser 1)',
              className: 'confirm' + (canPay && hasChosenFaction ? '' : ' disabled'),
              disabled: !canPay || !hasChosenFaction,
              onClick: () => unfreezeCard(owner, card)
            },
            { label: 'Annuler', className: 'cancel', onClick: () => {} }
        ]
    );
}

// REMPLACEZ L'ANCIENNE FONCTION PAR CELLE-CI
function makePlacedCard(card, owner){
  const el = document.createElement('div');
  el.className = 'card placed';
  el.draggable = false;
  el.dataset.id = card.id;
  el.dataset.owner = owner;

  el.classList.remove('is-frozen', 'is-esprit');

  if (isFrozen(card)) {
    el.classList.add('is-frozen');
  }

  if (hasTag(card, 'Esprit')) {
    el.classList.add('is-esprit');
  }

  applyCardFace(el, card);

  if(hasTag(card, 'provocateur')){
    el.classList.add('taunt');
    el.style.position = 'relative';
    // Le décalage doit toujours pousser la carte VERS L'ADVERSAIRE. Avec le
    // retournement d'écran (joueur assis en siège "top"), les deux rangées
    // sont visuellement inversées : il faut donc inverser le sens du décalage
    // pour que "vers l'adversaire" reste correct quel que soit le siège.
    const flipped = document.body.classList.contains('flip-view');
    const baseOffset = (owner==='top') ? 70 : -70;
    el.style.top = (flipped ? -baseOffset : baseOffset) + 'px';
  }

  if (hasAttacked(owner, card) || isFrozen(card)) {
    el.classList.add('exhausted');
  } else {
    el.classList.remove('exhausted');
  }

  // --- Logique de surbrillance pour les ciblages ---

if (peinturlurerMode && getType(card.label) === 'personnage') {
    el.classList.add('positiveTargetHint');
    el.style.cursor = 'pointer';
  }

if (chargeboxTargetMode && CHARGEABLE_CARDS.includes(card.label)) {
    el.classList.add('positiveTargetHint');
    el.style.cursor = 'pointer';
}

if (hitAndRunMode) {
    if (hitAndRunMode.stage === 'damage' && owner !== hitAndRunMode.owner) {
      el.classList.add('enemyTargetHint');
      el.style.cursor = 'pointer';
    }
    if (hitAndRunMode.stage === 'bounce' && owner === hitAndRunMode.owner) {
      el.classList.add('positiveTargetHint');
      el.style.cursor = 'pointer';
    }
  }

  if (dollyHealMode) {
    el.classList.add('positiveTargetHint');
    el.style.cursor = 'pointer';
  }
  if (freedaTargetMode && getType(card.label) === 'personnage') {
    el.classList.add('positiveTargetHint');
    el.style.cursor = 'pointer';
  }
  if (c51SelectMode && c51SelectMode.owner !== owner && getType(card.label) === 'personnage') {
    const isPicked = c51SelectMode.picked.includes(card.id);
    if (isPicked) { el.classList.add('selectedTargetHint'); } else { el.classList.add('positiveTargetHint'); }
    el.style.cursor = 'pointer';
  }
  if (c58HealingMode && getType(card.label) === 'personnage') {
      el.classList.add('positiveTargetHint');
      el.style.cursor = 'pointer';
  }
  if (c112TargetMode) {
      const isValidForRemove = c112TargetMode.mode === 'remove' && hasTag(card, 'Esprit');
      const isValidForAdd = c112TargetMode.mode === 'add' && !hasTag(card, 'Esprit');
      if (isValidForRemove || isValidForAdd) { el.classList.add('positiveTargetHint'); el.style.cursor = 'pointer'; }
  }
  if (c114TargetMode && getType(card.label) === 'personnage') {
    el.classList.add('enemyTargetHint');
    el.style.cursor = 'pointer';
  }
  if (wadooLinkMode && getType(card.label) === 'personnage' && owner !== wadooLinkMode.owner) {
    el.classList.add('enemyTargetHint');
    el.style.cursor = 'pointer';
  }
  if (prismisTargetMode && card.id !== prismisTargetMode.prismisId) {
    if (!hasTag(card, 'Chimeria')) {
        const isPicked = prismisTargetMode.targets.includes(card.id);
        if (isPicked) { el.classList.add('selectedTargetHint'); } else { el.classList.add('positiveTargetHint'); }
        el.style.cursor = 'pointer';
    }
  }

  // --- Écouteurs d'événements ---
  el.addEventListener('mouseenter',()=>showZoom(card.label, card));
  el.addEventListener('mouseleave',hideZoom);
  renderMiniFamiliersForHost(el, card);

  el.addEventListener('mouseenter', ()=>{
    if(aiming && aimFrom && aimFrom.owner!==owner && getType(card.label)==='personnage'){
      if (isTargetBlockedByTaunt(card, owner)) return;
      const isAttackerEsprit = hasTag(aimFrom.card, 'Esprit');
      const isDefenderEsprit = hasTag(card, 'Esprit');
      if (isAttackerEsprit !== isDefenderEsprit) return;
      setTargetHint(card, owner, el);
    }
  });
  el.addEventListener('mouseleave', ()=>{
    if(hoveredTarget && hoveredTarget.el===el) clearTargetHint();
  });

  el.addEventListener('click', () => {
    if (isFrozen(card) && currentTurn === owner && activeFaction[owner] && hasTag(card, activeFaction[owner])) {
      openUnfreezePrompt(owner, card, el);
      return;
    }
    // Logique de clic pour les différents ciblages
    if (prismisTargetMode) { handlePrismisTargetSelection(card); return; }
    if (kabbaTargetMode) { handleKabbaTargetSelection(card, owner); return; }
    if (krouzpierTargetMode) { handleKrouzpierTargetSelection(card, owner); return; }
    if (vakxzinTargetMode) { handleVakxzinTargetSelection(card, owner); return; }
    if (longVoyageFamiliarMode) { handleLongVoyageFamiliarSelection(card, owner); return; }
    if (c33CombatantMode) { handleC33CombatantSelection(card, owner); return; }
    if (tokzikTargetMode) { handleTokzikTargetSelection(card, owner); return; }
    if (arakcubeTargetMode) { handleArakcubeTargetSelection(card, owner); return; }
    if (kryoTargetMode) { handleKryoTargetSelection(card, owner); return; }
    if (zyzyHostTargetMode) { handleZyzyHostSelection(card, owner); return; }
    if (c112TargetMode) { handleC112TargetSelection(card, owner); return; }
    if (c114TargetMode) { handleC114TargetSelection(card, owner); return; }
    if (c231TargetMode) { handleC231TargetSelection(card, owner); return; }
    if (wadooLinkMode) { handleWadooLinkTargetSelection(card, owner); return; }
    if (c51SelectMode && c51SelectMode.owner !== owner) { handleC51TargetSelection(card); return; }
    if (c58HealingMode) { handleC58HealingSelection(card); return; }
    if (freedaTargetMode) { handleFreedaTargetSelection(card, owner); return; }
    if (dollyHealMode) { handleDollyHealSelection(card); return; } // CORRIGÉ : clic pour Dolly
    if (hitAndRunMode) { handleHitAndRunSelection(card, owner); return; }
    if (chargeboxTargetMode) { handleChargeboxTargetSelection(card, owner); return; }
    if (peinturlurerMode) { handlePeinturlurerSelection(card); return; }

    // Cliquer À TOUT MOMENT sur un combattant ADVERSE portant un ou plusieurs
    // familiers ouvre un aperçu rapide — le même prompt que celui déjà
    // disponible pour ses propres combattants (via Miner), mais désormais
    // accessible aussi côté ennemi, peu importe le tour en cours.
    const isEnemyCard = (typeof ONLINE_MODE !== 'undefined' && ONLINE_MODE) ? (owner !== MY_SEAT) : (owner !== currentTurn);
    if (isEnemyCard) {
      const attachedFamiliars = getFamiliersOnHost(card);
      if (attachedFamiliars.length > 0) {
        openButtonsPrompt(
          cardName(card.label),
          'Choisissez une action.',
          el,
          [
            { label: `Voir Familiers (${attachedFamiliars.length})`, className: 'confirm', onClick: () => showFamiliarCarousel(card, attachedFamiliars) },
            { label: 'Annuler', className: 'cancel', onClick: () => {} },
          ]
        );
      }
    }
  });

  el.addEventListener('pointerdown', (e)=>{
    if (ONLINE_MODE && owner !== MY_SEAT) return; // en ligne : impossible de manipuler les cartes adverses
    if(getType(card.label) !== 'personnage') return;
    dragCandidate = { card, owner, fromEl: el, startX: e.clientX, startY: e.clientY, attackMode:false };
    aimHoldTimer = setTimeout(()=> startAiming(card, owner, el), 220);
    document.addEventListener('pointermove', onPointerMoveForAim);
    document.addEventListener('pointerup', onPointerUpForAim, { once:true });
  });

  el.addEventListener('dragover', (e)=>{
    if(!currentDragInfo || currentTurn!==currentDragInfo.owner) return;
    const draggedType = getType(currentDragInfo.label);

    if(draggedType==='familier' && canPlayThisCardNow(currentDragInfo.owner, currentDragInfo.card)){
      e.preventDefault(); el.classList.add('positiveTargetHint');
    }
    const targetableActions = ['C4', 'C57', 'C102', 'C115'];
    if(targetableActions.includes(currentDragInfo.label) && canPlayThisCardNow(currentDragInfo.owner, currentDragInfo.card)){
      e.preventDefault(); el.classList.add('positiveTargetHint');
    }
    // KRYLLS : Pudding (T10) — accepte n'importe quel Personnage allié
    // déposé directement dessus (fusion), à la place d'un dépôt en zone vide.
    if(card.label === 'T10' && owner === currentDragInfo.owner && draggedType==='personnage' && canPlayThisCardNow(currentDragInfo.owner, currentDragInfo.card)){
      e.preventDefault(); el.classList.add('positiveTargetHint');
    }
  });
  el.addEventListener('dragleave', ()=>{ el.classList.remove('positiveTargetHint'); });

  el.addEventListener('drop', (e)=>{
    e.preventDefault();
    el.classList.remove('positiveTargetHint');
    if (!currentDragInfo) return;
    const draggedCard    = currentDragInfo.card;
    const fromId         = currentDragInfo.fromId;
    const playingOwner   = currentDragInfo.owner;
    if (currentTurn !== playingOwner || !(fromId === 'handTop' || fromId === 'handBottom')) return;
    if (!canPlayThisCardNow(playingOwner, draggedCard)) return;

    // KRYLLS : Pudding (T10) — un Personnage déposé directement dessus le
    // remplace (fusion) au lieu d'un dépôt en zone vide classique. Le Pudding
    // "disparaît" (mangé), le combattant arrive avec RAPIDE et +2 PV.
    if (card.label === 'T10' && owner === playingOwner && getType(draggedCard.label) === 'personnage') {
      const playedCard = takeCardFromSource(fromId, draggedCard.id);
      if (!playedCard) return;
      const puddingLine = getLineByOwner(owner);
      const puddingIdx = puddingLine.findIndex(c => c.id === card.id);
      if (puddingIdx === -1) return;
      consumeAllowanceIfNeeded(playingOwner, playedCard);
      resetStatsToBaseWhenEnteringBattle(playedCard);
      playedCard.hp = getBaseHP(playedCard.label) + 2;
      if (!Array.isArray(playedCard.addedTags)) playedCard.addedTags = [];
      if (!playedCard.addedTags.includes('rapide')) playedCard.addedTags.push('rapide');
      // Le combattant hérite aussi du Mithril que le Pudding avait capturé
      // (lui-même hérité de la créature transformée par Kabba le zunt).
      if (typeof card.capturedMithril === 'number' && card.capturedMithril > 0) {
        playedCard.capturedMithril = card.capturedMithril;
      }
      // Remplace le Pudding À LA MÊME POSITION dans la zone de combat (pas
      // ajouté à la fin) — un seul splice qui retire et insère en même temps.
      puddingLine.splice(puddingIdx, 1, playedCard);
      onCharacterEnterBattlefield(playedCard, owner);
      pushHistory('jeu', `${cardAnchor(playedCard.label)} est joué sur le ${cardAnchor('T10')} : +2 PV et trait RAPIDE !${playedCard.capturedMithril ? ` Il conserve aussi ${playedCard.capturedMithril} Mithril capturé.` : ''}`);
      broadcastAndPlaySfx('posecarte');
      fullRender();
      return;
    }

    if (getType(draggedCard.label) === 'familier') {
      consumeAllowanceIfNeeded(playingOwner, draggedCard);
      const famCard = takeCardFromSource(fromId, draggedCard.id);
      if (famCard) {
        attachFamiliarToHost(playingOwner, famCard, card);
        if (famCard.label === 'C10') { broadcastAndPlaySfx('mozkyto'); }
      }
      return;
    }
    const targetableActions = ['C4', 'C57', 'C102', 'C115'];
    if (targetableActions.includes(draggedCard.label)) {
      if (getType(card.label) !== 'personnage') return;
      consumeAllowanceIfNeeded(playingOwner, draggedCard);
      const actionCard = takeCardFromSource(fromId, draggedCard.id);
      if (!actionCard) return;

      if (actionCard.label === 'C4') {
        if (typeof card.hp === 'number' && card.label !== 'C62') { card.hp += 2; playHPHitEffect(card); }
        discardCard(actionCard, playingOwner, 'action');
        pushHistory('pv', `${cardAnchor(card.label)} reçoit +2 PV (soin).`);
      }
      if (actionCard.label === 'C102') {
        card.tempHP = (card.tempHP || 0) + 3;
        card.tempShield = (card.tempShield || 0) + 3;
        whyMeBuffs.push(card);
        playHPHitEffect(card);
        discardCard(actionCard, playingOwner, 'action');
        pushHistory('action', `${cardAnchor(card.label)} reçoit un bonus temporaire de +3 PV et +3 Bouclier grâce à ${cardAnchor('C102')}.`);
      }
      if (actionCard.label === 'C57') {
        const shieldToAdd = exilePile.length;
        if (typeof card.permanentShieldBonus !== 'number') card.permanentShieldBonus = 0;
        card.permanentShieldBonus += shieldToAdd;
        card.shield = (card.shield || getBaseShield(card.label)) + shieldToAdd;
        discardCard(actionCard, playingOwner, 'action');
        pushHistory('action', `${cardAnchor('C57')} donne +${shieldToAdd} bouclier <strong>permanent</strong> à ${cardAnchor(card.label)}.`);
      }
      if (actionCard.label === 'C115') {
        if (!hasTag(card, 'provocateur')) {
          if (!Array.isArray(card.addedTags)) card.addedTags = [];
          card.addedTags.push('provocateur');
        }
        if (typeof card.permanentShieldBonus !== 'number') card.permanentShieldBonus = 0;
        card.permanentShieldBonus += 2;
        card.shield += 2;
        card.canMineFreely = true;
        discardCard(actionCard, playingOwner, 'action');
        pushHistory('action', `${cardAnchor('C115')} est joué sur ${cardAnchor(card.label)}.`);
        pushHistory('info', `${cardAnchor(card.label)} gagne <strong>PROVOCATION</strong>, <strong>+2 PB permanents</strong>, et peut <strong>miner sans coût</strong>.`);
      }
      fullRender();
    }
  });

  return el;
}/* ---------- Rescelleur (C8) visuel ---------- */
function renderRescelleurUnderStack(el, card){
  const old = el.querySelector('.underStack'); if(old) old.remove();
  const badgeOld = el.querySelector('.sealedBadge'); if(badgeOld) badgeOld.remove();
  const n = (Array.isArray(card.sealed)?card.sealed.length:0);
  if(n<=0) return;

  const stack = document.createElement('div');
  stack.className = 'underStack';
  const show = Math.min(3, n);
  for(let i=0;i<show;i++){
    const b = document.createElement('div');
    b.className = 'underBack';
    stack.appendChild(b);
  }
  el.appendChild(stack);

  attachSealedBadge(el, card);
}

            );
        } else {
            pushHistory('info', `L'effet de ${cardAnchor('C166')} s'active, mais vous n'avez pas assez de Mithril pour forger (coût actuel : ${currentForgeCost}).`);
        }
    } else {
        pushHistory('info', `L'effet de ${cardAnchor('C166')} ne s'active pas (moins de 2 artefacts en jeu).`);
    }
}

// ===================================================================
// FIN DE LA LOGIQUE D'ENTRÉE POUR HARVEY
// ===================================================================

// ===================================================================
    // DÉBUT DE LA LOGIQUE D'ENTRÉE POUR SYMONE (C170)
    // ===================================================================
    if (card.label === 'C170') {
        const allCombatants = topLine.concat(botLine);
        const poisonTargets = allCombatants.filter(c => hasTag(c, 'poison') && c.id !== card.id); // Ne se détruit pas lui-même

        if (poisonTargets.length > 0) {
            const targetNames = poisonTargets.map(c => cardAnchor(c.label)).join(', ');
            pushHistory('action', `${cardAnchor('C170')} détruit ${targetNames} !`);

            // On mémorise le propriétaire de chaque cible AVANT de la retirer des lignes
            const targetsWithOwner = poisonTargets.map(target => ({
                target,
                owner: ownerOfCardOnBoard(target) || (topLine.some(c => c.id === target.id) ? 'top' : 'bottom')
            }));

            // Détruire les cibles (mutation en place, jamais de réaffectation de topLine/botLine)
            const poisonIds = poisonTargets.map(t => t.id);
            const newTop = topLine.filter(c => !poisonIds.includes(c.id));
            const newBot = botLine.filter(c => !poisonIds.includes(c.id));
            topLine.length = 0; topLine.push(...newTop);
            botLine.length = 0; botLine.push(...newBot);

            targetsWithOwner.forEach(({ target, owner: targetOwner }) => {
                detachFamiliarsOnHost(target, targetOwner);
                discardCard(target, targetOwner, 'death');
            });
            
            // Gagner du Mithril
            const mithrilGained = poisonTargets.length;
            for (let i = 0; i < mithrilGained; i++) addMithril(owner);
            pushHistory('mithril', `${playerLabel(owner)} gagne ${mithrilGained} Mithril grâce à l'effet de ${cardAnchor('C170')}.`);

        } else {
            pushHistory('info', `${cardAnchor('C170')} entre en jeu, mais aucun combattant avec POISON n'est sur le plateau.`);
        }
    }
    // ===================================================================
    // FIN DE LA LOGIQUE D'ENTRÉE POUR SYMONE
    // ===================================================================

    // === WADOO : Assiba (C201) et Négociateur des Brumes (C207) — +1 Mithril à l'entrée en jeu ===
    if (card.label === 'C201' || card.label === 'C207') {
        addMithril(owner);
        pushHistory('mithril', `${cardAnchor(card.label)} entre en jeu : +1 Mithril.`);
    }
    // WADOO : Négociateur des Brumes force en plus l'adversaire à défausser 2 cartes du dessous de son deck
    if (card.label === 'C207') {
        const opp = (owner === 'top') ? 'bottom' : 'top';
        forceDiscardFromDeckBottom(opp, 2, 'C207');
    }

    // === WADOO 2e lot : Golgoth (C215) et Mboria (C220) — JOUER : lier cette Poupée
    // à un combattant ennemi de son choix (rituel automatique à l'entrée en jeu) ===
    if (card.label === 'C215' || card.label === 'C220') {
        const opp = (owner === 'top') ? 'bottom' : 'top';
        const hasEnemyTarget = getLineByOwner(opp).some(c => getType(c.label) === 'personnage');
        if (hasEnemyTarget) {
            startWadooLinkTargeting(owner, card);
        } else {
            pushHistory('info', `${cardAnchor(card.label)} entre en jeu, mais aucun combattant ennemi n'est disponible à lier.`);
        }
    }

    // === WADOO 2e lot : Mlle Pilate (C216) — entre en jeu avec 2 charges ===
    if (card.label === 'C216') {
        card.charges = 2;
        pushHistory('info', `${cardAnchor('C216')} entre en jeu avec 2 charges.`);
    }

    // === WADOO 4e lot : Mirikou (C225) — JOUER : détruit TOUS les combattants
    // (des deux côtés du plateau) qui ont au moins un Familier rattaché.
    if (card.label === 'C225') {
        const allCombatants = topLine.concat(botLine);
        const targets = allCombatants.filter(c => c.id !== card.id && getFamiliersOnHost(c).length > 0);
        if (targets.length === 0) {
            pushHistory('info', `${cardAnchor('C225')} entre en jeu, mais aucun combattant n'a de Familier rattaché.`);
        } else {
            pushHistory('action', `${cardAnchor('C225')} détruit ${targets.length} combattant${targets.length>1?'s':''} portant un Familier !`);
            targets.forEach(t => {
                const tOwner = topLine.includes(t) ? 'top' : 'bottom';
                const tLine = getLineByOwner(tOwner);
                const idx = tLine.findIndex(c => c.id === t.id);
                if (idx !== -1) {
                    tLine.splice(idx, 1);
                    detachFamiliarsOnHost(t, tOwner);
                    discardCard(t, tOwner, 'death');
                }
            });
        }
    }

    // === WADOO 5e lot : Mburno (C230) — JOUER : annule le gel de tous les
    // combattants ALLIÉS (les siens uniquement, pas ceux de l'adversaire).
    if (card.label === 'C230') {
        const ownLine = getLineByOwner(owner);
        const frozenAllies = ownLine.filter(c => c.id !== card.id && isFrozen(c) && c.isFrozenByEffect);
        if (frozenAllies.length === 0) {
            pushHistory('info', `${cardAnchor('C230')} entre en jeu, mais aucun allié n'était gelé.`);
        } else {
            frozenAllies.forEach(c => { c.isFrozenByEffect = false; });
            pushHistory('action', `${cardAnchor('C230')} dégèle ${frozenAllies.length} combattant${frozenAllies.length>1?'s':''} allié${frozenAllies.length>1?'s':''} !`);
        }
    }

  const allArts = topArts.concat(botArts);
  allArts.forEach(art => {
      if (art.label === 'C58') {
          if (typeof art.charges !== 'number') art.charges = 0;
          art.charges++;
          if (typeof card.hp === 'number' && card.label !== 'C62') {
              card.hp--;
          }
          pushHistory('artefact', `${cardAnchor('C58')} gagne 1 charge. ${cardAnchor(card.label)} perd 1 PV en entrant en jeu.`);
      }
  });

  if (getType(card.label) === 'personnage' && getEffectiveHP(card) <= 0) {
    const lineArray = getLineByOwner(owner);
    const idx = lineArray.findIndex(c => c.id === card.id);
    if (idx !== -1) {
        lineArray.splice(idx, 1);
    }
    discardCard(card, owner, 'death');
    pushHistory('pv', `${cardAnchor(card.label)} meurt immédiatement en entrant en jeu.`);
    return true;
  }
  return false;
}

        if (cardIndex > -1) {
          // NOUVEAU BLOC DE CODE (CORRIGÉ)
const reanimatedCard = discardPile.splice(cardIndex, 1)[0];
const playerLine = getLineByOwner(owner);

// AJOUT : On réinitialise manuellement les PV et le bouclier pour l'effet de Noxroc

reanimatedCard.shield = getBaseShield(reanimatedCard.label);

resetStatsToBaseWhenEnteringBattle(reanimatedCard); // Cette ligne reste pour réinitialiser les autres effets (tags, etc.)
