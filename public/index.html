<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>TCG 1v1 – Base (Mises à jour Tchat/Historiques/Liens/Familiers)</title>
  <style>
    :root{
      --cy:#00e6ff; --cyA:rgba(0,230,255,.35);
      --red:#ff3030; --green:#19e27a; --mithril:#7df9ff; --shield:#49b6ff;
      --orange:#ffb84d;

      /* Couleurs de type pour liens */
      --type-personnage:#ffca3a;
      --type-artefact:#ffa62b;
      --type-action:#7df9ff;
      --type-familier:#f78fb3;

      /* Couleurs par faction (habillage des cartes) */
      --fac-krylls:#3ddc84;   --fac-krylls-glow:rgba(61,220,132,.55);
      --fac-impy:#ff5a5f;     --fac-impy-glow:rgba(255,90,95,.55);
      --fac-savage:#ff9d3d;   --fac-savage-glow:rgba(255,157,61,.55);
      --fac-chimeria:#b06bff; --fac-chimeria-glow:rgba(176,107,255,.55);
      --fac-wadoo:#ffd93d;    --fac-wadoo-glow:rgba(255,217,61,.55);

      /* Artefacts layout */
      --artSide:   120px;
      --artHeight: 84px;
      --artOffset: 160px;

      /* Taille de carte de référence (adaptée par media queries plus bas) */
      --cardW: 86px;
      --cardH: 124px;
      --slotSize: 78px;
      --slotSizeH: 112px;
      --boardMarginTop: 120px;
      --sidebarW: 180px;
      --armSlotSize: 26px;
      --armGap: 5px;
    }

    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Manrope:wght@400;600;800&display=swap');
    *{box-sizing:border-box}

    /* ===================================================================
       REFONTE VISUELLE — thème "vrai TCG" (habillage par-dessus le CSS existant)
       =================================================================== */
    body{ margin:0; overflow:hidden; color:#cfffff; font-family:'Manrope', system-ui, sans-serif; }

    body{
      background:
        radial-gradient(1400px 700px at 50% -260px, rgba(0,230,255,.10), transparent 60%),
        radial-gradient(900px 500px at 15% 110%, rgba(176,107,255,.08), transparent 55%),
        radial-gradient(900px 500px at 85% 110%, rgba(255,90,95,.08), transparent 55%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0px, rgba(255,255,255,.012) 1px, transparent 1px, transparent 3px),
        linear-gradient(180deg,#081820 0%,#051217 45%,#02090c 100%);
    }

    /* Titre carte / nom : police à empattement pour un rendu "jeu de cartes" */
    .faceName{ font-family:'Cinzel','Manrope',serif; letter-spacing:.02em; }

    /* --- Habillage des cartes par faction : liseré + lueur colorée --- */
    .card[data-faction]{ transition: transform .15s ease, box-shadow .2s ease, filter .2s ease; }
    .card[data-faction="Krylls"]  { border-color:var(--fac-krylls);   box-shadow:0 0 12px var(--fac-krylls-glow); }
    .card[data-faction="Impy"]    { border-color:var(--fac-impy);     box-shadow:0 0 12px var(--fac-impy-glow); }
    .card[data-faction="Savage"]  { border-color:var(--fac-savage);   box-shadow:0 0 12px var(--fac-savage-glow); }
    .card[data-faction="Chimeria"]{ border-color:var(--fac-chimeria); box-shadow:0 0 12px var(--fac-chimeria-glow); }
    .card[data-faction="Wadoo"]   { border-color:var(--fac-wadoo);    box-shadow:0 0 12px var(--fac-wadoo-glow); }
    .card[data-faction]:hover{ filter:brightness(1.12); }
    .card.placed[data-faction="Krylls"]  { box-shadow:0 0 16px var(--fac-krylls-glow), inset 0 0 10px rgba(0,0,0,.35); }
    .card.placed[data-faction="Impy"]    { box-shadow:0 0 16px var(--fac-impy-glow), inset 0 0 10px rgba(0,0,0,.35); }
    .card.placed[data-faction="Savage"]  { box-shadow:0 0 16px var(--fac-savage-glow), inset 0 0 10px rgba(0,0,0,.35); }
    .card.placed[data-faction="Chimeria"]{ box-shadow:0 0 16px var(--fac-chimeria-glow), inset 0 0 10px rgba(0,0,0,.35); }
    .card.placed[data-faction="Wadoo"]   { box-shadow:0 0 16px var(--fac-wadoo-glow), inset 0 0 10px rgba(0,0,0,.35); }

    /* Badge de type en haut à gauche de la carte — icône + couleur, bien plus
       reconnaissable qu'un simple code couleur (combattant/action/artefact/familier) */
    .card[data-ctype]::before{
      position:absolute; top:-8px; left:-8px; width:24px; height:24px; border-radius:50%; z-index:5; pointer-events:none;
      display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; color:#fff;
      text-shadow:0 1px 2px rgba(0,0,0,.85); border:1.5px solid rgba(255,255,255,.65);
      box-shadow:0 2px 6px rgba(0,0,0,.55), inset 0 1px 2px rgba(255,255,255,.3);
    }
    .card[data-ctype="personnage"]::before{ content:'⚔'; background:radial-gradient(circle at 30% 28%, rgba(255,255,255,.5), transparent 45%), radial-gradient(closest-side, #ff5c5c, #8a0000); }
    .card[data-ctype="action"]::before{ content:'⚡'; background:radial-gradient(circle at 30% 28%, rgba(255,255,255,.5), transparent 45%), radial-gradient(closest-side, #ffd93d, #a87700); color:#2a1c00; text-shadow:0 1px 1px rgba(255,255,255,.4); }
    .card[data-ctype="artefact"]::before{ content:'◆'; background:radial-gradient(circle at 30% 28%, rgba(255,255,255,.5), transparent 45%), radial-gradient(closest-side, #ffb84d, #8a5a00); }
    .card[data-ctype="familier"]::before{ content:'☆'; background:radial-gradient(circle at 30% 28%, rgba(255,255,255,.5), transparent 45%), radial-gradient(closest-side, #55d6ff, #0a4f8a); }
    #zoom .card[data-ctype]::before, #zoom .zoomCard[data-ctype]::before{ width:38px; height:38px; font-size:19px; top:-14px; left:-14px; }

    /* --- Bouton fin de tour et zones de bataille : voir les règles .zone et #endTurn plus bas,
       qui ont été enrichies directement pour éviter tout conflit de cascade CSS --- */



    /* --- Bannière de tour --- */
    #turnBanner{
      position:fixed; top:14px; left:50%; transform:translateX(-50%) translateY(-140%);
      z-index:1300; padding:10px 28px; border-radius:999px; font-family:'Cinzel','Manrope',sans-serif;
      font-weight:800; font-size:14px; letter-spacing:.12em; text-transform:uppercase;
      opacity:0; transition:transform .35s cubic-bezier(.2,.9,.3,1.3), opacity .35s ease, background .3s ease, box-shadow .3s ease;
      pointer-events:none; white-space:nowrap;
    }
    #turnBanner.show{ transform:translateX(-50%) translateY(0); opacity:1; }
    #turnBanner.my-turn{ background:linear-gradient(180deg,#2dffa0,#0aa860); color:#012016; box-shadow:0 4px 0 #075c3a, 0 0 26px rgba(45,255,160,.55); animation:turnPulse 1.8s ease-in-out infinite; }
    #turnBanner.their-turn{ background:linear-gradient(180deg,#3a4550,#20282f); color:#cfe; box-shadow:0 4px 0 #10161a, 0 0 16px rgba(0,0,0,.4); }
    @keyframes turnPulse{ 0%,100%{ box-shadow:0 4px 0 #075c3a, 0 0 26px rgba(45,255,160,.55);} 50%{ box-shadow:0 4px 0 #075c3a, 0 0 42px rgba(45,255,160,.85);} }

    /* Quand ce n'est pas votre tour : le plateau adverse et vos zones d'action se tamisent légèrement
       (vous pouvez toujours consulter vos cartes, juste pas y jouer) */
    /* Assombrissement "pas mon tour" retiré à la demande de l'utilisateur —
       plus aucun élément ne s'assombrit selon le tour en cours. */

    @keyframes screenFlash { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

    body.screen-flash::after {
      content: ''; position: fixed; inset: 0; background: #fff; z-index: 9999;
      animation: screenFlash 0.4s ease-out; pointer-events: none;
    }

/* NOUVEAU : Toile pour les liens de Prismis (C152) */
#linkCanvas {
  position: fixed;
  inset: 0;
  pointer-events: none; /* Très important pour ne pas bloquer les clics */
  z-index: 1301; /* Juste au-dessus de la flèche d'attaque */
}

/* ===================================================================
   VERSUS DE COMBAT — overlay plein écran joué à chaque attaque
=================================================================== */
#combatVersusOverlay{
  position:fixed; inset:0; z-index:9300; display:flex; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at center, rgba(10,16,24,.65), rgba(3,6,10,.94) 70%);
  opacity:0; pointer-events:none; transition:opacity .18s ease;
  font-family:'Cinzel', system-ui, sans-serif;
}
#combatVersusOverlay.show{ opacity:1; pointer-events:auto; cursor:pointer; }
#combatVersusOverlay .cvStage{
  display:flex; align-items:flex-start; justify-content:center; gap:min(6vw,60px); width:100%; max-width:960px; padding:0 20px;
}
#combatVersusOverlay .cvFighter{ text-align:center; width:min(30vw,230px); position:relative; }
#combatVersusOverlay .cvFighter .cvImgWrap{ position:relative; border-radius:16px; }
#combatVersusOverlay .cvFighter img{
  width:100%; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.7), 0 0 0 3px rgba(255,255,255,.1);
  background:#111; display:block; transition:filter .5s ease, box-shadow .5s ease;
}
#combatVersusOverlay .cvFighter.left img{ transform:translateX(-140%) rotate(-8deg); opacity:0; }
#combatVersusOverlay .cvFighter.right img{ transform:translateX(140%) rotate(8deg); opacity:0; }
#combatVersusOverlay.show .cvFighter.left img{ animation: cvSlideInLeft .5s cubic-bezier(.2,.9,.3,1.1) forwards; }
#combatVersusOverlay.show .cvFighter.right img{ animation: cvSlideInRight .5s cubic-bezier(.2,.9,.3,1.1) forwards; }
@keyframes cvSlideInLeft{ 0%{ transform:translateX(-140%) rotate(-8deg); opacity:0;} 100%{ transform:translateX(0) rotate(0); opacity:1;} }
@keyframes cvSlideInRight{ 0%{ transform:translateX(140%) rotate(8deg); opacity:0;} 100%{ transform:translateX(0) rotate(0); opacity:1;} }
#combatVersusOverlay .cvFighter.dead img{ filter:grayscale(.85) brightness(.55); box-shadow:0 0 0 3px rgba(255,59,59,.75), 0 0 34px rgba(255,59,59,.5); }
#combatVersusOverlay .cvFighter.survivor img{ box-shadow:0 0 0 3px rgba(25,226,122,.55), 0 0 26px rgba(25,226,122,.3); }
#combatVersusOverlay .cvName{ margin-top:10px; font-size:.8rem; font-weight:800; letter-spacing:.04em; color:#cfe7ee; text-transform:uppercase; }
#combatVersusOverlay .cvHpRow{ margin-top:6px; display:flex; align-items:baseline; justify-content:center; gap:8px; }
#combatVersusOverlay .cvHp{ font-size:1.5rem; font-weight:900; color:#ffe1e1; text-shadow:0 0 10px rgba(255,59,59,.5); }
#combatVersusOverlay .cvHp.tick{ animation:cvTick .5s ease; }
@keyframes cvTick{ 0%{ transform:scale(2); color:#fff; } 100%{ transform:scale(1); } }
#combatVersusOverlay .cvShield{ margin-top:4px; font-size:.85rem; font-weight:800; color:#8fd4ff; transition:opacity .3s ease; }
#combatVersusOverlay .cvShield.gone{ text-decoration:line-through; opacity:.35; }
#combatVersusOverlay .cvCaption{
  margin-top:8px; min-height:20px; font-size:.82rem; font-weight:700; color:#ffb3b3; opacity:0; transform:translateY(4px);
}
#combatVersusOverlay .cvCaption.show{ animation: cvCaptionIn .3s ease forwards; }
@keyframes cvCaptionIn{ to{ opacity:1; transform:translateY(0); } }
#combatVersusOverlay .cvFloat{
  position:absolute; left:50%; top:38%; transform:translate(-50%,0); font-size:2rem; font-weight:900;
  color:#ff5252; text-shadow:0 2px 0 #4a0000, 0 0 18px rgba(255,82,82,.8); opacity:0; pointer-events:none; white-space:nowrap;
}
#combatVersusOverlay .cvFloat.absorb{ color:#8fd4ff; text-shadow:0 2px 0 #01324a, 0 0 18px rgba(143,212,255,.8); }
#combatVersusOverlay .cvFloat.play{ animation: cvFloatUp 1.1s ease forwards; }
@keyframes cvFloatUp{
  0%{ opacity:0; transform:translate(-50%,10px) scale(.6); }
  15%{ opacity:1; transform:translate(-50%,0) scale(1.15); }
  30%{ transform:translate(-50%,-6px) scale(1); }
  100%{ opacity:0; transform:translate(-50%,-56px) scale(1); }
}
#combatVersusOverlay .cvTag{
  display:inline-block; margin-top:8px; padding:3px 10px; border-radius:999px; font-size:.68rem; font-weight:900;
  letter-spacing:.06em; text-transform:uppercase; border:1px solid; opacity:0;
}
#combatVersusOverlay.show .cvTag.appear{ animation: cvTagIn .3s ease 1.15s forwards; }
@keyframes cvTagIn{ to{ opacity:1; } }
#combatVersusOverlay .cvTag.frozen{ color:#bfe9ff; background:rgba(73,182,255,.15); border-color:#49b6ff; }
#combatVersusOverlay .cvTag.poison{ color:#c9ffd9; background:rgba(25,226,122,.15); border-color:#19e27a; }
#combatVersusOverlay .cvMid{ text-align:center; flex:none; padding-top:30px; }
#combatVersusOverlay .cvVs{
  font-size:clamp(28px,6vw,52px); font-weight:900; color:#ffd23a; letter-spacing:.05em;
  text-shadow:0 0 24px rgba(255,210,58,.7), 0 0 60px rgba(255,120,30,.4);
  transform:scale(0); opacity:0;
}
#combatVersusOverlay.show .cvVs{ animation: cvVsPop .55s cubic-bezier(.3,1.6,.4,1) .25s forwards; }
@keyframes cvVsPop{ 0%{ transform:scale(0) rotate(-20deg); opacity:0;} 60%{ transform:scale(1.3) rotate(6deg); opacity:1;} 100%{ transform:scale(1) rotate(0); opacity:1;} }
#combatVersusOverlay .cvClashFlash{
  position:absolute; width:340px; height:340px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,210,58,.9), rgba(255,120,30,.3) 45%, transparent 70%);
  opacity:0; pointer-events:none;
}
#combatVersusOverlay.show .cvClashFlash{ animation: cvFlash .5s ease .28s; }
@keyframes cvFlash{ 0%{ opacity:0; transform:scale(.3);} 40%{ opacity:1; transform:scale(1.15);} 100%{ opacity:0; transform:scale(1.4);} }
#combatVersusOverlay .cvDeadStamp{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:1.6rem; font-weight:900; color:#ff5252; letter-spacing:.1em; text-transform:uppercase;
  background:rgba(20,4,4,.4); border-radius:16px; opacity:0; transform:rotate(-10deg) scale(1.3);
  border:3px solid rgba(255,82,82,.8);
}
#combatVersusOverlay.show .cvFighter.dead .cvDeadStamp{ animation: cvDeadIn .4s ease 1.15s forwards; }
@keyframes cvDeadIn{ to{ opacity:1; transform:rotate(-10deg) scale(1); } }
#combatVersusOverlay .cvResultBar{
  position:absolute; left:50%; bottom:74px; transform:translate(-50%,8px); width:min(92vw,560px); text-align:center;
  font-family:system-ui,sans-serif; font-size:.95rem; font-weight:700; color:#eafcff;
  background:rgba(9,14,20,.85); border:1px solid rgba(125,219,255,.35); border-radius:12px; padding:10px 18px;
  opacity:0;
}
#combatVersusOverlay.show .cvResultBar.show{ animation: cvResultIn .35s ease forwards; }
@keyframes cvResultIn{ to{ opacity:1; transform:translate(-50%,0); } }

/* ===================================================================
   ANNONCE D'ACTION — bandeau centré, plus léger que le Versus de combat,
   joué pour toute action/artefact/familier notable. Synchronisé entre les
   deux joueurs via le même canal que le journal de partie (historyEntry).
=================================================================== */
#actionAnnounceOverlay{
  position:fixed; left:50%; top:16%; transform:translate(-50%,-14px); z-index:9250;
  min-width:280px; max-width:min(560px,88vw); pointer-events:none; opacity:0;
  transition:opacity .18s ease, transform .18s ease;
  font-family:'Cinzel', system-ui, sans-serif;
}
#actionAnnounceOverlay.show{ opacity:1; transform:translate(-50%,0); pointer-events:auto; cursor:pointer; }
#actionAnnounceOverlay .aaCard{
  display:flex; align-items:center; gap:14px; padding:12px 20px;
  background:linear-gradient(145deg, rgba(10,18,26,.96), rgba(6,12,18,.96));
  border:1.5px solid var(--aaColor, #7df9ff); border-radius:16px;
  box-shadow:0 14px 40px rgba(0,0,0,.55), 0 0 26px color-mix(in srgb, var(--aaColor, #7df9ff) 40%, transparent);
}
#actionAnnounceOverlay .aaKind{
  flex:none; font-size:.62rem; font-weight:900; letter-spacing:.12em; text-transform:uppercase;
  color:var(--aaColor, #7df9ff); writing-mode:vertical-rl; text-orientation:mixed; transform:rotate(180deg);
  padding-right:2px; opacity:.85;
}
#actionAnnounceOverlay .aaText{
  font-family:system-ui,sans-serif; font-size:.95rem; font-weight:600; color:#eafcff; line-height:1.35;
}
#actionAnnounceOverlay .aaText strong{ color:#fff; }
#actionAnnounceOverlay .aaText .cardLink{ color:var(--aaColor, #7df9ff); font-weight:800; text-decoration:none; }

#combatVersusOverlay .cvSkip{
  position:absolute; bottom:26px; left:50%; transform:translateX(-50%);
  font-size:.72rem; letter-spacing:.15em; text-transform:uppercase; color:#7fa3af; opacity:.75;
}
@media (prefers-reduced-motion: reduce){
  #combatVersusOverlay *{ animation-duration:.001ms !important; }
}


/* NOUVEAU : Rétablit le curseur normal quand on peut cibler une unité épuisée */
.card.placed.exhausted.enemyTargetHint {
  cursor: grab;
}
    /* EXIL — zone regroupée : un petit portail mystique dessiné entièrement
       en CSS (aucune image externe, donc aucun risque de rendu cassé), une
       pile de cartes cliquable, et un libellé. Volontairement compact pour
       ne jamais chevaucher quoi que ce soit autour. */
    #exileZone{
      position:fixed; top:10px; left:10px; z-index:1000; width:80px;
      display:flex; flex-direction:column; align-items:center; user-select:none;
      cursor:pointer; gap:4px;
    }
    #exileRift{
      width:42px; height:42px; border-radius:50%; position:relative; flex:none;
      background:radial-gradient(circle at 35% 30%, #5a3a9a, #1c0c33 62%, #05020a 100%);
      border:2px solid #9b6bff;
      box-shadow:0 0 12px rgba(155,107,255,.55), inset 0 0 10px rgba(155,107,255,.4);
      animation:exileRiftPulse 3s ease-in-out infinite;
      transition:box-shadow .2s ease;
    }
    #exileRift::before{
      content:''; position:absolute; inset:5px; border-radius:50%;
      border:1px dashed rgba(205,180,255,.55);
      animation:exileRiftSpin 9s linear infinite;
    }
    #exileRiftCore{
      position:absolute; top:50%; left:50%; width:7px; height:7px; border-radius:50%;
      background:#ecdfff; transform:translate(-50%,-50%);
      box-shadow:0 0 9px 3px rgba(224,208,255,.85);
      animation:exileRiftCorePulse 2s ease-in-out infinite;
    }
    @keyframes exileRiftPulse{ 0%,100%{ box-shadow:0 0 12px rgba(155,107,255,.5), inset 0 0 10px rgba(155,107,255,.4);} 50%{ box-shadow:0 0 18px rgba(155,107,255,.8), inset 0 0 13px rgba(155,107,255,.6);} }
    @keyframes exileRiftSpin{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }
    @keyframes exileRiftCorePulse{ 0%,100%{ opacity:.7; transform:translate(-50%,-50%) scale(1);} 50%{ opacity:1; transform:translate(-50%,-50%) scale(1.35);} }
    #exileZone:hover #exileRift{ box-shadow:0 0 22px rgba(155,107,255,.85), inset 0 0 14px rgba(155,107,255,.65); }
    #exileStack{
      position:relative; width:58px; height:84px; z-index:2;
      background-image:url("../cartes/Versobasic.png"); background-size:cover; background-position:center;
      border:2px solid #9b6bff; border-radius:9px; box-shadow:2px 2px 0 #9b6bff, 4px 4px 0 rgba(155,107,255,.35); cursor:pointer;
      transition:box-shadow .2s ease, transform .15s ease;
    }
    #exileStack:hover{ box-shadow:2px 2px 0 #9b6bff, 4px 4px 0 rgba(155,107,255,.35), 0 0 14px rgba(155,107,255,.65); transform:translateY(-2px); }
    #exileStack.open{ box-shadow:2px 2px 0 #7df9ff, 4px 4px 0 rgba(125,249,255,.4), 0 0 16px rgba(125,249,255,.7); border-color:#7df9ff; }
    #exileStack::after{
      content:attr(data-count);
      position:absolute; right:-9px; bottom:-9px; width:23px; height:23px;
      background:#9b6bff; color:#1a0a2e; border-radius:50%; font-weight:800; font-size:11px;
      display:flex; align-items:center; justify-content:center; box-shadow:0 0 8px #9b6bff; z-index:3;
    }
    #exileLabel{
      font-family:'Cinzel','Manrope',sans-serif; font-weight:800; letter-spacing:.14em;
      text-transform:uppercase; font-size:10px; color:#c9b3ff; text-shadow:0 0 7px rgba(155,107,255,.55);
    }
    #exileCarousel{
      position:fixed; top:150px; left:20px; right:20px; height:200px; z-index:1100; display:none;
      background:rgba(0,0,0,.82); border:2px solid #9b6bff88; border-radius:12px;
      padding:12px; overflow-x:auto; white-space:nowrap; box-shadow:0 0 20px #9b6bff66;
    }
    .thumb{
      display:inline-block; width:110px; height:160px; margin-right:12px; position:relative;
      border:2px solid var(--cy); border-radius:12px; background:linear-gradient(145deg,#fff,#e6e6e6);
      background-size:cover; background-position:center; color:#111; font-weight:900; text-align:center; line-height:160px;
      transition:transform .12s ease;
    }
    .thumb.back{ background-image:url("../cartes/Versobasic.png"); color:transparent; }
    .thumb .hp{ position:absolute; right:-6px; top:50%; transform:translateY(-50%); width:30px; height:30px; font-size:14px; }
    .thumb .shield{ position:absolute; right:-6px; top:calc(50% + 34px); width:28px; height:28px; font-size:12px; }
    .thumb:hover{ transform:scale(1.18); z-index:2; }

    /* Carrousels de DÉFAUSSE */
    .discardCarousel{
      position:fixed; left:20px; right:20px; height:200px; z-index:1100; display:none;
      background:rgba(0,0,0,.82); border:2px solid #00e6ff55; border-radius:12px; padding:12px; overflow-x:auto; white-space:nowrap;
      box-shadow:0 0 20px #00e6ff66;
    }
    .discardCarousel.selecting{ border-color:#7df9ff; box-shadow:0 0 22px #7df9ff66; }
    #discardTopCarousel{ top:320px; }
    #discardBottomCarousel{ bottom:20px; }
    .dthumb{
      display:inline-block; width:110px; height:160px; margin-right:12px; position:relative;
      border:2px solid var(--cy); border-radius:12px; background:linear-gradient(145deg,#fff,#e6e6e6);
      background-size:cover; background-position:center; color:#111; font-weight:900; text-align:center; line-height:160px;
      transition:transform .12s ease; cursor:default;
    }
    .discardCarousel.selecting .dthumb{ cursor:pointer; outline:2px dashed #7df9ff66; }
    .discardCarousel.selecting .dthumb:hover{ transform:scale(1.18); z-index:2; }
    .dthumb .hp{ right:-6px; top:50%; transform:translateY(-50%); width:30px; height:30px; font-size:14px; }
    .dthumb .shield{ right:-6px; top:calc(50% + 34px); width:28px; height:28px; font-size:12px; }

    /* Plateau */
    .board{ position:relative; height:88vh; margin-top:var(--boardMarginTop); display:grid; grid-template-rows:1fr auto 1fr; gap:14px; padding:0 28px 8px; }
    .centerDivider{ display:flex; align-items:center; gap:14px; padding:0 6px; opacity:.55; pointer-events:none; user-select:none; }

    #surrenderBtn{
      position:fixed; left:calc(var(--sidebarW) / 2 + 20px); top:calc(50% + 55px); transform:translate(-50%,-50%);
      pointer-events:auto; cursor:pointer; display:flex; align-items:center; gap:9px;
      padding:11px 22px; border-radius:999px; z-index:1400;
      background:linear-gradient(180deg,#4a1a1a,#240a0a); border:2px solid rgba(255,110,110,.65);
      color:#ffb3b3; font-weight:800; font-size:13.5px; font-family:'Cinzel','Manrope',sans-serif; letter-spacing:.03em;
      box-shadow:0 4px 0 #5c0f0f, 0 8px 18px rgba(255,40,40,.35); transition:transform .12s ease, box-shadow .12s ease;
    }
    #surrenderBtn img{ width:26px; height:26px; object-fit:contain; filter:drop-shadow(0 0 4px rgba(255,120,120,.6)); }
    #surrenderBtn:hover{ transform:translate(-50%,-50%) scale(1.06); box-shadow:0 5px 0 #5c0f0f, 0 10px 22px rgba(255,40,40,.5); background:linear-gradient(180deg,#5c2020,#2e0c0c); }
    #surrenderBtn:active{ transform:translate(-50%,-50%) scale(1.02); box-shadow:0 2px 0 #5c0f0f; }
    @media (max-width: 1300px){ #surrenderBtn{ padding:8px 16px; font-size:11.5px; } #surrenderBtn img{ width:20px; height:20px; } }
    @media (max-width: 820px){ #surrenderBtn span{ display:none; } #surrenderBtn{ padding:9px; } }

    /* Retournement visuel : le joueur assis en siège "top" voit son propre camp
       en bas de son écran, exactement comme le joueur "bottom" — sans toucher
       à aucune donnée de jeu, uniquement l'ordre d'affichage des deux rangées. */
    body.flip-view .board > .row:first-child{ order:3; }
    body.flip-view .board > .centerDivider{ order:2; }
    body.flip-view .board > .row:last-child{ order:1; }
    .centerDivider span{ flex:1; height:1px; background:linear-gradient(90deg, transparent, rgba(125,249,255,.5) 20%, rgba(125,249,255,.5) 80%, transparent); }
    .centerDivider i{ font-style:normal; font-family:'Cinzel',sans-serif; font-size:11px; letter-spacing:.35em; color:rgba(125,249,255,.55); font-weight:600; }
    .row{ display:flex; align-items:center; justify-content:space-between; gap:22px; position:relative; }

    /* ===================================================================
       REFONTE "TCG PRO" — panneaux joueurs, sidebars, arène de combat
       =================================================================== */
    .playerPanel{ display:flex; align-items:center; gap:9px; margin-bottom:10px; }
    .playerPanel.bottom{ margin-bottom:0; margin-top:10px; order:3; }
    .playerAvatar{ width:44px; height:44px; border-radius:50%; background-size:cover; background-position:center; background-color:#04141a;
      border:2px solid rgba(125,249,255,.55); box-shadow:0 0 12px rgba(0,230,255,.4), inset 0 0 6px rgba(0,0,0,.4); flex:none; }
    .playerAvatar.isMe{ border-color:#2dffa0; box-shadow:0 0 14px rgba(45,255,160,.55), inset 0 0 6px rgba(0,0,0,.4); }
    .playerName{ font-family:'Cinzel','Manrope',sans-serif; font-weight:800; font-size:13px; color:#dff; text-shadow:0 1px 3px rgba(0,0,0,.7);
      letter-spacing:.02em; max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    .zone{ border:1.5px solid rgba(125,249,255,.45); border-radius:18px;
      background:radial-gradient(140% 180% at 50% 0%, rgba(0,230,255,.16), transparent 58%), linear-gradient(180deg,#0d3542,#082530);
      box-shadow:inset 0 0 30px rgba(0,230,255,.16), inset 0 0 2px rgba(125,249,255,.4), 0 10px 26px rgba(0,0,0,.35); position:relative; min-height:120px; flex:1; display:flex; align-items:center; justify-content:center;}
    .zone::before{ content:''; position:absolute; left:50%; top:8%; bottom:8%; width:1px; background:linear-gradient(180deg,transparent,rgba(125,249,255,.4) 30%,rgba(125,249,255,.4) 70%,transparent); pointer-events:none; }

    .deckWrap,.dumpWrap{ width:var(--sidebarW); height:auto; padding:12px 10px; border:1px solid rgba(125,249,255,.28); border-radius:16px; display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:linear-gradient(180deg,#08222b,#040e12); box-shadow:inset 0 0 18px rgba(0,230,255,.1), 0 8px 18px rgba(0,0,0,.35); flex:0 0 auto; position:relative; gap:8px; }

    .slotLabel,.battleLabel{ position:relative; pointer-events:none; color:#72f7ff; text-shadow:0 0 10px var(--cy);
      font-weight:600; letter-spacing:.14em; font-size:9.5px; text-transform:uppercase; font-family:'Cinzel','Manrope',sans-serif; opacity:.7;}
    .slotLabel.top,.slotLabel.bottom{ position:relative; top:auto; bottom:auto; text-align:center; order:2; }
    .deckWrap .slotLabel{ order:2; } .deckWrap .deck{ order:1; }
    .deckWrap .resHUD{ order:3; position:relative !important; inset:auto !important; top:auto !important; bottom:auto !important; left:auto !important; transform:none !important; align-items:center; }
    .dumpWrap .slotLabel{ order:2; } .dumpWrap .dump{ order:1; } .dumpWrap .cycleHUD{ order:3; position:relative !important; inset:auto !important; }
    .battleLabel{ font-size:11.5px; opacity:1; padding:5px 12px; border-radius:999px; background:linear-gradient(145deg,#0d4a5c,#062830);
      border:1px solid rgba(125,249,255,.55); box-shadow:0 0 10px rgba(0,230,255,.35); display:flex; align-items:center; gap:5px; white-space:nowrap; z-index:10; }
    .battleLabel::before{ content:'⚔'; font-size:11px; }
    .battleLabel.topRight{ top:-16px; right:14px; left:auto; text-align:right; position:absolute; }
    .battleLabel.bottomRight{ bottom:-16px; right:14px; left:auto; text-align:right; position:absolute; }
    .zoneCount{ font-size:.82em; opacity:.65; font-weight:600; letter-spacing:.02em; }
    .zoneCount.full{ color:#ff8a8a; opacity:1; }

    .deck{
      width:var(--slotSize); height:var(--slotSizeH); border:1px solid rgba(125,249,255,.55); border-radius:10px;
      box-shadow:0 3px 0 rgba(0,150,170,.5), 0 8px 16px rgba(0,0,0,.5), inset 0 0 10px rgba(125,249,255,.15); position:relative;
      background-image:url("../cartes/Versobasic.png"); background-size:cover; background-position:center; background-color:#000;
    }
    .deck::before{ content:''; position:absolute; inset:-4px -4px auto auto; top:4px; right:-6px; width:100%; height:100%;
      border:1px solid rgba(125,249,255,.25); border-radius:10px; background:#02080a; z-index:-1; }
    .deck::after{ content:attr(data-count); position:absolute; right:-13px; bottom:-13px; width:30px; height:30px; background:linear-gradient(145deg,#7df9ff,#00a8bf); color:#001015;
      border-radius:50%; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 12px rgba(125,249,255,.65), 0 2px 4px rgba(0,0,0,.4); border:2px solid #04141a; }

    /* Piles de DÉFAUSSE visibles */
    .dump{ width:var(--slotSize); height:var(--slotSizeH); border:1px dashed rgba(125,249,255,.4); border-radius:10px; position:relative; overflow:visible;
      background:radial-gradient(circle at 50% 40%, rgba(125,249,255,.05), transparent 70%); cursor:pointer; transition:box-shadow .2s ease, border-color .2s ease, transform .15s ease; }
    .dump:hover{ border-color:rgba(125,249,255,.85); box-shadow:0 0 16px rgba(0,230,255,.4); transform:translateY(-2px); }
    .dump.open{ border-color:#7df9ff; border-style:solid; box-shadow:0 0 20px rgba(125,249,255,.6); }
    .dump .stackCard{
      position:absolute; inset:0; border:2px solid var(--cy); border-radius:10px;
      background-size:cover; background-position:center; box-shadow:0 6px 12px rgba(0,0,0,.45);
      transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }
    .dump .stackCard.layer1{ transform:translate(0px,0px); }
    .dump .stackCard.layer2{ transform:translate(2px,2px); }
    .dump .stackCard.layer3{ transform:translate(4px,4px); }
    .dump .stackCard.layer4{ transform:translate(6px,6px); }
    .dump .stackCard.layer5{ transform:translate(8px,8px); }

    .dump.highlight {
        outline: 2px dashed #00e6ff88;
        outline-offset: 6px;
        border-radius: 12px;
        background: #00e6ff0a;
    }
    .dump.denied {
        outline: 2px dashed rgba(255,48,48,.95);
        background: #ff2a2a10;
    }

    .battleInner{ position:absolute; inset:8px 10px; display:flex; gap:8px; align-items:center; justify-content:space-between; pointer-events:none; }
    .drop{ flex:1; height:100%; pointer-events:auto; border-radius:10px; transition:background .15s ease, box-shadow .15s ease; }
    .drop.highlight{ outline:2px dashed #00e6ff88; outline-offset:-6px; border-radius:8px; background:#00e6ff0a; }
    .drop.denied{ outline:2px dashed rgba(255,48,48,.95); outline-offset:-6px; background:#ff2a2a10; }
    /* Dès qu'on saisit une carte jouable, les zones valides "respirent" pour inviter au dépôt */
    .drop.eligible{ outline:2px dashed rgba(45,255,160,.6); outline-offset:-6px; background:rgba(45,255,160,.06); animation:eligiblePulse 1.3s ease-in-out infinite; }
    @keyframes eligiblePulse{ 0%,100%{ box-shadow:inset 0 0 12px rgba(45,255,160,.15); } 50%{ box-shadow:inset 0 0 24px rgba(45,255,160,.35); } }

    /* === ARTEFACTS en dehors des zones de combat === */
    .artifactZone{ position:absolute; left:calc(10px + var(--artSide)); right:calc(10px + var(--artSide)); height:var(--artHeight); z-index:4; pointer-events:none; }
    .artifactZone.top{ bottom: calc(-1 * var(--artOffset)); }
    .artifactZone.bottom{ top:    calc(-1 * var(--artOffset)); }
    /* Avec le retournement d'écran, chaque rangée change physiquement de côté :
       il faut donc inverser le sens de la zone d'artefact pour qu'elle reste
       toujours orientée vers le centre du plateau, peu importe le siège. */
    body.flip-view .artifactZone.top{ bottom:auto; top: calc(-1 * var(--artOffset)); }
    body.flip-view .artifactZone.bottom{ top:auto; bottom: calc(-1 * var(--artOffset)); }
    .artifactInner{
      position:absolute; inset:0; display:flex; gap:8px; align-items:center; justify-content:space-between; pointer-events:auto;
      border:1.5px solid rgba(255,201,110,.55); border-radius:10px; background:linear-gradient(180deg,#3a2d10,#241a08);
      box-shadow:inset 0 0 16px rgba(255,180,60,.18); overflow:visible;
    }
    .aDrop{ flex:1; height:100%; }
    .aDrop.highlight{ outline:2px dashed #00e6ff88; outline-offset:-6px; border-radius:8px; background:#00e6ff0a; }
    .aDrop.eligible{ outline:2px dashed rgba(45,255,160,.6); outline-offset:-6px; background:rgba(45,255,160,.06); animation:eligiblePulse 1.3s ease-in-out infinite; }
    .artifactLabel{ position:absolute; pointer-events:none; color:#ffe9c4; text-shadow:0 1px 3px rgba(0,0,0,.8); font-weight:800; letter-spacing:.1em; font-size:12.5px; text-transform:uppercase;
      padding:6px 14px; border-radius:999px; background:linear-gradient(145deg,#6b4e15,#33230a); border:1.5px solid rgba(255,210,130,.75); box-shadow:0 2px 8px rgba(0,0,0,.5), 0 0 10px rgba(255,180,60,.35);
      display:flex; align-items:center; gap:6px; white-space:nowrap; z-index:10; }
    .artifactLabel::before{ content:'◆'; font-size:10px; color:#ffd98a; }
    .artifactLabel.topRight{ top:-18px; right:16px; }
    .artifactLabel.bottomRight{ bottom:-18px; right:16px; }

    /* Main */
    .hand{ 
      position:absolute; left:0; right:0; height:160px; pointer-events:none; z-index:1690;
      --handDragX: 0px; --handDragY: 0px;
      transform: translate(var(--handDragX), var(--handDragY));
      transition: transform 0.3s ease-out, bottom 0.3s ease-out, opacity .25s ease, filter .25s ease; /* AJOUT : Transition pour le zoom */
    }
    .handCount{ position:fixed; left:50%; transform:translateX(-50%); padding:4px 13px; border-radius:999px;
      background:linear-gradient(180deg,#0d2530,#061820); border:1px solid rgba(125,249,255,.45); color:#aefaff;
      font-weight:800; font-size:11.5px; white-space:nowrap; z-index:1691; pointer-events:none; box-shadow:0 0 8px rgba(0,230,255,.3);
      font-family:'Manrope',sans-serif; letter-spacing:.02em; }
    .handCount.top{ top:42px; bottom:auto; }
    .handCount.bottom{ bottom:220px; top:auto; }
    body.flip-view .handCount.top{ top:auto; bottom:220px; }
    body.flip-view .handCount.bottom{ bottom:auto; top:42px; }
    /* Ancrage direct au viewport (et non plus à la zone, dont la position peut
       varier selon la taille d'écran) : garantit que la main adverse reste
       toujours en haut de l'écran, et la sienne toujours en bas — y compris
       avec le retournement de siège, qui inverse alors ces deux ancrages.
       (Ne s'applique qu'à la main ADVERSE : la vôtre vit désormais dans sa
       propre box déplaçable, voir .myHandPanel plus bas.) */
    .hand.top{ position:fixed; top:66px; bottom:auto; left:0; right:0; }
    .hand.bottom{ position:fixed; bottom:54px; top:auto; left:0; right:0; }
    body.flip-view .hand.top{ top:auto; bottom:54px; }
    body.flip-view .hand.bottom{ bottom:auto; top:66px; }
    .hand.bottom::before{ content:''; position:absolute; left:10%; right:10%; bottom:-6px; height:40px; pointer-events:none;
      background:radial-gradient(ellipse 60% 100% at 50% 100%, rgba(45,255,160,.16), transparent 70%); z-index:0; }

    /* La poignée est positionnée dynamiquement en JS (position:fixed), pour rester
       toujours accrochée à SA main peu importe le retournement d'écran du siège.
       (Utilisée uniquement pour la main ADVERSE désormais.) */
    .handGrip{ position:fixed; left:0; top:0; transform:translateX(-50%); width:52px; height:26px; border-radius:10px 10px 0 0;
      background:linear-gradient(180deg,#0d3e2b,#052018); border:1px solid rgba(45,255,160,.5); border-bottom:none; color:#7dffc0; font-size:16px;
      display:flex; align-items:center; justify-content:center; cursor:grab; z-index:5100; box-shadow:0 -2px 8px rgba(0,0,0,.35), 0 0 10px rgba(45,255,160,.25);
      user-select:none; letter-spacing:2px; }
    .handGrip.hidden{ display:none; }
    .handGrip:active{ cursor:grabbing; }
    .handGrip{ touch-action:none; }
    .hand.grabbing{ transition:none !important; }

    /* AJOUT : Style de la main zoomée pendant le choix de faction — pour la
       main ADVERSE uniquement désormais (la vôtre est gérée dans sa box, voir
       expandMyHandPanel appelé au moment du choix de faction). */
    .hand.bottom.faction-select-zoom {
      bottom: 90px; top:auto;
      transform: translate(var(--handDragX), var(--handDragY)) scale(1.25);
      transform-origin: bottom center;
      z-index: 2001;
      opacity: 1 !important; filter:none !important;
    }
    .hand.top.faction-select-zoom {
      top: 90px; bottom:auto;
      transform: translate(var(--handDragX), var(--handDragY)) scale(1.25);
      transform-origin: top center;
      z-index: 2001;
      opacity: 1 !important; filter:none !important;
    }
    body.flip-view .hand.top.faction-select-zoom{ top:auto; bottom:90px; transform-origin:bottom center; }
    body.flip-view .hand.bottom.faction-select-zoom{ bottom:auto; top:90px; transform-origin:top center; }

    /* ===================================================================
       VOTRE MAIN — box à part, déplaçable et repliable
       =================================================================== */
    .myHandPanel{
      position:fixed; z-index:1700;
      /* Aligné avec le bord gauche RÉEL de la zone de combat : padding du
         plateau (28px) + largeur de la colonne deck/Mithril (--sidebarW) +
         l'espacement entre les deux (22px) — voir .board / .row / .deckWrap. */
      left:calc(28px + var(--sidebarW) + 22px); bottom:8px; top:auto; transform:none;
      width:min(90vw, 420px);
      display:flex; flex-direction:column;
      background:linear-gradient(180deg, rgba(9,22,28,.97), rgba(4,10,14,.98));
      border:1.5px solid rgba(125,249,255,.45);
      border-radius:14px;
      box-shadow:0 14px 36px rgba(0,0,0,.55), 0 0 24px rgba(0,230,255,.14);
    }
    .myHandPanel.attention{ animation: myHandPulse 1s ease-in-out 2; }
    @keyframes myHandPulse{ 0%,100%{ box-shadow:0 14px 36px rgba(0,0,0,.55), 0 0 24px rgba(0,230,255,.14);} 50%{ box-shadow:0 14px 36px rgba(0,0,0,.55), 0 0 46px rgba(0,230,255,.65);} }
    .myHandPanel-header{
      display:flex; align-items:center; gap:10px; padding:7px 8px 7px 14px;
      cursor:grab; user-select:none; touch-action:none;
      border-bottom:1px solid rgba(125,249,255,.25);
      font-family:'Cinzel','Manrope',sans-serif; font-weight:800; font-size:12px; color:#aefaff;
      letter-spacing:.03em; border-radius:12.5px 12.5px 0 0;
      background:linear-gradient(180deg, rgba(13,42,54,.92), rgba(9,22,28,.92));
    }
    .myHandPanel-header:active{ cursor:grabbing; }
    .myHandPanel-grip{ opacity:.6; font-size:13px; letter-spacing:2px; }
    .myHandPanel-title{ flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .myHandPanel-toggle{
      appearance:none; border:1px solid rgba(125,249,255,.4); background:rgba(0,230,255,.08); color:#aefaff;
      border-radius:8px; width:28px; height:24px; font-size:12px; cursor:pointer; line-height:1; flex:none;
      display:flex; align-items:center; justify-content:center; transition:background .15s ease;
    }
    .myHandPanel-toggle:hover{ background:rgba(0,230,255,.25); }
    /* Hauteur calculée directement à partir de la vraie taille des cartes
       (var(--cardH), qui change déjà selon la taille d'écran via les media
       queries existantes) + une marge large et fixe — jamais de pourcentage
       ni de position:absolute imbriqués, qui se sont montrés peu fiables
       d'un navigateur à l'autre. Les 3 niveaux ci-dessous partagent
       exactement la même formule, donc aucune ambiguïté de calcul possible. */
    .myHandPanel-body{
      position:relative; height:calc(var(--cardH) + 90px); overflow:hidden;
      transition:height .25s ease, opacity .2s ease;
    }
    .myHandPanel.collapsed .myHandPanel-body{
      height:0; opacity:0; overflow:hidden; pointer-events:none;
    }
    .hand.in-panel{
      position:static !important; height:calc(var(--cardH) + 90px); width:100%;
      transform:none !important; transition:none !important;
    }
    .hand.in-panel .card{ pointer-events:auto; }

    /* Rangée propre (sans éventail ni rotation) à l'intérieur de la box, avec
       défilement horizontal fluide dès que les cartes dépassent la largeur
       disponible — molette, glisser, ou flèches, au choix. Le padding vertical
       (15px en haut et en bas) est inclus dans la hauteur grâce à box-sizing,
       laissant ~60px de marge réelle autour de la carte : bien plus que ce
       qu'il faut pour le survol (agrandissement à 1.15 + léger décollage). */
    .handRow{
      height:calc(var(--cardH) + 90px); width:100%; box-sizing:border-box;
      display:flex; align-items:center; gap:10px;
      padding:15px 40px; overflow-x:auto; overflow-y:hidden; scroll-behavior:smooth;
      scrollbar-width:thin; scrollbar-color:rgba(125,249,255,.5) rgba(255,255,255,.06);
    }
    .handRow::-webkit-scrollbar{ height:7px; }
    .handRow::-webkit-scrollbar-track{ background:rgba(255,255,255,.04); border-radius:999px; }
    .handRow::-webkit-scrollbar-thumb{ background:rgba(125,249,255,.45); border-radius:999px; }
    .handRow::-webkit-scrollbar-thumb:hover{ background:rgba(125,249,255,.7); }

    .card.in-line{
      position:relative !important; left:auto !important; bottom:auto !important;
      flex:0 0 auto; transform:none !important;
    }
    .card.in-line:hover{ transform:translateY(-10px) scale(1.15) !important; z-index:60; }

    .myHandPanel-scrollBtn{
      position:absolute; top:0; bottom:0; width:34px; z-index:6;
      display:flex; align-items:center; justify-content:center;
      border:none; color:#eafcff; font-size:16px; cursor:pointer; opacity:.9;
      background:linear-gradient(90deg, rgba(6,16,20,.92), transparent);
      transition:opacity .15s ease;
    }
    .myHandPanel-scrollBtn:hover{ opacity:1; }
    .myHandPanel-scrollBtn.left{ left:0; }
    .myHandPanel-scrollBtn.right{ right:0; background:linear-gradient(270deg, rgba(6,16,20,.92), transparent); }
    .myHandPanel-scrollBtn.hide{ opacity:0; pointer-events:none; }

    .card{
      width:var(--cardW); height:var(--cardH); border:2px solid var(--cy); border-radius:12px; background:linear-gradient(145deg,#fff,#e6e6e6);
      color:#111; font-weight:800; display:flex; align-items:center; justify-content:center;
      position:absolute; left:50%; bottom:0; transform-origin:bottom center; box-shadow:0 0 12px #00e6ffcc, 0 6px 14px rgba(0,0,0,.45); cursor:grab; transition:transform .15s ease, box-shadow .2s ease;
      pointer-events:auto; user-select:none; background-size:cover; background-position:center; overflow:visible;
    }
    .card:hover{ transform:scale(1.15) translateY(-8px); z-index:50; box-shadow:0 0 20px #00e6ffdd, 0 14px 22px rgba(0,0,0,.5); }
    /* Rotation de l'éventail de la main via variable CSS (au lieu d'un transform
       en ligne), pour que le survol standard ci-dessus puisse s'appliquer normalement
       — au survol, une carte s'agrandit légèrement ET son grand format apparaît à
       droite de l'écran comme d'habitude (voir showZoom, déjà déclenché au survol). */
    .hand .card{ transform: translateX(-50%) rotate(var(--fanRotate, 0deg)); }
    .hand .card:hover{ transform: translateX(-50%) rotate(0deg) scale(1.15) translateY(-8px); }
    .placed{ position:relative; left:auto; bottom:auto; transform:none; cursor:grab; }

    @keyframes denyShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    .card.deny{ animation:denyShake .25s linear; }

    .hp{
      position:absolute; right:-7px; top:50%; transform:translateY(-50%); width:29px; height:29px;

      border:2px solid rgba(255,190,190,.95);
      box-shadow:0 0 12px rgba(255,40,40,.65), 0 3px 5px rgba(0,0,0,.55), inset 0 -3px 5px rgba(0,0,0,.35), inset 0 2px 3px rgba(255,255,255,.4);
      color:#fff; font-weight:900; font-size:13px; font-family:'Manrope',sans-serif;

    #zoom .hp{ right:-14px; width:46px; height:46px; font-size:19px; }
    .shield{

      border-radius:50% 50% 22% 22% / 64% 64% 30% 30%;
      background: radial-gradient(circle at 30% 22%, rgba(255,255,255,.75), transparent 42%), radial-gradient(closest-side, #55d6ff 55%, #0a4f8a);
      border:2px solid rgba(195,238,255,.95);
      box-shadow:0 0 12px rgba(70,195,255,.65), 0 3px 5px rgba(0,0,0,.55), inset 0 -3px 5px rgba(0,0,0,.3), inset 0 2px 3px rgba(255,255,255,.4);
      color:#eafcff; font-weight:900; font-size:12px; font-family:'Manrope',sans-serif; text-shadow:0 1px 2px rgba(0,0,0,.9), 0 0 3px rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:15; pointer-events:none; overflow:visible;
    }
    #zoom .shield{ right:-14px; width:46px; height:46px; font-size:17px; top:calc(50% + 44px); }

    /* Bouton fin de tour + minuteur de tour — conçu comme un petit bloc
       compact (bouton + fine barre) plutôt qu'un anneau circulaire autour
       d'un bouton ovale, qui prenait trop de place et débordait sur les
       éléments voisins (compteur de Cycles). */
    #turnTimerWrap{ position:fixed; right:26px; bottom:26px; z-index:1200;
      display:flex; flex-direction:column; align-items:center; gap:5px; width:auto; }
    #turnTimerWrap.hidden{ display:none; }
    #endTurn{ position:relative; background:linear-gradient(180deg,#2dffa0,#0aa860);
      border:2px solid rgba(255,255,255,.4); color:#012016; font-weight:900; padding:13px 22px; border-radius:999px;
      box-shadow:0 5px 0 #075c3a, 0 9px 18px rgba(10,168,96,.5), 0 0 0 3px rgba(45,255,160,.15); cursor:pointer;
      letter-spacing:.04em; text-transform:uppercase; font-family:'Cinzel','Manrope',sans-serif; font-size:11.5px;
      transition:transform .12s ease, box-shadow .12s ease, background .4s ease; }
    body.not-my-turn #endTurn:not(:disabled){ animation:none; }
    #endTurn:not(:disabled){ animation:endTurnBeacon 2.2s ease-in-out infinite; }
    @keyframes endTurnBeacon{ 0%,100%{ box-shadow:0 5px 0 #075c3a, 0 9px 18px rgba(10,168,96,.5), 0 0 0 3px rgba(45,255,160,.15);} 50%{ box-shadow:0 5px 0 #075c3a, 0 12px 24px rgba(10,168,96,.65), 0 0 0 7px rgba(45,255,160,.05);} }
    #endTurn:hover:not(:disabled){ transform:translateY(-2px); box-shadow:0 7px 0 #075c3a, 0 11px 20px rgba(10,168,96,.55); }
    #endTurn:active:not(:disabled){ transform:translateY(1px); box-shadow:0 2px 0 #075c3a; }
    #endTurn:disabled{ background:linear-gradient(180deg,#3a4a4a,#20302f); box-shadow:0 4px 0 #16201f; color:#9fb; cursor:not-allowed; animation:none; }
    #endTurn.hidden{ display:none; }

    /* Le bouton lui-même change de couleur selon l'urgence, pas seulement
       une barre à côté — impossible à manquer. */
    #turnTimerWrap.warn #endTurn{ background:linear-gradient(180deg,#ffd75e,#e0a300); box-shadow:0 5px 0 #7a5600, 0 9px 18px rgba(224,163,0,.5), 0 0 0 3px rgba(255,215,94,.18); }
    #turnTimerWrap.warn #endTurn:not(:disabled){ animation:endTurnBeaconWarn 1.6s ease-in-out infinite; }
    @keyframes endTurnBeaconWarn{ 0%,100%{ box-shadow:0 5px 0 #7a5600, 0 9px 18px rgba(224,163,0,.5), 0 0 0 3px rgba(255,215,94,.18);} 50%{ box-shadow:0 5px 0 #7a5600, 0 12px 26px rgba(224,163,0,.7), 0 0 0 8px rgba(255,215,94,.08);} }
    #turnTimerWrap.urgent #endTurn{ background:linear-gradient(180deg,#ff6b6b,#c81e1e); color:#fff; box-shadow:0 5px 0 #6e0f0f, 0 9px 18px rgba(200,30,30,.55), 0 0 0 3px rgba(255,107,107,.2); }
    #turnTimerWrap.urgent #endTurn:not(:disabled){ animation:endTurnUrgent .6s ease-in-out infinite !important; }
    @keyframes endTurnUrgent{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.07); } }

    /* Fine barre de progression, largeur = celle du bouton, sous celui-ci. */
    #turnTimerBarTrack{ width:100%; height:5px; border-radius:999px; background:rgba(255,255,255,.1);
      overflow:hidden; box-shadow:inset 0 1px 2px rgba(0,0,0,.4); }
    #turnTimerBarFill{ height:100%; width:100%; border-radius:999px; background:#2dffa0;
      box-shadow:0 0 6px rgba(45,255,160,.7); transition:width 1s linear, background .4s ease; transform-origin:left center; }
    #turnTimerWrap.warn #turnTimerBarFill{ background:#ffd75e; box-shadow:0 0 8px rgba(255,215,94,.75); }
    #turnTimerWrap.urgent #turnTimerBarFill{ background:#ff4d4d; box-shadow:0 0 8px rgba(255,77,77,.85); }

    /* Petit badge numérique (secondes restantes), sous la barre. */
    #turnTimerLabel{
      font-size:10.5px; font-weight:900; color:#aefaff; font-family:'Manrope',sans-serif;
      background:rgba(6,24,32,.7); border:1px solid rgba(125,249,255,.4); border-radius:999px;
      padding:1px 9px; letter-spacing:.02em;
    }
    #turnTimerWrap.warn #turnTimerLabel{ color:#ffe9b0; border-color:rgba(255,215,94,.55); }
    #turnTimerWrap.urgent #turnTimerLabel{ color:#ffc6c6; border-color:rgba(255,77,77,.65); }
    #turnTimerLabel.hidden{ display:none; }

    /* Ressources */
    .resHUD{ position:absolute; display:flex; flex-direction:column; align-items:stretch; gap:6px; z-index:950; }
    .resHUD.top{ top:100%; left:-4px; transform:translateY(10px); }
    .resHUD.bottom{ bottom:100%; left:-4px; transform:translateY(-10px); }

    /* Surtaxe de forge (Imposytion) */
    .forgeTaxBadge{
      padding:4px 8px;
      border-radius:8px;
      border:1px solid rgba(255,184,77,.75);
      color:#ffb84d;
      background:linear-gradient(145deg,#2b1a00,#3a2400);

      white-space:nowrap;
      text-align: center;
      box-shadow:inset 0 0 6px rgba(255,255,255,.08);

    }

    .mithrilBox{ padding:8px 14px; border-radius:999px; background:linear-gradient(145deg,#0d3e4a,#031619); border:1px solid rgba(125,249,255,.55);
      color:var(--mithril); box-shadow:0 0 16px rgba(125,249,255,.35), inset 0 1px 0 rgba(255,255,255,.08), inset 0 0 10px rgba(125,249,255,.1); font-weight:800; font-size:13px;
      font-family:'Cinzel','Manrope',sans-serif; letter-spacing:.02em; white-space:nowrap; display: flex; align-items: center; gap: 7px; }
    .factionBadge{ display:flex; align-items:center; gap:7px; padding:6px 14px; border-radius:999px;
      background:linear-gradient(145deg,var(--fbGlow,rgba(125,249,255,.25)),rgba(2,10,13,.7)); border:1.5px solid var(--fbColor,rgba(125,249,255,.6));
      box-shadow:0 0 14px var(--fbColor,rgba(125,249,255,.4)); animation:factionBadgeIn .3s cubic-bezier(.2,.9,.3,1.3); }
    .factionBadge img{ width:20px; height:20px; object-fit:contain; filter:drop-shadow(0 0 4px rgba(255,255,255,.5)); }
    .factionBadge span{ font-family:'Cinzel','Manrope',sans-serif; font-weight:800; font-size:12px; color:#fff; letter-spacing:.03em; text-shadow:0 1px 2px rgba(0,0,0,.7); white-space:nowrap; }
    @keyframes factionBadgeIn{ from{ opacity:0; transform:scale(.7) translateY(4px); } to{ opacity:1; transform:none; } }
    .armsRow{ display:flex; gap:var(--armGap); justify-content: center; padding:4px 6px; border-radius:999px; background:rgba(2,10,13,.4); border:1px solid rgba(125,249,255,.12); flex-wrap:nowrap; max-width:100%; }
    .armSlot{ width:var(--armSlotSize); height:var(--armSlotSize); flex:none; border-radius:50%; border:1.5px dashed rgba(125,249,255,.35); background:rgba(0,0,0,.35); box-shadow:inset 0 0 8px rgba(0,230,255,.18); position:relative; }
    .armActive{ border:1.5px solid var(--armColor,#19e27a); background:radial-gradient(circle at 45% 40%, var(--armColor,#19e27a), #021);
      box-shadow:0 0 16px var(--armColor,#19e27a), inset 0 0 8px var(--armColor,#19e27a); }
    .armActive::before{ content:""; position:absolute; inset:6px; border-radius:50%; border:1.5px solid rgba(255,255,255,.3); box-shadow:0 0 6px rgba(255,255,255,.2); }

    /* KRYLLS : Forgecoeur (T14) — croix sur les emplacements d'A'rms
       devenus inutiles, en partant de la droite. */
    .armCrossedOut{ opacity:.55; }
    .armCrossMark{
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      color:#ffd93d; font-size:calc(var(--armSlotSize, 20px) * 0.7); font-weight:900; line-height:1;
      text-shadow:0 0 6px rgba(255,217,61,.7); pointer-events:none;
    }
    /* Célébration : la case d'A'rms qui vient tout juste de se forger
       s'illumine avec un éclat marqué avant de revenir à son état normal. */
    @keyframes armForgedPulse{
      0%{ transform:scale(1); filter:brightness(1); }
      35%{ transform:scale(1.5); filter:brightness(2.2) saturate(1.6); box-shadow:0 0 28px var(--armColor,#19e27a), 0 0 50px var(--armColor,#19e27a); }
      100%{ transform:scale(1); filter:brightness(1); }
    }
    .armForged{ animation:armForgedPulse 1.4s cubic-bezier(.2,.8,.25,1) 2; }

.mithrilCostMod {
  color: var(--orange); /* --orange est déjà défini, c'est parfait */
  font-weight: 900;
  margin-left: 8px; /* Ajoute un petit espace */
}

    /* Cycles HUD */
    .cycleHUD{
      position:absolute; display:flex; align-items:center; gap:6px; z-index:960;
      padding:5px 8px; border-radius:999px;
      background:linear-gradient(145deg,#0d1f28,#050e12); border:1px solid rgba(0,230,255,.2);
      box-shadow:0 0 10px rgba(0,230,255,.12), inset 0 1px 0 rgba(255,255,255,.05);
      font-weight:800; font-size:12px; color:#aefaff;
    }
    .cycleHUD.top{ bottom:calc(100% + 6px); right:-6px; }
    .cycleHUD.bottom{ top:calc(100% + 6px); right:-6px; }
    .cycleHUD .cycleLabel{ opacity:.7; margin-right:2px; letter-spacing:.04em; font-size:10px; text-transform:uppercase; }
    .cyclePip{
      width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center;
      border:1.5px solid #5a6b72; color:#5a6b72; background:rgba(90,107,114,.1);
      text-shadow:none; box-shadow:inset 0 0 4px rgba(0,0,0,.2); line-height:1; font-size:10px;
    }
    .cycleHUD.stage1 .cyclePip.active{ border-color:#ffc400; background:#ffc400; color:#2a2100; box-shadow:0 0 12px #ffc400, inset 0 0 6px rgba(0,0,0,.25); }
    .cycleHUD.stage2 .cyclePip.active{ border-color:#ff9800; background:#ff9800; color:#2a0f00; box-shadow:0 0 12px #ff9800, inset 0 0 6px rgba(0,0,0,.25); }
    .cycleHUD.stage3 .cyclePip.active{ border-color:#ff5252; background:#ff5252; color:#1b0000; box-shadow:0 0 14px #ff5252, inset 0 0 6px rgba(0,0,0,.25); }

    /* Effets PV */
    @keyframes hpHit { 0%{ transform:translateY(-50%) scale(1.08); box-shadow:0 0 18px rgba(255,0,0,.65), inset 0 0 10px rgba(255,0,0,.45);} 100%{ transform:translateY(-50%) scale(1.0); box-shadow:0 0 12px rgba(255,0,0,.45), inset 0 0 8px rgba(255,0,0,.35);} }
    .hp.hit{ animation:hpHit .3s ease; }

    /* Viseur attaque */
    #aimLayer{ position:fixed; inset:0; pointer-events:none; z-index:1300; }
    .aimArrow{ position:absolute; height:4px; background:linear-gradient(90deg,#b00000,#ff2a2a); box-shadow:0 0 12px #ff2a2a; transform-origin:left center; border-radius:4px; }
    .aimArrow::after{ content:""; position:absolute; right:-8px; top:50%; width:0; height:0; transform:translateY(-50%); border-left:10px solid #ff2a2a; border-top:6px solid transparent; border-bottom:6px solid transparent; filter:drop-shadow(0 0 6px #ff2a2a); }
    .card.placed.enemyTargetHint{ outline:3px solid rgba(255,48,48,.95); outline-offset:-6px; }
    .card.placed.positiveTargetHint{ outline:3px solid rgba(25,226,122,.95); box-shadow:0 0 14px rgba(25,226,122,.55); outline-offset:-6px; }
    .card.placed.poisonTargetHint{
      outline:3px solid #ffd93d !important; outline-offset:-6px;
      box-shadow:0 0 22px rgba(255,217,61,.8) !important;
      animation:poisonTargetPulse 1.1s ease-in-out infinite;
    }
    @keyframes poisonTargetPulse{
      0%,100%{ outline-color:#ffd93d; filter:brightness(1); }
      50%{ outline-color:#fff6cf; filter:brightness(1.35); }
    }

    /* KRYLLS : Ozokshi (C34) — surbrillance dorée pulsante sur les
       artefacts de la main éligibles au choix gratuit. */
    .card.ozokshiEligibleHint{
      outline:3px solid #ffd93d !important; outline-offset:-4px;
      box-shadow:0 0 20px rgba(255,217,61,.75) !important;
      animation:poisonTargetPulse 1.1s ease-in-out infinite;
      cursor:pointer;
    }

    .card.placed.selectedTargetHint {
      outline: 4px solid #ffca3a; /* Bordure jaune/dorée bien visible */
      box-shadow: 0 0 20px #ffca3a;
      transform: scale(1.05); /* Légèrement plus grande pour confirmer la sélection */
    }

    /* Sélection d'EXIL pour Azpiryne (C18) */
    #exileCarousel.selecting{
      border-color:#7df9ff !important;
      box-shadow:0 0 22px #7df9ff66 !important;
    }
    #exileCarousel.selecting .thumb{
      cursor:pointer;
      outline:2px dashed #7df9ff66;
    }
    #exileCarousel.selecting .thumb:hover{
      transform:scale(1.18);
      z-index:2;
    }

    /* Fantômes */
    .ghostClone{
      position:fixed; width:86px; height:124px; border:2px solid rgba(255,42,42,.75);
      border-radius:12px; background-size:cover; background-position:center;
      box-shadow:0 0 16px rgba(255,42,42,.55); pointer-events:none; z-index:1400;
      transform:translate(0,0) scale(1); opacity:.9;
      transition: transform .45s ease, opacity .45s ease;
    }
    .vortexGhost{
      position:fixed; width:86px; height:124px; border:2px solid rgba(125,249,255,.95);
      border-radius:12px; background-size:cover; background-position:center;
      box-shadow:0 0 18px rgba(125,249,255,.65), inset 0 0 8px rgba(125,249,255,.35);
      pointer-events:none; z-index:1400;
      transform:translate(0,0) scale(1) rotate(0deg); opacity:.95;
      transition: transform .8s cubic-bezier(.2,.7,.2,1), opacity .8s ease;
      filter:drop-shadow(0 0 12px rgba(0,230,255,.45));
    }

    /* EXIL — la carte est "aspirée" : rétrécissement extrême + rotation
       rapide + assombrissement, façon trou noir/portail, terminant pile sur
       le portail violet. Courbe d'accélération marquée (ease-in) pour bien
       vendre l'idée d'aspiration plutôt qu'un simple déplacement. */
    .exileGhost{
      position:fixed; width:86px; height:124px; border:2px solid rgba(155,107,255,.9);
      border-radius:12px; background-size:cover; background-position:center;
      box-shadow:0 0 20px rgba(155,107,255,.6), inset 0 0 10px rgba(155,107,255,.4);
      pointer-events:none; z-index:1400;
      transform:translate(0,0) scale(1) rotate(0deg); opacity:1;
      transition: transform .5s cubic-bezier(.55,0,.85,.35), opacity .5s cubic-bezier(.55,0,.85,.35), filter .5s ease;
      filter:drop-shadow(0 0 14px rgba(155,107,255,.6));
    }
    /* Pulse violet sur le portail au moment de l'impact, pour "sceller" l'absorption. */
    #exileZone.exileImpact #exileRift{
      animation:exileImpactPulse .5s ease-out;
    }
    @keyframes exileImpactPulse{
      0%{ box-shadow:0 0 12px rgba(155,107,255,.5), inset 0 0 10px rgba(155,107,255,.4); }
      35%{ box-shadow:0 0 34px rgba(200,170,255,1), inset 0 0 20px rgba(200,170,255,.9); transform:scale(1.35); }
      100%{ box-shadow:0 0 12px rgba(155,107,255,.5), inset 0 0 10px rgba(155,107,255,.4); transform:scale(1); }
    }

    /* DÉFAUSSE — vol plus sobre et naturel vers la pile, la carte se retourne
       légèrement de travers comme jetée sur un tas, sans effet spectaculaire
       pour rester discret sur ce qui reste une action très fréquente. */
    .discardGhost{
      position:fixed; width:86px; height:124px; border:2px solid rgba(255,255,255,.35);
      border-radius:12px; background-size:cover; background-position:center;
      box-shadow:0 6px 16px rgba(0,0,0,.5); pointer-events:none; z-index:1400;
      transform:translate(0,0) scale(1) rotate(0deg); opacity:.95;
      transition: transform .45s cubic-bezier(.3,.6,.35,1), opacity .45s ease;
    }

    /* WADOO 6e lot : Fusionner les tous (C236) — chaque carte adverse est
       aspirée façon vortex monstrueux (teinte pourpre/violette, saturée)
       vers le centre de la zone, où une onde de choc marque l'apparition
       d'Ignominie. */
    .fusionGhost{
      position:fixed; width:86px; height:124px; border:2px solid rgba(180,40,220,.85);
      border-radius:12px; background-size:cover; background-position:center;
      box-shadow:0 0 22px rgba(180,40,220,.65), inset 0 0 10px rgba(180,40,220,.5);
      pointer-events:none; z-index:1450;
      transform:translate(0,0) scale(1) rotate(0deg); opacity:1;
      transition: transform .85s cubic-bezier(.6,0,.85,.35), opacity .85s cubic-bezier(.6,0,.85,.35), filter .85s ease;
      filter:saturate(1.8) hue-rotate(270deg) brightness(.55) blur(1px);
    }
    .fusionFlash{
      position:fixed; width:14px; height:14px; margin-left:-7px; margin-top:-7px;
      border-radius:50%; background:radial-gradient(circle, #fff 0%, #c86bff 45%, transparent 72%);
      pointer-events:none; z-index:1460; opacity:.95; transform:scale(1);
      transition: transform .65s cubic-bezier(.15,.85,.3,1), opacity .65s ease;
    }
    .fusionFlash.go{ transform:scale(34); opacity:0; }

    /* Secousse d'écran au moment de l'impact de la fusion. */
    @keyframes fusionShakeKeyframes{
      0%{ transform:translate(0,0); }
      10%{ transform:translate(-7px,5px); }
      20%{ transform:translate(8px,-6px); }
      30%{ transform:translate(-9px,-3px); }
      40%{ transform:translate(7px,7px); }
      50%{ transform:translate(-6px,4px); }
      60%{ transform:translate(5px,-7px); }
      70%{ transform:translate(-7px,2px); }
      80%{ transform:translate(6px,3px); }
      90%{ transform:translate(-3px,-2px); }
      100%{ transform:translate(0,0); }
    }
    body.fusionShake{ animation:fusionShakeKeyframes .65s cubic-bezier(.36,.07,.19,.97) both; }

    /* Assombrissement pourpre progressif de tout l'écran pendant la fusion,
       pour une ambiance plus monstrueuse/oppressante. */
    .fusionVignette{
      position:fixed; inset:0; z-index:1440; pointer-events:none;
      opacity:0; transition:opacity .45s ease, background .45s ease;
      background:radial-gradient(ellipse at center, transparent 30%, rgba(60,10,90,0) 55%, rgba(10,0,20,0) 100%);
    }
    .fusionVignette.go{
      opacity:1;
      background:radial-gradient(ellipse at center, transparent 15%, rgba(90,15,140,.4) 55%, rgba(8,0,16,.8) 100%);
    }

    /* Ignominie (T08) errant dans sa zone pendant Ignominie.mp3 : la case
       elle-même tremble en continu (distinct de la secousse ponctuelle de
       la fusion), et chaque déplacement laisse un reflet éthéré qui s'estompe. */
    @keyframes ignominieZoneShakeKeyframes{
      0%,100%{ transform:translate(0,0) rotate(0deg); }
      15%{ transform:translate(-2px,1px) rotate(-.3deg); }
      30%{ transform:translate(2px,-2px) rotate(.3deg); }
      45%{ transform:translate(-2px,-1px) rotate(-.2deg); }
      60%{ transform:translate(2px,2px) rotate(.2deg); }
      75%{ transform:translate(-1px,1px) rotate(-.15deg); }
      90%{ transform:translate(1px,-1px) rotate(.15deg); }
    }

/* === NOUVEAU : Effet visuel pour les cartes Esprit === */
@keyframes espritGlow {
  0% {
    box-shadow: 0 0 12px rgba(125, 249, 255, 0.5), inset 0 0 8px rgba(125, 249, 255, 0.2);
    filter: drop-shadow(0 0 4px rgba(125, 249, 255, 0.4));
    transform: translateY(0px);
  }
  50% {
    box-shadow: 0 0 22px rgba(174, 250, 255, 0.8), inset 0 0 14px rgba(174, 250, 255, 0.4);
    filter: drop-shadow(0 0 10px rgba(174, 250, 255, 0.7));
    transform: translateY(-3px); /* Ajoute un léger effet de flottement */
  }
  100% {
    box-shadow: 0 0 12px rgba(125, 249, 255, 0.5), inset 0 0 8px rgba(125, 249, 255, 0.2);
    filter: drop-shadow(0 0 4px rgba(125, 249, 255, 0.4));
    transform: translateY(0px);
  }
}

.card.placed.is-esprit {
  animation: espritGlow 4s ease-in-out infinite;
  opacity: 0.9;
  border: 2px solid rgba(125, 249, 255, 0.6) !important;
}

.card.placed.is-esprit:hover {
    transform: translateY(-3px) scale(1.0); /* Garde la position haute de l'animation et annule le zoom */
    z-index: 50;
}

/* Quand un Esprit est épuisé (miné, attaqué, ou tout juste posé), on interrompt
   le flottement/lueur animés en continu : sans ça, l'animation infinie de
   espritGlow réécrivait `transform` et `filter` à chaque frame et masquait
   complètement l'état "courbé et grisé" que toutes les autres cartes affichent. */
.card.placed.is-esprit.exhausted{
  animation: none;
  opacity:.92;
  filter: grayscale(.55) contrast(.95);
  transform: rotate(8deg);
  box-shadow: 0 0 12px rgba(125,249,255,.25), inset 0 0 8px rgba(125,249,255,.1);
}
.card.placed.is-esprit.exhausted:hover{
  transform: rotate(8deg) scale(1.0);
}

    /* === MODE PNG TRANSPARENT : supprimer tous les cadres/fonds des cartes === */
    /* Cartes sur le plateau + dos + zoom + miniatures (exil/défausse) + familiers */
    .card,
    .card.back,
    .thumb,
    .dthumb,
    .dump .stackCard,
    .famMini,
    #zoom .zoomCard {
      border: none !important;
      box-shadow: none !important;
      background-color: transparent !important; /* NE PAS mettre `background:` pour ne pas effacer l'image */
    }

    /* Deck visible (on enlève juste le trait, on garde l'image de dos) */
    .deck {
      border: none !important;
      box-shadow: none !important;
      background-color: transparent !important; /* garde le background-image Versobasic */
    }

    /* Petits dos affichés sous Rescelleur (C8) : garder l'image mais enlever le trait/ombre */
    .underBack {
      border: none !important;
      box-shadow: none !important;
    }

    /* === Afficher l'image des cartes en entier (pas de rognage) === */
    .card:not(.back),
    .thumb,
    .dthumb,
    .dump .stackCard,
    #zoom .zoomCard,
    .famMini,
    .vortexGhost,
    .ghostClone,
    .exileGhost,
    .discardGhost,
    .fusionGhost {
      background-size: contain !important;   /* affiche l'image entière */
      background-position: center center;
      background-repeat: no-repeat;
    }

    /* Conserver le "dos" (Versobasic) en plein cadre */
    .card.back,
    .underBack,
    .deck {
      background-size: cover;                /* on garde le dos en plein cadre */
    }

    /* Épuisement visuel — version unique */
    .card.placed.exhausted{
      opacity:.92;
      filter: grayscale(.55) contrast(.95);
      transform: rotate(8deg);
      cursor:not-allowed;
      transition: transform .12s ease, filter .12s ease, opacity .12s ease;
    }
    .card.placed.exhausted:hover{
      transform: rotate(8deg) scale(1.0);
    }

  max-width: 700px !important;
  text-align: center;
}
.liens-prompt::after {
  display: none; /* On enlève la flèche latérale quand la fenêtre est centrée */
}
.liens-choices {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 15px;
}
.liens-card {
  width: 172px;
  height: 248px;
  cursor: pointer !important; /* Le curseur indique qu'on peut cliquer */
  position: relative !important;
  left: auto;
  bottom: auto;
  transition: transform 0.2s ease, filter 0.2s ease;
}
.liens-card:hover {
    transform: scale(1.05) translateY(-10px) !important; /* Effet de survol amélioré */
    filter: drop-shadow(0 0 15px #7df9ff);
}
/* === NOUVEAU : Effet visuel pour les cartes gelées === */
@keyframes frozenGlow {
  0% {
    box-shadow: 0 0 10px rgba(173, 216, 230, 0.4), inset 0 0 8px rgba(173, 216, 230, 0.2);
    border-color: rgba(173, 216, 230, 0.7);
  }
  50% {
    box-shadow: 0 0 20px rgba(224, 248, 255, 0.8), inset 0 0 14px rgba(224, 248, 255, 0.4);
    border-color: rgba(224, 248, 255, 1);
  }
  100% {
    box-shadow: 0 0 10px rgba(173, 216, 230, 0.4), inset 0 0 8px rgba(173, 216, 230, 0.2);
    border-color: rgba(173, 216, 230, 0.7);
  }
}

.card.placed.is-frozen {
  /* On rend la carte inutilisable */
  cursor: not-allowed !important;
  
  /* Apparence glacée */
  border: 3px solid rgba(173, 216, 230, 0.7) !important; /* Bordure bleu glacier */
  filter: grayscale(60%) brightness(1.1); /* Désature et éclaircit l'image */
  
  /* Animation de lueur glaciale */
  animation: frozenGlow 5s ease-in-out infinite;
  
  /* Nécessaire pour positionner les superpositions */
  position: relative; 
  }

/* Superposition d'un voile de glace */
.card.placed.is-frozen::before {
  content: '';
  position: absolute;
  inset: 0; /* Couvre toute la carte */
  background: linear-gradient(45deg, rgba(200, 230, 255, 0.35), rgba(150, 200, 255, 0.15));
  pointer-events: none; /* N'interfère pas avec la souris */
  z-index: 8;
}

/* Texte "GELÉ" superposé */
.card.placed.is-frozen::after {
  content: 'GELÉ';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-15deg); /* Centré et incliné */

/* NOUVEAU : Style pour les copies créées par Miroir Papillon */
.card.is-mirrored-copy {
  /* Ajoute une lueur prismatique distinctive */
  box-shadow: 0 0 18px #ff00ff, inset 0 0 12px rgba(0, 255, 255, 0.5) !important;
}
.card.is-mirrored-copy::after {
  content: 'COPIE';
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(90deg, #00e6ff, #ff00ff);
  color: white;
  font-weight: 900;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  text-shadow: 0 0 4px #000;
  z-index: 10;
}
  
  /* Style du texte */
  color: #e0f8ff; /* Couleur bleu très clair, presque blanc */
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  
  /* Effet de lueur pour le texte, qui le rend lisible et stylé */
  text-shadow: 0 0 4px #fff, 0 0 10px var(--cy), 0 0 18px var(--cyA);
  
  pointer-events: none; /* N'interfère pas avec la souris */
  z-index: 9;
}

/* Empêche les effets de survol (zoom, etc.) sur une carte gelée */
.card.placed.is-frozen:hover {
  transform: none !important;
  z-index: initial !important;
}

/* NOUVEAU : Style pour le marqueur de BUTS de Flavio VII (C154) */
/* NOUVEAU STYLE (PRO) POUR LE MARQUEUR DE BUTS DE FLAVIO VII (C154) */
.goalsWrap {
  position: absolute;
  left: 6px;
  top: 10px;
  z-index: 7;
  pointer-events: none;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5)); /* Ajoute une ombre portée nette */
}
.goalPip {
  background: radial-gradient(circle at 65% 35%, #fffde4, #ffd700 60%, #b8860b);
  color: #4B3621; /* Brun foncé pour un look "gravé" */
  border: 2px solid #B8860B; /* Bordure or foncé */
  border-radius: 50%;
  width: 26px;
  height: 26px;
  font-size: 14px; /* Légèrement plus grand pour mieux remplir l'espace */
  font-weight: 900;
  line-height: 1;
  /* Ombres complexes pour un effet 3D et une lueur */
  box-shadow: 
    inset 0 1px 2px rgba(255, 255, 255, 0.7), /* Reflet interne */
    inset 0 -1px 2px rgba(0, 0, 0, 0.3),   /* Ombre interne */

  align-items: center;
  justify-content: center;

#zoom .goalsWrap { left: 18px; top: 20px; }
#zoom .goalPip { width: 42px; height: 42px; font-size: 20px; border-width: 3px; }
/* NOUVEAUX STYLES POUR L'ATTAQUE DIRECTE DE FLAVIO VII */

/* Le conteneur principal de la zone d'attaque adverse */
.field-opponent {
    position: relative; /* Important pour que l'overlay se positionne correctement */
    overflow: hidden; /* Pour s'assurer que les effets ne débordent pas */
}

/* L'overlay qui transforme la zone en "cage de but" */
.direct-attack-target-active .field-opponent::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        /* Motif de filet ou de cible */
        linear-gradient(to right, rgba(255, 215, 0, 0.1) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 215, 0, 0.1) 1px, transparent 1px);
    background-size: 20px 20px; /* Taille des carreaux du filet */
    box-shadow: 0 0 30px 10px rgba(255, 215, 0, 0.6); /* Lumière dorée éclatante */
    border: 5px solid gold; /* Cadre doré épais */
    border-radius: 10px; /* Bords légèrement arrondis */
    opacity: 0;
    animation: 
        fadeInTarget 0.5s forwards ease-out,
        pulseTarget 2s infinite alternate ease-in-out; /* Animation de pulsation */
    z-index: 10; /* S'assurer qu'il est au-dessus des autres éléments */
    
}

/* Animation d'apparition */
@keyframes fadeInTarget {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

/* Animation de pulsation subtile */
@keyframes pulseTarget {
    from { box-shadow: 0 0 30px 10px rgba(255, 215, 0, 0.6); transform: scale(1); }
    to { box-shadow: 0 0 45px 15px rgba(255, 215, 0, 0.9); transform: scale(1.02); }
}

/* Vous devrez probablement ajouter une classe au body ou à un conteneur parent */
/* par exemple, lorsque Flavio VII peut attaquer directement */
/* Cette classe "direct-attack-target-active" sera ajoutée/retirée par JavaScript */
/* Exemple : document.body.classList.add('direct-attack-target-active'); */
/* document.body.classList.remove('direct-attack-target-active'); */

/* Pour les flèches d'attaque, on pourrait les rendre plus "énergétiques" */
.attack-arrow.direct-attack {
    border-color: gold; /* Couleur dorée pour la flèche */
    box-shadow: 0 0 15px 5px rgba(255, 215, 0, 0.8); /* Aura lumineuse */
    animation: arrowGlow 1.5s infinite alternate;
}

@keyframes arrowGlow {
    from { box-shadow: 0 0 15px 5px rgba(255, 215, 0, 0.8); }
    to { box-shadow: 0 0 25px 8px rgba(255, 215, 0, 1); }
}

/* NOUVEAU STYLE POUR LA ZONE D'ATTAQUE DIRECTE DE FLAVIO VII */
/* NOUVEAU STYLE (FINAL) POUR LA ZONE D'ATTAQUE DIRECTE DE FLAVIO VII */
.highlight-direct-attack {
    /* Propriétés de positionnement */
    position: absolute;
    width: 100%;
    height: 100%;
    cursor: pointer;
    pointer-events: auto;

    /* Nouvel aspect visuel */
    border: 5px solid gold;
    border-radius: 10px;
    box-sizing: border-box;
    background: 
        radial-gradient(circle, rgba(255, 215, 0, 0.2) 0%, rgba(255, 215, 0, 0) 70%),
        linear-gradient(to right, rgba(255, 215, 0, 0.1) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 215, 0, 0.1) 1px, transparent 1px);
    background-size: 100% 100%, 20px 20px, 20px 20px;
    box-shadow: 0 0 30px 10px rgba(255, 215, 0, 0.6);
    
    /* Animation d'apparition et de pulsation */
    opacity: 0;
    animation: 
        fadeInTarget 0.5s forwards ease-out,
        pulseTarget 2s infinite alternate ease-in-out;

    /* ---- AJOUT POUR CENTRER LE TEXTE ---- */

/* Assurez-vous que les animations @keyframes sont bien présentes après */

}

/* NOUVELLE ANIMATION DE PULSATION (CORRIGÉE ET ADOUCIE) */

/* DÉBUT DES STYLES (TUNNEL DE LUMIÈRE) POUR LA FUSION DES LARVES (T02)*/
/* =================================================================== */

@keyframes screenShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
}

body.fusion-shake {
  animation: screenShake 0.4s ease-in-out;
}

#fusionOverlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(10,0,20,0.6) 0%, rgba(5,0,10,0.9) 70%);
  z-index: 8000;
  display: none;
  pointer-events: none;
  backdrop-filter: blur(8px) brightness(0.8);
  overflow: hidden;
}

.fusion-larva {
  position: fixed;
  width: 172px;
  height: 248px;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  z-index: 8001;
  filter: drop-shadow(0 0 20px #abff7d) drop-shadow(0 0 10px #fff);
  opacity: 0;
  transform: scale(0.5);
}

@keyframes larva-fly-in-1 {
  0% { top: 50%; left: -200px; transform: scale(0.5) rotate(-360deg); opacity: 0; }
  100% { top: 35%; left: 35%; transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes larva-fly-in-2 {
  0% { top: 120%; left: 50%; transform: scale(0.5) rotate(360deg); opacity: 0; }
  100% { top: 35%; left: 55%; transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes larva-fly-in-3 {
  0% { top: 50%; left: 120%; transform: scale(0.5) rotate(-360deg); opacity: 0; }
  100% { top: 55%; left: 45%; transform: scale(1) rotate(0deg); opacity: 1; }
}

@keyframes larva-orbit {
  0% { transform: rotate(0deg) translateX(120px) rotate(0deg) scale(1); filter: brightness(1.2); }
  50% { filter: brightness(2.5); }
  100% { transform: rotate(360deg) translateX(120px) rotate(-360deg) scale(1); filter: brightness(1.2); }
}

@keyframes final-fusion-flash {
  0% { transform: scale(1); opacity: 1; filter: brightness(2); }
  100% { transform: scale(0.1); opacity: 0; filter: brightness(200); }
}

.fusion-core {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 50px;
  height: 50px;
  background: radial-gradient(circle, #fff, #7df9ff 50%, rgba(125,249,255,0) 70%);
  border-radius: 50%;
  z-index: 8003;
  opacity: 0;
  transform: translate(-50%, -50%) scale(0);
  filter: blur(5px);
  animation: core-appear 0.3s forwards, core-pulse 1.5s ease-in-out 0.3s forwards; /* 'forwards' pour garder la fin de l'animation */
}

@keyframes core-appear {
  to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
@keyframes core-pulse {
  0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 30px #fff, 0 0 60px #7df9ff, 0 0 90px #00e6ff; opacity: 1; }
  80% { transform: translate(-50%, -50%) scale(2); box-shadow: 0 0 60px #fff, 0 0 120px #7df9ff, 0 0 180px #00e6ff; opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0); box-shadow: 0 0 0px #fff; opacity: 0; } /* Disparaît en s'élargissant */
}

.fusion-anomaly-zoom {
  position: fixed;
  width: 420px;
  height: 600px;
  top: 50%;
  left: 50%;
  /* Commence petit DANS le cœur qui s'élargit */
  transform: translate(-50%, -50%) scale(0.1); 
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  z-index: 8004; /* Doit apparaître AU-DESSUS du cœur qui s'élargit */
  filter: drop-shadow(0 0 40px #00e6ff) drop-shadow(0 0 60px #fffdef);
  opacity: 0;
  /* Animation d'apparition plus douce et progressive */
  animation: anomaly-emerge 1.0s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes anomaly-emerge {
  0% { transform: translate(-50%, -50%) scale(0.1) rotate(0deg); opacity: 0; filter: blur(20px); }
  50% { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); opacity: 1; filter: blur(0px); }
  100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
}
